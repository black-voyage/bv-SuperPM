<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Black Voyage — SuperPM</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://accounts.google.com/gsi/client" async defer></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<style>
  /* ===== BLACK VOYAGE brand system (Brand Guidelines V4) =====
     Primary: Black #111215 · Orange #EE3124 (signal — use strategically)
     Neutrals: Silver #D0D5E1 · Aero White #F6F8FC
     Type: Aeonik (heading/paragraph) · IBM Plex Mono (labels) · rectangles + thin lines */
  :root{
    /* Spatial figure-ground: page sits BELOW its floating panels. Darker page + lighter/contrastier panels = cards visibly float on dark (the v2 tokens were too close in value to read as depth). */
    --bg:#0C0D10; --panel:#1C2029; --panel2:#20242C; --line:#363B45;
    --text:#F6F8FC; --dim:#ADB6C6; --faint:#7B8494;
    --accent:#EE3124; --green:#4ade80; --amber:#fbbf24; --red:#f87171; --blue:#60a5fa; --purple:#c084fc;
    --btntext:#fff;
    /* radius scale (Spatial Console v2) — soft geometry; precision reads through hairlines + alignment, not corners. */
    --r-xs:6px;   /* chips · pills · tags · status squares · progress bars */
    --r-sm:10px;  /* buttons · inputs · selects · rows · nav · tabs */
    --r-md:14px;  /* panels · cards · containers · popovers */
    --r-lg:20px;  /* floating tiles · the chat rail · modals · media wells */
    --r-pill:999px;
    /* depth layers + materials (DESIGN.md — Materials & Depth) */
    --void:#070809;                       /* deepest layer: canvas fields, hero moments */
    --edge:rgba(246,248,252,.18);         /* 1px top-inset light edge on floating surfaces */
    --sh-sm:0 3px 14px rgba(0,0,0,.45);   /* raised controls */
    --sh-md:0 16px 44px rgba(0,0,0,.58);  /* cards · popovers */
    --sh-lg:0 24px 64px rgba(0,0,0,.55);  /* modals · overlays */
    --g2:0 0 50px rgba(244,247,252,.05);  /* G2 neutral surface glow — slabs bloom on the dark field (never orange) */
    --trend-hot:#f87171;                  /* struggling-dept trend line; darkened in the light theme for contrast */
    --glass1:rgba(28,32,41,.78);          /* M1 frosted — panels/cards; translucent enough that field/glow reads, opaque enough for text */
    --glass2:rgba(20,23,29,.55);          /* M2 glass — overlays/menus/chat/header */
    --font-head:"Aeonik","Inter","Helvetica Neue",-apple-system,"Segoe UI",sans-serif;
    --font-mono:"IBM Plex Mono",ui-monospace,Menlo,Consolas,monospace;
    /* Type scale — semantic, rem-based so it respects user zoom (1rem=16px → values match the prior px density exactly).
       Product-register: dense functional band (caption→body in ~1px steps) + a committed hierarchy jump (body→title→display ≈ 1.29×, 1.5×). */
    --fs-caption:0.6875rem; /* 11px · mono captions, legal, meta chips */
    --fs-meta:0.75rem;      /* 12px · column heads, secondary labels */
    --fs-sm:0.8125rem;      /* 13px · .sub, secondary body */
    --fs-body:0.875rem;     /* 14px · body base */
    --fs-title:1.125rem;    /* 18px · section h2 */
    --fs-lg:1.375rem;       /* 22px · dialog / auth h2 */
    --fs-display:1.6875rem; /* 27px · launch page hero title */
    --fs-hero:2.5rem;       /* 40px · display statements (weight 400 — no 300 weight is hosted; auth, empty states — one per surface max) */
    --lh-tight:1.12; --lh-snug:1.3; --lh-body:1.5;   /* leading roles */
  }
  [data-theme="light"]{
    --bg:#F6F8FC; --panel:#FFFFFF; --panel2:#ECEFF5; --line:#D0D5E1;
    --text:#111215; --dim:#4E5666; --faint:#8A93A3;
    --void:#E9EDF4; --edge:rgba(255,255,255,.85);
    /* Light elevation is its OWN system — NOT the dark theme's single black haze. Soft COOL-slate, LAYERED (tight contact + wide ambient) so white panels lift crisply on Aero White; low alpha reads as light air, not dirt. */
    --sh-sm:0 1px 2px rgba(17,24,39,.05),0 2px 8px rgba(41,50,72,.06); --sh-md:0 2px 6px rgba(17,24,39,.05),0 10px 26px rgba(41,50,72,.09),0 20px 44px rgba(41,50,72,.05); --sh-lg:0 4px 12px rgba(17,24,39,.07),0 22px 52px rgba(41,50,72,.13),0 40px 80px rgba(41,50,72,.08);
    --g2:0 0 0 rgba(41,50,72,0);   /* no surface bloom on white — the layered shadow carries depth; a dark glow here only double-hazes the panel (the old dirty-smudge halo) */
    --trend-hot:#dc2626;
    --glass1:rgba(255,255,255,.82); --glass2:rgba(255,255,255,.68);
  }
  /* cool dark-blue theme — dark base with blue glow */
  [data-theme="blue"]{
    --bg:#0D1320; --panel:#14203A; --panel2:#16213A; --line:#2A3A5C;
    --text:#E3EDFB; --dim:#92A8C7; --faint:#61748C;
    --void:#090E18; --edge:rgba(227,237,251,.12);
    --g2:0 0 50px rgba(120,170,255,.06);
    --glass1:rgba(18,26,43,.80); --glass2:rgba(13,19,32,.55);
    --accent:#3D8BFF;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  /* DESIGN.md — keyboard focus visible on every interactive element; mouse focus stays quiet */
  :focus-visible{outline:2px solid var(--accent);outline-offset:2px;border-radius:var(--r-xs)}
  button:focus:not(:focus-visible),summary:focus:not(:focus-visible){outline:none}
  /* DESIGN.md Motion — every animation has a reduced-motion alternative */
  @media (prefers-reduced-motion: reduce){
    *,*::before,*::after{animation-duration:.01ms!important;animation-iteration-count:1!important;transition-duration:.01ms!important;scroll-behavior:auto!important}
  }
  /* living atmosphere — blue-teal ambient glow that slowly drifts (Spatial Console v3, aligned to Fluxa reel).
     Lives on body::before (a STABLE element) so it animates smoothly and never restarts on #app re-render. */
  @keyframes ambientdrift{from{transform:translate3d(-1.5%,-1%,0) scale(1.02)}to{transform:translate3d(2%,1.5%,0) scale(1.09)}}
  body{background-color:var(--bg);background-image:radial-gradient(circle,rgba(246,248,252,.028) 1px,transparent 1.4px);background-size:26px 26px;color:var(--text);font:var(--fs-body)/var(--lh-body) var(--font-head);-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale;text-rendering:optimizeLegibility;font-kerning:normal;font-optical-sizing:auto;font-variant-numeric:tabular-nums;}
  /* ambient depth glow — one neutral halo per view, behind content (fixed, non-interactive, z-index -1) */
  body::before{content:"";position:fixed;inset:-15%;pointer-events:none;z-index:-1;will-change:transform;animation:ambientdrift 26s ease-in-out infinite alternate;background:radial-gradient(1240px 860px at 86% 11%,rgba(61,139,255,.22),transparent 60%),radial-gradient(1080px 780px at 4% 98%,rgba(30,209,233,.15),transparent 58%)}
  [data-theme="light"] body::before{background:radial-gradient(1240px 860px at 86% 11%,rgba(61,139,255,.12),transparent 60%),radial-gradient(1080px 780px at 4% 98%,rgba(30,209,233,.09),transparent 58%)}
  [data-theme="light"] body{background-image:radial-gradient(circle,rgba(17,18,21,.035) 1px,transparent 1.4px);background-size:26px 26px}
  [data-theme="blue"] body{background-image:radial-gradient(circle,rgba(227,237,251,.03) 1px,transparent 1.4px);background-size:26px 26px}
  /* the auth overlay is opaque and above everything — carry the same ambient halo on its own background */
  #authgate{background:radial-gradient(1100px 700px at 85% -12%,rgba(246,248,252,.10),transparent 60%),radial-gradient(900px 640px at -10% 112%,rgba(246,248,252,.06),transparent 60%) var(--bg,#0e0e12)}
  [data-theme="light"] #authgate{background:radial-gradient(1100px 700px at 85% -12%,rgba(17,24,39,.05),transparent 62%),radial-gradient(900px 640px at -10% 112%,rgba(17,24,39,.03),transparent 60%) var(--bg)}
  h2{font-size:var(--fs-title);font-weight:700;letter-spacing:-.018em;line-height:var(--lh-snug);text-wrap:balance}
  /* mono-uppercase = the DATA voice (table heads, column heads, codes). Panel titles moved to sentence case (reference-driven). */
  .col h4,th{font-family:var(--font-mono);font-weight:400;text-transform:uppercase;letter-spacing:.08em}
  .stg,.o,.sla,.checkin .d,.feeditem .d{font-family:var(--font-mono)}
  /* light-theme component overrides */
  [data-theme="light"] .st.x{background:#E9F7EC;border-color:#3E9E5B;color:#1E7E3E}
  [data-theme="light"] .st.p{background:#FFF3E0;border-color:#D68910;color:#A05A00}
  [data-theme="light"] .st.b{background:#FDEAEA;border-color:#D64545;color:#B03030}
  [data-theme="light"] .ok{background:#E9F7EC;color:#1E7E3E} [data-theme="light"] .risk{background:#FFF3E0;color:#A05A00}
  [data-theme="light"] .bad{background:#FDEAEA;color:#B03030} [data-theme="light"] .done{background:#E8F0FE;color:#1A56B0}
  [data-theme="light"] .dec{background:#F3E8FD;color:#7A3FB8}
  [data-theme="light"] .urg.low{background:#E8F0FE;color:#1A56B0} [data-theme="light"] .urg.med{background:#FbF6DD;color:#8a7400}
  [data-theme="light"] .urg.high{background:#FFF0E0;color:#B25E00} [data-theme="light"] .urg.urgent{background:#FDEAEA;color:#B03030}
  [data-theme="light"] .lnk{background:#E8F0FE;color:#1A56B0} [data-theme="light"] .asg{background:#E8EDF6;color:#3C5A8A}
  [data-theme="light"] .stg.past{background:#E9F7EC;color:#1E7E3E;border-color:#bfe5c8}
  [data-theme="light"] .deptchip.rdy{background:#E9F7EC;color:#1E7E3E;border-color:#bfe5c8}
  [data-theme="light"] .flowwrap{background-color:rgba(238,241,247,.82);background-image:radial-gradient(760px 460px at 84% -8%,rgba(61,139,255,.06),transparent 60%),radial-gradient(640px 460px at -6% 106%,rgba(30,209,233,.05),transparent 60%),radial-gradient(circle,rgba(17,18,21,.055) 1px,transparent 1.4px);background-size:auto,auto,24px 24px}
  [data-theme="light"] .taskpanel{background:#EDF1F7;box-shadow:inset 0 1px 3px rgba(41,50,72,.06),inset 0 10px 22px -12px rgba(41,50,72,.10)}   /* recessed inner well in light — cool inset shadow, NOT the dark theme's black inner smudge */
  [data-theme="light"] .bar{background:#E3E8F1}
  body[data-wide] main{max-width:none}
  body[data-wide] footer{max-width:none!important}
  @keyframes glowPulse{0%,100%{opacity:1}50%{opacity:.2}}
  .glownode{animation:glowPulse 1.15s ease-in-out infinite}
  @keyframes dashmove{to{stroke-dashoffset:-32}}
  .routeline{animation:dashmove 1.1s linear infinite}
  /* red dependency arrows — prominent (glow) + animated flow so the prerequisite→step→unblocks chain reads at a glance */
  .depedge{stroke-dasharray:7 5;filter:drop-shadow(0 0 2.5px rgba(238,49,36,.7));animation:dashmove 1s linear infinite}
  @media (prefers-reduced-motion:reduce){.depedge{animation:none;stroke-dasharray:none} .glownode{animation:none} .routeline{animation:none}}
  /* ── Flow-chart entrance choreography (Spatial Console v3 — DESIGN.md Motion) ──
     Plays ONCE per flow-view open (gated in flowSVG via .flowwrap.flowin); never on
     node-click / board-sync re-renders. Read: lane headers → nodes (fade+scale) →
     connectors (draw-in) → endpoint dots + cross links. All hidden/init state lives
     inside no-preference, so reduced-motion users get the finished static chart. */
  @keyframes flowHeadIn{from{opacity:0;transform:translateY(-5px)}to{opacity:1;transform:none}}
  @keyframes flowNodeIn{from{opacity:0}to{opacity:1}}
  @keyframes flowEdgeDraw{from{stroke-dashoffset:1}to{stroke-dashoffset:0}}
  @keyframes flowDotIn{from{opacity:0;transform:scale(.4)}to{opacity:1;transform:none}}
  @keyframes flowCrossIn{from{opacity:0}to{opacity:.5}}
  @media (prefers-reduced-motion:no-preference){
    /* timing tuned so every channel's (max --d + duration) lands ≤600ms total (DESIGN.md Motion budget) */
    .flowwrap.flowin .flowhead{opacity:0;transform-box:fill-box;transform-origin:center;animation:flowHeadIn .30s var(--d,0ms) cubic-bezier(.16,1,.3,1) both}
    /* nodes fade opacity-ONLY: each node body carries a feDropShadow (filter:url(#nsh)); scaling the group would re-rasterize that filter every frame across ~15-20 simultaneous nodes. opacity composites after the filter, so no re-raster. */
    .flowwrap.flowin .flownode{opacity:0;animation:flowNodeIn .32s var(--d,0ms) cubic-bezier(.16,1,.3,1) both}
    .flowwrap.flowin .flowedge{stroke-dasharray:1;stroke-dashoffset:1;animation:flowEdgeDraw .28s var(--d,0ms) cubic-bezier(.16,1,.3,1) both}
    .flowwrap.flowin .flowdot{opacity:0;transform-box:fill-box;transform-origin:center;animation:flowDotIn .18s var(--d,0ms) ease-out both}
    .flowwrap.flowin .flowcross{animation:flowCrossIn .26s var(--d,0ms) ease-out both}
  }
  /* flow-node inline popover — replaces the full-width route banner; fixed so it escapes the chart's overflow (mirrors #summitTip) */
  /* node inspector — M2/M3 glass (real backdrop-blur; sits over the live canvas) */
  #flowPop{position:fixed;z-index:58;display:none;width:300px;max-width:92vw;max-height:calc(100vh - 24px);overflow:auto;background:rgba(22,25,31,.62);backdrop-filter:blur(26px) saturate(1.2);-webkit-backdrop-filter:blur(26px) saturate(1.2);border:1px solid var(--line);border-radius:var(--r-md);box-shadow:inset 0 1px 0 var(--edge),var(--sh-lg);color:var(--text);font-size:12.5px;animation:fpIn .18s cubic-bezier(.16,1,.3,1)}
  [data-theme="light"] #flowPop{background:rgba(255,255,255,.82)}   /* the base is dark glass; on white the inspector needs a LIGHT glass or its var(--text) black copy sits on a dark panel (illegible) */
  @keyframes fpIn{from{opacity:0;transform:translateY(6px);filter:blur(6px)}to{opacity:1;transform:none;filter:blur(0)}}
  .fn-sel{filter:drop-shadow(0 0 4px rgba(238,49,36,.55))}
  .fp-head{display:flex;align-items:flex-start;gap:10px;padding:11px 12px 9px;border-bottom:1px solid var(--line)}
  .fp-h-main{flex:1;min-width:0}
  .fp-title{font-size:13px;font-weight:600;line-height:1.3;overflow-wrap:anywhere}
  .fp-meta{display:flex;gap:6px;align-items:center;flex-wrap:wrap;margin-top:6px}
  .fp-stage{font-family:var(--font-mono);font-size:10px;text-transform:uppercase;letter-spacing:.07em;color:var(--faint);border:1px solid var(--line);border-radius:2px;padding:1px 6px}
  .fp-dec{font-size:10.5px;color:var(--purple)}
  [data-theme="light"] .fp-dec{color:#7A3FB8}
  .fp-lock{font-size:10.5px;color:var(--faint)}
  .fp-x{flex:none;background:none;border:0;color:var(--faint);font-size:15px;line-height:1;cursor:pointer;padding:3px 5px;border-radius:2px}
  .fp-x:hover{color:var(--text);background:var(--panel2)}
  .fp-route{padding:9px 12px;color:var(--dim);line-height:1.5;border-bottom:1px solid var(--line)}
  .fp-route b{color:var(--text);font-weight:600}
  .fp-deps{display:flex;gap:5px;align-items:center;flex-wrap:wrap;margin-top:7px}
  .fp-deplabel{font-family:var(--font-mono);font-size:9.5px;text-transform:uppercase;letter-spacing:.06em;color:var(--faint)}
  .fp-deplabel.fp-deplock{font-size:14px;letter-spacing:0}   /* lock / unlock icon replaces the verbose 等待 / 完成後解鎖 label */
  .fp-dep{display:inline-flex;align-items:center;gap:5px;font-family:var(--font-mono);font-size:10.5px;color:var(--text);background:var(--panel2);border:1px solid var(--line);border-radius:2px;padding:1px 7px}
  /* action bar — primary Complete verb lifted to the top, paired with the step's day estimate on the right */
  .fp-actbar{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:9px 12px;border-bottom:1px solid var(--line)}
  .fp-actbar .btn{padding:7px 14px;font-size:12px}
  .fp-act-note{font-size:11px;color:var(--dim)}
  .fp-days{font-family:var(--font-mono);font-size:10.5px;color:var(--dim);border:1px solid var(--line);background:var(--panel2);border-radius:var(--r-xs);padding:3px 8px;white-space:nowrap;flex:none}
  .fp-days.tbd{color:var(--red);border-color:rgba(248,113,113,.45);background:rgba(248,113,113,.1)}   /* estimate not typed yet → soft-red, matches the days-pending flags */
  /* the 4 add-link buttons sit as an aligned 2×2 grid (was a ragged 3+1 wrap); existing link/code chips span full width above them */
  .fp-linkgrid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:6px;margin-top:4px}
  .fp-linkgrid>*:not(.addlnk){grid-column:1/-1;margin-left:0}
  .fp-linkgrid .addlnk{margin-left:0;width:100%;display:inline-flex;align-items:center;justify-content:center;gap:3px;padding:7px 6px;font-size:11px;white-space:nowrap}
  .fp-dep::before{content:"";width:6px;height:6px;border-radius:50%;background:var(--dc,var(--faint));flex:none}
  .fp-sec{padding:10px 12px;border-bottom:1px solid var(--line)}
  .fp-lab{font-family:var(--font-mono);font-size:10px;text-transform:uppercase;letter-spacing:.07em;color:var(--faint);margin-bottom:8px}
  .fp-links{display:flex;flex-direction:column;gap:5px;margin-bottom:8px;max-height:150px;overflow:auto}
  .fp-lnk{display:flex;align-items:center;gap:6px;background:var(--panel2);border:1px solid var(--line);border-radius:2px;padding:3px 4px 3px 8px}
  .fp-lnk a{flex:1;min-width:0;color:var(--blue);text-decoration:none;font-size:11.5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .fp-lnk a:hover{text-decoration:underline}
  [data-theme="light"] .fp-lnk a{color:#1A56B0}
  .fp-lnkx{flex:none;background:none;border:0;color:var(--faint);cursor:pointer;font-size:12px;line-height:1;padding:2px 4px;border-radius:2px}
  .fp-lnkx:hover{color:var(--red);background:var(--panel)}
  .fp-empty{color:var(--dim);font-size:11.5px}
  .fp-addrow{display:flex;gap:6px}
  .fp-in{flex:1;min-width:0;background:var(--bg);border:1px solid var(--line);border-radius:2px;color:var(--text);font:inherit;font-size:12px;padding:5px 8px}
  .fp-in::placeholder{color:var(--faint)}
  .fp-in:focus{outline:none;border-color:var(--accent)}
  .fp-add{flex:none;background:var(--panel2);border:1px solid var(--line);color:var(--text);border-radius:2px;font-size:11.5px;font-weight:600;padding:0 11px;cursor:pointer}
  .fp-add:hover{border-color:var(--accent);color:var(--accent)}
  .fp-foot{display:flex;align-items:center;justify-content:space-between;gap:10px 12px;padding:10px 12px;flex-wrap:wrap}
  .fp-open{padding:6px 12px;font-size:12px}
  .fp-foot-note{font-size:11px;color:var(--dim)}
  .fp-toggle{display:inline-flex;align-items:center;gap:7px;cursor:pointer;user-select:none;position:relative}
  .fp-toggle input{position:absolute;opacity:0;width:0;height:0;margin:0}
  .fp-sw{position:relative;width:30px;height:17px;border-radius:9px;background:var(--panel2);border:1px solid var(--line);transition:background .18s,border-color .18s;flex:none}
  .fp-sw::after{content:"";position:absolute;top:1px;left:1px;width:13px;height:13px;border-radius:50%;background:var(--faint);transition:transform .18s,background .18s}
  .fp-toggle input:checked + .fp-sw{background:rgba(238,49,36,.22);border-color:var(--accent)}
  .fp-toggle input:checked + .fp-sw::after{transform:translateX(13px);background:var(--accent)}
  .fp-toggle input:focus-visible + .fp-sw{outline:2px solid var(--accent);outline-offset:2px}
  .fp-sw-t{font-family:var(--font-mono);font-size:10px;text-transform:uppercase;letter-spacing:.04em;color:var(--faint)}
  .fp-toggle input:checked ~ .fp-sw-t{color:var(--dim)}
  @media (prefers-reduced-motion: reduce){#flowPop{animation:none}}
  /* ===== SuperPM layer ===== */
  .sla{display:inline-block;padding:2px 9px;border-radius:var(--r-xs);font-size:11px;font-weight:700;margin-left:6px;font-family:var(--font-mono)}
  .sla.ok{background:#14331f;color:var(--green)} .sla.over{background:#331414;color:var(--red);animation:pulse 1.4s infinite}
  [data-theme="light"] .sla.ok{background:#E9F7EC;color:#1E7E3E} [data-theme="light"] .sla.over{background:#FDEAEA;color:#B03030}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.55}}
  .iconbtn{background:var(--panel2);border:1px solid var(--line);color:var(--dim);border-radius:var(--r-sm);padding:6px 11px;cursor:pointer;font-size:13px}
  .iconbtn:hover{color:var(--text);border-color:var(--accent)}
  .navtools{display:flex;align-items:center;gap:7px;flex-wrap:wrap}   /* right-side controls cluster tightly (was 18px header gap = too spread) */
  .drawer{position:fixed;top:0;right:-420px;width:400px;max-width:92vw;height:100vh;background:var(--glass2);backdrop-filter:blur(22px);-webkit-backdrop-filter:blur(22px);border-left:1px solid var(--line);z-index:40;transition:right .25s;display:flex;flex-direction:column}
  .drawer.openD{right:0}
  .drawer .dh{padding:14px 16px;border-bottom:1px solid var(--line);display:flex;gap:8px;align-items:center}
  .drawer .db{flex:1;overflow-y:auto;padding:12px 16px}
  .feeditem{border:1px solid var(--line);border-radius:var(--r-md);padding:6px 10px;margin-bottom:8px;font-size:12.5px}
  .feeditem .d{color:var(--faint);font-size:11px}
  .pal{position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:60;display:flex;align-items:flex-start;justify-content:center;padding-top:12vh}
  .palbox{width:560px;max-width:92vw;background:var(--glass2);backdrop-filter:blur(22px);-webkit-backdrop-filter:blur(22px);border:1px solid var(--line);overflow:hidden;box-shadow:inset 0 1px 0 var(--edge),var(--sh-lg)}

  .tnotes-head{font-family:var(--font-mono);text-transform:uppercase;letter-spacing:.06em;font-size:11px;color:var(--faint);margin:12px 0 7px;padding-top:11px;border-top:1px solid var(--line)}
  .tnotes{display:flex;flex-direction:column}
  .tnote{border-top:1px solid var(--line);padding:6px 0;font-size:13px}
  .tnote:first-child{border-top:none}
  .tnote-m{color:var(--faint);font-size:11px;font-family:var(--font-mono);letter-spacing:.03em;margin-bottom:1px}
  .tnote-t{line-height:1.45}
  .tnote-add{display:flex;gap:6px;margin-top:8px}
  .tnote-add input{flex:1;background:var(--panel2);border:1px solid var(--line);border-radius:var(--r-sm);color:var(--text);padding:7px 9px;font-size:13px;font-family:inherit}
  .tnote-h{display:flex;align-items:baseline;justify-content:space-between;gap:8px}
  .tnote-x{color:var(--red);opacity:.5;font-size:11px;flex:none}
  .tnote-x:hover{opacity:1}
  .tnote-tools{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-top:7px}
  .tnote-plus{background:var(--panel2);border:1px solid var(--line);border-radius:var(--r-xs);color:var(--dim);cursor:pointer;font-size:12px;padding:4px 10px}
  .tnote-plus:hover{color:var(--text);border-color:var(--accent)}
  .tnote-tool{display:inline-flex;align-items:center;gap:6px}
  .tnote-tool label{font-size:11px;color:var(--faint);text-transform:uppercase;letter-spacing:.05em;font-family:var(--font-mono)}
  .tnote-tool select{background:var(--panel2);border:1px solid var(--line);border-radius:var(--r-sm);color:var(--text);padding:4px 6px;font-size:12px;font-family:inherit}
  /* workflow template (settings → step ownership) */
  .tpl-stage{margin-bottom:14px}
  .tpl-tbl{width:100%;border-collapse:collapse}
  .tpl-tbl th{text-align:left;font-family:var(--font-mono);text-transform:uppercase;letter-spacing:.06em;font-size:11px;color:var(--faint);font-weight:400;padding:4px 8px;border-bottom:1px solid var(--line)}
  .tpl-tbl td{padding:7px 8px;border-bottom:1px solid var(--line);vertical-align:top;font-size:13px}
  .tpl-tbl tr:last-child td{border-bottom:none}
  .tpl-step{line-height:1.4}
  .tpl-resp,.tpl-add{background:var(--panel2);border:1px solid var(--line);border-radius:var(--r-sm);color:var(--text);padding:5px 7px;font-size:12.5px;font-family:inherit}
  .tpl-collabs{display:flex;flex-wrap:wrap;gap:5px;align-items:center}
  .collab-chip{display:inline-flex;align-items:center;gap:5px;border:1px solid var(--c,var(--line));color:var(--c,var(--text));border-radius:var(--r-xs);padding:1px 4px 1px 8px;font-size:12px}
  .collab-chip button{background:none;border:none;color:inherit;cursor:pointer;opacity:.7;font-size:11px;padding:0 2px;line-height:1}
  .collab-chip button:hover{opacity:1}
  /* ---- V3 (Shopify flow) dashboard + rows ---- */
  .v3code{display:inline-block;font-weight:600;font-size:10px;color:var(--accent);background:var(--panel2);border:1px solid var(--line);border-radius:3px;padding:0 5px;margin-right:4px;vertical-align:1px}
  .v3days-fx{color:var(--faint);font-size:11px;margin-left:10px;white-space:nowrap}
  .v3days-in{color:var(--faint);font-size:11px;margin-left:10px;white-space:nowrap}
  .v3days-in input{width:52px;background:var(--panel2);border:1px solid var(--line);color:var(--text);border-radius:4px;padding:2px 4px;font-size:11px}
  .v3note{color:var(--faint);font-size:11px;margin:-4px 0 6px 34px}
  .v3sample{color:var(--dim);font-size:12px;margin:-2px 0 6px 34px}
  .v3sample input{background:var(--panel2);border:1px solid var(--line);color:var(--text);border-radius:4px;padding:2px 6px;font-size:12px}
  /* V3 detail panel — coherent info block shared by locked + open rows */
  /* KV info grid — labels align in one column, values in the next (DESIGN.md §Components KV rows); display:contents lets each row's k/v join the parent grid so nothing packs 2-per-row */
  .v3det{display:grid;grid-template-columns:max-content 1fr;gap:8px 18px;margin:2px 0 6px;font-size:13px;align-items:baseline}
  .v3det-r{display:contents}
  .v3det-k{font-family:var(--font-mono);font-size:10px;text-transform:uppercase;letter-spacing:.06em;color:var(--faint);white-space:nowrap}
  .v3det-v{color:var(--text);line-height:1.45;min-width:0;overflow-wrap:anywhere}
  .v3dod{margin:0 0 2px;color:var(--dim);font-size:13px;line-height:1.5}
  .v3dod b{color:var(--text);font-weight:600}
  .v3det-lock{background:#1d1417;border:1px solid #4a2530;color:#f0b9c0;border-radius:var(--r-sm);padding:7px 10px;font-size:12.5px;margin-bottom:10px}
  /* shot list (MS3a/b) */
  .v3shots{background:var(--panel2);border:1px solid var(--line);border-radius:var(--r-sm);padding:9px 11px;margin-bottom:10px}
  .v3shots-h{font-family:var(--font-mono);text-transform:uppercase;letter-spacing:.05em;font-size:10.5px;color:var(--dim);display:flex;align-items:center;gap:8px;margin-bottom:8px}
  .v3shots-tot{margin-left:auto;color:var(--accent);font-weight:700}
  .v3shot-r{display:flex;align-items:center;gap:8px;padding:3px 0}
  .v3shot-l{flex:1;font-size:12.5px;color:var(--text)}
  .v3shot-q{width:58px;background:var(--panel);border:1px solid var(--line);color:var(--text);border-radius:4px;padding:2px 6px;font-size:12.5px;font-family:var(--font-mono);text-align:right}
  .v3shot-x{background:none;border:0;color:var(--faint);cursor:pointer;font-size:12px;padding:2px 4px;border-radius:4px}
  .v3shot-x:hover{color:var(--red);background:rgba(248,113,113,.1)}
  .v3shot-add{margin-top:6px;background:none;border:1px dashed var(--line);color:var(--dim);border-radius:var(--r-sm);padding:4px 10px;font-size:12px;cursor:pointer;font-family:inherit}
  .v3shot-add:hover{border-color:var(--accent);color:var(--text)}
  .v3shots-note{margin-top:7px;font-size:11px;color:var(--faint);line-height:1.5}
  .v3strip .v3strip-top{display:flex;flex-wrap:wrap;align-items:center;gap:10px}
  .v3strip-k{font-weight:700}
  .v3light{padding:3px 10px;border-radius:14px;font-size:12px;border:1px solid var(--line);background:var(--panel2)}
  .v3light.go{border-color:#4ade80;color:#4ade80;background:rgba(74,222,128,.09)}
  .v3light.pre{border-color:#fbbf24;color:#fbbf24;background:rgba(251,191,36,.09)}
  .v3light.no{color:var(--dim)}
  .v3target{font-size:12px;color:var(--dim);display:flex;align-items:center;gap:6px}
  .v3target input{background:var(--panel2);border:1px solid var(--line);color:var(--text);border-radius:4px;padding:2px 6px}
  .v3strip-go{margin-left:auto;display:flex;gap:8px}
  .v3grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
  @media(max-width:980px){.v3grid{grid-template-columns:1fr}}
  .v3assets{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:8px}
  .v3asset{border:1px solid var(--line);background:var(--panel2);border-radius:8px;padding:8px 10px;cursor:pointer}
  .v3asset:hover{border-color:var(--accent)}
  .v3asset.ok{border-color:rgba(74,222,128,.5);background:rgba(74,222,128,.07)}
  .v3asset.warn{border-color:rgba(251,191,36,.5);background:rgba(251,191,36,.07)}
  .v3asset.bad{border-color:rgba(248,113,113,.5);background:rgba(248,113,113,.07)}
  .v3asset.lock{opacity:.55}
  .v3asset-n{font-weight:600;font-size:12.5px;margin-bottom:3px}
  .v3asset-s{font-size:11px;color:var(--dim)}
  .v3asset-m{display:flex;justify-content:space-between;font-size:10.5px;margin-top:4px}
  .v3late{color:#fbbf24;font-weight:700;margin-left:6px}
  .v3lrow{display:flex;align-items:center;gap:8px;padding:4px 2px;font-size:12.5px;cursor:pointer;border-bottom:1px solid var(--line)}
  .v3lrow:last-child{border-bottom:none}
  .v3lrow.done{color:var(--dim)}
  .v3lrow .o{margin-left:auto}
  .v3anchors{display:grid;grid-template-columns:1fr 1fr;gap:6px 14px;margin:4px 0 10px}
  .v3anchors>div{display:flex;justify-content:space-between;gap:8px;font-size:12px;color:var(--dim);border:1px solid var(--line);background:var(--panel2);border-radius:6px;padding:5px 9px}
  .v3anchors b{color:var(--text)}
  .panel.v3cur{border-color:var(--accent)}
  .ld-cardhead{display:flex;align-items:center;gap:8px;margin:2px 0 10px}
  .ld-flowhide{margin-left:auto}
  .ld-cardnav{display:inline-flex;gap:6px;vertical-align:middle}
  .ld-cardtab{background:var(--panel2);border:1px solid var(--line);color:var(--dim);font-size:12px;padding:4px 11px;border-radius:var(--r-pill,14px);cursor:pointer;font-family:inherit}
  .ld-cardtab:hover{color:var(--text);border-color:var(--accent)}
  .ld-cardtab.on{background:var(--accent);border-color:var(--accent);color:#fff}
  </style>
</head>

const taskDayLimit=t=>{const n=V3MAP[t.code]||{};return t.days!=null?t.days:(n.days!=null?n.days:(n.est||0));};

    const days=Math.max(1,dayDiff(h.start,end));

// per-dept cumulative-delay time series (N samples, launch start → today) for the trend sparklines;
// each overrun accrues linearly from the day its stage's budget ran out to the day the stage ended
function delayTrend(N=24){
  const iv=[];
  LAUNCHES.forEach(l=>{const hs=l.history||[];segments(l).forEach((s,i)=>{
    if(!(s.over&&s.blame.length)||!hs[i])return;
    const end=hs[i].end||(hs[i+1]?hs[i+1].start:today);
    const start=new Date(D(hs[i].start).getTime()+s.plan*864e5).toISOString().slice(0,10);

  iv.forEach(x=>depts[x.dept]=depts[x.dept]||new Array(N).fill(0));

// {t0, series:{name:number[N]}} so a real time-axis chart can be drawn. Portfolio total = sum of series per sample.
function delayTrendByLaunch(N=24){
  const iv=[];
  LAUNCHES.forEach(l=>{const hs=l.history||[]; segments(l).forEach((s,i)=>{
    if(!s.over||!hs[i])return;
    const end=hs[i].end||(hs[i+1]?hs[i+1].start:today);
    const start=v3AddD(hs[i].start,s.plan);   // the day the stage's day-budget ran out
    iv.push({slug:l.slug,start,end,amt:s.over});   // key by slug (unique) — two launches can share a display name
  });});

  const t0=iv.reduce((a,x)=>x.start<a?x.start:a,today);

  const total=new Array(N).fill(0);
  for(let k=0;k<N;k++){ const t=D(t0).getTime()+span*(N<2?0:k/(N-1));   // guard N=1 (0/0 → NaN)
    iv.forEach(x=>{const a=D(x.start).getTime(),b=Math.max(a+864e5,D(x.end).getTime());
      const v=x.amt*Math.max(0,Math.min(1,(t-a)/(b-a))); series[x.slug][k]+=v; total[k]+=v;});

/* ================= PRODUCT HEALTH OVERVIEW (V3) =================
   All read-only derivations off the req DAG + per-task day limits + actual timestamps.
   No new stored fields — startAt/doneAt already exist (auto-stamped on cycle, hand-editable in the detail panel). */
const v3DayOf=(l,c)=>{const t=v3Task(l,c),n=V3MAP[c]||{};return t?(taskDayLimit(t)||0):(n.days!=null?n.days:(n.est||0));};
// planned start/end for every node, laid out along the req DAG: a step's planned start = the latest
// planned end among its prerequisites (anchored at the card's first stage-start), end = start + its day limit.
function v3Schedule(l){
  const anchor=(l.history&&l.history[0]&&l.history[0].start)||today, sched={};
  const walk=c=>{
    if(c in sched)return sched[c];
    sched[c]={plannedStart:anchor,plannedEnd:anchor};   // placeholder = cycle guard (template is a DAG)
    const n=V3MAP[c]||{}; let start=anchor;
    (n.req||[]).forEach(r=>{if(V3MAP[r]){const pe=walk(r).plannedEnd; if(pe>start)start=pe;}});
    const d=v3DayOf(l,c), end=v3AddD(start,d), t=v3Task(l,c);
    return sched[c]={code:c,dept:n.dept||"",plan:d,plannedStart:start,plannedEnd:end,

function v3CriticalPath(l){
  const memo={};

    if(c in memo)return memo[c];
    memo[c]={len:0,path:[c]};                            // guard
    const n=V3MAP[c]||{}; let bl=0,bp=[];
    (n.req||[]).forEach(r=>{if(V3MAP[r]){const b=best(r); if(b.len>bl){bl=b.len;bp=b.path;}}});
    return memo[c]={len:bl+v3DayOf(l,c),path:[...bp,c]};
  };

/* ── 上市日期模型：開啟日（建卡）· Form 送出日（C1 完成）· 預計上市日（＝送出日＋關鍵路徑天數）──

function v3jumpDept(slug,dept){
  const l=L(slug); if(!l)return;
  const inDept=(l.tasks||[]).filter(t=>t.d===dept); if(!inDept.length)return;
  const open=inDept.filter(t=>t.st!=="x");
  // blocked → in-progress → next unlocked → first open → (all done) last task in the dept, so the click always lands somewhere
  const pick=open.find(t=>t.st==="b")||open.find(t=>t.st==="p")||open.find(t=>!taskLocked(l,t))||open[0]||inDept[inDept.length-1];
  jumpTask(slug,l.tasks.indexOf(pick));
}

/* ================= SUPER PM ENGINE ================= */
const SLA_DAYS=2, WIP_LIMIT=4;
const LOG=[{d:"2026-06-10 08:00",m:"SuperPM fork initialized from Tracker v2"}];
function log(m){LOG.unshift({d:today+" "+String(8+LOG.length%9).padStart(2,"0")+":"+String(LOG.length*7%60).padStart(2,"0"),m}); if(LOG.length>250)LOG.pop(); save();}
function floatDays(l){ if(l.complete) return 0;
  const cur=segments(l).find(s=>s.cur); const remainCur=cur?Math.max(0,cur.plan-cur.days):0;
  const future=STAGES.slice(STAGES.indexOf(l.stage)+1).reduce((a,s)=>a+stageDayBudget(l,s),0);
  return dayDiff(today,l.target)-(remainCur+future);
}
function velocity(l){ const weeks=Math.max(1,dayDiff(l.history[0].start,today)/7);
  return l.tasks.filter(t=>t.st==="x").length/weeks; }
function forecastDate(l){ if(l.complete) return l.target;
  const rem=l.tasks.filter(t=>t.st!=="x").length; const vpd=Math.max(velocity(l)/7,0.05);
  return new Date(D(today).getTime()+Math.ceil(rem/vpd)*864e5).toISOString().slice(0,10); }
function criticalNext(l){ const g=gateState(l); const c=g.cs.find(c=>c.task.st!=="x"); return c?{t:c.t,d:c.d}:null; }
// which department progress is currently sitting with — derived from the next unmet gate criterion, NOT a manually-chosen DRI
function progressDept(l){ if(l.complete)return ""; const cn=criticalNext(l); return cn?cn.d:""; }
const wip=d=>LAUNCHES.filter(l=>!l.complete).reduce((a,l)=>a+l.tasks.filter(t=>t.d===d&&t.st==="p").length,0);
const decisionAge=(l,t)=>{const d=(l.decisionRequested||{})[t]; return d?dayDiff(d,today):0;};

function autopilot(){ // the auto-correct brain: detect → propose → one-click (or bulk) fix
  const issues=[];
  benQueue().forEach(({l,c})=>{const age=decisionAge(l,c.t); const br=age>SLA_DAYS;
    issues.push({sev:br?"red":"amber",msg:`◆ ${l.name} — “${c.t}” waiting ${age}d${br?" (SLA "+SLA_DAYS+"d breached)":""}`,
      fixLabel:"Escalate",fix:br?()=>{const t=l.tasks.find(x=>x.t===c.t); t.urg="urgent";
        l.checkins.unshift({d:today,a:"Autopilot",txt:`Escalated “${c.t}” — decision SLA breached (${age}d); flagged for Ben in the decision queue.`});
        log("⚡ Escalated "+l.name+" ◆ gate (SLA breach)");}:null});});
  LAUNCHES.filter(l=>!l.complete).forEach(l=>{
    const last=l.checkins[0], staleD=last?dayDiff(last.d,today):99;
    if(staleD>7) issues.push({sev:"amber",msg:`📝 ${l.name}: check-in ${staleD}d old`,fixLabel:"Nudge DRI",
      fix:()=>{l.checkins.unshift({d:today,a:"Autopilot",txt:`Auto-nudge sent to DRI (${l.dri}) — weekly check-in overdue.`});log("⚡ Nudged "+l.name+" DRI");}});
    l.tasks.filter(t=>t.st==="b").forEach(t=>issues.push({sev:"red",msg:`⛔ ${l.name}: “${t.t}” blocked (${t.d})`,fixLabel:"Escalate",
      fix:t.urg!=="urgent"?()=>{t.urg="urgent";l.checkins.unshift({d:today,a:"Autopilot",txt:`Escalated blocked “${t.t}” to urgent; Director alerted.`});log("⚡ Escalated blocked task on "+l.name);}:null}));
    l.tasks.filter(t=>t.st==="x"&&EVID.has(t.t)&&!(t.links||[]).length).forEach(t=>issues.push({sev:"amber",
      msg:`📎 ${l.name}: “${t.t}” marked done without evidence`,fixLabel:"Reopen",
      fix:()=>{t.st="p";l.checkins.unshift({d:today,a:"Autopilot",txt:`Reopened “${t.t}” — evidence link missing (playbook rule).`});log("⚡ Reopened "+l.name+" / "+t.t);}}));
    const fl=floatDays(l);
    if(fl<0) issues.push({sev:"red",msg:`📉 ${l.name}: float ${fl}d — forecast ${fmt(forecastDate(l))} vs target ${fmt(l.target)}`,fixLabel:null,fix:null});
  });
  DEPTS().forEach(d=>{const w=wip(d); if(w>WIP_LIMIT) issues.push({sev:"amber",msg:`🌊 ${d}: WIP ${w} over limit ${WIP_LIMIT}`,fix:null});});
  return issues;
}
function autoFixAll(){ let n=0; autopilot().forEach(i=>{if(i.fix){i.fix();n++;}});
  toast(n?`⚡ Auto-corrected ${n} issue(s) — all logged`:"✨ Nothing to fix"); render(); }

/* ----- portfolio health score (0–100) ----- */
function healthScore(){
  let s=100; const act=LAUNCHES.filter(l=>!l.complete);
  act.forEach(l=>{
    s-=l.tasks.filter(t=>t.st==="b").length*8;
    if(floatDays(l)<0)s-=15;
    const last=l.checkins[0]; if(!last||dayDiff(last.d,today)>7)s-=5;
  });
  benQueue().forEach(({l,c})=>{if(decisionAge(l,c.t)>SLA_DAYS)s-=12;});
  DEPTS().forEach(d=>{if(wip(d)>WIP_LIMIT)s-=5;});
  return Math.max(10,Math.min(100,s));
}
const grade=s=>s>=90?"A":s>=80?"B":s>=70?"C":s>=55?"D":"F";
function gaugeSVG(s){const R=42,C=2*Math.PI*R,f=s/100;
  const col=s>=80?"#4ade80":s>=60?"#fbbf24":"#f87171";
  return `<svg width="110" height="110" viewBox="0 0 110 110"><circle cx="55" cy="55" r="${R}" fill="none" stroke="#1d2127" stroke-width="11"/>
  <circle cx="55" cy="55" r="${R}" fill="none" stroke="${col}" stroke-width="11" stroke-linecap="round"
    stroke-dasharray="${(C*f).toFixed(1)} ${C.toFixed(1)}" transform="rotate(-90 55 55)"/>
  <text x="55" y="52" text-anchor="middle" fill="${col}" font-size="24" font-weight="700">${s}</text>
  <text x="55" y="70" text-anchor="middle" fill="#9aa3ad" font-size="11">grade ${grade(s)}</text></svg>`;}

/* ----- weekly digest (paste into Slack) ----- */
function buildDigest(){
  const lines=[`*BV PORTFOLIO DIGEST — week of ${fmt(today)}*`,""];
  LAUNCHES.filter(l=>!l.complete).forEach(l=>{
    const g=gateState(l),[h]=health(l),cn=criticalNext(l);
    lines.push(`*${l.name}* — ${l.stage} (${g.met}/${g.total} gate criteria) · ${h}`);
    lines.push(`  DRI ${l.dri} · target ${fmt(l.target)} · float ${floatDays(l)}d · forecast ${fmt(forecastDate(l))}`);
    if(cn) lines.push(`  → critical next: ${cn.t} (${cn.d})`);
    l.tasks.filter(t=>t.st==="b").forEach(t=>lines.push(`  ⛔ blocked: ${t.t} (${t.d})`));
    lines.push("");
  });
  const q=benQueue();
  if(q.length){lines.push(`*◆ DECISIONS WAITING ON BEN (SLA ${SLA_DAYS}d)*`);
    q.forEach(({l,c})=>lines.push(`  • ${l.name} — ${c.t} (${decisionAge(l,c.t)}d)`)); lines.push("");}
  const iss=autopilot();
  lines.push(`*AUTOPILOT* — ${iss.length} open issue(s), health score ${healthScore()}/100 (${grade(healthScore())})`);
  const z=LAUNCHES.filter(l=>l.complete);
  if(z.length)lines.push(`\n_Complete: ${z.map(l=>l.name).join(", ")}_`);
  return lines.join("\n");
}

/* ----- create a Drive folder for a launch, inside the shared "BV SuperPM" folder -----
   Called from newLaunch(). Best-effort: if Google isn't configured/signed-in, the card is
   still created locally and we just skip (or surface a hint). The folder id is stored on the
   launch so every Sheet/Doc generated for it lands inside its own folder. */
function createLaunchFolder(slug,_tries){
  const l=L(slug); if(!l)return;
  if(!GOOGLE_CLIENT_ID)return;            // Google not configured → skip silently, card already created
  if(l.driveFolderId)return;             // already has a folder → don't create a duplicate
  if(!gReady()){                         // the Google sign-in lib loads `async defer`, so on a fresh page it often
    const n=_tries||0;                   // isn't ready the instant a launch is created → WAIT for it instead of
    if(n>40){ toast("Google Drive isn't ready yet — open the card and tap 📁 Folder to create it."); return; } // skipping (this was why the folder never got created)
    setTimeout(()=>createLaunchFolder(slug,n+1),250); return;   // retry every 250ms, up to ~10s
  }
  if(GAUTH.token&&!gHasDrive())GAUTH.token=null; // drop a stale token lacking Drive access so we re-consent
  const fname="BV-SuperPM-"+l.name; // folder named after the product, matching the Doc/Sheet naming
  toast(LANG==="zh"?"正在建立 Drive 資料夾「"+fname+"」…":"Creating Drive folder “"+fname+"”…");
  gGetToken(true).then(tok=>{
    if(!gHasDrive())throw {kind:"noscope"};
    const body={name:fname,mimeType:"application/vnd.google-apps.folder"};
    if(GOOGLE_FOLDER_ID)body.parents=[GOOGLE_FOLDER_ID]; // nest inside the shared "BV SuperPM" folder
    return fetch("https://www.googleapis.com/drive/v3/files?fields=id,webViewLink,name",{method:"POST",
      headers:{"Authorization":"Bearer "+tok,"Content-Type":"application/json"},
      body:JSON.stringify(body)})
    .then(r=>r.json()).then(d=>{ if(!d.id)throw ((d.error&&d.error.message)||"create failed");
      // auto-share: anyone with the link can edit, like the generated Sheets/Docs
      return fetch("https://www.googleapis.com/drive/v3/files/"+d.id+"/permissions",{method:"POST",
        headers:{"Authorization":"Bearer "+tok,"Content-Type":"application/json"},
        body:JSON.stringify({role:"writer",type:"anyone"})}).then(()=>d).catch(()=>d); });
  }).then(d=>{
    const cur=L(slug); if(!cur)return;
    cur.driveFolderId=d.id; cur.driveFolderUrl=d.webViewLink||("https://drive.google.com/open?id="+d.id);
    cur.checkins.unshift({d:today,a:actor(),txt:`Drive folder “${d.name||fname}” created in BV SuperPM (anyone-with-link can edit) — new files for this launch are saved there.`});
    log("📁 Drive folder created: "+(d.name||fname)+(GAUTH.email?(" · by "+GAUTH.email):"")); save(); render();
    toast(LANG==="zh"?"📁 Drive 資料夾「"+(d.name||fname)+"」已在 BV SuperPM 建立":"📁 Drive folder “"+(d.name||fname)+"” created in BV SuperPM");
  }).catch(err=>{
    if(err&&err.kind==="noscope"){toast("Folder not created — re-connect Google and CHECK the “Google Drive” box.");}
    else if(err&&(err.kind==="denied"||err.kind==="unconfigured")){/* sign-in cancelled — card still created locally */}
    else{toast(LANG==="zh"?"無法建立 Drive 資料夾:"+(typeof err==="string"?err:"需要登入,或被你的組織封鎖"):"Couldn't create Drive folder: "+(typeof err==="string"?err:"sign-in needed or blocked by your org"));}
  });
}

   every load heals the stored board and prevents removed steps from ever lingering again.

function reconcileLaunchTasks(){

  if(!valid.size) return 0;                 // safety: if GATES is somehow empty, strip nothing

function migrateDeptReqToLogistics(){
  const OLDS=["Department requirements collected","Logistics execution","Send marketing samples"], NEW="Deploy marketing samples";
  const isOld=x=>x&&OLDS.indexOf(x)>=0; let changed=false;
  // GATES: rename + re-own to Logistics + reorder so it follows "Mass production complete"

    const i=arr.findIndex(c=>c&&isOld(c.t)); if(i<0)return; const c=arr[i]; c.t=NEW; c.d="Logistics";
    arr.splice(i,1); const mp=arr.findIndex(c=>c&&c.t==="Mass production complete");
    if(mp>=0)arr.splice(mp+1,0,c); else arr.push(c); changed=true; });

  if(Array.isArray(FLOW.Logistics)&&!FLOW.Logistics.some(n=>n&&n.t===NEW)){
    const di=FLOW.Logistics.findIndex(n=>n&&n.t==="Dispatch details & tracking filed");
    const node={l:NEW,s:"Production",t:NEW}; if(di>=0)FLOW.Logistics.splice(di,0,node); else FLOW.Logistics.push(node); changed=true; }
  // XROUTES: rename the key and any [dept,label] reference to the new dept + name
  Object.keys(XROUTES).forEach(key=>{ const steps=XROUTES[key];
    if(Array.isArray(steps))steps.forEach(p=>{ if(Array.isArray(p)&&isOld(p[1])){ p[0]="Logistics"; p[1]=NEW; changed=true; } });
    OLDS.forEach(OLD=>{ if(key.endsWith("|"+OLD)){ XROUTES["Logistics|"+NEW]=XROUTES[key]; delete XROUTES[key]; changed=true; } }); });
  // every card's task copy: rename + re-own + reorder after "Mass production complete"
  LAUNCHES.forEach(l=>{ if(!Array.isArray(l.tasks))return;
    const i=l.tasks.findIndex(t=>t&&isOld(t.t)); if(i<0)return; const t=l.tasks[i]; t.t=NEW; t.d="Logistics";
    l.tasks.splice(i,1); const mp=l.tasks.findIndex(t=>t&&t.t==="Mass production complete");
    if(mp>=0)l.tasks.splice(mp+1,0,t); else l.tasks.push(t); changed=true; });

}

function pushVersion(entry){ // shared → Firestore (everyone sees it); local → localStorage

}
function recordVersion(){
  try{
    const snap=verSnap();
    if(_lastVerKey===null){ _lastVerKey=snap;
      if(!VERSIONS.length && !fbConfigured()){VERSIONS.unshift({id:1,ts:nowStamp(),who:actor(),summary:"Baseline — version history started here",sections:[],changes:[],snap}); saveVersions();}
      return; }
    if(snap===_lastVerKey)return;
    const d=diffState(JSON.parse(_lastVerKey),JSON.parse(snap));
    pushVersion({ts:nowStamp(),who:actor(),summary:_verNote||d.summary,sections:d.sections,changes:_verNote?[_verNote].concat(d.detail):d.detail,snap});
    _verNote=null; _lastVerKey=snap;
  }catch(e){}
}
function recordRemoteVersion(who,newSnapStr){
  try{
    if(_lastVerKey===null||_lastVerKey===newSnapStr) return; // no baseline yet, or no change
    const d=diffState(JSON.parse(_lastVerKey),JSON.parse(newSnapStr));
    const id=(VERSIONS[0]?VERSIONS[0].id:0)+1;
    VERSIONS.unshift({id,ts:nowStamp(),who:(who||"someone")+" · remote",summary:d.summary,sections:d.sections,changes:d.detail,snap:newSnapStr});
    if(VERSIONS.length>80)VERSIONS.length=80; saveVersions();
  }catch(e){}
}

      if(!fromCache){ FB.serverSeen=true; FB.synced=true; fbStatus("● live (shared)","var(--green)"); }  // authoritative server data has arrived
      if(!snap.exists){ if(!fromCache) fbWriteNow(true); return; }   // seed the cloud ONLY when the SERVER confirms there is no board — NEVER from a cache miss (that was wiping fresh sign-ins with the demo seed)

const PROJ_SHEET_ID="1xVC0DtMZKyT1Mm5l2PPa_gFcBC3w19HgawdKLNISeCk";

function projCsvUrl(tab){return `https://docs.google.com/spreadsheets/d/${PROJ_SHEET_ID}/gviz/tq?tqx=out:csv&sheet=${encodeURIComponent(tab)}`;}
// CSV parser with quote handling — ported verbatim from the portal's parseCSV.
function parseCSV(text){
  const rows=[]; let cur="", inQ=false, row=[];
  for(let i=0;i<text.length;i++){const c=text[i];
    if(inQ){ if(c==='"'){ if(text[i+1]==='"'){cur+='"';i++;} else inQ=false; } else cur+=c; }
    else if(c==='"') inQ=true;
    else if(c===',') {row.push(cur.trim());cur="";}
    else if(c==='\n'||c==='\r'){ if(c==='\r'&&text[i+1]==='\n')i++; row.push(cur.trim());cur=""; if(row.some(x=>x!==""))rows.push(row); row=[]; }
    else cur+=c;
  }
  row.push(cur.trim()); if(row.some(x=>x!==""))rows.push(row);
  return rows;
}
// Fetch a tab → array of objects keyed by header. Header keyed on first whitespace
// token (recovers schema if a header cell gets a bad paste), same as the portal.
async function fetchSheet(tab){
  let res; try{ res=await fetch(projCsvUrl(tab)); }catch(e){ console.error("[projects] fetch failed: "+tab,e); return []; }
  if(!res.ok){ console.error("[projects] sheet "+tab+" → HTTP "+res.status); return []; }
  const rows=parseCSV(await res.text());
  if(rows.length<2) return [];
  const headers=rows[0].map(h=>(h||"").split(/\s+/)[0]);
  return rows.slice(1).map(r=>{const o={}; headers.forEach((h,i)=>{ if(h)o[h]=r[i]||""; }); return o;});
}

// V3 bilingual: EN base → ZH (auto-generated). tx() runs on ESCAPED html, so names containing "&"
// also need their &amp; form registered, else e.g. "Prototype & Delivery" won't match and stays English.
[...V3,...V3PH].forEach(o=>{const e=o.en,z=o.zh;ZH[e]=z; if(e.indexOf("&")>=0)ZH[e.replace(/&/g,"&amp;")]=z;});
const ZHRE=Object.entries(ZH).sort((a,b)=>b[0].length-a[0].length).map(([k,v])=>{
  const e=k.replace(/[.*+?^${}()|[\]\\]/g,"\\$&");
  return [new RegExp((/^\w/.test(k)?"\\b":"")+e+(/\w$/.test(k)?"\\b":""),"g"),v];
});
const zhText=s=>{if(!s.trim())return s;for(const [re,v] of ZHRE)s=s.replace(re,v);return s;};
// <!--notx-->…<!--/notx--> marks language-fixed regions (V3 labels are the user's own zh/EN mix — zhText's
// sequential key replacement would mangle them, e.g. "Catalog 資料建制"→"目錄 資料建制"). No marker → behavior unchanged.
const tx=html=>{
  if(LANG==="en")return html;
  const keep=[]; html=html.replace(/<!--notx-->([\s\S]*?)<!--\/notx-->/g,(m,inner)=>{keep.push(inner);return "\u0000NTX"+(keep.length-1)+"\u0000";});
  html=html.split(/(<[^>]*>)/g).map(seg=>seg.startsWith("<")?seg:zhText(seg)).join("");
  return keep.length?html.replace(/\u0000NTX(\d+)\u0000/g,(m,i)=>keep[+i]):html;
};
let THEME="dark", WIDE=false;
const THEME_CYCLE=["dark","light","blue"];
const THEME_ICON={dark:"☀️",light:"🔵",blue:"🌙"};
function setTheme(){THEME=THEME_CYCLE[(THEME_CYCLE.indexOf(THEME)+1)%THEME_CYCLE.length];
  if(typeof document!=="undefined"&&document.documentElement&&document.documentElement.setAttribute)document.documentElement.setAttribute("data-theme",THEME);
  const b=document.getElementById("themeBtn"); if(b)b.textContent=THEME_ICON[THEME];
  render();}
function setWide(){WIDE=!WIDE;
  if(typeof document!=="undefined"&&document.body&&document.body.setAttribute){if(WIDE)document.body.setAttribute("data-wide","");else document.body.removeAttribute("data-wide");}
  const b=document.getElementById("wideBtn"); if(b)b.style.color=WIDE?"var(--accent)":"";
  toast(WIDE?"Wide screen mode":"Regular width");}
function setLang(){LANG=LANG==="en"?"zh":"en";
  const b=document.getElementById("langBtn"); if(b)b.textContent=LANG==="en"?"中文":"EN";
  const v=document.getElementById("vaLab"); if(v)v.textContent=LANG==="en"?"Viewing as":"檢視身分";
  render();}

// ONE guarded status setter used by BOTH the checkbox (humans) and the AI's set_task_status tool:
// same lock-order + evidence-required rules + audit feed for everyone. Returns {ok} or {ok:false,reason}.
function applyTaskStatus(l,t,nx){
  if(taskLocked(l,t)) return {ok:false,reason:"🔒 Locked — "+lockReason(l,t)};
  if(nx==="x"&&EVID.has(t.t)&&!(t.links||[]).length) return {ok:false,reason:"📎 Evidence required — attach a link before marking “"+t.t+"” done (Task Playbook)"};
  t.st=nx;
  if(nx==="x")logEvent("milestone","✓ completed · "+l.name+" — "+t.t,{card:l.slug});
  else if(nx==="b")logEvent("blocked","⛔ blocked · "+l.name+" — "+t.t,{card:l.slug});
  return {ok:true};
}
/* ---- Design-freeze guard: once "Design freeze" is ticked, editing the 概念 (Concept) / 開發 (Build) steps is risky → ask first ---- */
function designFreezeStage(){ return Object.keys(GATES).find(s=>(GATES[s]||[]).some(c=>c.t==="Design freeze"))||"Production"; }
function isDesignFrozen(l){ const t=l&&(l.tasks||[]).find(x=>x.t==="Design freeze"); return !!(t&&t.st==="x"); }
// the design phases that lock once design freezes = every stage BEFORE the one Design freeze sits in (Concept + Build)
function isFrozenDesignStage(stage){ const fi=STAGES.indexOf(designFreezeStage()), si=STAGES.indexOf(stage); return si>=0&&fi>=0&&si<fi; }
// returns true to PROCEED, false to ABORT the edit (user declined the post-freeze change)
function confirmFrozenStepEdit(l,t){
  if(!l||!t||!isDesignFrozen(l)||!isFrozenDesignStage(t.stage)) return true;
  const zh={Concept:"概念",Build:"開發"}[t.stage]||t.stage;
  const msg=LANG==="zh"
    ? "設計已凍結 ❄️\n\n「"+t.t+"」屬於"+zh+"階段。設計凍結後再變更概念／開發步驟（含改狀態、加連結、加備註等）有風險，可能牽動已定案的規格與下游作業。\n\n仍要繼續嗎？"
    : "Design is frozen ❄️\n\n“"+t.t+"” is a "+t.stage+" step. Changing concept/development steps after design freeze (status, links, notes…) is risky — it can affect locked specs and downstream work.\n\nContinue anyway?";
  return (typeof confirm==="undefined")||confirm(msg);
}
// resolve a launch task by (slug,i) and run the freeze guard — returns true to PROCEED, false to abort. Campaign (__camp) tasks pass through.
function frozenStepGuard(slug,i){ const l=(typeof L==="function")?L(slug):null; return confirmFrozenStepEdit(l, l&&l.tasks&&l.tasks[i]); }
function cycle(slug,i){ stepStatus(slug,i,1); }      // left-click advances the status loop
function cycleBack(slug,i){ stepStatus(slug,i,-1); }  // right-click steps it back (so you don't have to wrap all the way around)
function stepStatus(slug,i,dir){ // status loop: todo → in progress → done → blocked → todo (dir<0 walks it backward)
  const l=L(slug), t=l.tasks[i];
  if(taskLocked(l,t)) return;               // locked rows are read-only (left button is disabled; ignore right-clicks silently)
  if(!confirmFrozenStepEdit(l,t)) return;   // post-design-freeze guard for 概念/開發 steps
  const nx=(dir<0?{p:"o",x:"p",b:"x",o:"b"}:{o:"p",p:"x",x:"b",b:"o"})[t.st]; // backward map is the exact inverse of forward
  const r=applyTaskStatus(l,t,nx); if(!r.ok){toast(r.reason);return;}
  if(nx==="x"){const lane=FLOW[t.d]; const ii=lane?lane.findIndex(n=>n.t===t.t):-1;
    if(ii>=0){const key=t.d+"|"+lane[ii].l; const others=[...new Set(routeSteps(key,t.d,ii).map(p=>p[0]))].filter(x=>x!==t.d);
      if(others.length){S.route={key,d:t.d,i:ii};
        toast(LANG==="zh"?"✨ 完成 → 這個交接涉及:"+others.join(", ")+" —— 流程圖上已標示路線":"✨ Done → this hand-off involves: "+others.join(", ")+" — route highlighted on the flow chart");}}}
  if(nx==="p"&&!t.startAt)t.startAt=today; if(nx==="x")t.doneAt=today; else if(t.doneAt)delete t.doneAt;
  v3Advance(l);   // no manual push — the phase auto-derives from what's still open
  render();
}
function lockReason(l,t){
  const blk=unlockBlocker(l,t); if(!blk)return "complete the previous step first";
  if(blk==="P3s")return LANG==="zh"?"等大貨樣（在 P3 填「預計大貨樣日」）":"waiting on the bulk-sample date (set it on P3)";
  const n=V3MAP[blk]; return n?(LANG==="zh"?`先完成 ${blk} ${n.zh}`:`finish ${blk} “${n.en}” first`):"complete the previous step first";
}
function approve(slug,i){
  const l=L(slug), t=l.tasks[i];
  if(S.role!=="ceo"){toast("◆ gates can only be approved by Ben (CEO)");return;}
  if(taskLocked(l,t)){toast("🔒 "+lockReason(l,t));return;}
  t.st="x"; t.doneAt=today; l.checkins.unshift({d:today,a:"Ben",txt:`Approved “${t.t}” via Slack. (Mock: committed as [x] + audit line.)`});
  if(l.decisionRequested) delete l.decisionRequested[t.t];
  log("✓ Ben approved ◆ on "+l.name); v3Advance(l);
  toast("✓ Approved — committed to repo, Slack message updated"); render();
}
function unapprove(slug,i){ // revert a Ben ◆ sign-off — kept Ben-only so the gate is fully his to control
  const l=L(slug), t=l.tasks[i];
  if(S.role!=="ceo"){toast("◆ gates can only be changed by Ben (CEO)");return;}
  t.st="o"; if(t.doneAt)delete t.doneAt; l.checkins.unshift({d:today,a:"Ben",txt:`Reverted approval on “${t.t}”.`});
  log("↩ Ben reverted ◆ on "+l.name); v3Advance(l);
  toast("↩ Approval reverted"); render();
}
function addLink(slug,i){
  if(!frozenStepGuard(slug,i))return;        // post-design-freeze guard for 概念/開發 steps
  const u=prompt("Paste link URL (Drive doc, Figma, listing…)"); if(!u)return;
  const n=prompt("Short label for this link","Document")||"Link";
  (slug==="__camp"?curCamp().tasks[i]:L(slug).tasks[i]).links.push({n,u});
  toast("🔗 Link attached to task"); render();
}
function _linkTask(slug,i){return slug==="__camp"?((curCamp()||{tasks:[]}).tasks[i]):L(slug).tasks[i];}
function editLink(slug,i,li){
  if(!frozenStepGuard(slug,i))return;
  const t=_linkTask(slug,i); const k=(t.links||[])[li]; if(!k)return;
  const u=prompt("Edit link URL (blank = keep current)",k.u); if(u===null)return;
  const n=prompt("Edit link label (blank = keep current)",k.n); if(n===null)return;
  if(u.trim())k.u=u.trim(); if(n.trim())k.n=n.trim();
  toast("✏️ Link updated"); render();
}
function removeLink(slug,i,li){
  if(!frozenStepGuard(slug,i))return;
  const t=_linkTask(slug,i); if(!t.links||!t.links[li])return;
  if(typeof confirm!=="undefined"&&!confirm("Remove “"+(t.links[li].n||"this link")+"”?"))return;
  t.links.splice(li,1); toast("🗑 Link removed"); render();
}

function htmlUtf8(h){h=h||""; return /<meta[^>]+charset/i.test(h)?h:('<meta charset="utf-8">\n'+h);} // force UTF-8 so ★ · — etc. don't mojibake
function openCodeFull(html,url){
  if(url){window.open(url,"_blank");return;}
  const doc=htmlUtf8(html);
  const w=window.open("","_blank");
  if(w){ try{ w.document.open(); w.document.write(doc); w.document.close(); return; }catch(e){} }
  try{const b=new Blob([doc],{type:"text/html;charset=utf-8"}); window.open(URL.createObjectURL(b),"_blank");}catch(e){}
}

   ?`<div class="cmbox"><div class="cmhead"><b>${url?"🔗":"&lt;/&gt;"} ${esc(label||"Attachment")}</b>

      <div class="cmbody" id="cmView"></div></div>`
   :`<div class="cmbox"><div class="cmhead"><b>${esc(title)}</b>
       <button class="lnkb" style="font-size:16px" onclick="document.getElementById('codeModal').remove()">✕</button></div>
      <div class="cmbody">

        <div class="frow" style="margin-top:8px"><label>or Link</label><input type="text" id="cmUrl" value="${esc(url||"")}" placeholder="…or paste a link (Claude Code / hosted page URL) to embed instead of code" style="flex:1"></div>
      </div>
      <div class="cmfoot"><button class="btn ghost" onclick="document.getElementById('codeModal').remove()">Cancel</button>
        <button class="btn" id="cmSave">Save</button></div></div>`;
  document.body.appendChild(ov);
  if(readOnly){
    const view=ov.querySelector("#cmView"), tp=ov.querySelector("#cmTabP"), ts=ov.querySelector("#cmTabS");
    const showP=()=>{tp.classList.add("on");ts.classList.remove("on");const f=document.createElement("iframe");
      f.setAttribute("sandbox",url?"allow-scripts allow-forms allow-popups allow-same-origin":"allow-scripts allow-forms allow-popups");
      if(url)f.src=url; else f.srcdoc=htmlUtf8(html); view.innerHTML=""; view.appendChild(f);};
    const showS=()=>{ts.classList.add("on");tp.classList.remove("on");view.innerHTML=url?`<pre><a class="lnk" href="${esc(url)}" target="_blank">🔗 ${esc(url)}</a></pre>`:`<pre>${esc(html||"")}</pre>`;};
    ov.querySelector("#cmFull").onclick=()=>openCodeFull(html,url);
    tp.onclick=showP; ts.onclick=showS; showP();
  }else{
    ov.querySelector("#cmSave").onclick=()=>{const code=ov.querySelector("#cmCode").value, u=ov.querySelector("#cmUrl").value.trim();
      const nm=ov.querySelector("#cmLabel").value.trim()||(u&&!code.trim()?"Link":"HTML");

// This keeps each stage's primary/DRI lane (e.g. Product in 生產) together and first — matching the process spine —
// rather than pixel-Y interleaving (which would scatter a long lane's later steps below short lanes' early steps).
function flowMetaFor(taskTitle,ownerDept){

}

  const nodeH=n=>(n.sub&&n.sub.length)?HEAD+n.sub.length*SUBH+(n.sub.length-1)*SUBGAP+PADB:NH;
  const LY={};                                        // per-lane cumulative Y — supports variable node heights
  depts.forEach(d=>{let yy=TOP;LY[d]=FLOW[d].map(n=>{const o=yy;yy+=nodeH(n)+(VG-NH);return o;});});
  const pos=(d,i)=>({x:GAP+depts.indexOf(d)*(CW+GAP),y:LY[d][i]});
  const hgt=(d,i)=>nodeH(FLOW[d][i]);
  const W=depts.length*(CW+GAP)+GAP, H=Math.max(...depts.map(d=>{const a=FLOW[d];return a.length?LY[d][a.length-1]+nodeH(a[a.length-1]):TOP;}))+46;
  const FT=THEME==="light"
    ?{colBg:"#FFFFFF",colLine:"#DDE3EE",arrow:"#9AA6BA",
      fill:{x:"#E9F7EC",p:"#FFF3E0",b:"#FDEAEA",o:"#EEF1F7",fut:"#F7F9FC"},
      strk:{x:"#3E9E5B",p:"#D68910",b:"#D64545",o:"#B9C2D4",fut:"#E3E8F1"},

      ice:{fill:"#E6F4FB",strk:"#38BDF8",txt:"#0369A1"}}                       // design-frozen step → icy blue
    :{colBg:"#13161A",colLine:"#22262D",arrow:"#4A5260",
      fill:{x:"#14331f",p:"#33260f",b:"#331414",o:"#1d2127",fut:"#15171b"},
      strk:{x:"#4ade80",p:"#fbbf24",b:"#f87171",o:"#3a414b",fut:"#262b32"},
      txt:{x:"#4ade80",p:"#fbbf24",b:"#f87171",o:"#aab3bd",fut:"#5a626d"},
      ice:{fill:"#0e2a3d",strk:"#38bdf8",txt:"#7dd3fc"}};                       // design-frozen step → icy blue
  const fill=FT.fill, strk=FT.strk;
  const stateOf=(n,d,i)=>{
    if(n.t){const t=l.tasks.find(x=>x.t===n.t); if(t){ if(t.st!=="o")return t.st; return nodeLocked(l,d,i)?"fut":"o"; }}
    const si=STAGES.indexOf(n.s),ci=STAGES.indexOf(l.stage);

  };
  const here=nextUnmet(l);
  const hereOwner=here?((l.tasks.find(t=>t&&t.t===here)||{}).d||null):null;   // the lane that OWNS the current criterion — so a re-linked node sharing its t (e.g. "Send samples to teams") doesn't double-fire the 📍 marker
  const hintsOn=S.flowHints!==false;                   // dependency-highlight toggle (popover); off → calm chart
  // Dependency highlight — clicking a node traces its REAL req graph: prerequisites ➜ this node ➜ what it unblocks.
  // (Replaces the old lane-polyline "route", whose meaning was unclear.)
  const selN=S.route?((FLOW[S.route.d]||[])[S.route.i]||null):null;
  const selCode=selN?selN.code:null;
  const depOn=hintsOn&&!!S.route;
  // entrance choreography gate — animate ONCE per flow-view open, not on node-click / board-sync re-renders (DESIGN.md Motion).
  // Skip when a node is already selected (depOn) so the one-time stagger never fights the dependency-dim opacity attr.
  const _fctx=(l&&l.slug||"?")+"|"+(S.cardView||"flow");
  const _flowFirst=(FLOWSEEN!==_fctx)&&!depOn; FLOWSEEN=_fctx;
  const findByCode=code=>{ for(const dd of depts){const arr=FLOW[dd]||[]; for(let k=0;k<arr.length;k++) if(arr[k].code===code) return [dd,k];} return null; };
  const depEdges=[]; const depKeys=new Set();
  if(depOn&&selCode){ const selPos=[S.route.d,S.route.i]; depKeys.add(S.route.d+"|"+selN.l);
    (selN.req||[]).forEach(rc=>{const p=findByCode(rc); if(p){depEdges.push([p,selPos]); depKeys.add(p[0]+"|"+FLOW[p[0]][p[1]].l);}});   // prereq ➜ selected
    depts.forEach(dd=>(FLOW[dd]||[]).forEach((nn,k)=>{ if((nn.req||[]).includes(selCode)){depEdges.push([selPos,[dd,k]]); depKeys.add(dd+"|"+nn.l);} }));  // selected ➜ dependents
  }
  // node drop-shadow — theme-aware: dark/blue get a deep black lift; LIGHT gets a soft COOL-slate shadow (a black .55 shadow on a near-white node reads as the dirty smudge the reference light-mode never has).
  const nshDrop=THEME==="light"?'dy="2" stdDeviation="3.5" flood-color="#293248" flood-opacity="0.15"':'dy="4" stdDeviation="5" flood-color="#000" flood-opacity="0.55"';
  let svg=`<svg width="${W}" height="${H}" viewBox="0 0 ${W} ${H}" preserveAspectRatio="xMidYMin meet" xmlns="http://www.w3.org/2000/svg" style="font-family:inherit;width:100%;height:auto;max-width:${W}px;margin-inline:auto;display:block">
  <defs><marker id="ar" viewBox="0 0 8 8" refX="7" refY="4" markerWidth="7" markerHeight="7" orient="auto"><path d="M0 0L8 4L0 8z" fill="${FT.arrow}"/></marker>
  <marker id="arR" viewBox="0 0 9 9" refX="7.5" refY="4.5" markerWidth="7.5" markerHeight="7.5" orient="auto"><path d="M0 0L9 4.5L0 9z" fill="#EE3124"/></marker>

  // lane headers — no container boxes; a dept-colored anchor dot + generous headroom mark each lane on the open field

  // cross links — origin dot + dashed curve + arrowhead (direction matters across lanes)
  CROSS.forEach(([fd,fi,td,ti],ci)=>{ if(!FLOW[fd]||!FLOW[td])return; const a=pos(fd,fi),b=pos(td,ti);
    const l2r=b.x>=a.x, ax=l2r?a.x+CW:a.x, bx=l2r?b.x-4:b.x+CW+4;
    const ay=a.y+hgt(fd,fi)/2, by=b.y+hgt(td,ti)/2, mx=(ax+bx)/2;

  // nodes
  depts.forEach(d=>FLOW[d].forEach((n,i)=>{const {x,y}=pos(d,i);const st=stateOf(n,d,i);
    const frozen=isDesignFrozen(l)&&isFrozenDesignStage(n.s)&&st==="x";   // a done 概念/開發 node, locked by design freeze → render it iced
    const nf=frozen?FT.ice.fill:fill[st], ns=frozen?FT.ice.strk:strk[st];
    const isHere=n.t&&n.t===here&&(hereOwner==null||d===hereOwner);
    const ti=n.t?l.tasks.findIndex(x=>x.t===n.t):-1;
    const _tt=ti>=0?l.tasks[ti]:null, _vnn=n.code&&V3MAP[n.code];
    const daysMiss=!n.d&&_vnn&&_vnn.days==null&&_tt&&_tt.days==null&&_tt.st!=="x";   // step still needs its day estimate typed in → soft-red corner flag
    const key=d+"|"+n.l, inHi=depOn&&depKeys.has(key);
    const isSel=S.route&&S.route.d===d&&S.route.i===i;     // currently-open node (drives the popover anchor)
    const click=` class="flownode" style="cursor:pointer;--d:${Math.min(60+depts.indexOf(d)*14+i*15,220)}ms" onclick="event.stopPropagation();flowNode('${d}',${i})"`;
    const h=hgt(d,i);
    const body=n.d
      ?`<polygon id="fn-${d}-${i}" filter="url(#nsh)" points="${x+CW/2},${y-2} ${x+CW+4},${y+NH/2} ${x+CW/2},${y+NH+2} ${x-4},${y+NH/2}" fill="${nf}" stroke="${isHere?"#EE3124":ns}" stroke-width="${isHere?2.5:1.4}"/>`
      :`<rect id="fn-${d}-${i}" filter="url(#nsh)" x="${x}" y="${y}" width="${CW}" height="${h}" rx="5" fill="${nf}" stroke="${isHere?"#EE3124":ns}" stroke-width="${isHere?2.5:1.4}"/>`;

      labelSVG=`<text x="${x+CW/2}" y="${y+17}" text-anchor="middle" fill="${tcol}" font-size="11" font-weight="700" letter-spacing="${FL_LS}em">${esc(flowTL(n.l))}</text>`
        +n.sub.map((s,k)=>{const sy=y+HEAD+k*(SUBH+SUBGAP);const sl=flowLabel(flowTL(s),CW-20);return `<rect x="${x+10}" y="${sy}" width="${CW-20}" height="${SUBH}" rx="2" fill="${FT.colBg}" stroke="${ns}" stroke-width="1"/><text x="${x+CW/2}" y="${sy+SUBH/2+Math.min(sl.font,10)*0.35}" text-anchor="middle" fill="${tcol}" font-size="${Math.min(sl.font,10)}" letter-spacing="${FL_LS}em">${esc(sl.lines[0])}</text>`;}).join("");

    ${n.d?`<text x="${x+CW/2}" y="${y-7}" text-anchor="middle" fill="#c084fc" font-size="11">◆ decision</text>`:""}${n.url?`<text x="${x+CW/2}" y="${y-7}" text-anchor="middle" fill="#60a5fa" font-size="11">🔗 Figma</text>`:""}
    ${isHere?`<g pointer-events="none"><rect x="${x-4}" y="${y-10}" width="${LANG==="zh"?48:46}" height="18" rx="9" fill="#EE3124"/><text x="${x-4+(LANG==="zh"?48:46)/2}" y="${y+3}" text-anchor="middle" fill="#fff" font-size="11" font-weight="700">📍 ${LANG==="zh"?"這裡":"here"}</text></g>`:""}
    <title>${esc(n.l)} — stage: ${n.s} · click for route + quick actions${st==="fut"&&ti>=0?" · 🔒 locked until previous step is done":""}${daysMiss?(LANG==="zh"?" · ⏱ 天數未填":" · ⏱ days not set"):""}</title></g>`;}));
  // red dependency arrows (drawn on top so they clearly reach the highlighted nodes)
  depEdges.forEach(([a,b])=>{const pa=pos(a[0],a[1]),pb=pos(b[0],b[1]),ha=hgt(a[0],a[1]),hb=hgt(b[0],b[1]); let dpath;
    if(a[0]===b[0]){ const ax=pa.x+CW/2, ay=pa.y+ha, bx=pb.x+CW/2, by=pb.y-5, my=(ay+by)/2; dpath=`M${ax} ${ay} C ${ax} ${my}, ${bx} ${my}, ${bx} ${by}`; }
    else{ const l2r=pb.x>=pa.x, ax=l2r?pa.x+CW:pa.x, ay=pa.y+ha/2, bx=l2r?pb.x-5:pb.x+CW+5, by=pb.y+hb/2, mx=(ax+bx)/2; dpath=`M${ax} ${ay} C ${mx} ${ay}, ${mx} ${by}, ${bx} ${by}`; }
    svg+=`<path class="depedge" d="${dpath}" fill="none" stroke="#EE3124" stroke-width="2.3"/>`;});
  svg+="</svg>";
  return `<div class="flowwrap${_flowFirst?' flowin':''}">${svg}</div>`;        // .flowin → play the entrance choreography once (gated above); route intro + actions live in the inline #flowPop popover
}

/* ===== flow-node inline popover (route intro · files/links · hint toggle) =====
   Clicking a node opens a fixed popover anchored beside it — no more scroll-to-top
   red banner. S.route holds the selected node; S.flowHints (persisted) gates the
   animated red route highlight on the chart. Nodes + the popover stopPropagation,
   so the lone document-click listener only fires for genuine outside clicks.
   pop:true distinguishes a node-click popover from cycle()'s highlight-only route. */
function flowNode(d,i){
  const n=FLOW[d]&&FLOW[d][i]; if(!n)return;
  const key=d+"|"+n.l;
  if(S.route&&S.route.pop&&S.route.key===key){S.route=null;render();return;}   // click the open node again → close
  S.route={key,d,i,pop:true}; render();                                        // pop:true → syncFlowPop() opens the popover (cycle() sets route WITHOUT pop = chart highlight only)
}
function toggleFlowHints(on){
  S.flowHints=!!on;
  try{if(typeof localStorage!=="undefined")localStorage.setItem("bv-flow-hints",on?"1":"0");}catch(e){}
  toast(on?"Route hints on":"Route hints off"); render();
}
function closeFlowPop(){ S.route=null; render(); }
function fpLinkLabel(u){try{const host=new URL(u).hostname.replace(/^www\./,"");
  if(/figma/.test(host))return"Figma"; if(/drive\.google|docs\.google/.test(host))return"Drive";
  if(/loom/.test(host))return"Loom"; if(/youtu/.test(host))return"YouTube"; if(/amazon/.test(host))return"Amazon";
  return host||"Link";}catch(e){return"Link";}}
function fpAddLink(slug,i){

  const t=slug==="__camp"?(curCamp()||{tasks:[]}).tasks[i]:L(slug).tasks[i];

// complete / reopen a step straight from the inspector (mirrors the card's status tick, jumps to done)
function fpComplete(slug,i){
  const l=L(slug),t=l&&l.tasks[i]; if(!t)return;
  if(taskLocked(l,t)){toast(LANG==="zh"?"此步驟仍鎖定，無法完成":"step is still locked");return;}

function placeFlowPop(){

/* ============ PROJECTS — domain helpers (ported from projectDomain.ts / projectStats.ts) ============ */
function pjToday(){return new Intl.DateTimeFormat("en-CA",{timeZone:"Asia/Taipei",year:"numeric",month:"2-digit",day:"2-digit"}).format(new Date());}
function pjIsIso(s){return /^\d{4}-\d{2}-\d{2}$/.test(s||"");}
function pjDayDiff(a,b){const x=Date.parse((a||"").slice(0,10)+"T00:00:00Z"),y=Date.parse((b||"").slice(0,10)+"T00:00:00Z");if(isNaN(x)||isNaN(y))return 0;return Math.round((y-x)/864e5);}
function pjStages(p){return [p.stage_design,p.stage_sample,p.stage_pps,p.stage_bulk];}
function pjNotes(p){return [p.note_design,p.note_sample,p.note_pps,p.note_bulk];}
function pjFinished(p){return pjStages(p).every(s=>s==="done"||s==="na");}
function pjCurrentStage(p){const c=pjStages(p);for(let i=3;i>=0;i--)if(c[i]==="progress")return i;for(let i=0;i<4;i++)if(c[i]==="pending")return i;return 3;}
const PJ_URANK={hot:1,soon:2,prod:3,wait:4,plan:5,none:6};
const PJ_URGENCY_ORDER=["hot","soon","prod","wait","plan","none"];
function pjTier(p,t){if(pjFinished(p))return 7;if(pjIsIso(p.due_date)&&p.due_date<t)return 0;return PJ_URANK[p.urgency]!=null?PJ_URANK[p.urgency]:6;}
function pjCmp(t){return (a,b)=>{const d=pjTier(a,t)-pjTier(b,t);if(d)return d;const da=a.due_date||"9999-12-31",db=b.due_date||"9999-12-31";if(da!==db)return da<db?-1:1;const sd=pjCurrentStage(b)-pjCurrentStage(a);if(sd)return sd;return (a.name||"").localeCompare(b.name||"");};}
function pjMD(iso){const m=(iso||"").match(/^(\d{4})-(\d{2})-(\d{2})/);return m?(+m[2])+"/"+(+m[3]):(iso||"");}
function pjWhen(p){return p.due_date?pjMD(p.due_date):(p.when_label||"");}
function pjOverdue(p,t){return pjIsIso(p.due_date)&&p.due_date<t?pjDayDiff(p.due_date,t):0;}
function pjUntil(p,t){return pjIsIso(p.due_date)&&p.due_date>=t?pjDayDiff(t,p.due_date):Infinity;}
function pjA(s){return esc(s||"").replace(/"/g,"&quot;");} // safe for attribute values

/* ============ PROJECTS — presentation maps ============ */
const PJ_STAGE_LBL=["Design","Sample","PPS","Bulk"];
const PJ_URGENCY_ICON={hot:"🔥",soon:"⏰",prod:"🏭",wait:"⏳",plan:"📅",none:""};
const PJ_URGENCY_LBL={hot:"Urgent",soon:"This week",prod:"In production",wait:"Waiting",plan:"Planned",none:"—"};
const PJ_TIER_LBL=["🔴 Overdue","🔥 Urgent","⏰ This Week","🏭 Bulk in Production / Transit","⏳ Waiting","📅 To Schedule","— Unsorted","✅ Completed"];
const PJ_TIER_BAR=["var(--red)","var(--red)","var(--amber)","var(--blue)","#4b5563","#5b6678","#6b7789","var(--green)"];
// Stage cells: done/in-progress carry their semantic fill (the prominent green/amber the team scans for); pending/na stay quiet. A status glyph is added so it isn't color-only.
const PJ_SEG={done:"background:rgba(74,222,128,.15);color:var(--green)",progress:"background:rgba(251,191,36,.15);color:var(--amber)",pending:"color:var(--faint)",na:"color:var(--faint)"};
const PJ_SEG_ICON={done:"✓",progress:"●",pending:"○",na:"—"};
const PJ_SEG_ICOLOR={done:"var(--green)",progress:"var(--amber)",pending:"var(--faint)",na:"var(--faint)"};
const PJ_TAG={hot:"background:rgba(248,113,113,.14);color:var(--red);border-color:rgba(248,113,113,.5)",soon:"background:rgba(251,191,36,.14);color:var(--amber);border-color:rgba(251,191,36,.5)",prod:"background:rgba(96,165,250,.14);color:var(--blue);border-color:rgba(96,165,250,.5)",wait:"color:var(--dim);border-color:var(--line)",plan:"color:var(--dim);border-color:var(--line)",none:"color:var(--faint);border-color:var(--line)",overdue:"background:rgba(248,113,113,.14);color:var(--red);border-color:rgba(248,113,113,.5)"};
function pjSegText(s,note){if(s==="done")return "Done";if(s==="progress")return note||"In progress";if(s==="na")return "No sample";return "—";}
// unknown urgency (e.g. the sheet's "dated") falls back to "none" — mirrors the portal.
function pjTag(p,t){const overdue=pjTier(p,t)===0;const u=PJ_URGENCY_LBL[p.urgency]?p.urgency:"none";const st=overdue?PJ_TAG.overdue:PJ_TAG[u];const icon=overdue?"":PJ_URGENCY_ICON[u];const label=overdue?[pjWhen(p),"Overdue "+pjOverdue(p,t)+"d"].filter(Boolean).join(" · "):(pjWhen(p)||PJ_URGENCY_LBL[u]);return `<span class="pjtag" style="${st}">${icon?icon+" ":""}${esc(label)}</span>`;}

/* ============ PROJECTS — one triage row ============ */
function pjRow(p,tier,showHeader,headerFirst,mode,t){
  const overdue=tier===0, soon=!overdue&&!pjFinished(p)&&pjUntil(p,t)<=7;

    ? `<div class="pj-next">${pjFinished(p)?`<span style="color:var(--green);font-size:12px">✅ Completed</span>`:`${pjTag(p,t)}<span style="font-size:12px;color:${p.next_action?"var(--dim)":"var(--faint)"}">${p.next_action?esc(p.next_action):"— (next action TBD)"}</span>`}</div>`
    : `<div class="pj-stages">${stages.map((s,i)=>{const seg=PJ_SEG[s]?s:"pending";const vtext=(seg==="pending"||seg==="na")?"":" "+esc(pjSegText(s,notes[i]));return `<div class="pj-cell" style="${PJ_SEG[seg]}" title="${pjA((s==="progress"?"In progress":pjSegText(s,notes[i]))+(notes[i]?" — "+notes[i]:""))}"><span class="k">${PJ_STAGE_LBL[i]}</span><span class="v"><span class="pj-ic" style="color:${PJ_SEG_ICOLOR[seg]}">${PJ_SEG_ICON[seg]}</span>${vtext}</span></div>`;}).join("")}</div>`;
  return `${head}<button type="button" class="pj-row pj-clickable${mode==="next"?" pj-row-next":""}${overdue?" overdue":soon?" soon":""}" aria-label="${pjA(p.name+(p.mo?" "+p.mo:"")+" — "+PJ_TIER_LBL[tier].replace(/^[^ ]+ /,"")+(when?" — "+when:"")+" — open detail")}" onclick="pjOpen('${pjA(p.id||p.name)}')">
    <div style="min-width:0">
      <div style="min-width:0;display:flex;align-items:center"><span class="pj-name${overdue?" overdue":""}">${esc(p.name)}</span>${p.mo?`<span class="pj-mo">${esc(p.mo)}</span>`:""}</div>
      <div class="pj-sub">${overdue?`<span class="pj-badge">Overdue ${pjOverdue(p,t)}d</span> `:""}${esc(p.supplier||"")}${when?" · "+esc(when):""}</div>
    </div>
    ${right}
  </button>`;
}

function pjCountBy(arr,key){const m=new Map();for(const p of arr){const v=key(p);if(!v)continue;m.set(v,(m.get(v)||0)+1);}return [...m.entries()];}
function pjMatch(p){const q=(S.pjQ||"").trim().toLowerCase();if(!q)return true;const hay=[p.name,p.supplier,p.mo,p.next_action,p.note_design,p.note_sample,p.note_pps,p.note_bulk].join(" ").toLowerCase();return q.split(/\s+/).every(tok=>hay.includes(tok));}
function pjPasses(p,t){
  if(S.pjFCat&&p.category!==S.pjFCat)return false;
  if(S.pjFSup&&p.supplier!==S.pjFSup)return false;
  if(S.pjFStage!=null&&(pjFinished(p)||pjCurrentStage(p)!==S.pjFStage))return false;
  if(S.pjFUrg&&p.urgency!==S.pjFUrg)return false;
  if(S.pjFDue==="overdue"&&pjTier(p,t)!==0)return false;
  if(S.pjFDue==="week"){if(pjFinished(p)||!pjIsIso(p.due_date)||p.due_date<t)return false;if(pjDayDiff(t,p.due_date)>7)return false;}
  return pjMatch(p);
}

function pjHasF(){return !!((S.pjQ&&S.pjQ.trim())||S.pjFCat||S.pjFSup||S.pjFStage!=null||S.pjFUrg||S.pjFDue);}
function pjSearchInput(el){const p=el.selectionStart;S.pjQ=el.value;render();const n=document.getElementById("pjSearch");if(n){n.focus();try{n.setSelectionRange(p,p);}catch(e){}}}
