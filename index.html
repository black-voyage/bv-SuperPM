const CHAT_PRESET_DEFS = [{"tier":"utility","group":"Utility","label":"Status in 60 seconds","deep":false,"prompt":"Give me a 60-second status on this launch card: what stage it's in, how many gate tasks are done vs. remaining for the current stage, which department (DRI) owns the open items, the latest check-in, and the one thing standing between us and the next stage. Keep it tight enough to paste into a standup.","tools":"read_card_doc (card tasks, notes, check-ins), the card's stage + gate map, recall"},{"tier":"utility","group":"Utility","label":"What's blocking us","deep":false,"prompt":"What is currently blocking this card from moving forward? List every task marked blocked or stalled, name the department that has to unblock it and who they're waiting on, and tell me which blocker is on the critical path to the next gate. End with a one-line ask I can send to the owning department today.","tools":"read_card_doc (blocked/in-progress tasks + check-in blockers), gate/stage dependency map, recall"},{"tier":"utility","group":"Utility","label":"Gate-readiness check","deep":false,"prompt":"Run a gate-readiness check for this card's current stage. List each gate criterion, mark it met or not-met, flag any evidence-required tasks that are marked done but have no link attached, and call out whether a Ben ◆ sign-off is the thing holding the gate. Tell me plainly: are we clear to advance to the next stage, yes or no, and what's left.","tools":"read_card_doc (per-task status + attached links), the GATES map + evidence/Ben-◆ rules for the current stage"},{"tier":"utility","group":"Utility","label":"Draft a check-in","deep":false,"prompt":"Draft today's check-in note for this card from its real state: what got done since the last check-in, what's in progress, what's blocked and on whom, and the single next action with its owning department. Keep it to 4-5 lines in the same plain style as the existing check-ins, then save it to the card as a note.","tools":"read_card_doc (latest tasks + prior check-ins), add_note (writes the check-in to the card log)"},{"tier":"utility","group":"Utility","label":"Surface the risks","deep":false,"prompt":"Surface the top risks to this launch hitting its target date. Look at how long it's sat in the current stage vs. the planned duration, any repeated delays in its history, blocked tasks near a gate, and any missing inputs (specs, BOM, freight, brief, imagery). Rank the risks by impact on the timeline and give a one-line mitigation for each. Save the most important durable risk to shared memory.","tools":"read_card_doc (task state + stage history + check-ins), planned stage durations, remember (saves the key risk)"},{"tier":"utility","group":"Utility","label":"Launch readiness brief","deep":true,"prompt":"Build a full launch-readiness brief for this card as a branded HTML document. Cover: stage and timeline status; a gate-by-gate readiness table for every stage with met/not-met and evidence/Ben-◆ flags; open blockers by department with owners; risks to the target date with mitigations; and a clear go / not-go recommendation for advancing the current gate. Pull the product's key specs and positioning so the brief reads as a real BV deliverable, then file it for sign-off.","tools":"read_card_doc, GATES/stage map + planned durations, search_catalog + search_knowledge (specs/tech), search_strategy (positioning), find_images, save_brief"},{"tier":"dept","group":"Product","label":"Market research scan","deep":false,"prompt":"Run a market-research scan for this product before we lock the concept. Pull the differentiation graph and competitor profiles (search_knowledge + search_strategy), the category entry points buyers use to enter the premium travel-bag / vacuum-compression category, and the top review praise + objections in our space. Give me: (1) where Black Voyage sits vs the named competitors, (2) the 3-4 buying triggers we should design toward, (3) the unmet need or objection we can win on, and (4) one sentence on the gap this product should fill. Cite which collection each point came from. If something isn't in the data, say so rather than guessing.","tools":"search_knowledge (competitors, brand_docs), search_strategy (differentiation, category_entry_points, review_praise, review_objections), recall"},{"tier":"dept","group":"Product","label":"Concept brief from intake","deep":true,"prompt":"Read this card's intake form and concept notes (read_card_doc), then write the full Concept Brief for Ben's concept sign-off. Ground every spec, dimension and price in the catalog (search_catalog / get_product) and the detailed per-product spec sheet (search_product_spec) — treat the catalog as the source of truth and flag any place the intake disagrees with it instead of silently picking one. Pull personas, JTBD and objections from search_strategy, the relevant tech/materials/series/hardware from search_knowledge, and embed 2-3 real product images via find_images. Sections: Why this product / the gap, Target personas + buying trigger, Concept definition (form, materials, key features), Spec snapshot vs catalog, Competitor edge, and Open risks for sign-off. File it to the card's Briefs panel for review.","tools":"read_card_doc (intake/concept), search_catalog, get_product, search_product_spec, search_strategy, search_knowledge, find_images, save_brief"},{"tier":"dept","group":"Product","label":"Spec + hardware sheet","deep":false,"prompt":"Pull the detailed spec sheet for this product from search_product_spec and give me a clean Design-Freeze readiness summary: the current 技術規格 (tech spec), 五金輔料 (hardware / sub-materials), 功能特色 (key features), and the MO 變更史 (change history) so far. Cross-check the headline dimensions, materials and price against the catalog row (get_product) and flag any mismatch. End with a short list of what's still TBD or unconfirmed before we can freeze the design.","tools":"search_product_spec (product_docs), get_product / search_catalog"},{"tier":"dept","group":"Product","label":"Pre-production BOM draft","deep":true,"prompt":"Draft a pre-production Bill of Materials for this product as the starting point for the sample + BOM stage. Use search_product_spec to pull the 五金輔料 (hardware / sub-materials) and 功能特色, and search_knowledge for the named materials (e.g. CloudWeave, Cordura, X-Pac) and hardware (YKK, Fidlock) so each line uses the correct branded component. Output a table: component / part, material or branded hardware, where it's used, and a 'confirmed vs TBD' status pulled from the spec + MO change history. Clearly mark every line where the source data is silent so Product knows what to confirm with the factory — do not invent quantities or costs we don't have.","tools":"search_product_spec (product_docs, incl. 五金輔料 + MO 變更史), search_knowledge (materials, hardware)"},{"tier":"dept","group":"Product","label":"Costing positioning check","deep":false,"prompt":"For this product, pull its price and tier from the catalog (get_product) and compare against the named competitors (search_knowledge competitors + search_strategy differentiation). Tell me whether our intended price sits above, at, or below the relevant competitors, which features justify a premium, and the top price objection customers raise in reviews plus how we currently handle it (search_strategy review_objections). This is a positioning gut-check for costing — note that internal margins/COGS are not in the data, so frame this as price-positioning only.","tools":"get_product / search_catalog, search_knowledge (competitors), search_strategy (differentiation, review_objections)"},{"tier":"dept","group":"Product","label":"Advance to next stage","deep":false,"prompt":"Where is this product in the Product pipeline right now, and what's blocking the next gate? Read the card's tasks and notes (read_card_doc), tell me which stage we're in (intake / market research / concept / prototyping / costing / design freeze / pre-production sample + BOM / mass production), and list exactly what must be done or attached before the next task can be marked done. If a step is complete and unblocked, mark it done with set_task_status; if it's blocked, tell me what evidence or link it still needs rather than forcing it.","tools":"read_card_doc (card tasks/notes), set_task_status, add_note"},{"tier":"dept","group":"Design","label":"A+ / infographic copy blocks","deep":false,"prompt":"Build the Amazon A+ content modules and infographic copy blocks for [PRODUCT, e.g. Zephyr Pro 35L]. Pull the real specs, hardware and 品牌呈現 from the product spec sheet, ground every tech claim (Vortex Vacuum Seal, 60kPa compression chamber, IPX8, material) in the brand knowledge base, and embed the matching product photos from find_images. Give me 5-6 modules: hero statement, the headline feature with its proof number, materials/hardware callouts, a benefit-led lifestyle module, and a spec/comparison block. Each module = a short headline (max 8 words), 1-2 sentence body in Black Voyage voice, and which image to use.","tools":"search_product_spec (技術規格/五金/品牌呈現), search_knowledge (tech, materials, hardware), find_images (product_images), search_strategy (brand_elements)"},{"tier":"dept","group":"Design","label":"Model name options","deep":false,"prompt":"Propose 6-8 model name options for [PRODUCT/CONCEPT — pull the intake form and concept off this card first]. Stay inside the Black Voyage naming world (Vesper, Aero, Apex, Zephyr, AirCabin, AirTrunk) and the series tiering (Essential / Pro / Pro Lite). For each name give: the word, why it fits the product's character and audience, and a quick check against existing catalog names so we don't collide. Flag any that clash with the brand voice rules or an existing SKU, and star your top recommendation.","tools":"read_card_doc (intake/concept), search_catalog (existing names), search_knowledge (series, brand_docs/voice), search_strategy (personas, brand_elements)"},{"tier":"dept","group":"Design","label":"Packaging iggest objections first. File it as a brief for Design + Ben sign-off.","tools":"search_product_spec, search_knowledge (tech, materials, competitors), search_strategy (personas, review_objections, differentiation, category_entry_points), find_images, save_brief"},{"tier":"dept","group":"Design","label":"Amazon Store page brief","deep":true,"prompt":"Design the Black Voyage Amazon Storefront visual brief covering the brand landing page and the [series/category, e.g. vacuum-compression backpacks] sub-page. Pull the brand story, voice and visual elements from the brand guidelines and brand_elements, the full product line from the catalog, and real hero/lifestyle imagery from find_images. Lay out each section: brand hero banner, the category navigation tiles, a featured-product row with the model names, the technology explainer band (Vortex Vacuum Seal, IPX8, compression), and a cross-sell row — with headline copy, the image to use, and the layout intent for each. File it as a brief for sign-off.","tools":"search_knowledge (brand_docs, series, tech), search_strategy (brand_elements, differentiation), search_catalog (full line + model names), find_images (hero/lifestyle + logo), save_brief"},{"tier":"dept","group":"Catalog","label":"Competitor teardown","deep":false,"prompt":"Build a competitor teardown for the Apex Pro 35L backpack vs its closest 2-3 rivals (e.g. Away, Peak Design, Nomatic). Pull our real specs, materials, hardware and our differentiation/gap notes, then lay it out as a side-by-side comparison table: capacity, material, key tech (Vortex Vacuum Seal, IPX8, 60kPa compression), hardware (YKK/Fidlock), price tier, and the one angle where we clearly win. Flag any spec where a competitor beats us so I know what to defend in the listing copy.","tools":"search_knowledge (competitors, tech, materials, hardware), search_strategy (differentiation), get_product / search_catalog"},{"tier":"dept","group":"Catalog","label":"Amazon listing draft","deep":false,"prompt": },{"tier":"dept","group":"Catalog","label":"Listing image pull","deep":false,"prompt":"Pull the product photos and brand assets I need to publish the AirCabin listing live. Show me every available AirCabin product image as an inline gallery with the raw public image URLs, plus the Black Voyage logo and any brand-guideline asset. Tell me which shots I have (hero, detail, lifestyle, infographic-ready) and flag any obvious gap in the image set before I push the listing live.","tools":"find_images (product_images + brand_assets)"},{"tier":"dept","group":"Catalog","label":"Full listing kit","deep":true,"prompt":"Run a complete publish-ready Listing Kit for the Apex Pro 35L as a branded document I can hand off to go live. Pull all confirmed specs, the product spec sheet, our differentiation vs competitors, review-based benefit language, and real product images, then assemble: (1) Amazon title + 5 bullets + description, (2) Shopify fields (title, slug, SEO meta, tags, body), (3) a spec/ops table with every key field, (4) a competitor positioning summary, and (5) an embedded hero + detail image gallery. Flag any spec conflict between the intake/concept and the catalog, and file it to the card's Briefs for sign-off when done.","tools":"search_catalog, get_product, search_product_spec, search_knowledge (competitors/tech/materials), search_strategy (differentiation, review_praise), find_images, read_card_doc, save_brief"},{"tier":"dept","group":"Content","label":"Hero + lifestyle shoot brief","deep":true,"prompt":"Run a full pre-production shoot brief in Deep mode for the [Vesper / Aero / Apex / Zephyr / AirCabin] launch. Pull the exact specs and hero features from the catalog and product spec sheet, the materials and hardware worth showing in close-up (CloudWeave, X-Pac, YKK, Fidlock, the vacuum-compression chamber), the target personas and their jobs-to-be-done so the lifestyle scenes match how they actually travel, our differentiation vs competitors as the hero angles to dramatize, and brand_elements for the visual identity. Embed reference frames from existing product_images and brand_assets. Structure it as: hero shot list, lifestyle scene list (with implied location/wardrobe/props), must-capture detail/macro shots, the compression before/after demo setup, and a do-not-shoot list tied to our brand voice.","tools":"search_catalog + get_product, search_product_spec, search_knowledge (materials/hardware/tech), search_strategy (personas/JTBD/differentiation/brand_elements), find_images"},{"tier":"dept","group":"Content","label":"Shot-list gap check","deep":false,"prompt":"Show me every existing product image and brand asset we already have for the [product/SKU], then tell me which hero features, materials, and hardware from its spec sheet have NOT yet been shot. Give me a prioritized gap shot list of what we still need to capture (close-ups, in-use, compression demo, angles) before this product is content-complete.","tools":"find_images (product_images + brand_assets), get_product, search_product_spec, search_knowledge (materials/hardware)"},{"tier":"dept","group":"Content","label":"Instruction clip script","deep":false,"prompt":"Write a short instruction / how-it-works clip script for the [product/SKU], grounded in the real spec sheet and tech. Walk through how the vacuum-compression works (chamber, manual pump, the actual kPa / hold numbers), the hardware in order of use, and the key handling steps. Give me an on-screen-text version plus a voiceover version, broken into numbered beats with the exact spec callouts so nothing is invented. Keep claims to what the catalog and tech data support.","tools":"search_product_spec, search_knowledge (tech/hardware/materials), get_product, recall (canonical specs)"},{"tier":"dept","group":"Content","label":"Social clip hook bank","deep":false,"prompt":"Give me a bank of 10-12 short-form social clip concepts and on-screen hooks for the [product/SKU]. Base each hook on a real customer job-to-be-done, a category entry point (the moment someone reaches for this product), a top review-praise quote we can dramatize on camera, or a common objection we can answer visually. For each idea give me the hook line, the 3-5 second visual, and which proof point it lands. Keep the language inside our approved brand voice.","tools":"search_strategy (jobs_to_be_done / category_entry_points / review_praise / review_objections / personas / brand_elements)"},{"tier":"dept","group":"Content","label":"Caption + overlay copy","deep":false,"prompt":"Write caption and on-screen text overlay copy for the [lifestyle / instruction / social] clips of the [product/SKU]. Use the real differentiators and proof points from our strategy data and pull exact, supported spec numbers from the catalog. Stay strictly inside our approved brand voice and avoid any banned words. Give me a primary caption plus 2 shorter overlay variants per clip type.","tools":"search_strategy (differentiation / review_praise / brand_elements), get_product, search_product_spec, search_knowledge (brand_docs)"},{"tier":"dept","group":"Content","label":"Content export plan","deep":true,"prompt":"Build a content export plan in Deep mode for the [product/SKU]: list every deliverable we should cut from this shoot, organized into instruction clips, lifestyle clips, and social clips. For each deliverable specify the feature or job-to-be-done it serves, the personas/channel it targets, the proof point or spec it must show, and the source footage it needs. Map it against the existing product_images and brand_assets so we know what is reusable vs net-new. End with a ready-to-hand-off shot-to-asset checklist.","tools":"search_strategy (personas / jobs_to_be_done / category_entry_points / differentiation), get_product, search_product_spec, find_images (product_images + brand_assets), search_knowledge (tech/materials)"},{"tier":"dept","group":"Social","label":"IG carousel captions","deep":false,"prompt":"Write 5 Instagram caption options for the Vesper backpack, each built around a different customer pain point. Pull the real pains and desired outcomes from our personas and jobs-to-be-done, and weave in the actual product features (Vortex Vacuum Seal, CloudWeave material, capacity). Each caption needs a scroll-stopping first line, 2-3 lines of body, a clear CTA, and a set of relevant hashtags. Follow our brand voice rules (use approved words, avoid the banned ones). Keep it sounding human, not salesy.","tools":"search_strategy (personas, jobs_to_be_done), search_catalog/get_product, search_knowledge (tech/materials), glossary voice rules"},{"tier":"dept","group":"Social","label":"TikTok hook list","deep":false,"prompt":"Give me 12 TikTok / Reels hook lines (the first 2 seconds of the video) for the Aero vacuum-compression cube. Base them on the moments people actually buy in this category — pull our category entry points and the top objections customers raise, and turn each into a hook. Mark which hooks are demo-driven (show the compression), which are problem/agitation, and which are social-proof. Keep them short, punchy, and in our brand voice.","tools":"search_strategy (category_entry_points, review_objections, personas), search_catalog, glossary voice rules"},{"tier":"dept","group":"Social","label":"YouTube demo script","deep":false,"prompt":"Write a 60-90 second YouTube Short / demo script for the Apex showing how the Vortex Vacuum Seal compression works. Use only verified specs from the catalog and tech knowledge (compression chamber 60kPa, IPX8, materials, capacity). Structure it as hook, problem, the demo beat-by-beat, the payoff, and a CTA. Note where on-screen text or the product shot should appear. Keep claims accurate and on-brand.","tools":"search_catalog/get_product, search_knowledge (tech/materials/hardware), search_product_spec, glossary voice rules"},{"tier":"dept","group":"Social","label":"Comment-reply playbook","deep":false,"prompt":"Build me a comment-reply playbook for our Zephyr social posts. Pull the most common customer objections from our review data (price, durability, does-the-compression-actually-work, airline rules) and write 2 ready-to-use reply options for each — one short and friendly, one that links to a proof point or spec. Also give me 3 reply templates for positive comments. Match our brand voice and never overclaim.","tools":"search_strategy (review_objections, review_praise), search_catalog, search_knowledge, glossary voice rules"},{"tier":"dept","group":"Social","label":"Find post visuals","deep":false,"prompt":"Pull the available product photos and brand assets for the AirCabin so I can plan this week's posts. Show me what we have, and for each image suggest which platform and post type it fits best (IG grid, IG story, TikTok cover, YouTube thumbnail) plus a one-line caption idea. Flag any obvious gaps where we're missing a shot we'd want for social.","tools":"find_images (product_images + brand_assets), search_catalog, search_strategy (personas)"},{"tier":"dept","group":"Social","label":"Full launch social pack","deep":true,"prompt":"Create a complete launch social content pack for the Vesper across IG, TikTok, and YouTube. Include: 3 IG carousel concepts with full captions and hashtags, 6 TikTok/Reels hooks with their shot directions, 2 YouTube Short scripts, a posting sequence for launch week, and a comment-reply cheat sheet for the top objections. Ground every angle in our personas, jobs-to-be-done, category entry points, and review language; use only verified catalog/tech specs; embed the real product photos where relevant; and follow our brand voice rules throughout.","tools":"search_strategy (personas/JTBD/category_entry_points/reviews/differentiation), search_catalog/get_product, search_knowledge, search_product_spec, find_images, glossary voice rules; files via save_brief"},{"tier":"dept","group":"Marketing","label":"Build the launch marketing brief","deep":true,"prompt":"Build the full product marketing brief for this product. Pull the real specs from the catalog, the core tech (Vortex Vacuum Seal, IPX8, 60kPa compression) and series positioning from brand knowledge, the buyer personas + jobs-to-be-done + top objections + how we win vs Away and Peak Design from strategy, and embed 2-3 real hero product photos. Structure it as: positioning one-liner, key message + 3 proof points, target persona, the single biggest objection and how to handle it, competitor angle, and the 3 KOL lanes I should lead with. File it as a Brief for Marketing + Product + Ben sign-off.","tools":"search_catalog/get_product, search_knowledge (tech/series/competitors), search_strategy (personas/JTBD/objections/differentiation), find_images, save_brief"},{"tier":"dept","group":"Marketing","label":"Map product to 8 KOL lanes","deep":false,"prompt":"For this product, give me a one-paragraph creative brief for each of our 8 KOL lanes — MOAT, ASMR, Cinematic, Authority, Reach, Seed, UGC, and Pro. For each lane: the hook/angle to feature, which real product feature or spec it should show (pull from the catalog and tech knowledge), the persona it speaks to, and one example shot or talking point. Ground every angle in our actual differentiation and customer insights, not generic ideas.","tools":"search_catalog, search_knowledge (tech/materials), search_strategy (personas/insights/category-entry-points)"},{"tier":"dept","group":"Marketing","label":"Top objections + rebuttals","deep":false,"prompt":"What are the top customer objections for this product, and how should our KOLs and copy handle each one? Pull the real review objections and their handlers, plus any price/durability/skepticism patterns from customer insights. Give me each objection, the proof point that answers it, and one line a creator could actually say on camera.","tools":"search_strategy (review_objections/review_praise/insights), search_knowledge (tech/materials for proof points)"},{"tier":"dept","group":"Marketing","label":"Why we beat Away & Peak Design","deep":false,"prompt":"Give me our sharpest differentiation story for this product versus Away and Peak Design. Pull the real differentiation dimensions and competitor strengths/weaknesses, then turn it into 3 punchy positioning angles a KOL could lead a video with — each tied to a real spec or material we have that they don't.","tools":"search_strategy (differentiation), search_knowledge (competitors/tech/materials), search_catalog"},{"tier":"dept","group":"Marketing","label":"Pull hero shots for creators","deep":false,"prompt":"Find the best real product photos and brand assets for this product that I can send to KOLs and drop into a brief. Return the embeddable image URLs grouped by use — hero shot, lifestyle, detail/feature close-up, and the logo — and note which KOL lane each image best supports.","tools":"find_images (product_images + brand_assets)"},{"tier":"dept","group":"Marketing","label":"Score a finished KOL video","deep":false,"prompt":"I'm running the evaluation loop on a KOL video. Here's what the creator delivered: [paste a short description or link]. Score it against our brief on brand-message accuracy, which spec/proof point it actually showed, voice/tone fit to our brand guidelines, and objection coverage. Flag anything that contradicts our real specs (e.g. wrong compression or hold-time numbers), tell me whether to approve / request edits / pass on usage rights, and save the verdict as a note on this card.","tools":"search_catalog, search_knowledge (tech/brand voice), search_strategy (key messages), add_note, remember"},{"tier":"dept","group":"Ads","label":"Claims-safe ad copy check","deep":false,"prompt":"Before we publish, fact-check the on-screen claims and captions for our [Vesper / Aero / Apex / Zephyr / AirCabin] paid ad against the real catalog and tech data. List every spec or claim we use (compression %, kPa, IPX8 waterproofing, hold/airtight hours, capacity, materials, hardware), mark each as VERIFIED, OVERSTATED, or NOT FOUND in the data, and give the corrected wording for anything that's off. Flag any number that drifts from the catalog source of truth.","tools":"search_catalog, get_product, search_product_spec, search_knowledge (tech/materials/hardware), recall"},{"tier":"dept","group":"Ads","label":"Hook lines for paid social","deep":false,"prompt":"Give me 8 scroll-stopping hook lines (first 3 seconds) for a paid Meta/TikTok video ad for the [product]. Tie each hook to a real customer pain or buying trigger from our persona and review data, and label which persona and objection each one targets. Keep them in Black Voyage's confident, plain-spoken brand voice and avoid any banned phrasing.","tools":"search_strategy (personas/JTBD/review_objections/category_entry_points), search_knowledge (brand guidelines), search_catalog"},{"tier":"dept","group":"Ads","label":"Partnership / KOL fit check","deep":false,"prompt":"We're considering approving a partnership with [creator name + their niche/audience, e.g. 'a travel-gym hybrid creator, 80k followers']. Based on our personas, audience segments, and category entry points for the [product], is this a strong fit? Score the fit, name which persona and entry point they map to, list the 2-3 product angles they should lead with, and flag any audience mismatch or brand-voice risk before we sign off.","tools":"search_strategy (personas/audience_segments/category_entry_points/differentiation), search_knowledge (brand guidelines/competitors), recall"},{"tier":"dept","group":"Ads","label":"Objection-handling ad variants","deep":false,"prompt":"Pull our top customer objections for the [product] from the review data and write a paid ad concept that directly defuses each one. For every objection give me: the objection in the customer's own language, the one-line counter, the visual/proof we should show on screen, and which spec or feature backs it up. Note any objection we can't currently answer with real proof.","tools":"search_strategy (review_objections with handlers/review_praise/differentiation), search_catalog, search_knowledge (tech/materials)"},{"tier":"dept","group":"Ads","label":"B-roll & shot reference pull","deep":false,"prompt":"For the [product] ad we're in post-production on, pull the real product photos and brand assets we should match for color, framing, and logo lockup. Show me the embeddable image URLs, note the correct logo/wordmark usage and brand colors from the guidelines, and list 6-8 feature moments (the vacuum-compression action, IPX8 water test, packing, the hardware) that the cut should be sure to show.","tools":"find_images (product_images + brand_assets), search_knowledge (brand_docs/hardware/tech), search_catalog"},{"tier":"dept","group":"Ads","label":"Full paid campaign brief","deep":true,"prompt":"Build a complete paid-campaign creative brief for the [product] launch and file it for Marketing + Product + Ben sign-off. Cover: positioning and the single key message, the target personas and audience segments to target, the strongest ad angles and hooks tied to real pains/objections, the proof points and verified specs to show on screen, the brand-voice and claims guardrails, and a shot/B-roll list with embedded reference images. Ground every claim in the catalog and strategy data and flag anything unverified.","tools":"search_catalog, get_product, search_product_spec, search_strategy (personas/JTBD/objections/differentiation/CEPs), search_knowledge (tech/materials/competitors/brand), find_images, read_card_doc, save_brief"},{"tier":"dept","group":"Email","label":"Launch sequence (Deep)","deep":true,"prompt":"Build the full launch email sequence for [product, e.g. Vesper] — a 5-email pre-launch-to-launch flow (teaser, problem/agitate, the reveal with hero specs, social-proof/objection-handler, last-call). For each email give 3 subject-line variants, preview text, full body copy, a CTA, and send-day timing. Ground every product claim in the catalog + spec sheets (e.g. Vortex Vacuum Seal, 60kPa compression, IPX8, 168h airtight hold), pull the pains and buying triggers from the personas + jobs-to-be-done, and weave in real customer language from the reviews. Embed real product image URLs from find_images so it drops straight into our ESP. Match Black Voyage brand voice.","tools":"search_catalog + get_product + search_product_spec (specs), search_strategy (personas, JTBD, review_praise/objections), search_knowledge (tech, brand voice), find_images (embeddable HTML images)"},{"tier":"dept","group":"Email","label":"Subject line variants","deep":false,"prompt":"Give me 10 subject lines plus matching preview text for the [product] launch announcement email. Make 4 benefit-led (tie to the real differentiators and specs), 3 curiosity/teaser, and 3 objection-flipping (address the top hesitation from our review objections). Keep each subject under ~50 characters and on Black Voyage brand voice — no banned/avoid words from the glossary.","tools":"search_strategy (review_objections, differentiation), search_knowledge (brand voice/glossary), get_product (specs)"},{"tier":"dept","group":"Email","label":"Abandoned-cart emails","deep":false,"prompt":"Write a 3-email abandoned-cart / browse-abandon sequence for [product]. Email 1 = friendly reminder, Email 2 = handle the #1 purchase objection with proof, Email 3 = urgency/last-chance. Pull the real objections and how-to-handle-them from the review data, reinforce the key differentiators vs competitors, and include subject + preview + body + CTA for each. On brand voice.","tools":"search_strategy (review_objections, differentiation, personas), get_product (specs), search_knowledge (brand voice)"},{"tier":"dept","group":"Email","label":"Welcome / nurture flow","deep":false,"prompt":"Draft a 4-email welcome + nurture sequence for new subscribers who haven't bought yet, centered on the [series, e.g. Pro] line. Email 1 = brand story + what makes Black Voyage different, Email 2 = the core technology explained simply (Vortex Vacuum Seal, compression, IPX8), Email 3 = match the right bag to the right traveler using our personas, Email 4 = soft offer with the strongest social proof. Subject + preview + body + CTA each, grounded in real specs, series positioning, and customer language.","tools":"search_knowledge (tech, series, brand voice/competitors), search_strategy (personas, review_praise), get_product"},{"tier":"dept","group":"Email","label":"Promo / seasonal campaign","deep":false,"prompt":"Write a 3-email seasonal promo sequence (e.g. Black Friday or summer-travel) for [product or bundle]. Lead with the strongest persona-relevant benefit, stack the real differentiators and proof, and build urgency across the three sends. Give me subject + preview + body + CTA per email, and pull embeddable product image URLs so it's ready to build. Stay on Black Voyage brand voice and use approved spec claims only.","tools":"search_strategy (personas, differentiation, review_praise), get_product + search_product_spec (specs), find_images, search_knowledge (brand voice)"},{"tier":"dept","group":"Email","label":"Objection-handling email bank","deep":false,"prompt":"From our review objections data for [product], build me a reusable bank of 6 short email blocks — one per top purchase objection (price, durability, will-it-actually-seal, size/capacity, warranty, comparison to competitor). For each: the objection in the customer's own words, a one-line reframe, the proof point (real spec or review praise), and a CTA line I can drop into any campaign. Save it as a reusable skill so the whole Email team can reuse it.","tools":"search_strategy (review_objections, review_praise, differentiation), get_product + search_product_spec, save_skill"},{"tier":"dept","group":"CRM","label":"Reply pack for an influencer DM","deep":false,"prompt":"An influencer just DM'd us interested in collaborating. Pull the real specs and top proof points for the Aero so I can write a warm reply: 3-4 short talking points (key feature, the vacuum-compression / airtight-hold benefit, and one differentiator vs competitors), plus 2 product photos and our logo I can drop into the DM or follow-up email. Keep the tone on-brand and ready to paste.","tools":"search_catalog + get_product + search_product_spec (Aero specs), search_strategy/search_knowledge (differentiation + brand voice), find_images (product photos + logo)"},{"tier":"dept","group":"CRM","label":"Does this influencer fit?","deep":false,"prompt":"We're considering an influencer whose audience is mostly carry-on/minimalist frequent flyers and digital nomads. Check this against our real personas and audience segments for the Apex and tell me: which of our buyer personas they overlap with, what pains/buying triggers that audience shares, and whether they're a strong, medium, or weak fit for a Black Voyage collab. Give me a one-line verdict I can log on the record.","tools":"search_strategy (personas, audience_segments, jobs_to_be_done, category_entry_points), get_product (Apex)"},{"tier":"dept","group":"CRM","label":"Save this relationship record","deep":false,"prompt":"Log a relationship record for this influencer so the whole team can see it later: handle @packlight.theo, platform Instagram, ~85k travel/EDC audience, first contacted today about a Zephyr seeding collab, status = warm / awaiting product list. Save this as a durable record and add it as a note on the Zephyr card so Email and Marketing can pick it up.","tools":"remember (shared memory relationship record), add_note (Zephyr card log)"},{"tier":"dept","group":"CRM","label":"Recall what we know about a contact","deep":false,"prompt":"Before I reply, pull up everything we've already saved about influencer @packlight.theo or anyone we've talked to about Zephyr seeding — past conversations, agreed terms, status, and any decisions. Summarize it so I know exactly where this relationship stands before I send my next message.","tools":"recall (shared memory across all chats/apps)"},{"tier":"dept","group":"CRM","label":"Hand-off brief to Email team","deep":true,"prompt":"This influencer is vetted and ready to move into the email pipeline. Build me a one-page hand-off brief for the Email team covering the Aero: who the influencer is and their audience fit, the 3 core product talking points and proof, the differentiator vs competitors to lead with, 2-3 embedded product photos plus our logo, and a suggested next-step sequence. File it as a Brief on the Aero card and attach it for the Email team to action.","tools":"search_strategy (fit/personas), get_product + search_product_spec (Aero), search_knowledge (differentiation/voice), find_images (photos + logo), save_brief (file to card)"},{"tier":"dept","group":"CRM","label":"On-brand outreach DM templates","deep":false,"prompt":"Write me 3 short, on-brand cold-outreach DM templates to invite travel/EDC influencers to collaborate on the AirCabin. Each should open with a genuine hook, name one real AirCabin benefit (use accurate specs, not invented numbers), and end with a soft CTA. Keep them in Black Voyage's brand voice and under 60 words each so I can lightly personalize and send.","tools":"get_product + search_product_spec (AirCabin specs), search_knowledge (brand_docs/brand voice), search_strategy (review_praise for proof language)"},{"tier":"dept","group":"Logistics","label":"Freight cube + weight sheet","deep":false,"prompt":"Pull the catalog spec rows for [PRODUCT — e.g. Aero or Vesper] and give me a freight planning snapshot: unit dimensions, unit weight, and capacity/liters for every variant in the line. Lay it out as a simple table (SKU, model, variant, size, dimensions, weight) and flag any variant where the dimensions or weight are missing from the catalog so I know what to chase before I quote sea freight. Trust the catalog numbers exactly — do not estimate or round.","tools":"search_catalog + get_product (catalog: Size, spec/dimensions, Material, auto-surfaced weight/liters fields)"},{"tier":"dept","group":"Logistics","label":"Packaging readiness check","deep":false,"prompt":"Open the full product spec sheet for [PRODUCT] and pull everything related to packaging and the box: inner/outer packaging, carton or box notes, hardware that ships separately (e.g. the manual pump on accessories), and any MO change history that affects how it's packed. Summarize what's locked vs still undefined for packaging, so I know whether this product is ready to carton up for the sea bulk shipment.","tools":"search_product_spec (product_docs: 包裝/技術規格/五金/MO 變更史)"},{"tier":"dept","group":"Logistics","label":"Air sample shipping brief","deep":false,"prompt":"I'm air-shipping pre-production samples of [PRODUCT] for the team to review. Give me a sample-shipping summary: which variants/SKUs exist, their unit dimensions and weight from the catalog, what's in the box (including any separate hardware like pumps or pouches per the spec sheet), and a short note on what to declare for customs given the materials used. Keep it to one page I can hand to the courier.","tools":"search_catalog + get_product + search_product_spec (dimensions, weight, materials, packaging contents)"},{"tier":"dept","group":"Logistics","label":"Warehouse receiving checklist","deep":false,"prompt":"Build a warehouse receiving + readiness checklist for the [PRODUCT] sea-bulk shipment landing at our Amazon FBA and ShipBob warehouses. Use the catalog SKUs and variants so each line item is real, and include: SKU/variant to verify on receipt, carton contents to confirm against the packaging spec, FNSKU/label check, dimensions to spot-check, and a damage/QC step. Save it as a note on this card so the warehouse team can work off it, and set the logistics task to in-progress.","tools":"search_catalog + search_product_spec, then add_note + set_task_status (writes checklist to the card and updates task state)"},{"tier":"dept","group":"Logistics","label":"Log the freight decision","deep":false,"prompt":"We've decided the freight plan for [PRODUCT]: [sea bulk for the main PO / air for the first batch / split shipment — fill in], target landing window [DATE], to [Amazon FBA / ShipBob / both]. Save this decision to shared memory so other departments and future chats can see how this product is being shipped, and add a short note to this card summarizing the plan and who owns it.","tools":"remember (shared cross-app memory) + add_note (card log)"},{"tier":"dept","group":"Logistics","label":"Logistics & fulfillment brief","deep":true,"prompt":"Produce a full Logistics & Fulfillment Brief for the [PRODUCT] launch. Ground every number in the catalog and spec sheets. Cover: (1) the full SKU/variant list with unit dimensions, weight, and capacity; (2) packaging & carton readiness from the spec sheet, flagging anything not yet frozen; (3) sea-bulk vs air-sample plan with what each mode is for; (4) a two-warehouse receiving plan for Amazon FBA + ShipBob with per-SKU labeling and QC steps; and (5) open risks and the data still missing before we can book freight. File it as a brief for sign-off.","tools":"search_catalog + get_product + search_product_spec + recall, delivered via save_brief (versioned, branded HTML with per-section feedback)"}];
function presetsHidden(){ try{ return localStorage.getItem("bv-presets-hidden")==="1"; }catch(e){ return false; } }
function togglePresets(){ const el=document.getElementById("chatPresets"); if(!el)return; const hide=!el.classList.contains("collapsed"); el.classList.toggle("collapsed",hide); try{ localStorage.setItem("bv-presets-hidden",hide?"1":"0"); }catch(e){} }
function fillPreset(slug,i,send){ const p=CHAT_PRESET_DEFS[i]; if(!p)return; const ta=document.getElementById("chatInput"); if(!ta)return;
  CHAT.deep=!!p.deep; const b=document.getElementById("deepBtn"); if(b)b.classList.toggle("on",CHAT.deep);
  ta.value=p.prompt; ta.focus();
  if(send){ chatSend(slug); } else { toast((p.deep?"🔬 Deep armed — ":"")+"Filled — edit if you want, then Send"); } }
function chatPresetsHTML(l){
  const slug=l.slug, myDept=(S.role==="dept"?S.dept:"");
  const utility=[], byDept={};
  CHAT_PRESET_DEFS.forEach((p,i)=>{ if(p.tier==="utility")utility.push(i); else (byDept[p.group]=byDept[p.group]||[]).push(i); });
  const chip=i=>{ const p=CHAT_PRESET_DEFS[i]; return `<button class="cpre${p.deep?" deep":""}" title="Uses: ${esc(p.tools||"—")}${p.deep?"  ·  🔬 builds a full Deep deliverable":""}&#10;Click to fill · Shift-click to send" onclick="fillPreset('${slug}',${i},event.shiftKey)">${esc(p.label)}${p.deep?' <span class="cpd">🔬</span>':""}</button>`; };
  const grp=(name,idxs,pin)=>`<div class="cpregrp${pin?" pin":""}"><div class="cpregh">${esc(name)}${pin?' <span class="cprestar">★ your dept</span>':""}</div><div class="cprechips">${idxs.map(chip).join("")}</div></div>`;
  let body="";
  if(utility.length) body+=grp("Utility",utility,false);
  if(myDept&&byDept[myDept]) body+=grp(myDept,byDept[myDept],true);
  const others=DEPTS().filter(d=>byDept[d]&&byDept[d].length&&d!==myDept);
  if(others.length) body+=`<details class="cpreother"><summary>▸ Other departments (${others.length})</summary>${others.map(d=>grp(d,byDept[d],false)).join("")}</details>`;
  return `<div id="chatPresets" class="${presetsHidden()?"collapsed":""}"><div class="cpreh"><span>⚡ Quick prompts</span><button class="cpretog" onclick="togglePresets()" title="show / hide">▾</button></div><div class="cprebody">${body}</div></div>`;
}

function renderChatPanel(l){

    if(vaLab)vaLab.textContent= ME?("Signed in as "+roleLabel()):"Viewing as";
  }
  document.getElementById("nav").innerHTML=tx(NAVS.map(([v,l])=>`<button class="${S.view===v?"on":""}" onclick="go('${v}')">${l}</button>`).join(""));
  const app=document.getElementById("app");
  // datalist for assignee suggestions (from Team tab heads/members + departments)
  let dl=document.getElementById("people");
  if(!dl){dl=document.createElement("datalist");dl.id="people";document.body.appendChild(dl);}
  dl.innerHTML=[...new Set(TEAM.flatMap(t=>[t.name,t.head,...(t.members||"").split(",")]).map(s=>(s||"").trim()).filter(Boolean))].map(p=>`<option value="${esc(p)}">`).join("");
  let html;
  if(S.view==="launch") html=viewLaunch();
  else if(S.view==="digest") html=viewDigest();
  else if(S.view==="portfolio") html=`<h2>Portfolio <button class="btn" style="margin-left:8px" onclick="newLaunch()">+ New launch</button></h2><div class="sub">Every launch by stage. New cards start fully locked except the intake Form.</div>${portfolioBoard()}<div style="margin-top:26px">${viewTimeline()}</div>`;
  else if(S.view==="progress") html=viewProgress();
  else if(S.view==="timeline") html=viewTimeline();
  else if(S.view==="dept") html=viewDept();
  else if(S.view==="campaign") html=viewCampaign();
  else if(S.view==="settings"||S.view==="team"||S.view==="versions") html=viewSettings();
  else html=S.role==="ceo"?homeCEO():S.role==="director"?homeDirector():homeDept();
  app.innerHTML=tx(html);
  const nb=document.getElementById("inboxN"); if(nb){const n=autopilot().length; nb.textContent=n?n:"";}
  if(S.view==="launch"&&S.launch){chatSub(S.launch);renderChatBody();}
  renderWhoami(); renderGAuth(); renderDrawer(); save();
}
loadSaved();
loadVersions();
fbInit();
loadProjectsData();
if(typeof document!=="undefined"&&document.addEventListener){
  document.addEventListener("keydown",e=>{
    if((e.ctrlKey||e.metaKey)&&e.key.toLowerCase()==="k"){e.preventDefault();openPal();}
    else if(e.key==="/"&&document.activeElement&&document.activeElement.tagName!=="INPUT"&&document.activeElement.tagName!=="TEXTAREA"){e.preventDefault();const q=(S.view==="progress"&&document.getElementById("pjSearch"))||document.getElementById("q");if(q)q.focus();}
    else if(e.key==="Escape"){ if(S.pjOpen){pjClose();} else closePal(); }
  });
}
render();
</script>
</body>
</html>
