let PCHAT={msgs:(function(){try{return JSON.parse((typeof localStorage!=="undefined"&&localStorage.getItem("bv-pchat"))||"[]")||[];}catch(e){return [];}})(),busy:false,busyAt:0};   // persists across refresh (per-user, localStorage)
function pchatSave(){ try{ localStorage.setItem("bv-pchat",JSON.stringify((PCHAT.msgs||[]).slice(-40))); }catch(e){} }
function progressDigest(){
  if(!(typeof PROJECTS!=="undefined"&&PROJECTS.length)) return "(no project data loaded yet)";
  return PROJECTS.map(p=>{ const st=pjStages(p);
    const stages=PJ_STAGE_LBL.map((lbl,i)=>lbl+":"+(st[i]||"?")).join(", ");
    const notes=["Design:"+(p.note_design||""),"Sample:"+(p.note_sample||""),"PPS:"+(p.note_pps||""),"Bulk:"+(p.note_bulk||"")].filter(s=>!/:$/.test(s));
    return ["• "+(p.name||"(unnamed)")+(p.category?" ["+p.category+"]":""),
      "  supplier: "+(p.supplier||"—")+(p.mo?" · MO "+p.mo:""),
      "  manufacturing stages — "+stages+"  → current: "+(PJ_STAGE_LBL[pjCurrentStage(p)]||"?"),
      "  due: "+(p.due_date||"—")+(p.urgency?" · urgency: "+p.urgency:""),
      p.next_action?"  next action: "+p.next_action:"",
      notes.length?("  notes: "+notes.join(" | ")):""
    ].filter(Boolean).join("\n");
  }).join("\n\n").slice(0,9000);
}
function progressSpecDigest(){ const c=(typeof KNOWLEDGE!=="undefined"&&KNOWLEDGE.catalog)||[]; if(!c.length)return "";
  return "\n\nPRODUCT SPECS (catalog — dimensions / materials / hardware / etc.):\n"+c.slice(0,40).map(x=>"• "+(x.name||x.product||x.model||x.sku||x.id||"?")+": "+JSON.stringify(x).replace(/[{}"]/g," ").replace(/\s+/g," ").trim().slice(0,260)).join("\n").slice(0,4500); }
const ENGLISH_ONLY="OUTPUT LANGUAGE — DEFAULT ENGLISH, NEVER LEAK CHINESE (hard rule). Write entirely in English unless the user EXPLICITLY asks for Chinese or bilingual output. The knowledge base is bilingual: there are Traditional-Chinese strategy documents and a Chinese `_zh` twin for nearly every catalog field. When a tool returns Chinese, TRANSLATE the facts you use into natural English — prefer the English `_en` fields and treat `_zh`/Chinese docs ONLY as a source to translate from. NEVER copy a Chinese/CJK character into a reply, persona, quote, headline, brief, title, or saved document; paraphrase Chinese sources in English. Any CJK character in English output is a defect — re-render it in English before sending.\n";
const FACTS_ONLY="FACTUAL INTEGRITY — ABSOLUTE RULE, OVERRIDES EVERYTHING ELSE. Every factual claim you write — any product spec, number, price, weight, dimension, capacity, material, feature, warranty, date, customer/review quote, competitor fact, or performance/sales/ROAS/inventory figure — MUST come VERBATIM from data a tool actually returned THIS turn (catalog, Core collections, research, card attachments). If a needed fact was not returned by a tool, you MUST write \"[not recorded]\" or omit it — you may NEVER invent, infer, estimate, approximate, round, recall from training / general knowledge, or fill a gap with a plausible-sounding number or claim. Do NOT state that a product, SKU, spec value, price, or competitor fact is true unless a tool surfaced it this turn; a blank/absent field means \"not recorded\", never a guess. The ONLY things you may decide yourself are CREATIVE/EDITORIAL choices (angle, tone, structure, which audience to lead with, ordering) — present those as recommendations, never as facts. When unsure whether something is a fact you actually saw in the data, LEAVE IT OUT. A short, fully-grounded answer is REQUIRED over a longer one containing even one guessed fact. If you have no grounded data to answer, say so plainly and name exactly what is missing — do NOT fabricate.\n";
const WRITING_CRAFT="WRITING CRAFT — how to WRITE (governs WORDING only; it NEVER overrides the FACTUAL INTEGRITY rule above — craft the words, never the facts; never embellish a number or invent a claim to read better). Write like a sharp in-house strategist briefing the founder: plain, confident, specific, a little dry — the calm precision of a premium-gear engineer who is also a great writer. Lead with the point, not a preamble or a restatement of the question. Vary sentence rhythm: mix a short punch with a longer explanatory line; never a wall of same-length sentences. Prefer concrete nouns and strong active verbs over adjectives; cut hype and filler ('it seems', 'perhaps', 'very', 'truly', 'in today's landscape', 'it is important to note'). State the facts you DO have with full confidence and zero hedging — qualifiers are for genuine data gaps only, not a nervous tic; when a fact is missing, omit it cleanly or gather gaps into one short 'To confirm:' line at the end rather than burying a marker mid-sentence. Use a list only when items are truly parallel; where a benefit, hook, or positioning line must PERSUADE, write it as polished prose, not a fragment. Match register to the job: internal strategy = dry, decisive, executive; customer-facing copy (PDP, landing page, ad hooks) = vivid and benefit-led while still grounded — copy good enough to ship as-is. Synthesize, don't just report: connect a persona pain to a spec to a proof point into one insight, provided every underlying fact is in the data. No AI throat-clearing, no sign-off.\n";
function progressChatSystem(){
  return ENGLISH_ONLY+FACTS_ONLY+WRITING_CRAFT+"You are the Black Voyage PRODUCT PROGRESS assistant for the Active Projects (manufacturing) board. "
   +"You ONLY help with: product progress, manufacturing status (Design → Sample → PPS → Bulk), suppliers/MOs, due dates and what's next, product specs, and quantities. "
   +"If asked about anything outside that — marketing, ads, copywriting, strategy, finance, or off-topic chit-chat — briefly decline and steer back to product / manufacturing progress. "
   +"Answer ONLY from the PROJECT DATA and PRODUCT SPECS below plus the user's question. NEVER invent a stage, status, date, supplier, MO, spec, or quantity that isn't in the data; if it isn't there, say so plainly and suggest who to ask. Be concise and concrete; use each product's real name.\n\n"
   +"PROJECT DATA (live, from the production sheet):\n"+progressDigest()+progressSpecDigest();
}
function pchatMsgsHTML(){ return PCHAT.msgs.map(m=>`<div class="pcmsg ${m.role==="user"?"user":"assistant"}"><b>${m.role==="user"?esc(m.who||"You"):"🏭 Progress AI"}</b><div>${esc(m.text)}</div></div>`).join("")+(PCHAT.busy?`<div class="pcmsg assistant"><b>🏭 Progress AI</b><div class="sub">thinking…</div></div>`:""); }
function renderPChat(){ const el=document.getElementById("pchatMsgs"); if(!el)return; el.innerHTML=pchatMsgsHTML(); el.scrollTop=el.scrollHeight; }
function progressChatHTML(){
  const open=(S.pchatOpen!==false);   // default OPEN so it's discoverable; collapses only when the user explicitly hides it
  const intro=`<div class="sub">Ask about where products stand — manufacturing stage, supplier / MO, due dates, what's next, specs, quantities. <span style="opacity:.8">e.g. “Which products are stuck in Sample?” · “What's overdue?” · “What stage is the Aero at and what's next?”</span></div>`;
  const body=open?`<div class="pcbody"><div id="pchatMsgs" class="pcmsgs" role="log" aria-live="polite">${PCHAT.msgs.length?pchatMsgsHTML():intro}</div>
      <div class="chatinput"><textarea id="pchatInput" placeholder="Ask about product progress, manufacturing, specs, quantity… (Enter to send)" onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();progressChatSend()}"></textarea><div class="cin-acts"><span class="cin-spacer"></span><button class="btn" onclick="progressChatSend()">Send</button></div></div></div>`:"";
  return `<div class="panel" style="margin-bottom:18px"><h3 style="cursor:pointer;margin:0" onclick="S.pchatOpen=!S.pchatOpen;render()">🏭 Ask about progress <span style="font-size:11px">${open?"▾":"▸"}</span> <span class="ghostnote pchat-tags" style="font-weight:400">· manufacturing · specs · quantity</span></h3>${body}</div>`;
}
async function progressChatSend(){
  const ta=document.getElementById("pchatInput"); if(!ta)return; const text=(ta.value||"").trim(); if(!text)return;
  if(PCHAT.busy){ if(PCHAT.busyAt&&(Date.now()-PCHAT.busyAt)>240000){ PCHAT.busy=false; } else { toast("Still working on the last question — one sec, then ask again."); return; } }
  ta.value=""; PCHAT.msgs.push({role:"user",who:actor(),text}); PCHAT.busy=true; PCHAT.busyAt=Date.now(); pchatSave(); renderPChat();
  const messages=PCHAT.msgs.slice(-12).map(m=>({role:m.role==="user"?"user":"assistant",content:String(m.text||"")}));
  let answer="";
  try{ const r=await chatFetch({model:chatModel(),system:progressChatSystem(),messages,tools:undefined,think:false},{timeout:120000,tries:2,toobigMsg:"That took too long — try asking about one product at a time."});
    if(r&&!r.error){ answer=(r.content||[]).filter(b=>b.type==="text").map(b=>b.text).join("").trim(); }
    else { answer="⚠️ "+((r&&r.error&&r.error.message)||"the assistant backend hiccuped — please ask again."); }
  }catch(e){ answer="⚠️ "+String((e&&e.message)||"that didn't go through — please ask again."); }
  finally{ PCHAT.busy=false; PCHAT.busyAt=0; }
  PCHAT.msgs.push({role:"assistant",text:answer||"I didn't get an answer back — please ask again."}); pchatSave(); renderPChat();
}

// trend sparkline: 2px line, soft area wash, endpoint dot with a surface ring (the spec's connector-dot language)
function sparkSVG(pts,color,label){
  const w=112,h=30,max=Math.max(...pts,1),n=pts.length;
  const px=i=>3+(w-11)*(i/(n-1)), py=v=>h-4-(h-10)*(v/max);
  const P=pts.map((v,i)=>[px(i),py(v)]);
  const line=P.map(p=>p.map(x=>x.toFixed(1)).join(",")).join(" ");
  const area=`M${P[0][0].toFixed(1)},${h-3} `+P.map(p=>`L${p[0].toFixed(1)},${p[1].toFixed(1)}`).join(" ")+` L${P[n-1][0].toFixed(1)},${h-3} Z`;
  return `<svg class="dd-spark" viewBox="0 0 ${w} ${h}" role="img" aria-label="${esc(label)}"><title>${esc(label)}</title>
    <path d="${area}" fill="${color}" opacity=".12"/>
    <polyline points="${line}" fill="none" stroke="${color}" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="${P[n-1][0].toFixed(1)}" cy="${P[n-1][1].toFixed(1)}" r="3.5" fill="${color}" stroke="var(--panel)" stroke-width="2"/></svg>`;
}
// round a max up to a clean axis tick (1/2/5 × 10^k) so gridlines read as round numbers
function niceMax(v){ if(!isFinite(v)||v<=0)return 1; const p=Math.pow(10,Math.floor(Math.log10(v))); const f=v/p; const n=[1,1.5,2,2.5,3,4,5,6,8,10].find(s=>f<=s)||10; return n*p; }
// analytical line chart: real x/y axes, recessive grid, round ticks, 2px lines, endpoint dot + direct label,
// per-point <title> for native hover. series=[{name,color,pts:number[]}]. Single series gets an area wash;
// multi-series lean on direct labels (the CVD floor-band secondary encoding). opts.xTicks=[{i,label}].
function lineChartSVG(series,opts){
  opts=opts||{}; const W=opts.w||520,H=opts.h||210,m={t:14,r:opts.r||70,b:30,l:38};
  const iw=W-m.l-m.r, ih=H-m.t-m.b;
  const n=Math.max(2,...series.map(s=>s.pts.length));
  const nice=niceMax(Math.max(...series.flatMap(s=>s.pts),0));
  const X=i=>m.l+iw*(n<2?0:i/(n-1)), Y=v=>m.t+ih*(1-v/nice);
  let grid="",ylab="";
  for(let g=0;g<=4;g++){const val=nice*g/4,y=Y(val);
    grid+=`<line x1="${m.l}" y1="${y.toFixed(1)}" x2="${(m.l+iw).toFixed(1)}" y2="${y.toFixed(1)}" stroke="var(--line)" stroke-width="1" opacity="${g===0?".8":".4"}"/>`;
    ylab+=`<text x="${m.l-7}" y="${(y+3).toFixed(1)}" text-anchor="end" font-size="9.5" fill="var(--faint)" style="font-variant-numeric:tabular-nums">${Math.round(val)}</text>`;}
  let xlab=""; (opts.xTicks||[]).forEach(t=>{xlab+=`<text x="${X(t.i).toFixed(1)}" y="${H-9}" text-anchor="${t.i===0?"start":t.i>=n-1?"end":"middle"}" font-size="9.5" fill="var(--faint)">${esc(t.label)}</text>`;});
  let body=""; const ends=[];
  series.forEach(s=>{ if(!s.pts||!s.pts.length)return; const P=s.pts.map((v,i)=>[X(i),Y(v)]); const li=P.length-1;   // per-series last index — series can differ in length
    const line=P.map(p=>p[0].toFixed(1)+","+p[1].toFixed(1)).join(" ");
    if(series.length===1){const area=`M${P[0][0].toFixed(1)},${Y(0).toFixed(1)} `+P.map(p=>`L${p[0].toFixed(1)},${p[1].toFixed(1)}`).join(" ")+` L${P[li][0].toFixed(1)},${Y(0).toFixed(1)} Z`;
      body+=`<path d="${area}" fill="${s.color}" opacity=".13"/>`;}
    body+=`<polyline points="${line}" fill="none" stroke="${s.color}" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>`;
    P.forEach((p,i)=>{body+=`<circle cx="${p[0].toFixed(1)}" cy="${p[1].toFixed(1)}" r="7" fill="transparent"><title>${esc(s.name)} · ${Math.round(s.pts[i])}d</title></circle>`;});
    const last=P[li];
    body+=`<circle cx="${last[0].toFixed(1)}" cy="${last[1].toFixed(1)}" r="3.5" fill="${s.color}" stroke="var(--panel)" stroke-width="2"/>`;
    ends.push({y:last[1],dotY:last[1],x:last[0]+7,color:s.color,text:esc(s.name)+" "+Math.round(s.pts[li])+"d"});});
  // de-collide endpoint labels: sort by y, push apart to a minimum gap, clamp inside the plot
  ends.sort((a,b)=>a.y-b.y); const GAP=13;
  for(let i=1;i<ends.length;i++) if(ends[i].y<ends[i-1].y+GAP) ends[i].y=ends[i-1].y+GAP;
  const bot=H-6; if(ends.length&&ends[ends.length-1].y>bot){let over=ends[ends.length-1].y-bot; for(let i=ends.length-1;i>=0;i--){ends[i].y-=over; if(i>0&&ends[i].y-ends[i-1].y>=GAP)break; }}
  const labels=ends.map(e=>`<text x="${e.x.toFixed(1)}" y="${(e.y+3.5).toFixed(1)}" font-size="10.5" font-weight="600" fill="${e.color}" style="font-variant-numeric:tabular-nums">${e.text}</text>`
    +(Math.abs(e.y-e.dotY)>2?`<line x1="${(e.x-3).toFixed(1)}" y1="${(e.dotY).toFixed(1)}" x2="${(e.x-1).toFixed(1)}" y2="${(e.y+1).toFixed(1)}" stroke="${e.color}" stroke-width="1" opacity=".5"/>`:"")).join("");
  return `<svg viewBox="0 0 ${W} ${H}" width="100%" preserveAspectRatio="xMidYMid meet" role="img" aria-label="${esc(opts.aria||"trend chart")}" style="max-width:100%;display:block">
    ${grid}${ylab}${xlab}${body}${labels}</svg>`;
}
function viewTimeline(){

          return `<div class="tl-seg${s.cur?" cur":""}" style="width:${wpx}px;background:${SEGRAMP[si]};color:${ink}" title="${s.stage}: ${s.days}d / ${s.plan}d${s.over?" · +"+s.over+"d · "+s.blame.join(", "):""}">
            ${s.over?`<span class="ov" style="width:${Math.min(s.over*PXD,wpx)}px"></span>`:""}

    </div>`;}).join("");

    ?`目前最大瓶頸：<b style="color:var(--text)">${ranks[0].d}</b>（${ranks[0].v} 天${hot.has(ranks[0].d)?"，且仍在累積":""}）`
    :`Biggest bottleneck right now: <b style="color:var(--text)">${ranks[0].d}</b> (${ranks[0].v}d${hot.has(ranks[0].d)?", still accruing":""})`):"";
  return `<h2>Timeline — planned vs actual</h2>

    ${ranks.length?ranks.map((r,i)=>{
      const act=hot.has(r.d);
      const series=trend[r.d]||Array.from({length:24},(_,k)=>r.v*k/23);
      const tip=zh?`${r.d}：累計延誤 ${r.v} 天${act?"（仍在累積）":""}`:`${r.d}: ${r.v} delay days total${act?" (still accruing)":""}`;
      return `<div class="dd-row${i===0?" top":""}">

  <div class="panel"><h3>Launch timelines</h3>${rows}</div>`;

function loadUsage(){
  if(!FB.docRef){USAGE=[];return;}
  if(USAGE_LOADING)return; USAGE_LOADING=true;
  FB.docRef.collection("chats").get().then(qs=>{
    const rows=[];
    qs.forEach(doc=>{ const card=doc.id; const msgs=(doc.data().messages)||[]; let q=null;
      msgs.forEach(m=>{ if(m.role==="user"){ q=m; }
        else if(m.role==="assistant"){ const meta=m.meta||{}; const isErr=/^⚠️/.test(m.text||""); if(!q&&!meta.in&&!isErr)return;
          rows.push({card, who:(q&&q.who)||"—", question:(q&&q.text)||"(no question)", answer:m.text||"", model:meta.model||"", tin:meta.in||0, tout:meta.out||0, cost:(typeof meta.cost==="number"?meta.cost:0), err:isErr, tools:[...new Set((meta.trace||[]).map(t=>t.name))], ts:(m.ts||(q&&q.ts)||"")}); q=null; } });
    });
    rows.sort((a,b)=>String(b.ts).localeCompare(String(a.ts)));
    USAGE=rows; USAGE_LOADING=false; if(S.view==="settings"&&S.settingsTab==="usage")render();
  }).catch(e=>{ USAGE=[]; USAGE_LOADING=false; if(S.view==="settings"&&S.settingsTab==="usage")render(); });
}

  function matchRep(topic){ var t=(topic||"").toLowerCase().slice(0,40); if(!t)return null; return reps.find(function(r){return String(r.text||"").toLowerCase().includes(t);}); }
  function when(c){ try{ return c&&c.toDate?c.toDate().toLocaleDateString():""; }catch(e){ return ""; } }
  return `<div class="panel"><h3>🌪 Storm Research <span class="ghostnote" style="font-weight:400">· ${mine.length}</span><button class="iconbtn" style="font-size:11px;padding:2px 7px;float:right" title="${T("從 Core 重新整理研究進度","Refresh briefing status from the Core")}" onclick="loadResearchReports(true)">↻</button>${mine.length?`<button class="iconbtn" style="font-size:11px;padding:2px 7px;float:right;margin-right:4px" title="${T("刪除此卡片的所有研究請求","Delete ALL research requests for this card")}" onclick="clearQueuedResearch('${l.slug}')">🗑 ${T("全部清除","Clear all")}</button>`:""}</h3>`
    +(mine.length?"":`<div class="sub">${T("尚無研究。在 chat 輸入框填入主題，按下 🌪 STORM 即可排入 5 視角、引用可查核的研究簡報。","No research yet. Type a topic in the chat box and press 🌪 STORM to queue a 5-lens, citation-verified briefing.")}</div>`)
    +(S.researchAll?mine:mine.slice(0,3)).map(function(r){ var rep=matchRep(r.topic); var done=!!rep;
      return `<div class="card" style="padding:10px 12px;margin-top:8px"><div style="display:flex;justify-content:space-between;gap:8px;align-items:center"><b style="font-size:13px">🌪 ${esc(r.topic||T("（未命名）","(untitled)"))}</b><span style="display:flex;gap:6px;align-items:center;flex:none"><span class="pill" style="${done?"background:rgba(46,125,91,.14);color:var(--green)":"background:rgba(238,49,36,.10);color:var(--accent)"}">${done?T("✓ 已完成","✓ done"):T("⏳ 排隊中","⏳ queued")}</span><button class="iconbtn" title="${T("刪除此研究請求","Delete this research request")}" style="font-size:12px;padding:1px 7px;opacity:.55" onclick="deleteResearch('${r.id}')">✕</button></span></div><div class="sub" style="margin-top:3px;font-size:11px">${esc(r.by||"")}${when(r.createdAt)?(" · "+when(r.createdAt)):""}</div>`
        +(done?`<details style="margin-top:6px"><summary style="cursor:pointer;font-size:12px;color:var(--accent);user-select:none">${T("▾ 檢視完整簡報","▾ View full briefing")}</summary><div class="sub" style="margin-top:6px;white-space:pre-wrap">${esc(String(rep.text||"").replace(/^STORM RESEARCH COMPLETE —\s*/i,""))}</div></details>`:`<div class="sub" style="margin-top:6px">${zh?`正在研究執行環境中執行 5 視角、引用可查核的 pipeline —— 簡報完成後會自動回貼在這裡。也可以直接在 chat 裡喚回：「recall the research on ${esc((r.topic||"").slice(0,40))}」。`:`Running the 5-lens, citation-verified pipeline in the research runtime — the briefing posts back here. Or pull it in chat: "recall the research on ${esc((r.topic||"").slice(0,40))}".`}</div>`)
        +`</div>`; }).join("")
    +((mine.length>3)?('<div style="text-align:center;margin-top:8px"><button class="iconbtn" style="font-size:11px" onclick="toggleResearchAll()">'+(S.researchAll?T("▴ 顯示較少","▴ Show fewer"):T("▾ 顯示全部 "+mine.length,"▾ Show all "+mine.length))+'</button></div>'):"")
    +`</div>`;
}
/* ===== CHAT PRESETS — one-click pre-engineered prompts (Utility -> Department, dept-aware) ===== */
const CHAT_PRESET_DEFS = [{"tier":"utility","group":"Utility","label":"Status in 60 seconds","deep":false,"prompt":"Give me a 60-second status on this launch card: what stage it's in, how many gate tasks are done vs. remaining for the current stage, which department (DRI) owns the open items, the latest check-in, and the one thing standing between us and the next stage. Keep it tight enough to paste into a standup.","tools":"read_card_doc (card tasks, notes, check-ins), the card's stage + gate map, recall"},{"tier":"utility","group":"Utility","label":"What's blocking us","deep":false,"prompt":"What is currently blocking this card from moving forward? List every task marked blocked or stalled, name the department that has to unblock it and who they're waiting on, and tell me which blocker is on the critical path to the next gate. End with a one-line ask I can send to the owning department today.","tools":"read_card_doc (blocked/in-progress tasks + check-in blockers), gate/stage dependency map, recall"},{"tier":"utility","group":"Utility","label":"Gate-readiness check","deep":false,"prompt":"Run a gate-readiness check for this card's current stage. List each gate criterion, mark it met or not-met, flag any evidence-required tasks that are marked done but have no link attached, and call out whether a Ben ◆ sign-off is the thing holding the gate. Tell me plainly: are we clear to advance to the next stage, yes or no, and what's left.","tools":"read_card_doc (per-task status + attached links), the GATES map + evidence/Ben-◆ rules for the current stage"},{"tier":"utility","group":"Utility","label":"Draft a check-in","deep":false,"prompt":"Draft today's check-in note for this card from its real state: what got done since the last check-in, what's in progress, what's blocked and on whom, and the single next action with its owning department. Keep it to 4-5 lines in the same plain style as the existing check-ins, then save it to the card as a note.","tools":"read_card_doc (latest tasks + prior check-ins), add_note (writes the check-in to the card log)"},{"tier":"utility","group":"Utility","label":"Surface the risks","deep":false,"prompt":"Surface the top risks to this launch hitting its target date. Look at how long it's sat in the current stage vs. the planned duration, any repeated delays in its history, blocked tasks near a gate, and any missing inputs (specs, BOM, freight, brief, imagery). Rank the risks by impact on the timeline and give a one-line mitigation for each. Save the most important durable risk to shared memory.","tools":"read_card_doc (task state + stage history + check-ins), planned stage durations, remember (saves the key risk)"},{"tier":"utility","group":"Utility","label":"Launch readiness brief","deep":true,"prompt":"Build a full launch-readiness brief for this card as a branded HTML document. Cover: stage and timeline status; a gate-by-gate readiness table for every stage with met/not-met and evidence/Ben-◆ flags; open blockers by department with owners; risks to the target date with mitigations; and a clear go / not-go recommendation for advancing the current gate. Pull the product's key specs and positioning so the brief reads as a real BV deliverable, then file it for sign-off.","tools":"read_card_doc, GATES/stage map + planned durations, search_catalog + search_knowledge (specs/tech), search_strategy (positioning), find_images, save_brief"},{"tier":"dept","group":"Product","label":"Market research scan","deep":false,"prompt":"Run a market-research scan for this product before we lock the concept. Pull the differentiation graph and competitor profiles (search_knowledge + search_strategy), the category entry points buyers use to enter the premium travel-bag / vacuum-compression category, and the top review praise + objections in our space. Give me: (1) where Black Voyage sits vs the named competitors, (2) the 3-4 buying triggers we should design toward, (3) the unmet need or objection we can win on, and (4) one sentence on the gap this product should fill. Cite which collection each point came from. If something isn't in the data, say so rather than guessing.","tools":"search_knowledge (competitors, brand_docs), search_strategy (differentiation, category_entry_points, review_praise, review_objections), recall"},{"tier":"dept","group":"Product","label":"Concept brief from intake","deep":true,"prompt":"Read this card's intake form and concept notes (read_card_doc), then write the full Concept Brief for Ben's concept sign-off. Ground every spec, dimension and price in the catalog (search_catalog / get_product) and the detailed per-product spec sheet (search_product_spec) — treat the catalog as the source of truth and flag any place the intake disagrees with it instead of silently picking one. Pull personas, JTBD and objections from search_strategy, the relevant tech/materials/series/hardware from search_knowledge, and embed 2-3 real product images via find_images. Sections: Why this product / the gap, Target personas + buying trigger, Concept definition (form, materials, key features), Spec snapshot vs catalog, Competitor edge, and Open risks for sign-off. File it to the card's Briefs panel for review.","tools":"read_card_doc (intake/concept), search_catalog, get_product, search_product_spec, search_strategy, search_knowledge, find_images, save_brief"},{"tier":"dept","group":"Product","label":"Spec + hardware sheet","deep":false,"prompt":"Pull the detailed spec sheet for this product from search_product_spec and give me a clean Design-Freeze readiness summary: the current 技術規格 (tech spec), 五金輔料 (hardware / sub-materials), 功能特色 (key features), and the MO 變更史 (change history) so far. Cross-check the headline dimensions, materials and price against the catalog row (get_product) and flag any mismatch. End with a short list of what's still TBD or unconfirmed before we can freeze the design.","tools":"search_product_spec (product_docs), get_product / search_catalog"},{"tier":"dept","group":"Product","label":"Pre-production BOM draft","deep":true,"prompt":"Draft a pre-production Bill of Materials for this product as the starting point for the sample + BOM stage. Use search_product_spec to pull the 五金輔料 (hardware / sub-materials) and 功能特色, and search_knowledge for the named materials (e.g. CloudWeave, Cordura, X-Pac) and hardware (YKK, Fidlock) so each line uses the correct branded component. Output a table: component / part, material or branded hardware, where it's used, and a 'confirmed vs TBD' status pulled from the spec + MO change history. Clearly mark every line where the source data is silent so Product knows what to confirm with the factory — do not invent quantities or costs we don't have.","tools":"search_product_spec (product_docs, incl. 五金輔料 + MO 變更史), search_knowledge (materials, hardware)"},{"tier":"dept","group":"Product","label":"Costing positioning check","deep":false,"prompt":"For this product, pull its price and tier from the catalog (get_product) and compare against the named competitors (search_knowledge competitors + search_strategy differentiation). Tell me whether our intended price sits above, at, or below the relevant competitors, which features justify a premium, and the top price objection customers raise in reviews plus how we currently handle it (search_strategy review_objections). This is a positioning gut-check for costing — note that internal margins/COGS are not in the data, so frame this as price-positioning only.","tools":"get_product / search_catalog, search_knowledge (competitors), search_strategy (differentiation, review_objections)"},{"tier":"dept","group":"Product","label":"Advance to next stage","deep":false,"prompt":"Where is this product in the Product pipeline right now, and what's blocking the next gate? Read the card's tasks and notes (read_card_doc), tell me which stage we're in (intake / market research / concept / prototyping / costing / design freeze / pre-production sample + BOM / mass production), and list exactly what must be done or attached before the next task can be marked done. If a step is complete and unblocked, mark it done with set_task_status; if it's blocked, tell me what evidence or link it still needs rather than forcing it.","tools":"read_card_doc (card tasks/notes), set_task_status, add_note"},{"tier":"dept","group":"Design","label":"A+ / infographic copy blocks","deep":false,"prompt":"Build the Amazon A+ content modules and infographic copy blocks for [PRODUCT, e.g. Zephyr Pro 35L]. Pull the real specs, hardware and 品牌呈現 from the product spec sheet, ground every tech claim (Vortex Vacuum Seal, 60kPa compression chamber, IPX8, material) in the brand knowledge base, and embed the matching product photos from find_images. Give me 5-6 modules: hero statement, the headline feature with its proof number, materials/hardware callouts, a benefit-led lifestyle module, and a spec/comparison block. Each module = a short headline (max 8 words), 1-2 sentence body in Black Voyage voice, and which image to use.","tools":"search_product_spec (技術規格/五金/品牌呈現), search_knowledge (tech, materials, hardware), find_images (product_images), search_strategy (brand_elements)"},{"tier":"dept","group":"Design","label":"Model name options","deep":false,"prompt":"Propose 6-8 model name options for [PRODUCT/CONCEPT — pull the intake form and concept off this card first]. Stay inside the Black Voyage naming world (Vesper, Aero, Apex, Zephyr, AirCabin, AirTrunk) and the series tiering (Essential / Pro / Pro Lite). For each name give: the word, why it fits the product's character and audience, and a quick check against existing catalog names so we don't collide. Flag any that clash with the brand voice rules or an existing SKU, and star your top recommendation.","tools":"read_card_doc (intake/concept), search_catalog (existing names), search_knowledge (series, brand_docs/voice), search_strategy (personas, brand_elements)"},{"tier":"dept","group":"Design","label":"Packaging / insert copy","deep":false,"prompt":"Write the print-ready copy for the [PRODUCT] packaging, insert card and quick-start manual. Pull the real specs and hardware so the insert is accurate (what's in the box, the pump, IPX8 rating, capacity, weight), use the exact ™ lockups and approved terminology from the brand guidelines, and structure it as: outer-box hero line + 3 feature callouts, insert card (welcome line + how-to-use in 4-5 steps + care), and a one-panel quick-start. Keep it in Black Voyage voice and flag anything that needs a legal/cert symbol.","tools":"search_product_spec (功能特色/五金), search_knowledge (tech, materials, brand_docs/voice, glossary), search_catalog (what's-in-box, weight)"},{"tier":"dept","group":"Design","label":"Pull product + brand assets","deep":false,"prompt":"Pull every product photo and brand asset I have for [PRODUCT or asset type — e.g. 'Zephyr backpack' or 'logo']. Show me the gallery with the public embeddable URLs, and tell me what's available (logo lockups, brand-guidelines PDF, fonts, graphic elements, lifestyle vs white-background shots). Then tell me what's MISSING for a complete Amazon listing set (hero, white-bg, scale/dimension shot, in-use, detail/hardware macro, infographic base) so I know exactly what still needs to be shot or designed.","tools":"find_images (product_images + brand_assets: logos, fonts, brand-guidelines PDF, graphics)"},{"tier":"dept","group":"Design","label":"Listing image plan brief","deep":true,"prompt":"Create the full Amazon listing imagery brief for [PRODUCT]: the 7-image main gallery plus A+ visual plan. For each slot give the shot type, the on-image headline, the single feature/benefit it must communicate, the proof number to overlay, and which existing asset to use (pull from find_images) or whether it needs to be newly shot/rendered. Ground every claim in the real specs and tech knowledge, lead with the differentiators that beat our top competitors, and order the gallery to answer the buyer's biggest objections first. File it as a brief for Design + Ben sign-off.","tools":"search_product_spec, search_knowledge (tech, materials, competitors), search_strategy (personas, review_objections, differentiation, category_entry_points), find_images, save_brief"},{"tier":"dept","group":"Design","label":"Amazon Store page brief","deep":true,"prompt":"Design the Black Voyage Amazon Storefront visual brief covering the brand landing page and the [series/category, e.g. vacuum-compression backpacks] sub-page. Pull the brand story, voice and visual elements from the brand guidelines and brand_elements, the full product line from the catalog, and real hero/lifestyle imagery from find_images. Lay out each section: brand hero banner, the category navigation tiles, a featured-product row with the model names, the technology explainer band (Vortex Vacuum Seal, IPX8, compression), and a cross-sell row — with headline copy, the image to use, and the layout intent for each. File it as a brief for sign-off.","tools":"search_knowledge (brand_docs, series, tech), search_strategy (brand_elements, differentiation), search_catalog (full line + model names), find_images (hero/lifestyle + logo), save_brief"},{"tier":"dept","group":"Catalog","label":"Competitor teardown","deep":false,"prompt":"Build a competitor teardown for the Apex Pro 35L backpack vs its closest 2-3 rivals (e.g. Away, Peak Design, Nomatic). Pull our real specs, materials, hardware and our differentiation/gap notes, then lay it out as a side-by-side comparison table: capacity, material, key tech (Vortex Vacuum Seal, IPX8, 60kPa compression), hardware (YKK/Fidlock), price tier, and the one angle where we clearly win. Flag any spec where a competitor beats us so I know what to defend in the listing copy.","tools":"search_knowledge (competitors, tech, materials, hardware), search_strategy (differentiation), get_product / search_catalog"},{"tier":"dept","group":"Catalog","label":"Amazon listing draft","deep":false,"prompt":"Draft a full Amazon listing for the Vesper Air backpack ready to paste into Seller Central. Pull the confirmed catalog specs and product spec sheet first, then give me: a keyword-rich title (brand + model + capacity + top materials/tech, under 200 chars), 5 bullet points (each leading with a benefit then the spec proof: Vortex Vacuum Seal, IPX8, 60kPa compression, CloudWeave/Cordura material, YKK hardware, dimensions and weight), and a product description paragraph in our approved brand voice. Keep every number exactly as it appears in the catalog.","tools":"search_catalog, get_product, search_product_spec, search_knowledge (tech/materials/hardware), search_strategy (review_praise for benefit language)"},{"tier":"dept","group":"Catalog","label":"Shopify SKU fields","deep":false,"prompt":"Generate the Shopify product fields for the Zephyr Pro 35L so I can file the SKU. Pull the real specs and give me: product title, handle/URL slug, SEO meta title and meta description, vendor (Black Voyage), product type, tags (materials, tech, use-case, series), variant options if any (size/color), and the bullet/HTML body copy. Format it as a clean labeled list I can copy field-by-field into Shopify, with every spec number pulled straight from the catalog.","tools":"search_catalog, get_product, search_product_spec, search_knowledge (series, materials, tech)"},{"tier":"dept","group":"Catalog","label":"Ops sheet rows","deep":false,"prompt":"Build the Catalog ops-sheet rows for the Aero Pro family. List every Aero variant in the catalog and for each give me a single row with: SKU, model name, series (Essential/Pro/Pro Lite), capacity, primary material, key hardware, dimensions, weight, and any noted MO/spec change. Output as a markdown table I can drop straight into the ops sheet, and call out any variant where a field is missing in the catalog so I know what still needs filing.","tools":"search_catalog, get_product, search_product_spec (MO change history), search_knowledge (series)"},{"tier":"dept","group":"Catalog","label":"Listing image pull","deep":false,"prompt":"Pull the product photos and brand assets I need to publish the AirCabin listing live. Show me every available AirCabin product image as an inline gallery with the raw public image URLs, plus the Black Voyage logo and any brand-guideline asset. Tell me which shots I have (hero, detail, lifestyle, infographic-ready) and flag any obvious gap in the image set before I push the listing live.","tools":"find_images (product_images + brand_assets)"},{"tier":"dept","group":"Catalog","label":"Full listing kit","deep":true,"prompt":"Run a complete publish-ready Listing Kit for the Apex Pro 35L as a branded document I can hand off to go live. Pull all confirmed specs, the product spec sheet, our differentiation vs competitors, review-based benefit language, and real product images, then assemble: (1) Amazon title + 5 bullets + description, (2) Shopify fields (title, slug, SEO meta, tags, body), (3) a spec/ops table with every key field, (4) a competitor positioning summary, and (5) an embedded hero + detail image gallery. Flag any spec conflict between the intake/concept and the catalog, and file it to the card's Briefs for sign-off when done.","tools":"search_catalog, get_product, search_product_spec, search_knowledge (competitors/tech/materials), search_strategy (differentiation, review_praise), find_images, read_card_doc, save_brief"},{"tier":"dept","group":"Content","label":"Hero + lifestyle shoot brief","deep":true,"prompt":"Run a full pre-production shoot brief in Deep mode for the [Vesper / Aero / Apex / Zephyr / AirCabin] launch. Pull the exact specs and hero features from the catalog and product spec sheet, the materials and hardware worth showing in close-up (CloudWeave, X-Pac, YKK, Fidlock, the vacuum-compression chamber), the target personas and their jobs-to-be-done so the lifestyle scenes match how they actually travel, our differentiation vs competitors as the hero angles to dramatize, and brand_elements for the visual identity. Embed reference frames from existing product_images and brand_assets. Structure it as: hero shot list, lifestyle scene list (with implied location/wardrobe/props), must-capture detail/macro shots, the compression before/after demo setup, and a do-not-shoot list tied to our brand voice.","tools":"search_catalog + get_product, search_product_spec, search_knowledge (materials/hardware/tech), search_strategy (personas/JTBD/differentiation/brand_elements), find_images"},{"tier":"dept","group":"Content","label":"Shot-list gap check","deep":false,"prompt":"Show me every existing product image and brand asset we already have for the [product/SKU], then tell me which hero features, materials, and hardware from its spec sheet have NOT yet been shot. Give me a prioritized gap shot list of what we still need to capture (close-ups, in-use, compression demo, angles) before this product is content-complete.","tools":"find_images (product_images + brand_assets), get_product, search_product_spec, search_knowledge (materials/hardware)"},{"tier":"dept","group":"Content","label":"Instruction clip script","deep":false,"prompt":"Write a short instruction / how-it-works clip script for the [product/SKU], grounded in the real spec sheet and tech. Walk through how the vacuum-compression works (chamber, manual pump, the actual kPa / hold numbers), the hardware in order of use, and the key handling steps. Give me an on-screen-text version plus a voiceover version, broken into numbered beats with the exact spec callouts so nothing is invented. Keep claims to what the catalog and tech data support.","tools":"search_product_spec, search_knowledge (tech/hardware/materials), get_product, recall (canonical specs)"},{"tier":"dept","group":"Content","label":"Social clip hook bank","deep":false,"prompt":"Give me a bank of 10-12 short-form social clip concepts and on-screen hooks for the [product/SKU]. Base each hook on a real customer job-to-be-done, a category entry point (the moment someone reaches for this product), a top review-praise quote we can dramatize on camera, or a common objection we can answer visually. For each idea give me the hook line, the 3-5 second visual, and which proof point it lands. Keep the language inside our approved brand voice.","tools":"search_strategy (jobs_to_be_done / category_entry_points / review_praise / review_objections / personas / brand_elements)"},{"tier":"dept","group":"Content","label":"Caption + overlay copy","deep":false,"prompt":"Write caption and on-screen text overlay copy for the [lifestyle / instruction / social] clips of the [product/SKU]. Use the real differentiators and proof points from our strategy data and pull exact, supported spec numbers from the catalog. Stay strictly inside our approved brand voice and avoid any banned words. Give me a primary caption plus 2 shorter overlay variants per clip type.","tools":"search_strategy (differentiation / review_praise / brand_elements), get_product, search_product_spec, search_knowledge (brand_docs)"},{"tier":"dept","group":"Content","label":"Content export plan","deep":true,"prompt":"Build a content export plan in Deep mode for the [product/SKU]: list every deliverable we should cut from this shoot, organized into instruction clips, lifestyle clips, and social clips. For each deliverable specify the feature or job-to-be-done it serves, the personas/channel it targets, the proof point or spec it must show, and the source footage it needs. Map it against the existing product_images and brand_assets so we know what is reusable vs net-new. End with a ready-to-hand-off shot-to-asset checklist.","tools":"search_strategy (personas / jobs_to_be_done / category_entry_points / differentiation), get_product, search_product_spec, find_images (product_images + brand_assets), search_knowledge (tech/materials)"},{"tier":"dept","group":"Social","label":"IG carousel captions","deep":false,"prompt":"Write 5 Instagram caption options for the Vesper backpack, each built around a different customer pain point. Pull the real pains and desired outcomes from our personas and jobs-to-be-done, and weave in the actual product features (Vortex Vacuum Seal, CloudWeave material, capacity). Each caption needs a scroll-stopping first line, 2-3 lines of body, a clear CTA, and a set of relevant hashtags. Follow our brand voice rules (use approved words, avoid the banned ones). Keep it sounding human, not salesy.","tools":"search_strategy (personas, jobs_to_be_done), search_catalog/get_product, search_knowledge (tech/materials), glossary voice rules"},{"tier":"dept","group":"Social","label":"TikTok hook list","deep":false,"prompt":"Give me 12 TikTok / Reels hook lines (the first 2 seconds of the video) for the Aero vacuum-compression cube. Base them on the moments people actually buy in this category — pull our category entry points and the top objections customers raise, and turn each into a hook. Mark which hooks are demo-driven (show the compression), which are problem/agitation, and which are social-proof. Keep them short, punchy, and in our brand voice.","tools":"search_strategy (category_entry_points, review_objections, personas), search_catalog, glossary voice rules"},{"tier":"dept","group":"Social","label":"YouTube demo script","deep":false,"prompt":"Write a 60-90 second YouTube Short / demo script for the Apex showing how the Vortex Vacuum Seal compression works. Use only verified specs from the catalog and tech knowledge (compression chamber 60kPa, IPX8, materials, capacity). Structure it as hook, problem, the demo beat-by-beat, the payoff, and a CTA. Note where on-screen text or the product shot should appear. Keep claims accurate and on-brand.","tools":"search_catalog/get_product, search_knowledge (tech/materials/hardware), search_product_spec, glossary voice rules"},{"tier":"dept","group":"Social","label":"Comment-reply playbook","deep":false,"prompt":"Build me a comment-reply playbook for our Zephyr social posts. Pull the most common customer objections from our review data (price, durability, does-the-compression-actually-work, airline rules) and write 2 ready-to-use reply options for each — one short and friendly, one that links to a proof point or spec. Also give me 3 reply templates for positive comments. Match our brand voice and never overclaim.","tools":"search_strategy (review_objections, review_praise), search_catalog, search_knowledge, glossary voice rules"},{"tier":"dept","group":"Social","label":"Find post visuals","deep":false,"prompt":"Pull the available product photos and brand assets for the AirCabin so I can plan this week's posts. Show me what we have, and for each image suggest which platform and post type it fits best (IG grid, IG story, TikTok cover, YouTube thumbnail) plus a one-line caption idea. Flag any obvious gaps where we're missing a shot we'd want for social.","tools":"find_images (product_images + brand_assets), search_catalog, search_strategy (personas)"},{"tier":"dept","group":"Social","label":"Full launch social pack","deep":true,"prompt":"Create a complete launch social content pack for the Vesper across IG, TikTok, and YouTube. Include: 3 IG carousel concepts with full captions and hashtags, 6 TikTok/Reels hooks with their shot directions, 2 YouTube Short scripts, a posting sequence for launch week, and a comment-reply cheat sheet for the top objections. Ground every angle in our personas, jobs-to-be-done, category entry points, and review language; use only verified catalog/tech specs; embed the real product photos where relevant; and follow our brand voice rules throughout.","tools":"search_strategy (personas/JTBD/category_entry_points/reviews/differentiation), search_catalog/get_product, search_knowledge, search_product_spec, find_images, glossary voice rules; files via save_brief"},{"tier":"dept","group":"Marketing","label":"Build the launch marketing brief","deep":true,"prompt":"Build the full product marketing brief for this product. Pull the real specs from the catalog, the core tech (Vortex Vacuum Seal, IPX8, 60kPa compression) and series positioning from brand knowledge, the buyer personas + jobs-to-be-done + top objections + how we win vs Away and Peak Design from strategy, and embed 2-3 real hero product photos. Structure it as: positioning one-liner, key message + 3 proof points, target persona, the single biggest objection and how to handle it, competitor angle, and the 3 KOL lanes I should lead with. File it as a Brief for Marketing + Product + Ben sign-off.","tools":"search_catalog/get_product, search_knowledge (tech/series/competitors), search_strategy (personas/JTBD/objections/differentiation), find_images, save_brief"},{"tier":"dept","group":"Marketing","label":"Map product to 8 KOL lanes","deep":false,"prompt":"For this product, give me a one-paragraph creative brief for each of our 8 KOL lanes — MOAT, ASMR, Cinematic, Authority, Reach, Seed, UGC, and Pro. For each lane: the hook/angle to feature, which real product feature or spec it should show (pull from the catalog and tech knowledge), the persona it speaks to, and one example shot or talking point. Ground every angle in our actual differentiation and customer insights, not generic ideas.","tools":"search_catalog, search_knowledge (tech/materials), search_strategy (personas/insights/category-entry-points)"},{"tier":"dept","group":"Marketing","label":"Top objections + rebuttals","deep":false,"prompt":"What are the top customer objections for this product, and how should our KOLs and copy handle each one? Pull the real review objections and their handlers, plus any price/durability/skepticism patterns from customer insights. Give me each objection, the proof point that answers it, and one line a creator could actually say on camera.","tools":"search_strategy (review_objections/review_praise/insights), search_knowledge (tech/materials for proof points)"},{"tier":"dept","group":"Marketing","label":"Why we beat Away & Peak Design","deep":false,"prompt":"Give me our sharpest differentiation story for this product versus Away and Peak Design. Pull the real differentiation dimensions and competitor strengths/weaknesses, then turn it into 3 punchy positioning angles a KOL could lead a video with — each tied to a real spec or material we have that they don't.","tools":"search_strategy (differentiation), search_knowledge (competitors/tech/materials), search_catalog"},{"tier":"dept","group":"Marketing","label":"Pull hero shots for creators","deep":false,"prompt":"Find the best real product photos and brand assets for this product that I can send to KOLs and drop into a brief. Return the embeddable image URLs grouped by use — hero shot, lifestyle, detail/feature close-up, and the logo — and note which KOL lane each image best supports.","tools":"find_images (product_images + brand_assets)"},{"tier":"dept","group":"Marketing","label":"Score a finished KOL video","deep":false,"prompt":"I'm running the evaluation loop on a KOL video. Here's what the creator delivered: [paste a short description or link]. Score it against our brief on brand-message accuracy, which spec/proof point it actually showed, voice/tone fit to our brand guidelines, and objection coverage. Flag anything that contradicts our real specs (e.g. wrong compression or hold-time numbers), tell me whether to approve / request edits / pass on usage rights, and save the verdict as a note on this card.","tools":"search_catalog, search_knowledge (tech/brand voice), search_strategy (key messages), add_note, remember"},{"tier":"dept","group":"Ads","label":"Claims-safe ad copy check","deep":false,"prompt":"Before we publish, fact-check the on-screen claims and captions for our [Vesper / Aero / Apex / Zephyr / AirCabin] paid ad against the real catalog and tech data. List every spec or claim we use (compression %, kPa, IPX8 waterproofing, hold/airtight hours, capacity, materials, hardware), mark each as VERIFIED, OVERSTATED, or NOT FOUND in the data, and give the corrected wording for anything that's off. Flag any number that drifts from the catalog source of truth.","tools":"search_catalog, get_product, search_product_spec, search_knowledge (tech/materials/hardware), recall"},{"tier":"dept","group":"Ads","label":"Hook lines for paid social","deep":false,"prompt":"Give me 8 scroll-stopping hook lines (first 3 seconds) for a paid Meta/TikTok video ad for the [product]. Tie each hook to a real customer pain or buying trigger from our persona and review data, and label which persona and objection each one targets. Keep them in Black Voyage's confident, plain-spoken brand voice and avoid any banned phrasing.","tools":"search_strategy (personas/JTBD/review_objections/category_entry_points), search_knowledge (brand guidelines), search_catalog"},{"tier":"dept","group":"Ads","label":"Partnership / KOL fit check","deep":false,"prompt":"We're considering approving a partnership with [creator name + their niche/audience, e.g. 'a travel-gym hybrid creator, 80k followers']. Based on our personas, audience segments, and category entry points for the [product], is this a strong fit? Score the fit, name which persona and entry point they map to, list the 2-3 product angles they should lead with, and flag any audience mismatch or brand-voice risk before we sign off.","tools":"search_strategy (personas/audience_segments/category_entry_points/differentiation), search_knowledge (brand guidelines/competitors), recall"},{"tier":"dept","group":"Ads","label":"Objection-handling ad variants","deep":false,"prompt":"Pull our top customer objections for the [product] from the review data and write a paid ad concept that directly defuses each one. For every objection give me: the objection in the customer's own language, the one-line counter, the visual/proof we should show on screen, and which spec or feature backs it up. Note any objection we can't currently answer with real proof.","tools":"search_strategy (review_objections with handlers/review_praise/differentiation), search_catalog, search_knowledge (tech/materials)"},{"tier":"dept","group":"Ads","label":"B-roll & shot reference pull","deep":false,"prompt":"For the [product] ad we're in post-production on, pull the real product photos and brand assets we should match for color, framing, and logo lockup. Show me the embeddable image URLs, note the correct logo/wordmark usage and brand colors from the guidelines, and list 6-8 feature moments (the vacuum-compression action, IPX8 water test, packing, the hardware) that the cut should be sure to show.","tools":"find_images (product_images + brand_assets), search_knowledge (brand_docs/hardware/tech), search_catalog"},{"tier":"dept","group":"Ads","label":"Full paid campaign brief","deep":true,"prompt":"Build a complete paid-campaign creative brief for the [product] launch and file it for Marketing + Product + Ben sign-off. Cover: positioning and the single key message, the target personas and audience segments to target, the strongest ad angles and hooks tied to real pains/objections, the proof points and verified specs to show on screen, the brand-voice and claims guardrails, and a shot/B-roll list with embedded reference images. Ground every claim in the catalog and strategy data and flag anything unverified.","tools":"search_catalog, get_product, search_product_spec, search_strategy (personas/JTBD/objections/differentiation/CEPs), search_knowledge (tech/materials/competitors/brand), find_images, read_card_doc, save_brief"},{"tier":"dept","group":"Email","label":"Launch sequence (Deep)","deep":true,"prompt":"Build the full launch email sequence for [product, e.g. Vesper] — a 5-email pre-launch-to-launch flow (teaser, problem/agitate, the reveal with hero specs, social-proof/objection-handler, last-call). For each email give 3 subject-line variants, preview text, full body copy, a CTA, and send-day timing. Ground every product claim in the catalog + spec sheets (e.g. Vortex Vacuum Seal, 60kPa compression, IPX8, 168h airtight hold), pull the pains and buying triggers from the personas + jobs-to-be-done, and weave in real customer language from the reviews. Embed real product image URLs from find_images so it drops straight into our ESP. Match Black Voyage brand voice.","tools":"search_catalog + get_product + search_product_spec (specs), search_strategy (personas, JTBD, review_praise/objections), search_knowledge (tech, brand voice), find_images (embeddable HTML images)"},{"tier":"dept","group":"Email","label":"Subject line variants","deep":false,"prompt":"Give me 10 subject lines plus matching preview text for the [product] launch announcement email. Make 4 benefit-led (tie to the real differentiators and specs), 3 curiosity/teaser, and 3 objection-flipping (address the top hesitation from our review objections). Keep each subject under ~50 characters and on Black Voyage brand voice — no banned/avoid words from the glossary.","tools":"search_strategy (review_objections, differentiation), search_knowledge (brand voice/glossary), get_product (specs)"},{"tier":"dept","group":"Email","label":"Abandoned-cart emails","deep":false,"prompt":"Write a 3-email abandoned-cart / browse-abandon sequence for [product]. Email 1 = friendly reminder, Email 2 = handle the #1 purchase objection with proof, Email 3 = urgency/last-chance. Pull the real objections and how-to-handle-them from the review data, reinforce the key differentiators vs competitors, and include subject + preview + body + CTA for each. On brand voice.","tools":"search_strategy (review_objections, differentiation, personas), get_product (specs), search_knowledge (brand voice)"},{"tier":"dept","group":"Email","label":"Welcome / nurture flow","deep":false,"prompt":"Draft a 4-email welcome + nurture sequence for new subscribers who haven't bought yet, centered on the [series, e.g. Pro] line. Email 1 = brand story + what makes Black Voyage different, Email 2 = the core technology explained simply (Vortex Vacuum Seal, compression, IPX8), Email 3 = match the right bag to the right traveler using our personas, Email 4 = soft offer with the strongest social proof. Subject + preview + body + CTA each, grounded in real specs, series positioning, and customer language.","tools":"search_knowledge (tech, series, brand voice/competitors), search_strategy (personas, review_praise), get_product"},{"tier":"dept","group":"Email","label":"Promo / seasonal campaign","deep":false,"prompt":"Write a 3-email seasonal promo sequence (e.g. Black Friday or summer-travel) for [product or bundle]. Lead with the strongest persona-relevant benefit, stack the real differentiators and proof, and build urgency across the three sends. Give me subject + preview + body + CTA per email, and pull embeddable product image URLs so it's ready to build. Stay on Black Voyage brand voice and use approved spec claims only.","tools":"search_strategy (personas, differentiation, review_praise), get_product + search_product_spec (specs), find_images, search_knowledge (brand voice)"},{"tier":"dept","group":"Email","label":"Objection-handling email bank","deep":false,"prompt":"From our review objections data for [product], build me a reusable bank of 6 short email blocks — one per top purchase objection (price, durability, will-it-actually-seal, size/capacity, warranty, comparison to competitor). For each: the objection in the customer's own words, a one-line reframe, the proof point (real spec or review praise), and a CTA line I can drop into any campaign. Save it as a reusable skill so the whole Email team can reuse it.","tools":"search_strategy (review_objections, review_praise, differentiation), get_product + search_product_spec, save_skill"},{"tier":"dept","group":"CRM","label":"Reply pack for an influencer DM","deep":false,"prompt":"An influencer just DM'd us interested in collaborating. Pull the real specs and top proof points for the Aero so I can write a warm reply: 3-4 short talking points (key feature, the vacuum-compression / airtight-hold benefit, and one differentiator vs competitors), plus 2 product photos and our logo I can drop into the DM or follow-up email. Keep the tone on-brand and ready to paste.","tools":"search_catalog + get_product + search_product_spec (Aero specs), search_strategy/search_knowledge (differentiation + brand voice), find_images (product photos + logo)"},{"tier":"dept","group":"CRM","label":"Does this influencer fit?","deep":false,"prompt":"We're considering an influencer whose audience is mostly carry-on/minimalist frequent flyers and digital nomads. Check this against our real personas and audience segments for the Apex and tell me: which of our buyer personas they overlap with, what pains/buying triggers that audience shares, and whether they're a strong, medium, or weak fit for a Black Voyage collab. Give me a one-line verdict I can log on the record.","tools":"search_strategy (personas, audience_segments, jobs_to_be_done, category_entry_points), get_product (Apex)"},{"tier":"dept","group":"CRM","label":"Save this relationship record","deep":false,"prompt":"Log a relationship record for this influencer so the whole team can see it later: handle @packlight.theo, platform Instagram, ~85k travel/EDC audience, first contacted today about a Zephyr seeding collab, status = warm / awaiting product list. Save this as a durable record and add it as a note on the Zephyr card so Email and Marketing can pick it up.","tools":"remember (shared memory relationship record), add_note (Zephyr card log)"},{"tier":"dept","group":"CRM","label":"Recall what we know about a contact","deep":false,"prompt":"Before I reply, pull up everything we've already saved about influencer @packlight.theo or anyone we've talked to about Zephyr seeding — past conversations, agreed terms, status, and any decisions. Summarize it so I know exactly where this relationship stands before I send my next message.","tools":"recall (shared memory across all chats/apps)"},{"tier":"dept","group":"CRM","label":"Hand-off brief to Email team","deep":true,"prompt":"This influencer is vetted and ready to move into the email pipeline. Build me a one-page hand-off brief for the Email team covering the Aero: who the influencer is and their audience fit, the 3 core product talking points and proof, the differentiator vs competitors to lead with, 2-3 embedded product photos plus our logo, and a suggested next-step sequence. File it as a Brief on the Aero card and attach it for the Email team to action.","tools":"search_strategy (fit/personas), get_product + search_product_spec (Aero), search_knowledge (differentiation/voice), find_images (photos + logo), save_brief (file to card)"},{"tier":"dept","group":"CRM","label":"On-brand outreach DM templates","deep":false,"prompt":"Write me 3 short, on-brand cold-outreach DM templates to invite travel/EDC influencers to collaborate on the AirCabin. Each should open with a genuine hook, name one real AirCabin benefit (use accurate specs, not invented numbers), and end with a soft CTA. Keep them in Black Voyage's brand voice and under 60 words each so I can lightly personalize and send.","tools":"get_product + search_product_spec (AirCabin specs), search_knowledge (brand_docs/brand voice), search_strategy (review_praise for proof language)"},{"tier":"dept","group":"Logistics","label":"Freight cube + weight sheet","deep":false,"prompt":"Pull the catalog spec rows for [PRODUCT — e.g. Aero or Vesper] and give me a freight planning snapshot: unit dimensions, unit weight, and capacity/liters for every variant in the line. Lay it out as a simple table (SKU, model, variant, size, dimensions, weight) and flag any variant where the dimensions or weight are missing from the catalog so I know what to chase before I quote sea freight. Trust the catalog numbers exactly — do not estimate or round.","tools":"search_catalog + get_product (catalog: Size, spec/dimensions, Material, auto-surfaced weight/liters fields)"},{"tier":"dept","group":"Logistics","label":"Packaging readiness check","deep":false,"prompt":"Open the full product spec sheet for [PRODUCT] and pull everything related to packaging and the box: inner/outer packaging, carton or box notes, hardware that ships separately (e.g. the manual pump on accessories), and any MO change history that affects how it's packed. Summarize what's locked vs still undefined for packaging, so I know whether this product is ready to carton up for the sea bulk shipment.","tools":"search_product_spec (product_docs: 包裝/技術規格/五金/MO 變更史)"},{"tier":"dept","group":"Logistics","label":"Air sample shipping brief","deep":false,"prompt":"I'm air-shipping pre-production samples of [PRODUCT] for the team to review. Give me a sample-shipping summary: which variants/SKUs exist, their unit dimensions and weight from the catalog, what's in the box (including any separate hardware like pumps or pouches per the spec sheet), and a short note on what to declare for customs given the materials used. Keep it to one page I can hand to the courier.","tools":"search_catalog + get_product + search_product_spec (dimensions, weight, materials, packaging contents)"},{"tier":"dept","group":"Logistics","label":"Warehouse receiving checklist","deep":false,"prompt":"Build a warehouse receiving + readiness checklist for the [PRODUCT] sea-bulk shipment landing at our Amazon FBA and ShipBob warehouses. Use the catalog SKUs and variants so each line item is real, and include: SKU/variant to verify on receipt, carton contents to confirm against the packaging spec, FNSKU/label check, dimensions to spot-check, and a damage/QC step. Save it as a note on this card so the warehouse team can work off it, and set the logistics task to in-progress.","tools":"search_catalog + search_product_spec, then add_note + set_task_status (writes checklist to the card and updates task state)"},{"tier":"dept","group":"Logistics","label":"Log the freight decision","deep":false,"prompt":"We've decided the freight plan for [PRODUCT]: [sea bulk for the main PO / air for the first batch / split shipment — fill in], target landing window [DATE], to [Amazon FBA / ShipBob / both]. Save this decision to shared memory so other departments and future chats can see how this product is being shipped, and add a short note to this card summarizing the plan and who owns it.","tools":"remember (shared cross-app memory) + add_note (card log)"},{"tier":"dept","group":"Logistics","label":"Logistics & fulfillment brief","deep":true,"prompt":"Produce a full Logistics & Fulfillment Brief for the [PRODUCT] launch. Ground every number in the catalog and spec sheets. Cover: (1) the full SKU/variant list with unit dimensions, weight, and capacity; (2) packaging & carton readiness from the spec sheet, flagging anything not yet frozen; (3) sea-bulk vs air-sample plan with what each mode is for; (4) a two-warehouse receiving plan for Amazon FBA + ShipBob with per-SKU labeling and QC steps; and (5) open risks and the data still missing before we can book freight. File it as a brief for sign-off.","tools":"search_catalog + get_product + search_product_spec + recall, delivered via save_brief (versioned, branded HTML with per-section feedback)"}];
function presetsHidden(){ try{ return localStorage.getItem("bv-presets-hidden")==="1"; }catch(e){ return false; } }
function togglePresets(){ const el=document.getElementById("chatPresets"); if(!el)return; const hide=!el.classList.contains("collapsed"); el.classList.toggle("collapsed",hide); try{ localStorage.setItem("bv-presets-hidden",hide?"1":"0"); }catch(e){} }
function fillPreset(slug,i,send){ const p=CHAT_PRESET_DEFS[i]; if(!p)return; const ta=document.getElementById("chatInput"); if(!ta)return;
  CHAT.deep=!!p.deep; const b=document.getElementById("deepBtn"); if(b)b.classList.toggle("on",CHAT.deep);
  ta.value=p.prompt; ta.focus();
  if(send){ chatSend(slug); } else { toast((p.deep?"🔬 Deep armed — ":"")+"Filled — edit if you want, then Send"); } }
function chatPresetsHTML(l){
  const slug=l.slug, myDept=(S.role==="dept"?S.dept:"");
  const utility=[], byDept={};
  CHAT_PRESET_DEFS.forEach((p,i)=>{ if(p.tier==="utility")utility.push(i); else (byDept[p.group]=byDept[p.group]||[]).push(i); });
  const chip=i=>{ const p=CHAT_PRESET_DEFS[i]; return `<button class="cpre${p.deep?" deep":""}" title="Uses: ${esc(p.tools||"—")}${p.deep?"  ·  🔬 builds a full Deep deliverable":""}&#10;Click to fill · Shift-click to send" onclick="fillPreset('${slug}',${i},event.shiftKey)">${esc(p.label)}${p.deep?' <span class="cpd">🔬</span>':""}</button>`; };
  const grp=(name,idxs,pin)=>`<div class="cpregrp${pin?" pin":""}"><div class="cpregh">${esc(name)}${pin?' <span class="cprestar">★ your dept</span>':""}</div><div class="cprechips">${idxs.map(chip).join("")}</div></div>`;
  let body="";
  if(utility.length) body+=grp("Utility",utility,false);
  if(myDept&&byDept[myDept]) body+=grp(myDept,byDept[myDept],true);
  const others=DEPTS().filter(d=>byDept[d]&&byDept[d].length&&d!==myDept);
  if(others.length) body+=`<details class="cpreother"><summary>▸ Other departments (${others.length})</summary>${others.map(d=>grp(d,byDept[d],false)).join("")}</details>`;
  return `<div id="chatPresets" class="${presetsHidden()?"collapsed":""}"><div class="cpreh"><span>⚡ Quick prompts</span><button class="cpretog" onclick="togglePresets()" title="show / hide">▾</button></div><div class="cprebody">${body}</div></div>`;
}

function renderChatPanel(l){
  return `<div class="panel chatpanel${CHAT.full?" full":""}" id="chatPanel"><h3>💬 Claude — ${esc(l.name)} <span class="ghostnote" style="font-weight:400">· shared</span>
      <span style="float:right;display:inline-flex;gap:6px;align-items:center">
        <select title="model — Sonnet 4.6 is the default; Opus is deepest, Haiku is fastest" onchange="setChatModel(this.value)" style="font-size:11px;padding:3px 6px">${CHAT_MODELS.map(m=>`<option value="${m.id}" ${m.id===chatModel()?"selected":""}>${m.label}</option>`).join("")}</select>
        <button class="iconbtn" id="chatFullBtn" title="${CHAT.full?"close — back to the card (Esc)":"expand to full screen"}" onclick="toggleChatFull()">${CHAT.full?"✕ Close":"⛶ Full"}</button></span></h3>
    <div class="chatmsgs" id="chatMsgs"></div>${chatPresetsHTML(l)}
    <div class="chatinput"><input type="file" id="chatFileInput" multiple style="display:none" onchange="chatAttachFiles(this.dataset.slug,this.files)"><textarea id="chatInput" placeholder="Ask Claude to attach a link/doc/HTML, add a note, or update a task… (Enter to send · Esc to close)" onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();chatSend('${l.slug}')}else if(event.key==='Escape'&&CHAT.full){event.preventDefault();toggleChatFull()}"></textarea>
      <div class="cin-acts"><button class="iconbtn${CHAT.deep?" on":""}" id="deepBtn" title="Deep mode — for big multi-part deliverables (full brief + product guide + personas + ad concepts + competitor comparison). Builds it section-by-section into one document and files it as a Brief. Takes a few minutes." onclick="toggleDeep()">🔬 Deep</button><button class="iconbtn" id="stormBtn" title="STORM deep-research — queues a 5-lens (Practitioner · Academic · Skeptic · Economist · Historian), CITATION-VERIFIED research briefing on whatever topic is in the box. Runs in the research runtime and posts back to the Core in a few minutes; recall it here when ready." onclick="stormResearch('${l.slug}')">🌪 STORM</button><button class="iconbtn" title="Attach a file (PDF / Word / text / CSV / HTML / image) — its text is absorbed into THIS card so its briefs ground in it" onclick="chatAttachOpen('${l.slug}')">📎</button><button class="iconbtn" id="micBtn" title="Dictate — speak and it types into the box for you" onclick="chatMic('${l.slug}')">🎤</button><span class="cin-spacer"></span><button class="iconbtn" title="Stop / reset — halts any running build and unsticks the chat" onclick="chatStop()">⟲ Reset</button><button class="btn" id="chatSendBtn" onclick="chatSend('${l.slug}')">Send</button></div></div>
    <div style="display:flex;justify-content:flex-end;padding:5px 2px 0"><button class="iconbtn" style="font-size:11px;opacity:.55" title="erase this card's entire conversation for everyone (cannot be undone)" onclick="clearChat('${l.slug}')">🗑 Clear conversation</button></div></div>`;
}
const TOOL_STEP={search_catalog:"🔎 Searching the product catalog",get_product:"🔎 Looking up the product",search_knowledge:"📚 Searching brand & tech knowledge",search_product_spec:"📐 Checking the product spec",search_documents:"📄 Reading strategy / research docs",search_strategy:"🎯 Pulling customer & strategy insights",read_card_doc:"📄 Reading this card's intake / concept",find_images:"🖼 Finding product images",recall:"🧠 Recalling saved decisions",remember:"🧠 Saving to shared memory",add_link:"🔗 Attaching a link",add_html:"</> Building an HTML document",add_note:"📝 Adding a note",set_task_status:"☑ Updating a task",save_skill:"📘 Saving a skill",save_brief:"📋 Filing the brief for sign-off"};
function chatStepLabel(n){return TOOL_STEP[n]||("⚙️ Running "+n);}

const TOOL_SRC={search_catalog:"BV Data Core › catalog",get_product:"BV Data Core › catalog",search_knowledge:"BV Data Core › tech · competitors · brand",search_product_spec:"BV Data Core › product specs",search_documents:"BV Data Core › documents",search_strategy:"BV Data Core › personas · insights · reviews",find_images:"BV Data Core › product_images · brand_assets",recall:"BV Data Core › shared memory",remember:"BV Data Core › shared memory (write)",read_card_doc:"this card › intake · concept (bv-superpm)",set_task_status:"this board › task (bv-superpm)",add_link:"this card › attachment (bv-superpm)",add_html:"this chat › HTML doc",add_note:"this card › note (bv-superpm)",save_brief:"this card › Briefs (bv-superpm)",save_skill:"playbooks (bv-superpm)"};

      if(sec.want_compare||/competit|comparison|versus|\bvs\b|landscape|alternativ|rival|market analysis/i.test(sec.heading||"")){ try{ const _cmp=buildCompetitorComparison({card:slug, product:((typeof L==='function'&&L(slug)&&L(slug).name)||slug||"")}); if(_cmp){ frag=frag+_cmp; CHAT.steps.push({head:"\ud83d\udcca Inserted the verified competitor comparison",sub:"spec table + image grid \u00b7 "+(BV_COMPETITORS||[]).length+" brands"}); renderChatBody(); } }catch(e){} }
      parts.push(frag); doneHeads.push(sec.heading);
      if(wantBi){ CHAT.steps.push({head:"🌐 §"+(i+1)+" → 繁體中文",sub:sec.heading}); renderChatBody(); partsZh.push(await translateFragment(frag,acc)); }
      seclog.push((frag&&frag.trim().length>=20?"✓":"⚠️")+" Section "+(i+1)+"/"+plan.sections.length+" — "+sec.heading);
    }
    if(CHAT.cancel){ chatPush(slug,{role:"assistant",who:"Claude",text:"⏹ Stopped — nothing was filed. Re-send when you're ready.",ts:nowStamp()}); return; }
    // 3b) FACT-CHECK — compare the draft to the Core canonical data; auto-file contradictions to the BV Second Brain
    try{ CHAT.steps.push({head:"🔎 Checking for contradictions vs the catalog",sub:"fact-check → BV Second Brain"}); renderChatBody();
      const contra=await detectContradictions(l,slug,plan,parts,researchPack,acc);
      if(contra===null)note("⚠️ Couldn't complete the contradiction check this run (it timed out or returned an unreadable response) — please review the specs against the catalog manually.");
      else if(contra.length)note("⚠️ "+contra.length+" possible contradiction"+(contra.length>1?"s":"")+" vs the catalog — auto-filed to the BV Second Brain Quality dashboard for review.");
      else note("✓ Fact-check done — no contradictions vs the catalog found.");
    }catch(e){}
    // 3c) EDITORIAL COHESION PASS — one whole-document polish so the sections read as one author (facts locked; fail-open).
    try{ if(!CHAT.cancel){ CHAT.phase="acting"; CHAT.steps.push({head:"✍️ Editorial pass — unifying voice & cutting repetition",sub:"whole-document polish · numbers locked"}); renderChatBody();
      var _pol=await editorialPass(parts,plan,acc); if(Array.isArray(_pol)&&_pol.length===parts.length){ for(var _pi=0;_pi<parts.length;_pi++){ if(_pol[_pi]&&String(_pol[_pi]).trim().length>=20)parts[_pi]=_pol[_pi]; } CHAT.steps.push({head:"✓ Editorial pass complete",sub:"flow smoothed; every number verified unchanged"}); renderChatBody(); }
    } }catch(e){}
    // 4) ASSEMBLE + file (or show inline) — shared path, used by success and the catch
    fileIt(null);
  }catch(e){ if(parts.length||plan){ try{ fileIt("stopped: "+((e&&e.message)||e)); }catch(_){ chatPush(slug,{role:"assistant",who:"Claude",text:"⚠️ Deep run hit an error after some sections: "+((e&&e.message)||e)+".",ts:nowStamp()}); } } else { chatPush(slug,{role:"assistant",who:"Claude",text:"⚠️ Deep run couldn't start: "+((e&&e.message)||e)+". Please try again.",ts:nowStamp()}); } }
  finally{ CHAT.deep=false; if(leaseRef){ try{ leaseRef.get().then(function(s){ var dd=(s&&s.data())||{}; if(!dd.deepRunId||dd.deepRunId===_runId){ leaseRef.set({deepRunAt:0,deepRunId:""},{merge:true}); } }).catch(function(){}); }catch(e){} } CHAT.deepRunId=null; var _b=document.getElementById("deepBtn"); if(_b)_b.classList.remove("on"); chatRelease(); }
}
// the lens switcher (CEO-only) — self-contained like the Department-lens dept picker; lives on the Home header, not the nav
function lensSwitcherHTML(){
  if(!isCEO())return "";
  const cur=S.role==="dept"?"dept:"+S.dept:S.role;
  const roles=[["ceo","Ben — CEO"],["director","Director"]].concat(DEPTS().map(d=>["dept:"+d,"Head — "+d]));
  return `<select class="lenssel" onchange="setRole(this.value)" title="preview another department's lens (CEO only)">${roles.map(([v,lab])=>`<option value="${v}" ${v===cur?"selected":""}>${lab}</option>`).join("")}</select>`;
}
function render(){
  const sel=document.getElementById("roleSel"), vaLab=document.getElementById("vaLab");
  if(isCEO()){
    if(vaLab)vaLab.textContent="Preview as";
    const cur=S.role==="dept"?"dept:"+S.dept:S.role;
    if(sel){ sel.style.display=""; sel.innerHTML=tx(`<option value="ceo">Ben — CEO</option><option value="director">Director</option>`+DEPTS().map(d=>`<option value="dept:${d}">Head — ${d}</option>`).join("")); sel.value=[...sel.options].some(o=>o.value===cur)?cur:"ceo"; }
  } else {
    if(sel)sel.style.display="none";
    if(vaLab)vaLab.textContent= ME?("Signed in as "+roleLabel()):"Viewing as";
  }
  document.getElementById("nav").innerHTML=tx(NAVS.map(([v,l])=>`<button class="${S.view===v?"on":""}" onclick="go('${v}')">${l}</button>`).join(""));
  const app=document.getElementById("app");
  // datalist for assignee suggestions (from Team tab heads/members + departments)
  let dl=document.getElementById("people");
  if(!dl){dl=document.createElement("datalist");dl.id="people";document.body.appendChild(dl);}
  dl.innerHTML=[...new Set(TEAM.flatMap(t=>[t.name,t.head,...(t.members||"").split(",")]).map(s=>(s||"").trim()).filter(Boolean))].map(p=>`<option value="${esc(p)}">`).join("");
  let html;
  // guard a stale/deleted launch slug (e.g. card removed but S.launch still points at it) — fall back to portfolio instead of crashing in viewLaunch/health
  if(S.view==="launch"&&!L(S.launch)){S.view="portfolio";S.launch=null;}
  if(S.view!=="launch")FLOWSEEN="";   // left the flow view → next open replays the entrance (once), not on in-view re-renders
  if(S.view==="launch") html=viewLaunch();
  else if(S.view==="digest") html=viewDigest();
  else if(S.view==="portfolio") html=`<h2>Portfolio <button class="btn" style="margin-left:8px" onclick="newLaunch()">+ New launch</button></h2><div class="sub">${LANG==="zh"?"依階段的流程總覽在上,各產品健康與進度明細在下(最需關注排最前)。":"Stage pipeline up top; per-product health and progress below (most-at-risk first)."}</div>${portfolioBoard()}${portfolioOverview()}`;
  else if(S.view==="progress") html=viewProgress();
  else if(S.view==="timeline") html=viewTimeline();
  else if(S.view==="dept") html=viewDept();
  else if(S.view==="campaign") html=viewCampaign();
  else if(S.view==="settings"||S.view==="team"||S.view==="versions") html=viewSettings();
  else html=(isCEO()?`<div class="lensbar">${LANG==="zh"?"視角":"Lens"} ${lensSwitcherHTML()}</div>`:"")+(S.role==="ceo"?homeCEO():S.role==="director"?homeDirector():homeDept());
  app.innerHTML=tx(html);
  const nb=document.getElementById("inboxN"); if(nb){const n=autopilot().length; nb.textContent=n?n:"";}
  if(S.view==="launch"&&S.launch){chatSub(S.launch);renderChatBody();}
  syncFlowPop();
  renderWhoami(); renderGAuth(); renderDrawer(); save();
}

if(typeof document!=="undefined"&&document.addEventListener){
  document.addEventListener("keydown",e=>{
    if((e.ctrlKey||e.metaKey)&&e.key.toLowerCase()==="k"){e.preventDefault();openPal();}
    else if(e.key==="/"&&document.activeElement&&document.activeElement.tagName!=="INPUT"&&document.activeElement.tagName!=="TEXTAREA"){e.preventDefault();const q=(S.view==="progress"&&document.getElementById("pjSearch"))||document.getElementById("q");if(q)q.focus();}
    else if(e.key==="Escape"){ if(S.route){closeFlowPop();} else if(S.pjOpen){pjClose();} else closePal(); }
  });
}
