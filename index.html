<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Black Voyage — SuperPM</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://accounts.google.com/gsi/client" async defer></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<style>
  /* ===== BLACK VOYAGE brand system (Brand Guidelines V4) =====
     Primary: Black #111215 · Orange #EE3124 (signal — use strategically)
     Neutrals: Silver #D0D5E1 · Aero White #F6F8FC
     Type: Aeonik (heading/paragraph) · IBM Plex Mono (labels) · rectangles + thin lines */
  :root{
    --bg:#111215; --panel:#16181C; --panel2:#1D2026; --line:#2A2D34;
    --text:#F6F8FC; --dim:#ADB6C6; --faint:#7B8494;
    --accent:#EE3124; --green:#4ade80; --amber:#fbbf24; --red:#f87171; --blue:#60a5fa; --purple:#c084fc;
    --btntext:#fff;
    /* radius scale (Balanced) — softer than the old flat 2px, still precise. Tier by element size. */
    --r-xs:4px;   /* chips · pills · tags · status squares · progress bars */
    --r-sm:7px;   /* buttons · inputs · selects · rows · nav · tabs */
    --r-md:11px;  /* panels · cards · containers · popovers */
    --r-lg:16px;  /* the floating chat rail · modals · large overlays */
    --r-pill:999px;
    --font-head:"Aeonik","Inter","Helvetica Neue",-apple-system,"Segoe UI",sans-serif;
    --font-mono:"IBM Plex Mono",ui-monospace,Menlo,Consolas,monospace;
  }
  [data-theme="light"]{
    --bg:#F6F8FC; --panel:#FFFFFF; --panel2:#ECEFF5; --line:#D0D5E1;
    --text:#111215; --dim:#4E5666; --faint:#8A93A3;
  }
  /* cool dark-blue theme — dark base with blue glow */
  [data-theme="blue"]{
    --bg:#0D1320; --panel:#121A2B; --panel2:#16213A; --line:#243353;
    --text:#E3EDFB; --dim:#92A8C7; --faint:#61748C;
    --accent:#3D8BFF;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  /* DESIGN.md — keyboard focus visible on every interactive element; mouse focus stays quiet */
  :focus-visible{outline:2px solid var(--accent);outline-offset:2px;border-radius:var(--r-xs)}
  button:focus:not(:focus-visible),summary:focus:not(:focus-visible){outline:none}
  /* DESIGN.md Motion — every animation has a reduced-motion alternative */
  @media (prefers-reduced-motion: reduce){
    *{animation-duration:.01ms!important;animation-iteration-count:1!important;transition-duration:.01ms!important;scroll-behavior:auto!important}
  }
  body{background:var(--bg);color:var(--text);font:14px/1.5 var(--font-head);-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale;text-rendering:optimizeLegibility;}
  h2{font-weight:700;letter-spacing:-.015em;text-wrap:balance}
  .panel h3,.col h4,th{font-family:var(--font-mono);font-weight:400;text-transform:uppercase;letter-spacing:.08em}
  .stg,.o,.sla,.checkin .d,.feeditem .d{font-family:var(--font-mono)}
  /* light-theme component overrides */
  [data-theme="light"] .st.x{background:#E9F7EC;border-color:#3E9E5B;color:#1E7E3E}
  [data-theme="light"] .st.p{background:#FFF3E0;border-color:#D68910;color:#A05A00}
  [data-theme="light"] .st.b{background:#FDEAEA;border-color:#D64545;color:#B03030}
  [data-theme="light"] .ok{background:#E9F7EC;color:#1E7E3E} [data-theme="light"] .risk{background:#FFF3E0;color:#A05A00}
  [data-theme="light"] .bad{background:#FDEAEA;color:#B03030} [data-theme="light"] .done{background:#E8F0FE;color:#1A56B0}
  [data-theme="light"] .dec{background:#F3E8FD;color:#7A3FB8}
  [data-theme="light"] .urg.low{background:#E8F0FE;color:#1A56B0} [data-theme="light"] .urg.med{background:#FbF6DD;color:#8a7400}
  [data-theme="light"] .urg.high{background:#FFF0E0;color:#B25E00} [data-theme="light"] .urg.urgent{background:#FDEAEA;color:#B03030}
  [data-theme="light"] .lnk{background:#E8F0FE;color:#1A56B0} [data-theme="light"] .asg{background:#E8EDF6;color:#3C5A8A}
  [data-theme="light"] .stg.past{background:#E9F7EC;color:#1E7E3E;border-color:#bfe5c8}
  [data-theme="light"] .deptchip.rdy{background:#E9F7EC;color:#1E7E3E;border-color:#bfe5c8}
  [data-theme="light"] .flowwrap{background:#FBFCFE}
  [data-theme="light"] .taskpanel{background:#F4F6FA}
  [data-theme="light"] .bar{background:#E3E8F1}
  body[data-wide] main{max-width:none}
  body[data-wide] footer{max-width:none!important}
  @keyframes glowPulse{0%,100%{opacity:1}50%{opacity:.2}}
  .glownode{animation:glowPulse 1.15s ease-in-out infinite}
  @keyframes dashmove{to{stroke-dashoffset:-32}}
  .routeline{animation:dashmove 1.1s linear infinite}
  .routebanner{display:flex;gap:10px;align-items:center;flex-wrap:wrap;border:1px solid var(--accent);background:rgba(238,49,36,.08);color:var(--text);padding:8px 12px;margin-bottom:10px;font-size:12.5px}
  .routebanner a{color:var(--accent)}
  /* ===== SuperPM layer ===== */
  .sla{display:inline-block;padding:2px 9px;border-radius:var(--r-xs);font-size:11px;font-weight:700;margin-left:6px;font-family:var(--font-mono)}
  .sla.ok{background:#14331f;color:var(--green)} .sla.over{background:#331414;color:var(--red);animation:pulse 1.4s infinite}
  [data-theme="light"] .sla.ok{background:#E9F7EC;color:#1E7E3E} [data-theme="light"] .sla.over{background:#FDEAEA;color:#B03030}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.55}}
  .iconbtn{background:var(--panel2);border:1px solid var(--line);color:var(--dim);border-radius:var(--r-sm);padding:6px 11px;cursor:pointer;font-size:13px}
  .iconbtn:hover{color:var(--text);border-color:var(--accent)}
  .drawer{position:fixed;top:0;right:-420px;width:400px;max-width:92vw;height:100vh;background:var(--panel);border-left:1px solid var(--line);z-index:40;transition:right .25s;display:flex;flex-direction:column}
  .drawer.openD{right:0}
  .drawer .dh{padding:14px 16px;border-bottom:1px solid var(--line);display:flex;gap:8px;align-items:center}
  .drawer .db{flex:1;overflow-y:auto;padding:12px 16px}
  .feeditem{border:1px solid var(--line);border-radius:var(--r-md);padding:6px 10px;margin-bottom:8px;font-size:12.5px}
  .feeditem .d{color:var(--faint);font-size:11px}
  .pal{position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:60;display:flex;align-items:flex-start;justify-content:center;padding-top:12vh}
  .palbox{width:560px;max-width:92vw;background:var(--panel);border:1px solid var(--line);overflow:hidden;box-shadow:0 24px 64px rgba(0,0,0,.5)}
  .palbox input{width:100%;border:none;background:var(--panel2);padding:14px 16px;font-size:15px;border-radius:0}
  .palitem{padding:10px 16px;cursor:pointer;display:flex;gap:10px;align-items:center;font-size:13.5px}
  .palitem:hover,.palitem.sel{background:var(--panel2)}
  .risk{border:1px solid rgba(248,113,113,.4);border-radius:var(--r-md);padding:8px 12px;margin-bottom:8px;font-size:13px;background:rgba(248,113,113,.08)}
  .autofix{border:1px solid var(--line);padding:10px 12px;margin-bottom:8px;display:flex;gap:10px;align-items:center;background:var(--panel2)}
  .autofix .sev{width:8px;height:8px;border-radius:var(--r-xs);flex:none}
  .ghostnote{color:var(--faint);font-size:11.5px}
  .gauge{display:flex;align-items:center;gap:16px}
  .digestbox{width:100%;min-height:380px;background:var(--panel2);border:1px solid var(--line);color:var(--text);padding:14px;font:12.5px/1.6 var(--font-mono);white-space:pre-wrap}
  @keyframes confetti{0%{transform:translateY(-10px) rotate(0)}100%{transform:translateY(105vh) rotate(720deg)}}
  .cf{position:fixed;top:-12px;width:9px;height:14px;z-index:80;animation:confetti 1.4s ease-in forwards;pointer-events:none}
  header{display:flex;align-items:center;gap:18px;padding:12px 20px;border-bottom:1px solid var(--line);position:sticky;top:0;background:var(--bg);z-index:10;flex-wrap:wrap}
  .logo{font-weight:700;letter-spacing:.12em;font-size:15px}
  .logo span{color:var(--accent)}
  nav{display:flex;gap:4px;flex-wrap:wrap}
  nav button{background:none;border:none;color:var(--dim);padding:7px 12px;border-radius:var(--r-sm);cursor:pointer;font-size:13.5px}
  nav button.on{background:var(--panel2);color:var(--text)}
  .spacer{flex:1}
  .rolewrap{display:flex;align-items:center;gap:8px;font-size:12.5px;color:var(--dim)}
  select,input[type=text]{background:var(--panel2);color:var(--text);border:1px solid var(--line);border-radius:var(--r-sm);padding:6px 10px;font-size:13px}
  main{padding:20px;max-width:1320px;margin:0 auto}
  h2{font-size:18px;margin-bottom:6px}
  .sub{color:var(--dim);font-size:13px;margin-bottom:18px;line-height:1.55;text-wrap:pretty}
  .kpis{display:grid;grid-template-columns:repeat(auto-fit,minmax(170px,1fr));gap:12px;margin-bottom:22px}
  .kpi{background:var(--panel);border:1px solid var(--line);border-radius:var(--r-md);padding:14px 16px}
  .kpi .n{font-size:26px;font-weight:700}
  .kpi .l{color:var(--dim);font-size:12.5px}
  .panel{background:var(--panel);border:1px solid var(--line);border-radius:var(--r-md);padding:18px;margin-bottom:18px}
  .panel h3{font-size:14px;margin-bottom:12px;color:var(--dim);letter-spacing:.06em}
  .board{display:flex;gap:12px;overflow-x:auto;padding-bottom:8px}
  .col{min-width:200px;flex:1}
  .col h4{font-size:12px;color:var(--dim);text-transform:uppercase;letter-spacing:.06em;margin-bottom:8px;display:flex;justify-content:space-between}
  .card{background:var(--panel);border:1px solid var(--line);border-radius:var(--r-md);padding:14px;margin-bottom:10px;cursor:pointer;transition:border-color .15s,box-shadow .15s}
  .card:hover{border-color:var(--accent);box-shadow:0 2px 14px rgba(0,0,0,.22)}
  .card .nm{font-weight:600;font-size:14.5px;margin-bottom:3px}
  .card .meta{color:var(--dim);font-size:12px}
  .bar{height:5px;background:var(--panel2);border-radius:var(--r-xs);margin:8px 0 6px;overflow:hidden}
  .bar i{display:block;height:100%;background:var(--accent)}
  .pill{display:inline-block;padding:2px 9px;border-radius:var(--r-xs);font-size:11px;font-weight:600;margin-top:6px}
  .ok{background:#14331f;color:var(--green)} .risk{background:#33260f;color:var(--amber)}
  .bad{background:#331414;color:var(--red)} .done{background:#1a2333;color:var(--blue)} .dec{background:#2a1a33;color:var(--purple)}
  .row{display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:var(--r-sm);flex-wrap:wrap}
  .row:hover{background:var(--panel2)}
  .st{width:18px;height:18px;border-radius:var(--r-xs);border:1.5px solid var(--faint);background:none;color:var(--faint);font-family:inherit;padding:0;display:inline-flex;align-items:center;justify-content:center;font-size:11px;flex:none;cursor:pointer}
  button.st:disabled{cursor:default}
  .st.x{background:#14331f;border-color:var(--green);color:var(--green)}
  .st.p{background:#33260f;border-color:var(--amber);color:var(--amber)}
  .st.b{background:#331414;border-color:var(--red);color:var(--red)}
  .row .o:not(.st){margin-left:auto;color:var(--faint);font-size:12px;white-space:nowrap}
  .lnk{display:inline-flex;align-items:center;gap:4px;background:#1a2333;color:var(--blue);border-radius:var(--r-xs);padding:1px 9px;font-size:11.5px;text-decoration:none;margin-left:4px}
  .addlnk{background:none;border:1px dashed var(--faint);color:var(--faint);border-radius:var(--r-sm);padding:0 8px;font-size:11px;cursor:pointer;margin-left:4px}
  .lnkg{display:inline-flex;align-items:center;margin-left:4px}
  .lnkg .lnk{margin-left:0}
  .lnkb{background:none;border:none;color:var(--faint);cursor:pointer;font-size:11px;padding:0 3px;opacity:.65}
  .lnkb:hover{opacity:1;color:var(--accent)}
  .addlnk:hover{color:var(--blue);border-color:var(--blue)}
  .codechip{display:inline-flex;align-items:center;gap:4px;background:#1d2033;color:#c4b5fd;border:1px solid #3a3560;border-radius:var(--r-xs);padding:1px 8px;font-size:11.5px;cursor:pointer;margin-left:0;font-family:ui-monospace,Menlo,monospace}
  .codechip:hover{background:#262147;color:#ddd6fe}
  .cmodal{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:70;display:flex;align-items:center;justify-content:center;padding:5vh 4vw}
  .cmbox{background:var(--panel);border:1px solid var(--line);border-radius:var(--r-sm);width:min(880px,96vw);max-height:90vh;display:flex;flex-direction:column;overflow:hidden}
  .cmhead{display:flex;align-items:center;gap:10px;padding:12px 16px;border-bottom:1px solid var(--line)}
  .cmhead b{flex:1;font-size:14px}
  .cmbody{padding:14px 16px;overflow:auto}
  .cmbody textarea{width:100%;min-height:300px;background:#0d0f13;color:#e5e7eb;border:1px solid var(--line);border-radius:var(--r-sm);padding:10px;font-family:ui-monospace,Menlo,monospace;font-size:12.5px;line-height:1.5;resize:vertical}
  .cmbody iframe{width:100%;height:55vh;border:1px solid var(--line);border-radius:var(--r-sm);background:#fff}
  .cmbody pre{background:#0d0f13;color:#e5e7eb;border:1px solid var(--line);border-radius:var(--r-sm);padding:12px;overflow:auto;font-size:12.5px;line-height:1.5;white-space:pre-wrap;word-break:break-word;margin:0}
  .cmfoot{display:flex;gap:8px;justify-content:flex-end;padding:12px 16px;border-top:1px solid var(--line)}
  .cmtab{background:none;border:1px solid var(--faint);color:var(--faint);border-radius:var(--r-sm);padding:3px 12px;font-size:12px;cursor:pointer}
  .cmtab.on{border-color:var(--blue);color:var(--blue)}
  /* ---- inline brief section editor (✎ Edit) ---- */
  .bedsec{border:1px solid var(--line);border-radius:var(--r-sm);margin:10px 0;overflow:hidden;background:var(--panel2)}
  .bedbar{display:flex;align-items:center;gap:6px;flex-wrap:wrap;padding:7px 10px;border-bottom:1px solid var(--line);background:var(--panel)}
  .bedh{font-size:12px;font-weight:700;color:var(--ink,#e5e7eb);opacity:.85}
  .bedprev{padding:12px 14px;background:#fff;color:#202227;max-height:42vh;overflow:auto}
  .bedprev img{max-width:100%;height:auto;border-radius:var(--r-md)}
  .bedprev table{border-collapse:collapse;max-width:100%}.bedprev th,.bedprev td{border:1px solid #ddd;padding:6px 9px;font-size:13px}
  .bedprev .bvfig{position:relative;display:inline-block;margin:8px 0}
  .bedprev .bvswap{position:absolute;bottom:8px;right:8px;background:#E2552E;color:#fff;border:0;border-radius:var(--r-sm);padding:5px 9px;font-size:11px;cursor:default;opacity:.85}
  .bedprev .bvtag{position:absolute;top:6px;left:6px;background:rgba(22,24,28,.82);color:#fff;font-size:10px;padding:3px 6px;border-radius:var(--r-sm)}
  .bedpick{position:fixed;inset:0;background:rgba(0,0,0,.72);z-index:90;display:none;align-items:center;justify-content:center;padding:5vh 4vw}
  .bedpick.show{display:flex}
  .bedpbox{background:var(--panel);border:1px solid var(--line);border-radius:var(--r-sm);width:min(900px,96vw);max-height:88vh;display:flex;flex-direction:column;overflow:hidden}
  .bedphead{display:flex;align-items:center;gap:10px;padding:11px 14px;border-bottom:1px solid var(--line)}
  .bedphead b{font-size:13px}.bedphead input{flex:1;font-size:12px;padding:5px 8px;background:#0d0f13;color:#e5e7eb;border:1px solid var(--line);border-radius:var(--r-sm)}
  .bedpgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:10px;padding:14px;overflow:auto}
  .bedthumb{cursor:pointer;border:2px solid transparent;border-radius:var(--r-md);overflow:hidden;background:#1a1c22}.bedthumb:hover{border-color:#E2552E}
  .bedthumb img{width:100%;height:120px;object-fit:cover;display:block;background:#222}
  .bedthumb span{display:block;font-size:11px;color:#aab;padding:4px 6px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .gatecard{border:1px solid var(--line);border-radius:var(--r-md);padding:12px;margin-bottom:10px;background:var(--panel2)}
  .btn{background:var(--accent);color:#fff;border:none;border-radius:var(--r-sm);padding:8px 14px;font-weight:600;cursor:pointer;font-size:13px}
  .btn.ghost{background:var(--panel2);color:var(--text);border:1px solid var(--line)}
  .btn.red{background:#3a1d1d;color:var(--red);border:1px solid #5a2a2a}
  .btn:disabled{background:var(--panel2);color:var(--faint);cursor:not-allowed;border:1px solid var(--line)}
  .stages{display:flex;gap:6px;flex-wrap:wrap;margin:10px 0 16px;position:sticky;top:58px;z-index:9;background:var(--bg);padding:6px 0;border-bottom:1px solid var(--line)}
  .stg{padding:5px 11px;border-radius:var(--r-xs);font-size:12px;border:1px solid var(--line);color:var(--faint);cursor:pointer;background:none;font-family:inherit;white-space:nowrap}
  .stages .stg.sel{outline:2px solid var(--accent);outline-offset:1px}
  .stages-gate{margin:12px 0 0;border-bottom:none;align-items:center;padding-bottom:8px;flex-wrap:nowrap;overflow-x:auto}
  .stages-cap{font-family:var(--font-mono);font-size:10px;letter-spacing:.08em;color:var(--faint);text-transform:uppercase;margin-right:2px;align-self:center}
  .stg.past{background:#14331f;color:var(--green);border-color:#1f4a2e}
  .stg.cur{background:var(--accent);color:#fff;font-weight:700;border-color:var(--accent)}
  .twocol{display:grid;grid-template-columns:1.5fr 1fr;gap:18px}
  @media(max-width:900px){.twocol{grid-template-columns:1fr}}
  .slack{background:#1a1d21;border:1px solid var(--line);border-radius:var(--r-md);overflow:hidden}
  .slack .hd{padding:10px 14px;border-bottom:1px solid var(--line);font-weight:700;font-size:13px}
  .slack .msgs{padding:10px 14px;max-height:440px;overflow-y:auto}
  .msg{display:flex;gap:10px;margin-bottom:14px}
  .av{width:34px;height:34px;border-radius:var(--r-md);flex:none;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px;color:#fff}
  .msg .who{font-weight:700;font-size:13px}.msg .when{color:var(--faint);font-size:11px;margin-left:6px}
  .msg .txt{font-size:13px;color:#d1d5db;margin-top:2px}
  .appr{border:1px solid rgba(238,49,36,.4);border-radius:var(--r-md);padding:10px;margin-top:8px;background:rgba(238,49,36,.07)}
  .thr{color:var(--blue);font-size:12px;margin-top:5px;cursor:pointer}
  table{width:100%;border-collapse:collapse;font-size:13px}
  th{color:var(--dim);text-align:left;font-size:11.5px;text-transform:uppercase;letter-spacing:.05em;padding:8px;border-bottom:1px solid var(--line)}
  td{padding:8px;border-bottom:1px solid var(--line);vertical-align:top}
  td input[type=text]{width:100%}
  .cell{display:inline-block;min-width:40px;text-align:center;padding:3px 8px;border-radius:var(--r-xs);font-size:12px;font-weight:600}
  textarea{width:100%;background:var(--panel2);border:1px solid var(--line);border-radius:var(--r-sm);color:var(--text);padding:10px;font:13px/1.5 inherit;resize:vertical;min-height:70px}
  #toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--accent);color:#fff;font-weight:600;padding:10px 18px;border-radius:var(--r-sm);display:none;z-index:50;font-size:13px;max-width:90vw}
  .back{color:var(--blue);cursor:pointer;font-size:13px;margin-bottom:12px;display:inline-block}
  .checkin{border:1px solid var(--line);border-radius:var(--r-md);padding:6px 12px;margin-bottom:8px;font-size:13px}
  .checkin .d{color:var(--faint);font-size:11.5px}
  .flowwrap{overflow:auto;border:1px solid var(--line);border-radius:var(--r-md);background:#101216}
  .legend{display:flex;gap:14px;flex-wrap:wrap;font-size:12px;color:var(--dim);margin:10px 0}
  .legend i{display:inline-block;width:11px;height:11px;border-radius:var(--r-xs);margin-right:5px;vertical-align:-1px}
  .deptchip{display:inline-block;background:var(--panel2);border:1px solid var(--line);border-radius:var(--r-xs);padding:2px 10px;font-size:11.5px;margin:2px 3px 2px 0}
  .deptchip.rdy{background:#14331f;color:var(--green);border-color:#1f4a2e}
  .urg{display:inline-block;padding:1px 8px;border-radius:var(--r-xs);font-size:10.5px;font-weight:700;text-transform:uppercase;letter-spacing:.04em;margin-left:4px}
  .urg.low{background:#1a2333;color:var(--blue)} .urg.med{background:#2a2a1a;color:#d4c44a}

<script>
/* ================= TEAM CONFIG (editable in Team tab — no names, departments only) ================= */
let TEAM = [
 {name:"Product",  role:"Owns the product: intake form, market research, concept, prototyping, costing, design freeze, pre-production sample + BOM, mass production."},
 {name:"Design",   role:"Packaging / insert / manual, model name, infographic & A+ assets, listing imagery, Amazon store visuals."},
 {name:"Catalog",  role:"Amazon & Shopify SKU creation, ops sheet, product data filing, publishing listings live."},
 {name:"Content",  role:"Pre-production, hero / lifestyle shoot, post-production, content export (instruction · lifestyle · social clips)."},
 {name:"Social",   role:"Channel posts: IG / YouTube / TikTok."},
 {name:"Marketing",role:"Product marketing brief, KOL / influencer engine (MOAT · ASMR · Cinematic · Authority · Reach · Seed · UGC · Pro), evaluation loop."},
 {name:"Ads",      role:"Ad post-production, partnerships approval, paid campaigns."},
 {name:"Email",    role:"Launch & campaign email sequences."},
 {name:"CRM",      role:"Influencer DM routing → email pipeline, relationship records."},
 {name:"Logistics",role:"Freight: sea bulk + air samples; warehouse readiness."},
];
TEAM.forEach(t=>{t.head=t.head||"";t.members=t.members||"";});
const DEPTS = () => TEAM.map(t=>t.name);

/* ================= STAGES & GATE MAP (from gate-map v1) ================= */
const STAGES = ["Concept","Build","Production","Content","Listing creation","Live","Marketing"];
const GATES = {
  "Concept":[{t:"Form (intake)",d:"Product"},{t:"Market research",d:"Product"},{t:"Concept definition",d:"Product"},{t:"Ben concept sign-off ◆",d:"Product",ben:1}],
  "Build":[{t:"Prototype 1-2-3 approved",d:"Product"},{t:"Ben validation ◆",d:"Product",ben:1},{t:"Costing & profit signed off",d:"Product"},{t:"Packaging / insert / manual locked",d:"Design"},{t:"Model name set",d:"Design"}],
  "Production":[{t:"Design freeze",d:"Product"},{t:"Marketing brief rough draft",d:"Marketing"},{t:"Department requirements collected",d:"Product"},{t:"Pre-production sample approved + BOM",d:"Product"},{t:"Mass production complete",d:"Product"},{t:"Dispatch details & tracking filed",d:"Logistics"},{t:"Freight booked (sea + air samples)",d:"Logistics"}],
  "Content":[{t:"Hero / lifestyle shoot done",d:"Content"},{t:"Post-production done",d:"Content"},{t:"Content exported (instruction / lifestyle / social clips / ads)",d:"Content"},{t:"A+ / infographic assets ready",d:"Design"}],

/* ================= GATE ENGINE (single implementation) ================= */
const criteria = l => (GATES[l.stage]||[]).map(c=>({...c, task:l.tasks.find(t=>t.t===c.t)}));
const gateState = l => { const cs=criteria(l); return {cs, met:cs.filter(c=>c.task&&c.task.st==="x").length, total:cs.length}; };
const mandatory = l => [...new Set((GATES[l.stage]||[]).map(c=>c.d))];
const deptReady = (l,d) => gateState(l).cs.filter(c=>c.d===d).every(c=>c.task.st==="x");
const allMet = l => { const g=gateState(l); return g.met===g.total && !l.complete; };
const canPushRole = l => S.role==="ceo" || (S.role==="dept" && (S.dept===l.dri || mandatory(l).includes(S.dept)));
const health = l => {
  if(l.complete) return ["Complete","done"];
  if(l.tasks.some(t=>t.st==="b")) return ["Blocked","bad"];
  const g=gateState(l);
  if(g.total-g.met===1 && g.cs.some(c=>c.ben&&c.task.st!=="x")) return ["Awaiting Ben ◆","dec"];
  if(g.met/g.total>=.5) return ["On track","ok"];
  return ["In progress","risk"];
};
const benQueue = () => LAUNCHES.filter(l=>!l.complete).flatMap(l=>{const g=gateState(l);return g.cs.filter(c=>c.ben&&c.task.st!=="x"&&g.cs.filter(o=>!o.ben).every(o=>o.task.st==="x")).map(c=>({l,c}));});
const nextUnmet = l => { const g=gateState(l); const c=g.cs.find(c=>c.task.st!=="x"); return c?c.t:null; };

/* ================= SEQUENTIAL UNLOCK ENGINE =================
   Rule: the intake Form is the root — until it's done, everything else is locked.
   Then nodes unlock lane-by-lane (a step opens only when the previous step in its
   department lane is done) and never ahead of the card's current stage. */
function nodeLocked(l,d,i){
  const n=FLOW[d][i];
  if(n.t==="Form (intake)") return false;
  const form=l.tasks.find(t=>t.t==="Form (intake)");
  if(form&&form.st!=="x") return true;
  if(STAGES.indexOf(n.s)>STAGES.indexOf(l.stage)&&!l.complete) return true;
  for(let k=0;k<i;k++){const p=FLOW[d][k]; if(p.t){const pt=l.tasks.find(x=>x.t===p.t); if(pt&&pt.st!=="x") return true;}}
  return false;
}
function taskLocked(l,task){
  if(task.t==="Form (intake)") return false;
  const form=l.tasks.find(t=>t.t==="Form (intake)");
  if(form&&form.st!=="x") return true;
  const lane=FLOW[task.d];
  if(lane){const i=lane.findIndex(n=>n.t===task.t); if(i>=0) return nodeLocked(l,task.d,i);}
  return STAGES.indexOf(task.stage)>STAGES.indexOf(l.stage)&&!l.complete;
}

/* ================= TIMELINE / DELAY ENGINE ================= */
const D=s=>new Date(s+"T00:00");
const dayDiff=(a,b)=>Math.round((D(b)-D(a))/864e5);
function curBlame(l){ // who is holding the current stage: unmet criteria owners + blocked-task owners
  const set=new Set();
  gateState(l).cs.filter(c=>c.task.st!=="x").forEach(c=>set.add(c.d));
  l.tasks.filter(t=>t.st==="b"&&t.stage===l.stage).forEach(t=>set.add(t.d));
  return [...set];
}
function segments(l){
  return (l.history||[]).map((h,i)=>{
    const end=h.end||(l.history[i+1]?l.history[i+1].start:today);
    const days=Math.max(1,dayDiff(h.start,end));
    const plan=PLAN[h.stage]||21;
    const over=Math.max(0,days-plan);
    const cur=!h.end&&!l.history[i+1]&&!l.complete;
    const blame=over?(h.delayBy||(cur?curBlame(l):[])):[];
    return {stage:h.stage,days,plan,over,cur,blame};
  });
}
function delayByDept(){
  const m={};
  LAUNCHES.forEach(l=>segments(l).forEach(s=>{ if(s.over&&s.blame.length){const share=s.over/s.blame.length; s.blame.forEach(d=>m[d]=(m[d]||0)+share);} }));
  return Object.entries(m).map(([d,v])=>({d,v:Math.round(v)})).sort((a,b)=>b.v-a.v);
}
function projectedSlip(l){ // projected finish vs target
  if(l.complete) return 0;
  const cur=segments(l).find(s=>s.cur); if(!cur) return 0;
  const remainCur=Math.max(0,cur.plan-cur.days); // optimistic: rest of plan
  const future=STAGES.slice(STAGES.indexOf(l.stage)+1).reduce((a,s)=>a+(PLAN[s]||21),0);
  const finish=new Date(D(today).getTime()+(remainCur+future)*864e5);
  return Math.round((finish-D(l.target))/864e5);
}

/* ----- portfolio health score (0–100) ----- */
function healthScore(){
  let s=100; const act=LAUNCHES.filter(l=>!l.complete);
  act.forEach(l=>{
    s-=l.tasks.filter(t=>t.st==="b").length*8;
    if(floatDays(l)<0)s-=15;
    const last=l.checkins[0]; if(!last||dayDiff(last.d,today)>7)s-=5;
  });
  benQueue().forEach(({l,c})=>{if(decisionAge(l,c.t)>SLA_DAYS)s-=12;});
  DEPTS().forEach(d=>{if(wip(d)>WIP_LIMIT)s-=5;});
  return Math.max(10,Math.min(100,s));
}
const grade=s=>s>=90?"A":s>=80?"B":s>=70?"C":s>=55?"D":"F";
function gaugeSVG(s){const R=42,C=2*Math.PI*R,f=s/100;
  const col=s>=80?"#4ade80":s>=60?"#fbbf24":"#f87171";
  return `<svg width="110" height="110" viewBox="0 0 110 110"><circle cx="55" cy="55" r="${R}" fill="none" stroke="#1d2127" stroke-width="11"/>
  <circle cx="55" cy="55" r="${R}" fill="none" stroke="${col}" stroke-width="11" stroke-linecap="round"
    stroke-dasharray="${(C*f).toFixed(1)} ${C.toFixed(1)}" transform="rotate(-90 55 55)"/>
  <text x="55" y="52" text-anchor="middle" fill="${col}" font-size="24" font-weight="700">${s}</text>
  <text x="55" y="70" text-anchor="middle" fill="#9aa3ad" font-size="11">grade ${grade(s)}</text></svg>`;}

/* ----- weekly digest (paste into Slack) ----- */
function buildDigest(){
  const lines=[`*BV PORTFOLIO DIGEST — week of ${fmt(today)}*`,""];
  LAUNCHES.filter(l=>!l.complete).forEach(l=>{
    const g=gateState(l),[h]=health(l),cn=criticalNext(l);
    lines.push(`*${l.name}* — ${l.stage} (${g.met}/${g.total} gate criteria) · ${h}`);
    lines.push(`  DRI ${l.dri} · target ${fmt(l.target)} · float ${floatDays(l)}d · forecast ${fmt(forecastDate(l))}`);
    if(cn) lines.push(`  → critical next: ${cn.t} (${cn.d})`);
    l.tasks.filter(t=>t.st==="b").forEach(t=>lines.push(`  ⛔ blocked: ${t.t} (${t.d})`));
    lines.push("");
  });
  const q=benQueue();
  if(q.length){lines.push(`*◆ DECISIONS WAITING ON BEN (SLA ${SLA_DAYS}d)*`);
    q.forEach(({l,c})=>lines.push(`  • ${l.name} — ${c.t} (${decisionAge(l,c.t)}d)`)); lines.push("");}
  const iss=autopilot();
  lines.push(`*AUTOPILOT* — ${iss.length} open issue(s), health score ${healthScore()}/100 (${grade(healthScore())})`);
  const z=LAUNCHES.filter(l=>l.complete);
  if(z.length)lines.push(`\n_Complete: ${z.map(l=>l.name).join(", ")}_`);
  return lines.join("\n");
}

/* Keep every launch's task list in sync with the workflow template: drop any launch task
   whose title no longer exists in GATES. These orphans appear when a step is removed/renamed
   in code or in Settings → Workflow template — the change updates GATES + the code seed, but a
   board persisted to Firestore BEFORE the change still carries the old task in its tasks array,
   and onSnapshot loads that verbatim (e.g. the legacy Concept-stage "Competitor analysis" task
   owned by Catalog, removed in code by 4a062f9 but stranded in the shared board). Reconciling on
   every load heals the stored board and prevents removed steps from ever lingering again.
   Only touches LAUNCHES — CAMPAIGNS tasks are intentionally free-form and not template-bound. */
function reconcileLaunchTasks(){
  const valid=new Set(); Object.values(GATES).forEach(arr=>(arr||[]).forEach(c=>{if(c&&c.t)valid.add(c.t);}));
  if(!valid.size) return 0;                 // safety: if GATES is somehow empty, strip nothing
  let removed=0;
  LAUNCHES.forEach(l=>{ if(!Array.isArray(l.tasks))return; const n=l.tasks.length; l.tasks=l.tasks.filter(t=>t&&valid.has(t.t)); removed+=n-l.tasks.length; });
  return removed;
}
function applySnapshot(d){
  if(!d)return;
  TEAM.length=0;(d.TEAM||[]).forEach(x=>TEAM.push(x));
  LAUNCHES.length=0;(d.LAUNCHES||[]).forEach(x=>LAUNCHES.push(x));
  CAMPAIGNS.length=0;(d.CAMPAIGNS||[]).forEach(x=>CAMPAIGNS.push(x));
  if(d.LOG){LOG.length=0;d.LOG.forEach(x=>LOG.push(x));} // keep current activity log if a version snap omits it
  if(d.GATES){Object.keys(GATES).forEach(k=>delete GATES[k]);Object.entries(d.GATES).forEach(([k,v])=>GATES[k]=v);}
  if(d.FLOW){Object.keys(FLOW).forEach(k=>delete FLOW[k]);Object.entries(d.FLOW).forEach(([k,v])=>FLOW[k]=v);}
  if(d.XROUTES){Object.keys(XROUTES).forEach(k=>delete XROUTES[k]);Object.entries(d.XROUTES).forEach(([k,v])=>XROUTES[k]=v);}
  reconcileLaunchTasks();                    // strip orphan tasks left by removed/renamed template steps
  applyDeptLens();                           // re-lock a signed-in non-CEO to their team once the shared TEAM email map has loaded
}

function diffState(prev,cur){
  const ch=[]; const secs=new Set();
  const pl={}, cl={}; (prev.LAUNCHES||[]).forEach(l=>pl[l.slug]=l); (cur.LAUNCHES||[]).forEach(l=>cl[l.slug]=l);
  Object.keys(cl).forEach(s=>{ if(!pl[s]){ch.push("＋ launch “"+cl[s].name+"” created");secs.add(cl[s].name);} });
  Object.keys(pl).forEach(s=>{ if(!cl[s]){ch.push("✕ launch “"+pl[s].name+"” removed");secs.add(pl[s].name);} });
  Object.keys(cl).forEach(s=>{ const a=pl[s], b=cl[s]; if(!a)return; const nm=b.name;
    if(a.stage!==b.stage){ch.push(nm+": stage "+a.stage+" → "+b.stage);secs.add(nm);}
    if(a.dri!==b.dri){ch.push(nm+": DRI "+a.dri+" → "+b.dri);secs.add(nm);}
    if(a.target!==b.target){ch.push(nm+": target "+a.target+" → "+b.target);secs.add(nm);}
    if((a.complete?1:0)!==(b.complete?1:0)){ch.push(nm+": "+(b.complete?"marked complete 🎉":"reopened"));secs.add(nm);}
    const at={}, bt={}; (a.tasks||[]).forEach(t=>at[t.t]=t); (b.tasks||[]).forEach(t=>bt[t.t]=t);
    Object.keys(bt).forEach(tt=>{ const x=at[tt], y=bt[tt]; if(!x){ch.push(nm+": ＋ task “"+tt+"”");secs.add(nm);return;}
      if(x.st!==y.st){ch.push(nm+" / "+tt+": "+stWord(x.st)+" → "+stWord(y.st));secs.add(nm);}
      const xl=(x.links||[]).length,yl=(y.links||[]).length; if(yl>xl){ch.push(nm+" / "+tt+": +"+(yl-xl)+" link");secs.add(nm);}
      const xn=(x.notes||[]).length,yn=(y.notes||[]).length; if(yn>xn){ch.push(nm+" / "+tt+": +"+(yn-xn)+" note");secs.add(nm);}
      const xc=(x.codes||[]).length,yc=(y.codes||[]).length; if(yc!==xc){ch.push(nm+" / "+tt+": "+(yc>xc?"+"+(yc-xc):(yc-xc))+" code/link");secs.add(nm);}
      if(x.assignee!==y.assignee&&y.assignee){ch.push(nm+" / "+tt+": assigned "+y.assignee);secs.add(nm);}
    });
    const ar=(a.risks||[]).length,br=(b.risks||[]).length; if(br!==ar){ch.push(nm+": "+(br>ar?"+"+(br-ar)+" risk":(br-ar)+" risk"));secs.add(nm);}
    const ac=(a.checkins||[]).length,bc=(b.checkins||[]).length; if(bc>ac){ch.push(nm+": +"+(bc-ac)+" check-in");secs.add(nm);}
  });
  if(JSON.stringify(prev.TEAM)!==JSON.stringify(cur.TEAM)){ch.push("Team updated");secs.add("Team");}
  if(JSON.stringify(prev.CAMPAIGNS)!==JSON.stringify(cur.CAMPAIGNS)){ch.push("Campaigns updated");secs.add("Campaigns");}
  if(JSON.stringify(prev.GATES)!==JSON.stringify(cur.GATES)||JSON.stringify(prev.FLOW)!==JSON.stringify(cur.FLOW)||JSON.stringify(prev.XROUTES)!==JSON.stringify(cur.XROUTES)){ch.push("Process map updated");secs.add("Process map");}
  const summary = ch.length? ch.slice(0,4).join("; ")+(ch.length>4?"; +"+(ch.length-4)+" more":"") : "Minor edit";
  return {sections:[...secs], summary, detail:ch};
}
function pushVersion(entry){ // shared → Firestore (everyone sees it); local → localStorage
  if(fbConfigured()){ if(FB.ready)fbAddVersion(entry); /* if not ready yet, this early change is skipped */ }
  else { entry.id=(VERSIONS[0]?VERSIONS[0].id:0)+1; VERSIONS.unshift(entry); if(VERSIONS.length>80)VERSIONS.length=80; saveVersions(); }
}
function recordVersion(){
  try{
    const snap=verSnap();
    if(_lastVerKey===null){ _lastVerKey=snap;
      if(!VERSIONS.length && !fbConfigured()){VERSIONS.unshift({id:1,ts:nowStamp(),who:actor(),summary:"Baseline — version history started here",sections:[],changes:[],snap}); saveVersions();}
      return; }
    if(snap===_lastVerKey)return;
    const d=diffState(JSON.parse(_lastVerKey),JSON.parse(snap));
    pushVersion({ts:nowStamp(),who:actor(),summary:_verNote||d.summary,sections:d.sections,changes:_verNote?[_verNote].concat(d.detail):d.detail,snap});
    _verNote=null; _lastVerKey=snap;
  }catch(e){}
}
function recordRemoteVersion(who,newSnapStr){
  try{
    if(_lastVerKey===null||_lastVerKey===newSnapStr) return; // no baseline yet, or no change
    const d=diffState(JSON.parse(_lastVerKey),JSON.parse(newSnapStr));
    const id=(VERSIONS[0]?VERSIONS[0].id:0)+1;
    VERSIONS.unshift({id,ts:nowStamp(),who:(who||"someone")+" · remote",summary:d.summary,sections:d.sections,changes:d.detail,snap:newSnapStr});
    if(VERSIONS.length>80)VERSIONS.length=80; saveVersions();
  }catch(e){}
}
function saveCheckpoint(){const lbl=prompt("Checkpoint label — what is this version?","");if(lbl===null)return;
  const snap=verSnap(); pushVersion({ts:nowStamp(),who:actor(),summary:"📌 "+(lbl||"Checkpoint"),sections:[],changes:[],snap});
  _lastVerKey=snap; if(!fbConfigured())render(); toast("📌 Checkpoint saved");}
function restoreVersion(id){
  const v=VERSIONS.find(x=>String(x.id)===String(id)); if(!v){toast("Version not found");return;}
  if(typeof confirm!=="undefined"&&!confirm("Restore version from "+v.ts+" (by "+v.who+")?\n\n“"+(v.summary||"")+"”\n\nThis replaces the current state. The restore is recorded as a new version, so you can undo it."))return;
  try{applySnapshot(JSON.parse(v.snap));}catch(e){toast("Restore failed");return;}
  _verNote="↩ Restored to "+v.ts+" (originally by "+v.who+")";
  log("↩ Restored version from "+v.ts);
  S.view="versions"; render(); // render → save → recordVersion captures the restore
  toast("↩ Restored to "+v.ts);
}

// bv-superpm (THIS project) reads/writes start ONLY after sign-in, so the auth-required firestore.rules
// don't reject the initial read. Called from onUser() when a user is present; idempotent.
function startBoardSync(){
  if(FB.boardStarted||!FB.docRef) return; FB.boardStarted=true;
  try{
    FB.docRef.collection("activity").orderBy("ts","desc").limit(80).onSnapshot(qs=>{ ACTIVITY=qs.docs.map(d=>d.data()); const dr=document.getElementById("drawer"); if(dr&&dr.classList&&dr.classList.contains("openD"))renderDrawer(); }, e=>{});  // shared attributed feed
    FB.docRef.onSnapshot(snap=>{
      if(snap.metadata.hasPendingWrites) return;            // our own optimistic write — ignore
      const fromCache=snap.metadata&&snap.metadata.fromCache;
      if(!fromCache){ FB.serverSeen=true; FB.synced=true; fbStatus("● live (shared)","var(--green)"); }  // authoritative server data has arrived
      if(!snap.exists){ if(!fromCache) fbWriteNow(true); return; }   // seed the cloud ONLY when the SERVER confirms there is no board — NEVER from a cache miss (that was wiping fresh sign-ins with the demo seed)
      const data=snap.data(); if(!data||typeof data.state!=="string") return;
      if(data.state===verSnap()){ FB.lastWritten=data.state; return; } // already identical
      FB.applying=true;
      recordRemoteVersion(data.updatedBy,data.state);        // log who changed what, before applying
      try{ applySnapshot(JSON.parse(data.state)); }catch(e){}
      const cleaned=verSnap();                               // applySnapshot may have stripped orphan tasks (reconcileLaunchTasks)
      FB.lastWritten=data.state; _lastVerKey=cleaned;        // already captured above as a remote version
      try{ if(typeof localStorage!=="undefined")localStorage.setItem("bv-superpm",snapshot()); }catch(e){}
      render(); FB.applying=false;
      if(cleaned!==data.state) fbWriteNow(true);             // self-heal: persist the reconciled board so the shared doc is clean for everyone (the echo equals verSnap() and is ignored, so no write loop)
      if(data.updatedBy&&data.updatedBy!==actor()) toast("🔄 "+data.updatedBy+" updated the board");
    }, err=>{ fbStatus("● offline","var(--red)"); });
    FB.versRef.orderBy("createdAt","desc").limit(120).onSnapshot(qs=>{   // shared version history (History tab)
      const arr=[]; qs.forEach(doc=>{ const x=doc.data(); x.id=doc.id; arr.push(x); });
      VERSIONS=arr; if(S.view==="versions") render();
    }, e=>{});
    FB.docRef.collection("briefs").orderBy("createdAt","desc").onSnapshot(qs=>{ BRIEFS=qs.docs.map(d=>{const x=d.data();x.id=d.id;return x;}); renderBriefs(); }, e=>{});  // shared, real-time briefs
    try{ firebase.firestore().collection("product_docs").onSnapshot(qs=>{_pdFb=qs.docs.map(d=>d.data()); if(!_pdCore.length)KNOWLEDGE.product_docs=_pdFb;}, e=>{}); }catch(_){}  // bv-superpm fallback until Core seeded
    firebase.firestore().collection("skills").onSnapshot(qs=>{KNOWLEDGE.skills=qs.docs.map(d=>Object.assign({id:d.id},d.data()));}, e=>{});  // SuperPM playbooks/skills injected into the chat prompt
  }catch(e){ fbStatus("● error","var(--red)"); }
}
function fbAddVersion(entry){ try{ FB.versRef.add(Object.assign({},entry,{createdAt:firebase.firestore.FieldValue.serverTimestamp()})); }catch(e){} }
function fbSchedule(){ if(!FB.ready||FB.applying) return; clearTimeout(FB.timer); FB.timer=setTimeout(()=>fbWriteNow(false),700); }
function fbWriteNow(force){
  if(!FB.ready||!FB.synced||!FB.serverSeen) return;        // never write before the authoritative remote board has loaded (prevents the demo-seed overwrite)
  const s=verSnap(); if(!force && s===FB.lastWritten) return;
  FB.lastWritten=s;
  try{ FB.docRef.set({state:s,updatedBy:actor(),updatedAt:firebase.firestore.FieldValue.serverTimestamp()}); }catch(e){}
}

function palItems(q){ const items=[];
  LAUNCHES.forEach(l=>items.push({k:"🚀 Open "+l.name,f:()=>openL(l.slug)}));
  NAVS.forEach(([v,lab])=>items.push({k:"📍 Go to "+lab,f:()=>go(v)}));
  items.push({k:"⚡ Run auto-correct all",f:autoFixAll});
  items.push({k:"🆕 New launch…",f:newLaunch});
  items.push({k:"📋 Weekly digest (copy for Slack)",f:()=>go("digest")});
  items.push({k:"⬇ Export JSON backup",f:exportJSON});
  LAUNCHES.forEach(l=>l.tasks.forEach((t,i)=>items.push({k:"☑ "+l.name+" · "+t.t,f:()=>jumpTask(l.slug,i)})));
  return items.filter(it=>it.k.toLowerCase().includes((q||"").toLowerCase())).slice(0,9);
}
function openPal(){S.palSel=0;const p=document.getElementById("pal");if(p)p.style.display="flex";const q=document.getElementById("palQ");if(q){q.value="";q.focus();}renderPal();}

function renderPal(){const q=document.getElementById("palQ"),list=document.getElementById("palList");if(!list)return;
  const items=palItems(q?q.value:"");
  list.innerHTML=items.map((it,i)=>`<div class="palitem ${i===S.palSel?"sel":""}" onclick="palItems(document.getElementById('palQ').value)[${i}].f();closePal();">${esc(it.k)}</div>`).join("");}
function palKey(e){const q=document.getElementById("palQ");const items=palItems(q?q.value:"");
  if(e.key==="ArrowDown"){S.palSel=Math.min(S.palSel+1,items.length-1);renderPal();e.preventDefault();}
  else if(e.key==="ArrowUp"){S.palSel=Math.max(S.palSel-1,0);renderPal();e.preventDefault();}
  else if(e.key==="Enter"){const it=items[S.palSel];if(it){it.f();closePal();}}
  else if(e.key==="Escape"){closePal();}else{S.palSel=0;}}

/* ============ PROJECTS DATA (live from Google Sheet — same source as the bv-Products portal) ============
   Read-only mirror of the portal's src/lib/sheets.ts. The portal pulls these tabs from a PUBLIC gviz CSV
   endpoint (zero auth), so this static page reads the exact same SHEET_ID directly in the browser.
   CORS is permitted on the gviz host (verified: it echoes Origin in Access-Control-Allow-Origin). */
const PROJ_SHEET_ID="1xVC0DtMZKyT1Mm5l2PPa_gFcBC3w19HgawdKLNISeCk";
let PROJECTS=[], WAITING=[], SIDETRACKS=[], PHISTORY=[], PROJ_LOADED=false, PROJ_ERR="";
function projCsvUrl(tab){return `https://docs.google.com/spreadsheets/d/${PROJ_SHEET_ID}/gviz/tq?tqx=out:csv&sheet=${encodeURIComponent(tab)}`;}
// CSV parser with quote handling — ported verbatim from the portal's parseCSV.
function parseCSV(text){
  const rows=[]; let cur="", inQ=false, row=[];
  for(let i=0;i<text.length;i++){const c=text[i];
    if(inQ){ if(c==='"'){ if(text[i+1]==='"'){cur+='"';i++;} else inQ=false; } else cur+=c; }
    else if(c==='"') inQ=true;
    else if(c===',') {row.push(cur.trim());cur="";}
    else if(c==='\n'||c==='\r'){ if(c==='\r'&&text[i+1]==='\n')i++; row.push(cur.trim());cur=""; if(row.some(x=>x!==""))rows.push(row); row=[]; }
    else cur+=c;
  }
  row.push(cur.trim()); if(row.some(x=>x!==""))rows.push(row);
  return rows;
}
// Fetch a tab → array of objects keyed by header. Header keyed on first whitespace
// token (recovers schema if a header cell gets a bad paste), same as the portal.
async function fetchSheet(tab){
  let res; try{ res=await fetch(projCsvUrl(tab)); }catch(e){ console.error("[projects] fetch failed: "+tab,e); return []; }
  if(!res.ok){ console.error("[projects] sheet "+tab+" → HTTP "+res.status); return []; }
  const rows=parseCSV(await res.text());
  if(rows.length<2) return [];
  const headers=rows[0].map(h=>(h||"").split(/\s+/)[0]);
  return rows.slice(1).map(r=>{const o={}; headers.forEach((h,i)=>{ if(h)o[h]=r[i]||""; }); return o;});
}
// gviz silently falls back to the FIRST tab when a tab is missing; require key
// columns so a missing tab degrades to [] instead of importing the wrong sheet.
function hasHeaders(rows,cols){return rows.filter(r=>cols.every(h=>typeof r[h]==="string"));}
async function loadProjectsData(){
  try{
    const [p,w,s,h]=await Promise.all([fetchSheet("Projects"),fetchSheet("Waiting"),fetchSheet("SideTracks"),fetchSheet("History")]);
    PROJECTS  =hasHeaders(p,["id","name","stage_design","stage_sample","stage_pps","stage_bulk","urgency","due_date","updated_at"]);
    WAITING   =hasHeaders(w,["supplier","project_id","item"]);
    SIDETRACKS=hasHeaders(s,["label","icon","body","is_empty"]);
    PHISTORY  =hasHeaders(h,["date","project_id","name","event_type","summary"]);
    PROJ_LOADED=true; PROJ_ERR="";
    console.log(`[projects] loaded — projects:${PROJECTS.length} waiting:${WAITING.length} sidetracks:${SIDETRACKS.length} history:${PHISTORY.length}`);
  }catch(e){ PROJ_ERR=String((e&&e.message)||e); console.error("[projects] load error",e); }
  render();
}

// ONE guarded status setter used by BOTH the checkbox (humans) and the AI's set_task_status tool:
// same lock-order + evidence-required rules + audit feed for everyone. Returns {ok} or {ok:false,reason}.
function applyTaskStatus(l,t,nx){
  if(taskLocked(l,t)) return {ok:false,reason:"🔒 Locked — "+lockReason(l,t)};
  if(nx==="x"&&EVID.has(t.t)&&!(t.links||[]).length) return {ok:false,reason:"📎 Evidence required — attach a link before marking “"+t.t+"” done (Task Playbook)"};
  t.st=nx;
  if(nx==="x")logEvent("milestone","✓ completed · "+l.name+" — "+t.t,{card:l.slug});
  else if(nx==="b")logEvent("blocked","⛔ blocked · "+l.name+" — "+t.t,{card:l.slug});
  return {ok:true};
}
function cycle(slug,i){ // checkbox click cycles status: todo → in progress → done → blocked → todo
  const l=L(slug), t=l.tasks[i];
  const nx={o:"p",p:"x",x:"b",b:"o"}[t.st];
  const r=applyTaskStatus(l,t,nx); if(!r.ok){toast(r.reason);return;}
  if(nx==="x"){const lane=FLOW[t.d]; const ii=lane?lane.findIndex(n=>n.t===t.t):-1;
    if(ii>=0){const key=t.d+"|"+lane[ii].l; const others=[...new Set(routeSteps(key,t.d,ii).map(p=>p[0]))].filter(x=>x!==t.d);
      if(others.length){S.route={key,d:t.d,i:ii};
        toast("✨ Done → this hand-off involves: "+others.join(", ")+" — route highlighted on the flow chart");}}}
  render();
}
function lockReason(l,t){
  const form=l.tasks.find(x=>x.t==="Form (intake)");
  if(form&&form.st!=="x"&&t.t!=="Form (intake)") return "fill the intake Form first";
  const lane=FLOW[t.d];
  if(lane){const i=lane.findIndex(n=>n.t===t.t);
    for(let k=0;k<i;k++){const p=lane[k]; if(p.t){const pt=l.tasks.find(x=>x.t===p.t); if(pt&&pt.st!=="x") return `finish “${p.t}” first`;}}}
  if(STAGES.indexOf(t.stage)>STAGES.indexOf(l.stage)) return `unlocks at the ${t.stage} stage`;
  return "complete the previous step first";
}

/* ---- Step ownership model: each workflow step has ONE responsible department (the GATES owner s.d) plus optional collaborator departments. s.who stores [owner, ...collaborators] (back-compatible with the old multi-select). Shared across every product and configured once in Settings → Workflow template; the launch detail reads it live and offers a lightweight inline ＋ to add a collaborator. ---- */
function stepSlot(t){ return (GATES[t.stage]||[]).find(x=>x.t===t.t)||null; }

function stepResp(t){ const s=stepSlot(t); return (s&&s.d)||t.d||""; }
function stepCollabs(t){ const s=stepSlot(t); if(!s)return []; const who=Array.isArray(s.who)?s.who:(s.who?[String(s.who)]:[]); return who.filter(d=>d&&d!==s.d); }

function toggleCollab(slug,i,dept){ if(!dept)return; const l=L(slug); const t=l&&l.tasks[i]; if(!t)return; const s=stepSlot(t); if(!s){toast("This step isn't in the workflow template");return;} const cur=stepCollabs(t); const had=cur.includes(dept); setStepWho(s, had?cur.filter(d=>d!==dept):cur.concat(dept)); log(`👥 Collaborators · ${t.t} → ${stepCollabs(t).join(", ")||"(none)"}`); save(); render(); toast(had?"Collaborator removed":"Collaborator added"); }
// template page: set the single responsible department for a step (propagates to every launch's task copy + campaigns)
function setStepResp(stage,taskName,dept){ const s=(GATES[stage]||[]).find(x=>x.t===taskName); if(!s||!dept||s.d===dept)return; const old=s.d; if(Array.isArray(s.who)) s.who=s.who.filter(d=>d!==dept); s.d=dept; LAUNCHES.forEach(l=>l.tasks.forEach(t=>{ if(t.t===taskName&&t.stage===stage)t.d=dept; })); CAMPAIGNS.forEach(c=>(c.tasks||[]).forEach(t=>{ if(t.t===taskName)t.d=dept; })); log(`🧭 Responsible · ${taskName} → ${dept} (was ${old})`); save(); render(); toast("Responsible department updated"); }
// template page: toggle a collaborator on a step
function tplCollab(stage,taskName,dept){ const s=(GATES[stage]||[]).find(x=>x.t===taskName); if(!s||!dept)return; const cur=(Array.isArray(s.who)?s.who:[]).filter(d=>d&&d!==s.d); const next=cur.includes(dept)?cur.filter(d=>d!==dept):cur.concat(dept); setStepWho(s,next); log(`👥 ${taskName} collaborators → ${next.join(", ")||"(none)"}`); save(); render(); }

/* ================= MASTER FLOW CHART RENDER (SVG, live-colored per launch) ================= */
function flowSVG(l){
  const depts=Object.keys(FLOW).filter(d=>DEPTS().includes(d)||FLOW[d]);
  const CW=158,GAP=14,NH=46,VG=66,TOP=56;
  const SUBH=21,SUBGAP=6,HEAD=24,PADB=10;            // nested sub-item metrics (a node with .sub renders as a taller container)
  const nodeH=n=>(n.sub&&n.sub.length)?HEAD+n.sub.length*SUBH+(n.sub.length-1)*SUBGAP+PADB:NH;
  const LY={};                                        // per-lane cumulative Y — supports variable node heights
  depts.forEach(d=>{let yy=TOP;LY[d]=FLOW[d].map(n=>{const o=yy;yy+=nodeH(n)+(VG-NH);return o;});});
  const pos=(d,i)=>({x:GAP+depts.indexOf(d)*(CW+GAP),y:LY[d][i]});
  const hgt=(d,i)=>nodeH(FLOW[d][i]);
  const W=depts.length*(CW+GAP)+GAP, H=Math.max(...depts.map(d=>{const a=FLOW[d];return a.length?LY[d][a.length-1]+nodeH(a[a.length-1]):TOP;}))+34;
  const FT=THEME==="light"
    ?{colBg:"#FFFFFF",colLine:"#DDE3EE",arrow:"#9AA6BA",
      fill:{x:"#E9F7EC",p:"#FFF3E0",b:"#FDEAEA",o:"#EEF1F7",fut:"#F7F9FC"},
      strk:{x:"#3E9E5B",p:"#D68910",b:"#D64545",o:"#B9C2D4",fut:"#E3E8F1"},
      txt:{x:"#1E7E3E",p:"#A05A00",b:"#B03030",o:"#3C4452",fut:"#A9B2C2"}}
    :{colBg:"#13161A",colLine:"#22262D",arrow:"#4A5260",
      fill:{x:"#14331f",p:"#33260f",b:"#331414",o:"#1d2127",fut:"#15171b"},
      strk:{x:"#4ade80",p:"#fbbf24",b:"#f87171",o:"#3a414b",fut:"#262b32"},
      txt:{x:"#4ade80",p:"#fbbf24",b:"#f87171",o:"#aab3bd",fut:"#5a626d"}};
  const fill=FT.fill, strk=FT.strk;
  const stateOf=(n,d,i)=>{
    if(n.t){const t=l.tasks.find(x=>x.t===n.t); if(t){ if(t.st!=="o")return t.st; return nodeLocked(l,d,i)?"fut":"o"; }}
    const si=STAGES.indexOf(n.s),ci=STAGES.indexOf(l.stage);
    if(l.complete||si<ci) return "x";
    return nodeLocked(l,d,i)?"fut":si===ci?"o":"fut";
  };
  const here=nextUnmet(l);
  const rsteps=S.route?routeSteps(S.route.key,S.route.d,S.route.i):null;
  const rset=new Set(rsteps?rsteps.map(p=>p[0]+"|"+p[1]):[]);
  let svg=`<svg width="${W}" height="${H}" viewBox="0 0 ${W} ${H}" preserveAspectRatio="xMidYMin meet" xmlns="http://www.w3.org/2000/svg" style="font-family:inherit;width:100%;height:auto;max-width:100%;display:block">
  <defs><marker id="ar" viewBox="0 0 8 8" refX="7" refY="4" markerWidth="7" markerHeight="7" orient="auto"><path d="M0 0L8 4L0 8z" fill="${FT.arrow}"/></marker></defs>`;
  // columns + headers
  depts.forEach((d,c)=>{const x=GAP+c*(CW+GAP);
    svg+=`<rect x="${x-6}" y="10" width="${CW+12}" height="${H-20}" rx="2" fill="${FT.colBg}" stroke="${FT.colLine}"/>
    <text x="${x+CW/2}" y="34" text-anchor="middle" fill="${DCOLOR(d)}" font-size="13" font-weight="700">${esc(d)}</text>`;});
  // in-column arrows
  depts.forEach(d=>FLOW[d].forEach((n,i)=>{ if(i<FLOW[d].length-1){const a=pos(d,i),b=pos(d,i+1);
    svg+=`<line x1="${a.x+CW/2}" y1="${a.y+hgt(d,i)}" x2="${b.x+CW/2}" y2="${b.y-3}" stroke="${FT.arrow}" stroke-width="1.3" marker-end="url(#ar)"/>`;}}));
  // cross links
  CROSS.forEach(([fd,fi,td,ti])=>{ if(!FLOW[fd]||!FLOW[td])return; const a=pos(fd,fi),b=pos(td,ti);
    const ax=a.x+CW, ay=a.y+hgt(fd,fi)/2, bx=b.x, by=b.y+hgt(td,ti)/2, mx=(ax+bx)/2;
    svg+=`<path d="M${ax} ${ay} C ${mx} ${ay}, ${mx} ${by}, ${bx-4} ${by}" fill="none" stroke="${FT.arrow}" stroke-width="1.2" stroke-dasharray="4 3" marker-end="url(#ar)"/>`;});
  // nodes
  depts.forEach(d=>FLOW[d].forEach((n,i)=>{const {x,y}=pos(d,i);const st=stateOf(n,d,i);
    const isHere=n.t&&n.t===here;
    const ti=n.t?l.tasks.findIndex(x=>x.t===n.t):-1;
    const key=d+"|"+n.l, inR=rset.has(key);
    const click=n.url?` style="cursor:pointer" onclick="window.open('${n.url}','_blank')"`
                     :` style="cursor:pointer" onclick="toggleRouteFor('${d}',${i})"`;
    const h=hgt(d,i);
    const body=n.d
      ?`<polygon points="${x+CW/2},${y-2} ${x+CW+4},${y+NH/2} ${x+CW/2},${y+NH+2} ${x-4},${y+NH/2}" fill="${fill[st]}" stroke="${isHere?"#EE3124":strk[st]}" stroke-width="${isHere?2.5:1.4}"/>`
      :`<rect x="${x}" y="${y}" width="${CW}" height="${h}" rx="2" fill="${fill[st]}" stroke="${isHere?"#EE3124":strk[st]}" stroke-width="${isHere?2.5:1.4}"/>`;
    const tcol=FT.txt[st]||FT.txt.o;
    let labelSVG;
    if(n.sub&&n.sub.length){                            // parent header + nested sub-item boxes
      labelSVG=`<text x="${x+CW/2}" y="${y+16}" text-anchor="middle" fill="${tcol}" font-size="10" font-weight="700">${esc(n.l)}</text>`
        +n.sub.map((s,k)=>{const sy=y+HEAD+k*(SUBH+SUBGAP);return `<rect x="${x+10}" y="${sy}" width="${CW-20}" height="${SUBH}" rx="2" fill="${FT.colBg}" stroke="${strk[st]}" stroke-width="1"/><text x="${x+CW/2}" y="${sy+SUBH/2+3.5}" text-anchor="middle" fill="${tcol}" font-size="9">${esc(s)}</text>`;}).join("");
    }else{
      const lines=wrap(n.l,24);
      labelSVG=lines.map((ln,k)=>`<text x="${x+CW/2}" y="${y+NH/2+(k-(lines.length-1)/2)*12+4}" text-anchor="middle" fill="${tcol}" font-size="9.5">${esc(ln)}</text>`).join("");
    }
    svg+=`<g${click}${rsteps&&!inR?' opacity="0.22"':""}>${body}${inR?`<rect class="glownode" x="${x-4}" y="${y-4}" width="${CW+8}" height="${h+8}" rx="3" fill="none" stroke="#EE3124" stroke-width="3"/>`:""}${labelSVG}
    ${n.d?`<text x="${x+CW/2}" y="${y-6}" text-anchor="middle" fill="#c084fc" font-size="9">◆ decision</text>`:""}${n.url?`<text x="${x+CW/2}" y="${y-6}" text-anchor="middle" fill="#60a5fa" font-size="9">🔗 Figma</text>`:""}
    ${isHere?`<text x="${x+CW/2}" y="${y+h+14}" text-anchor="middle" fill="#EE3124" font-size="10" font-weight="700">📍 ${l.name} is here</text>`:""}
    <title>${esc(n.l)} — stage: ${n.s}${ti>=0?" · click to open this task on the card":""}${st==="fut"&&ti>=0?" · 🔒 locked until previous step is done":""}</title></g>`;}));
  if(rsteps){const rpts=rsteps.map(([dd,ll])=>{const ii=FLOW[dd]?FLOW[dd].findIndex(nn=>nn.l===ll):-1; if(ii<0)return null; const p=pos(dd,ii); return [p.x+CW/2,p.y+hgt(dd,ii)/2];}).filter(Boolean);
    if(rpts.length>1) svg+=`<path d="M${rpts.map(p=>p.join(" ")).join(" L ")}" fill="none" stroke="#EE3124" stroke-width="2.5" stroke-dasharray="9 7" class="routeline" opacity="0.85"/>`;}
  svg+="</svg>";
  let banner="";
  if(rsteps){
    const depts=[...new Set(rsteps.map(p=>p[0]))];
    const src=FLOW[S.route.d][S.route.i];
    const ti2=src.t?l.tasks.findIndex(x=>x.t===src.t):-1;
    const hasUrl=rsteps.some(([dd,ll])=>{const nn=(FLOW[dd]||[]).find(n2=>n2.l===ll);return nn&&nn.url;});
    banner=`<div class="routebanner">⚡ <b>ROUTE</b>&nbsp; ${rsteps.map(([dd,ll])=>esc(ll)).join(" → ")}<br>
      ${depts.length>1?`🤝 Cross-department — DRI should reach out to: <b>${depts.join(" + ")}</b>`:`▼ Single department (${depts[0]}) — path runs straight down the lane`}
      ${hasUrl?` · <a href="${FIGMA}" target="_blank">open Figma board ↗</a>`:""}
      ${ti2>=0?`<button class="addlnk" onclick="jumpTask('${l.slug}',${ti2})">open task on card</button>`:""}
      <button class="addlnk" onclick="S.route=null;render()">✕ clear</button></div>`;
  }
  return `${banner}<div class="flowwrap">${svg}</div>`;
}
function wrap(s,w){const words=s.split(" ");const out=[""];for(const wd of words){if((out[out.length-1]+" "+wd).trim().length>w)out.push(wd);else out[out.length-1]=(out[out.length-1]+" "+wd).trim();}return out.slice(0,3);}

/* ============ PROJECTS — domain helpers (ported from projectDomain.ts / projectStats.ts) ============ */
function pjToday(){return new Intl.DateTimeFormat("en-CA",{timeZone:"Asia/Taipei",year:"numeric",month:"2-digit",day:"2-digit"}).format(new Date());}
function pjIsIso(s){return /^\d{4}-\d{2}-\d{2}$/.test(s||"");}
function pjDayDiff(a,b){const x=Date.parse((a||"").slice(0,10)+"T00:00:00Z"),y=Date.parse((b||"").slice(0,10)+"T00:00:00Z");if(isNaN(x)||isNaN(y))return 0;return Math.round((y-x)/864e5);}
function pjStages(p){return [p.stage_design,p.stage_sample,p.stage_pps,p.stage_bulk];}
function pjNotes(p){return [p.note_design,p.note_sample,p.note_pps,p.note_bulk];}
function pjFinished(p){return pjStages(p).every(s=>s==="done"||s==="na");}
function pjCurrentStage(p){const c=pjStages(p);for(let i=3;i>=0;i--)if(c[i]==="progress")return i;for(let i=0;i<4;i++)if(c[i]==="pending")return i;return 3;}
const PJ_URANK={hot:1,soon:2,prod:3,wait:4,plan:5,none:6};
const PJ_URGENCY_ORDER=["hot","soon","prod","wait","plan","none"];
function pjTier(p,t){if(pjFinished(p))return 7;if(pjIsIso(p.due_date)&&p.due_date<t)return 0;return PJ_URANK[p.urgency]!=null?PJ_URANK[p.urgency]:6;}
function pjCmp(t){return (a,b)=>{const d=pjTier(a,t)-pjTier(b,t);if(d)return d;const da=a.due_date||"9999-12-31",db=b.due_date||"9999-12-31";if(da!==db)return da<db?-1:1;const sd=pjCurrentStage(b)-pjCurrentStage(a);if(sd)return sd;return (a.name||"").localeCompare(b.name||"");};}
function pjMD(iso){const m=(iso||"").match(/^(\d{4})-(\d{2})-(\d{2})/);return m?(+m[2])+"/"+(+m[3]):(iso||"");}
function pjWhen(p){return p.due_date?pjMD(p.due_date):(p.when_label||"");}
function pjOverdue(p,t){return pjIsIso(p.due_date)&&p.due_date<t?pjDayDiff(p.due_date,t):0;}
function pjUntil(p,t){return pjIsIso(p.due_date)&&p.due_date>=t?pjDayDiff(t,p.due_date):Infinity;}
function pjA(s){return esc(s||"").replace(/"/g,"&quot;");} // safe for attribute values

function pjCountBy(arr,key){const m=new Map();for(const p of arr){const v=key(p);if(!v)continue;m.set(v,(m.get(v)||0)+1);}return [...m.entries()];}
function pjMatch(p){const q=(S.pjQ||"").trim().toLowerCase();if(!q)return true;const hay=[p.name,p.supplier,p.mo,p.next_action,p.note_design,p.note_sample,p.note_pps,p.note_bulk].join(" ").toLowerCase();return q.split(/\s+/).every(tok=>hay.includes(tok));}
function pjPasses(p,t){
  if(S.pjFCat&&p.category!==S.pjFCat)return false;
  if(S.pjFSup&&p.supplier!==S.pjFSup)return false;
  if(S.pjFStage!=null&&(pjFinished(p)||pjCurrentStage(p)!==S.pjFStage))return false;
  if(S.pjFUrg&&p.urgency!==S.pjFUrg)return false;
  if(S.pjFDue==="overdue"&&pjTier(p,t)!==0)return false;
  if(S.pjFDue==="week"){if(pjFinished(p)||!pjIsIso(p.due_date)||p.due_date<t)return false;if(pjDayDiff(t,p.due_date)>7)return false;}
  return pjMatch(p);
}
function pjTog(f,v){S[f]=S[f]===v?null:v;render();}
function pjClearF(){S.pjQ="";S.pjFCat=null;S.pjFSup=null;S.pjFStage=null;S.pjFUrg=null;S.pjFDue=null;render();}
function pjHasF(){return !!((S.pjQ&&S.pjQ.trim())||S.pjFCat||S.pjFSup||S.pjFStage!=null||S.pjFUrg||S.pjFDue);}
function pjSearchInput(el){const p=el.selectionStart;S.pjQ=el.value;render();const n=document.getElementById("pjSearch");if(n){n.focus();try{n.setSelectionRange(p,p);}catch(e){}}}
function pjJs(s){return String(s||"").replace(/\\/g,"\\\\").replace(/'/g,"\\'").replace(/"/g,"&quot;");}
function pjChip(label,count,active,onclick){return `<button class="pj-chip${active?" on":""}" onclick="${onclick}">${esc(label)} <span class="pj-chip-n">${count}</span></button>`;}

/* ===== PROGRESS CHAT — scoped assistant for the Active Projects board: ONLY product progress, manufacturing, specs, quantity ===== */
let PCHAT={msgs:(function(){try{return JSON.parse((typeof localStorage!=="undefined"&&localStorage.getItem("bv-pchat"))||"[]")||[];}catch(e){return [];}})(),busy:false,busyAt:0};   // persists across refresh (per-user, localStorage)
function pchatSave(){ try{ localStorage.setItem("bv-pchat",JSON.stringify((PCHAT.msgs||[]).slice(-40))); }catch(e){} }
function progressDigest(){
  if(!(typeof PROJECTS!=="undefined"&&PROJECTS.length)) return "(no project data loaded yet)";
  return PROJECTS.map(p=>{ const st=pjStages(p);
    const stages=PJ_STAGE_LBL.map((lbl,i)=>lbl+":"+(st[i]||"?")).join(", ");
    const notes=["Design:"+(p.note_design||""),"Sample:"+(p.note_sample||""),"PPS:"+(p.note_pps||""),"Bulk:"+(p.note_bulk||"")].filter(s=>!/:$/.test(s));
    return ["• "+(p.name||"(unnamed)")+(p.category?" ["+p.category+"]":""),
      "  supplier: "+(p.supplier||"—")+(p.mo?" · MO "+p.mo:""),
      "  manufacturing stages — "+stages+"  → current: "+(PJ_STAGE_LBL[pjCurrentStage(p)]||"?"),
      "  due: "+(p.due_date||"—")+(p.urgency?" · urgency: "+p.urgency:""),

      notes.length?("  notes: "+notes.join(" | ")):""
    ].filter(Boolean).join("\n");
  }).join("\n\n").slice(0,9000);
}
function progressSpecDigest(){ const c=(typeof KNOWLEDGE!=="undefined"&&KNOWLEDGE.catalog)||[]; if(!c.length)return "";
  return "\n\nPRODUCT SPECS (catalog — dimensions / materials / hardware / etc.):\n"+c.slice(0,40).map(x=>"• "+(x.name||x.product||x.model||x.sku||x.id||"?")+": "+JSON.stringify(x).replace(/[{}"]/g," ").replace(/\s+/g," ").trim().slice(0,260)).join("\n").slice(0,4500); }
const ENGLISH_ONLY="OUTPUT LANGUAGE — DEFAULT ENGLISH, NEVER LEAK CHINESE (hard rule). Write entirely in English unless the user EXPLICITLY asks for Chinese or bilingual output. The knowledge base is bilingual: there are Traditional-Chinese strategy documents and a Chinese `_zh` twin for nearly every catalog field. When a tool returns Chinese, TRANSLATE the facts you use into natural English — prefer the English `_en` fields and treat `_zh`/Chinese docs ONLY as a source to translate from. NEVER copy a Chinese/CJK character into a reply, persona, quote, headline, brief, title, or saved document; paraphrase Chinese sources in English. Any CJK character in English output is a defect — re-render it in English before sending.\n";

function pchatMsgsHTML(){ return PCHAT.msgs.map(m=>`<div class="pcmsg ${m.role==="user"?"user":"assistant"}"><b>${m.role==="user"?esc(m.who||"You"):"🏭 Progress AI"}</b><div>${esc(m.text)}</div></div>`).join("")+(PCHAT.busy?`<div class="pcmsg assistant"><b>🏭 Progress AI</b><div class="sub">thinking…</div></div>`:""); }

async function progressChatSend(){
  const ta=document.getElementById("pchatInput"); if(!ta)return; const text=(ta.value||"").trim(); if(!text)return;
  if(PCHAT.busy){ if(PCHAT.busyAt&&(Date.now()-PCHAT.busyAt)>240000){ PCHAT.busy=false; } else { toast("Still working on the last question — one sec, then ask again."); return; } }
  ta.value=""; PCHAT.msgs.push({role:"user",who:actor(),text}); PCHAT.busy=true; PCHAT.busyAt=Date.now(); pchatSave(); renderPChat();
  const messages=PCHAT.msgs.slice(-12).map(m=>({role:m.role==="user"?"user":"assistant",content:String(m.text||"")}));
  let answer="";
  try{ const r=await chatFetch({model:chatModel(),system:progressChatSystem(),messages,tools:undefined,think:false},{timeout:120000,tries:2,toobigMsg:"That took too long — try asking about one product at a time."});
    if(r&&!r.error){ answer=(r.content||[]).filter(b=>b.type==="text").map(b=>b.text).join("").trim(); }
    else { answer="⚠️ "+((r&&r.error&&r.error.message)||"the assistant backend hiccuped — please ask again."); }
  }catch(e){ answer="⚠️ "+String((e&&e.message)||"that didn't go through — please ask again."); }
  finally{ PCHAT.busy=false; PCHAT.busyAt=0; }
  PCHAT.msgs.push({role:"assistant",text:answer||"I didn't get an answer back — please ask again."}); pchatSave(); renderPChat();
}

function loadUsage(){
  if(!FB.docRef){USAGE=[];return;}
  if(USAGE_LOADING)return; USAGE_LOADING=true;
  FB.docRef.collection("chats").get().then(qs=>{
    const rows=[];
    qs.forEach(doc=>{ const card=doc.id; const msgs=(doc.data().messages)||[]; let q=null;
      msgs.forEach(m=>{ if(m.role==="user"){ q=m; }
        else if(m.role==="assistant"){ const meta=m.meta||{}; const isErr=/^⚠️/.test(m.text||""); if(!q&&!meta.in&&!isErr)return;
          rows.push({card, who:(q&&q.who)||"—", question:(q&&q.text)||"(no question)", answer:m.text||"", model:meta.model||"", tin:meta.in||0, tout:meta.out||0, cost:(typeof meta.cost==="number"?meta.cost:0), err:isErr, tools:[...new Set((meta.trace||[]).map(t=>t.name))], ts:(m.ts||(q&&q.ts)||"")}); q=null; } });
    });
    rows.sort((a,b)=>String(b.ts).localeCompare(String(a.ts)));
    USAGE=rows; USAGE_LOADING=false; if(S.view==="settings"&&S.settingsTab==="usage")render();
  }).catch(e=>{ USAGE=[]; USAGE_LOADING=false; if(S.view==="settings"&&S.settingsTab==="usage")render(); });
}

async function detectContradictions(l,slug,plan,parts,researchPack,acc){

  if(draft.trim().length<40)return [];
  const sys="You are a meticulous fact-checker for Black Voyage. The CANONICAL DATA below (the BV catalog, product specs and saved facts) is the SINGLE SOURCE OF TRUTH. Find ONLY places where the DRAFT brief states something that CONTRADICTS the canonical data — a wrong spec, number, price, material, dimension, or factual claim. Do NOT flag style, opinion, missing detail, or anything the canonical data does not cover. Output ONLY a JSON object: {\"contradictions\":[{\"section\":\"<heading>\",\"claim\":\"<what the brief says>\",\"canonical\":\"<what the data says>\",\"note\":\"<one line>\"}]} — empty array if none.";
  const msg="CANONICAL DATA (source of truth):\n"+String(researchPack||"").slice(0,12000)+"\n\n---\nDRAFT BRIEF to check:\n"+draft;
  let out="";
  try{ const r=await chatFetch({model:chatModel(),system:sys,messages:[{role:"user",content:msg}],tools:undefined,think:false},{timeout:90000,tries:1,toobigMsg:"contradiction check too long"});

  }catch(e){ return null; }   // null = the check could NOT complete (don't claim "clean")

  list.forEach(c=>fileQualityReport({ card:slug, cardName:(l&&l.name)||slug,
    question:("Auto contradiction check — Brief: "+(plan.title||"")+" — §"+(c.section||"")).slice(0,2000),

    reason:("[AUTO-CONTRADICTION] "+(c.note||((c.claim||"")+" vs "+(c.canonical||"")))).slice(0,1000),
    who:"Auto fact-check" }));
  return list;
}

// Build the searchable image gallery (productImages + brandAssets) for the picker.
function _briefPickerItems(query){ const q=String(query||"").toLowerCase().split(/\s+/).filter(Boolean);
  const sc=hay=>q.length?q.reduce((a,t)=>a+(hay.indexOf(t)>=0?1:0),0):1;
  const P=(KNOWLEDGE.productImages||[]).filter(im=>im.url).map(im=>({url:im.url,cap:String(im.file||im.variant||((im.product||"")+(im.variant?(" · "+im.variant):""))||im.id||"image"),s:sc(((im.product||"")+" "+(im.category||"")+" "+(im.variant||"")+" "+(im.file||im.id||"")).toLowerCase())}));
  const Bd=(KNOWLEDGE.brandAssets||[]).filter(im=>im.url).map(im=>({url:im.url,cap:String(im.name||im.type||im.path||"asset"),s:sc(((im.type||"")+" "+(im.name||"")+" "+(im.path||"")).toLowerCase())}));
  return P.concat(Bd).filter(x=>q.length?x.s>0:true).sort((a,b)=>b.s-a.s).slice(0,240);
}
function briefAddImageOpen(secIdx){ const E=BRIEF_EDIT; if(!E)return; E.picker={secIdx}; E.query="";
  const t=document.getElementById("bedptitle"); if(t)t.textContent="Pick an image for §"+(secIdx+1);
  const q=document.getElementById("bedpq"); if(q)q.value="";
  briefPickerSearch("");
  const p=document.getElementById("bedPick"); if(p)p.classList.add("show");
}
function briefAddImageClose(){ const p=document.getElementById("bedPick"); if(p)p.classList.remove("show"); if(BRIEF_EDIT)BRIEF_EDIT.picker=null; }
function briefPickerSearch(query){ const E=BRIEF_EDIT; if(!E)return; E.query=query;
  const grid=document.getElementById("bedpgrid"); if(!grid)return;
  const items=_briefPickerItems(query);
  if(!items.length){ grid.innerHTML='<div class="ghostnote" style="padding:14px">No images matched. Try a product (Vesper, Aero, Apex, Zephyr, AirCabin), a category (backpack, suitcase), or “logo”. '+((KNOWLEDGE.productImages||[]).length+(KNOWLEDGE.brandAssets||[]).length)+' public assets available — or paste an image URL above.</div>'; return; }
  grid.innerHTML=items.map((it,k)=>`<div class="bedthumb" onclick="briefAddImagePick(${k})"><img src="${escAll(it.url)}" loading="lazy"><span>${esc(it.cap)}</span></div>`).join("");
  E._pick=items;   // remember the current result set so the click resolves by index
}
function briefAddImagePick(k){ const E=BRIEF_EDIT; if(!E||!E.picker)return; const it=(E._pick||[])[k]; if(!it)return;
  const i=E.picker.secIdx; const img='<img src="'+escAll(it.url)+'" style="max-width:100%;border-radius:8px">';
  E.sections[i].html=_briefInjectVisual(E.sections[i].html,img);   // inject INSIDE the section (outside the EN/中文 layers), not after </section>
  briefAddImageClose();
  toast("🖼 Image added to §"+(i+1)+" — Save to keep it");
  _briefEditRender();   // re-render so the new image shows (with a ⇄ Swap button via decorateImages)
}
// Add an image by pasting a URL — the escape hatch when the Core gallery is empty or has no match.
function briefAddImageUrl(){ const E=BRIEF_EDIT; if(!E||!E.picker)return;
  const el=document.getElementById("bedpurl"); const u=(el&&el.value||"").trim();
  if(!/^https?:\/\//i.test(u)){ toast("Paste a full http(s) image OR video URL"); return; }
  const i=E.picker.secIdx; const media=_briefMediaHtml(u)||('<img src="'+escAll(u)+'" style="max-width:100%;border-radius:8px">');
  E.sections[i].html=_briefInjectVisual(E.sections[i].html,media);
  briefAddImageClose();
  toast((/^<video|^<div class="bvembed"/.test(media)?"🎬 Video":"🖼 Image")+" added to §"+(i+1)+" — Save to keep it");
  _briefEditRender();
}
// FEATURE 3 — generate a clean table OR inline SVG infographic summarizing the section, append it.
async function briefGenSectionVisual(i){ const E=BRIEF_EDIT; if(!E||E.busy)return; const sec=E.sections[i]; if(!sec)return;
  const text=String(sec.html||"").replace(/<[^>]+>/g," ").replace(/&nbsp;/gi," ").replace(/\s+/g," ").trim();
  if(text.length<20){ toast("Not enough text in this section to summarize."); return; }
  E.busy=true; _briefBtnBusy(i,"bedgen",true,"⚡ Generating…");
  const sys="From a section of a Black Voyage marketing brief, produce EITHER a clean HTML <table> OR a self-contained inline <svg> infographic — whichever better summarizes the content. "
    +"Output ONLY the HTML/SVG fragment: no prose, no explanation, no code fences, no <html>/<head>/<body>. Use Black Voyage's clean monochrome style (ink #16181C, accent #E2552E, light grey lines), keep it under ~700px wide, and make any <svg> fully self-contained (inline styles/attributes, a width/viewBox, no external refs).";
  try{
    const r=await chatFetch({model:chatModel(),system:sys,messages:[{role:"user",content:"SECTION (“"+_briefSecHeading(sec.html,i)+"”) content to summarize as a table or SVG:\n"+text}],tools:undefined,think:false},{timeout:120000,tries:1,toobigMsg:"section too long — trim it first"});
    if(!r||r.error){ toast("⚠️ Generate failed — "+((r&&r.error)||"no response")); }
    else{ let out=(r.content||[]).filter(x=>x.type==="text").map(x=>x.text).join("");
      out=_briefSanitizeVisual(out);
      if(out&&out.trim().length>12){ E.sections[i].html=_briefInjectVisual(E.sections[i].html,out); toast("⚡ Added a "+(/^<svg/i.test(out.trim())?"chart":"table")+" to §"+(i+1)+" — Save to keep it"); }
      else toast("⚠️ Generate came back empty."); }
  }catch(e){ toast("⚠️ Generate error: "+((e&&e.message)||e)); }
  finally{ E.busy=false; _briefBtnBusy(i,"bedgen",false,"⚡ Generate"); _briefEditRender(); }
}
// Allow <svg>/<table> through; strip fences and document/style/script wrappers like sanitizeFragment but keep svg+table tags.
function _briefSanitizeVisual(h){ return String(h||"").replace(/```html?/gi,"").replace(/```/g,"")
  .replace(/<\/?(?:html|head|body)[^>]*>/gi,"").replace(/<!doctype[^>]*>/gi,"")
  .replace(/<script[\s\S]*?<\/script>/gi,"").replace(/<title[\s\S]*?<\/title>/gi,"").trim(); }
// Reassemble all sections (unwrap → re-decorate once so images get the ⇄ Swap figure) + head + tail, file new version.
function briefEditSave(){ const E=BRIEF_EDIT; if(!E){toast("Nothing to save");return;} if(E.busy){toast("Hold on — a generate is still running");return;}
  const folders={}; const body=E.sections.map(s=>decorateImages(balanceFragment(_briefUnwrapFigures(s.html)),folders)).join("\n");
  const full=String(E.head||"")+body+String(E.tail||"");
  if(!full.trim()){toast("Nothing to save");return;}
  const v=briefSave(E.card,E.title,full,E.type);
  if(v){ try{logEvent("question","✎ Edited brief · "+(E.title||"")+" → v"+v,{card:E.card});}catch(e){} toast("✎ Edits saved — filed as v"+v); briefEditClose(); }
  else toast("⚠️ Couldn't file the edit (not signed in to the board?). Nothing changed.");
}
