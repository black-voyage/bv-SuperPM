<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Black Voyage — SUPER PM (forked edition)</title>
<style>
  :root{
    --bg:#0d0f12; --panel:#16191e; --panel2:#1d2127; --line:#2a2f37;
    --text:#e8eaed; --dim:#9aa3ad; --faint:#6b7280;
    --accent:#e8b765; --green:#4ade80; --amber:#fbbf24; --red:#f87171; --blue:#60a5fa; --purple:#c084fc;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--bg);color:var(--text);font:14px/1.5 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;}
  header{display:flex;align-items:center;gap:18px;padding:12px 20px;border-bottom:1px solid var(--line);position:sticky;top:0;background:var(--bg);z-index:10;flex-wrap:wrap}
  .logo{font-weight:700;letter-spacing:.12em;font-size:15px}
  .logo span{color:var(--accent)}
  nav{display:flex;gap:4px;flex-wrap:wrap}
  nav button{background:none;border:none;color:var(--dim);padding:7px 12px;border-radius:8px;cursor:pointer;font-size:13.5px}
  nav button.on{background:var(--panel2);color:var(--text)}
  .spacer{flex:1}
  .rolewrap{display:flex;align-items:center;gap:8px;font-size:12.5px;color:var(--dim)}
  select,input[type=text]{background:var(--panel2);color:var(--text);border:1px solid var(--line);border-radius:8px;padding:6px 10px;font-size:13px}
  main{padding:20px;max-width:1320px;margin:0 auto}
  h2{font-size:17px;margin-bottom:4px}
  .sub{color:var(--dim);font-size:13px;margin-bottom:18px}
  .kpis{display:grid;grid-template-columns:repeat(auto-fit,minmax(170px,1fr));gap:12px;margin-bottom:22px}
  .kpi{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:14px 16px}
  .kpi .n{font-size:26px;font-weight:700}
  .kpi .l{color:var(--dim);font-size:12.5px}
  .panel{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:16px;margin-bottom:18px}
  .panel h3{font-size:14px;margin-bottom:10px;color:var(--accent);letter-spacing:.03em}
  .board{display:flex;gap:12px;overflow-x:auto;padding-bottom:8px}
  .col{min-width:200px;flex:1}
  .col h4{font-size:12px;color:var(--dim);text-transform:uppercase;letter-spacing:.06em;margin-bottom:8px;display:flex;justify-content:space-between}
  .card{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:12px;margin-bottom:10px;cursor:pointer;transition:border-color .15s}
  .card:hover{border-color:var(--accent)}
  .card .nm{font-weight:600;font-size:14.5px;margin-bottom:3px}
  .card .meta{color:var(--dim);font-size:12px}
  .bar{height:5px;background:var(--panel2);border-radius:3px;margin:8px 0 6px;overflow:hidden}
  .bar i{display:block;height:100%;background:var(--accent)}
  .pill{display:inline-block;padding:2px 9px;border-radius:99px;font-size:11px;font-weight:600;margin-top:6px}
  .ok{background:#14331f;color:var(--green)} .risk{background:#33260f;color:var(--amber)}
  .bad{background:#331414;color:var(--red)} .done{background:#1a2333;color:var(--blue)} .dec{background:#2a1a33;color:var(--purple)}
  .row{display:flex;align-items:center;gap:10px;padding:8px 10px;border-radius:8px;flex-wrap:wrap}
  .row:hover{background:var(--panel2)}
  .st{width:18px;height:18px;border-radius:5px;border:1.5px solid var(--faint);display:inline-flex;align-items:center;justify-content:center;font-size:11px;flex:none;cursor:pointer}
  .st.x{background:#14331f;border-color:var(--green);color:var(--green)}
  .st.p{background:#33260f;border-color:var(--amber);color:var(--amber)}
  .st.b{background:#331414;border-color:var(--red);color:var(--red)}
  .row .o{margin-left:auto;color:var(--faint);font-size:12px;white-space:nowrap}
  .lnk{display:inline-flex;align-items:center;gap:4px;background:#1a2333;color:var(--blue);border-radius:99px;padding:1px 9px;font-size:11.5px;text-decoration:none;margin-left:4px}
  .addlnk{background:none;border:1px dashed var(--faint);color:var(--faint);border-radius:99px;padding:0 8px;font-size:11px;cursor:pointer;margin-left:4px}
  .addlnk:hover{color:var(--blue);border-color:var(--blue)}
  .gatecard{border:1px solid var(--line);border-radius:10px;padding:12px;margin-bottom:10px;background:var(--panel2)}
  .btn{background:var(--accent);color:#1a1407;border:none;border-radius:8px;padding:8px 14px;font-weight:600;cursor:pointer;font-size:13px}
  .btn.ghost{background:var(--panel2);color:var(--text);border:1px solid var(--line)}
  .btn.red{background:#3a1d1d;color:var(--red);border:1px solid #5a2a2a}
  .btn:disabled{background:var(--panel2);color:var(--faint);cursor:not-allowed;border:1px solid var(--line)}
  .stages{display:flex;gap:6px;flex-wrap:wrap;margin:10px 0 16px}
  .stg{padding:5px 11px;border-radius:99px;font-size:12px;border:1px solid var(--line);color:var(--faint)}
  .stg.past{background:#14331f;color:var(--green);border-color:#1f4a2e}
  .stg.cur{background:var(--accent);color:#1a1407;font-weight:700;border-color:var(--accent)}
  .twocol{display:grid;grid-template-columns:1.5fr 1fr;gap:18px}
  @media(max-width:900px){.twocol{grid-template-columns:1fr}}
  .slack{background:#1a1d21;border:1px solid var(--line);border-radius:12px;overflow:hidden}
  .slack .hd{padding:10px 14px;border-bottom:1px solid var(--line);font-weight:700;font-size:13px}
  .slack .msgs{padding:10px 14px;max-height:440px;overflow-y:auto}
  .msg{display:flex;gap:10px;margin-bottom:14px}
  .av{width:34px;height:34px;border-radius:8px;flex:none;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px;color:#1a1407}
  .msg .who{font-weight:700;font-size:13px}.msg .when{color:var(--faint);font-size:11px;margin-left:6px}
  .msg .txt{font-size:13px;color:#d1d5db;margin-top:2px}
  .appr{border:1px solid var(--line);border-left:3px solid var(--accent);border-radius:8px;padding:10px;margin-top:8px;background:#202329}
  .thr{color:var(--blue);font-size:12px;margin-top:5px;cursor:pointer}
  table{width:100%;border-collapse:collapse;font-size:13px}
  th{color:var(--dim);text-align:left;font-size:11.5px;text-transform:uppercase;letter-spacing:.05em;padding:8px;border-bottom:1px solid var(--line)}
  td{padding:8px;border-bottom:1px solid var(--line);vertical-align:top}
  td input[type=text]{width:100%}
  .cell{display:inline-block;min-width:40px;text-align:center;padding:3px 8px;border-radius:6px;font-size:12px;font-weight:600}
  textarea{width:100%;background:var(--panel2);border:1px solid var(--line);border-radius:8px;color:var(--text);padding:10px;font:13px/1.5 inherit;resize:vertical;min-height:70px}
  #toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--accent);color:#1a1407;font-weight:600;padding:10px 18px;border-radius:10px;display:none;z-index:50;font-size:13px;max-width:90vw}
  .back{color:var(--blue);cursor:pointer;font-size:13px;margin-bottom:12px;display:inline-block}
  .checkin{border-left:3px solid var(--line);padding:6px 12px;margin-bottom:8px;font-size:13px}
  .checkin .d{color:var(--faint);font-size:11.5px}
  .flowwrap{overflow:auto;border:1px solid var(--line);border-radius:12px;background:#101216}
  .legend{display:flex;gap:14px;flex-wrap:wrap;font-size:12px;color:var(--dim);margin:10px 0}
  .legend i{display:inline-block;width:11px;height:11px;border-radius:3px;margin-right:5px;vertical-align:-1px}
  .deptchip{display:inline-block;background:var(--panel2);border:1px solid var(--line);border-radius:99px;padding:2px 10px;font-size:11.5px;margin:2px 3px 2px 0}
  .deptchip.rdy{background:#14331f;color:var(--green);border-color:#1f4a2e}
  .urg{display:inline-block;padding:1px 8px;border-radius:99px;font-size:10.5px;font-weight:700;text-transform:uppercase;letter-spacing:.04em;margin-left:4px}
  .urg.low{background:#1a2333;color:var(--blue)} .urg.med{background:#2a2a1a;color:#d4c44a}
  .urg.high{background:#33260f;color:#fb923c} .urg.urgent{background:#331414;color:var(--red)}
  .asg{display:inline-block;background:#222a36;color:#aac4e8;border-radius:99px;padding:1px 9px;font-size:11px;margin-left:4px}
  .exp{background:none;border:none;color:var(--faint);cursor:pointer;font-size:11px;margin-left:6px;padding:2px 6px;border-radius:6px}
  .exp:hover{color:var(--text);background:var(--panel2)}
  .taskpanel{background:#13161a;border:1px solid var(--line);border-radius:10px;padding:12px;margin:2px 0 8px 28px;font-size:13px}
  .taskpanel .frow{display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin-bottom:10px}
  .taskpanel label{color:var(--dim);font-size:12px}
  .note{border-left:3px solid #2e3640;padding:4px 10px;margin-bottom:6px}
  .note .d{color:var(--faint);font-size:11px}
  .tl-row{margin-bottom:22px}
  .tl-head{display:flex;align-items:baseline;gap:10px;margin-bottom:6px}
  .tl-bar{display:flex;align-items:stretch;height:34px;border-radius:8px;overflow:hidden;background:var(--panel2);width:100%}
  .tl-seg{position:relative;display:flex;align-items:center;justify-content:center;font-size:10.5px;white-space:nowrap;overflow:hidden;border-right:2px solid var(--bg);min-width:34px}
  .tl-seg .ov{position:absolute;right:0;top:0;bottom:0;background:repeating-linear-gradient(45deg,rgba(248,113,113,.45) 0 6px,rgba(248,113,113,.2) 6px 12px)}
  .tl-leg{font-size:11.5px;color:var(--dim);margin-top:4px}
  .dbar{display:flex;align-items:center;gap:10px;margin-bottom:8px}
  .dbar .nm2{width:110px;font-size:12.5px;text-align:right;color:var(--dim)}
  .dbar .tr{flex:1;background:var(--panel2);border-radius:6px;height:20px;overflow:hidden}
  .dbar .fl{height:100%;border-radius:6px;display:flex;align-items:center;padding-left:8px;font-size:11px;font-weight:700;color:#1a0d07}
  /* ===== SuperPM additions ===== */
  body{background:radial-gradient(1200px 600px at 80% -10%, #1a1408 0%, var(--bg) 55%)}
  .panel{box-shadow:0 1px 0 rgba(255,255,255,.03) inset, 0 8px 24px rgba(0,0,0,.25)}
  .card{box-shadow:0 6px 18px rgba(0,0,0,.3)} .card:hover{transform:translateY(-2px);box-shadow:0 10px 26px rgba(0,0,0,.45)} .card{transition:all .18s}
  .btn{transition:transform .12s, filter .12s} .btn:not(:disabled):hover{transform:translateY(-1px);filter:brightness(1.08)}
  .sla{display:inline-block;padding:2px 9px;border-radius:99px;font-size:11px;font-weight:700;margin-left:6px}
  .sla.ok{background:#14331f;color:var(--green)} .sla.over{background:#331414;color:var(--red);animation:pulse 1.4s infinite}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.55}}
  .iconbtn{background:var(--panel2);border:1px solid var(--line);color:var(--dim);border-radius:8px;padding:6px 11px;cursor:pointer;font-size:13px}
  .iconbtn:hover{color:var(--text);border-color:var(--accent)}
  .drawer{position:fixed;top:0;right:-420px;width:400px;max-width:92vw;height:100vh;background:#121419;border-left:1px solid var(--line);z-index:40;transition:right .25s;display:flex;flex-direction:column}
  .drawer.openD{right:0}
  .drawer .dh{padding:14px 16px;border-bottom:1px solid var(--line);display:flex;gap:8px;align-items:center}
  .drawer .db{flex:1;overflow-y:auto;padding:12px 16px}
  .feeditem{border-left:3px solid var(--line);padding:6px 10px;margin-bottom:8px;font-size:12.5px}
  .feeditem .d{color:var(--faint);font-size:11px}
  .pal{position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:60;display:flex;align-items:flex-start;justify-content:center;padding-top:12vh}
  .palbox{width:560px;max-width:92vw;background:#15181d;border:1px solid var(--line);border-radius:14px;overflow:hidden;box-shadow:0 24px 64px rgba(0,0,0,.6)}
  .palbox input{width:100%;border:none;background:#1b1f25;padding:14px 16px;font-size:15px;border-radius:0}
  .palitem{padding:10px 16px;cursor:pointer;display:flex;gap:10px;align-items:center;font-size:13.5px}
  .palitem:hover,.palitem.sel{background:#222731}
  .risk{border:1px solid var(--line);border-left:3px solid var(--red);border-radius:8px;padding:8px 12px;margin-bottom:8px;font-size:13px;background:var(--panel2)}
  .autofix{border:1px solid var(--line);border-radius:10px;padding:10px 12px;margin-bottom:8px;display:flex;gap:10px;align-items:center;background:var(--panel2)}
  .autofix .sev{width:8px;height:8px;border-radius:50%;flex:none}
  .ghostnote{color:var(--faint);font-size:11.5px}
  @keyframes fadeIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}
  main{animation:fadeIn .18s}
  .gauge{display:flex;align-items:center;gap:16px}
  .digestbox{width:100%;min-height:380px;background:#101216;border:1px solid var(--line);border-radius:10px;color:#d1d5db;padding:14px;font:12.5px/1.6 ui-monospace,Menlo,monospace;white-space:pre-wrap}
  @keyframes confetti{0%{transform:translateY(-10px) rotate(0)}100%{transform:translateY(105vh) rotate(720deg)}}
  .cf{position:fixed;top:-12px;width:9px;height:14px;z-index:80;animation:confetti 1.4s ease-in forwards;pointer-events:none}
</style>
</head>
<body>
<header>
  <div class="logo">BLACK <span>VOYAGE</span> · SUPER&nbsp;PM</div>
  <nav id="nav"></nav>
  <div class="spacer"></div>
  <input type="text" id="q" placeholder="search… ( / )" style="width:130px" oninput="S.q=this.value;if(S.view!=='portfolio')go('portfolio');else render();document.getElementById('q').focus()">
  <button class="iconbtn" title="command palette (Ctrl/⌘ K)" onclick="openPal()">⌘K</button>
  <button class="iconbtn" title="activity feed + inbox" onclick="toggleDrawer()">🔔 <span id="inboxN"></span></button>
  <button class="iconbtn" title="download a JSON backup of all data" onclick="exportJSON()">⬇</button>
  <div class="rolewrap">Viewing as <select id="roleSel" onchange="setRole(this.value)"></select></div>
</header>
<main id="app"></main>
<div id="toast"></div>
<div class="drawer" id="drawer">
  <div class="dh"><b>Activity & Inbox</b><span class="spacer"></span>
    <button class="iconbtn" onclick="autoFixAll()">⚡ Auto-correct all</button>
    <button class="iconbtn" onclick="toggleDrawer()">✕</button></div>
  <div class="db" id="drawerBody"></div>
</div>
<div class="pal" id="pal" style="display:none" onclick="if(event.target===this)closePal()">
  <div class="palbox"><input id="palQ" placeholder="Jump to a launch, view, or task…" oninput="renderPal()" onkeydown="palKey(event)"><div id="palList"></div></div>
</div>

<script>
/* ================= TEAM CONFIG (editable in Team tab — no names, departments only) ================= */
let TEAM = [
 {name:"Product",  role:"Owns the product: intake form, market research, concept, prototyping, costing, design freeze, pre-production sample + BOM, mass production."},
 {name:"Design",   role:"Packaging / insert / manual, model name, infographic & A+ assets, listing imagery, Amazon store visuals."},
 {name:"Catalog",  role:"Competitor analysis, Amazon & Shopify SKU creation, ops sheet, product data filing, publishing listings live."},
 {name:"Content",  role:"Pre-production, hero / lifestyle shoot, post-production, content export (instruction · lifestyle · social clips)."},
 {name:"Social",   role:"Channel posts: IG / YouTube / TikTok."},
 {name:"Marketing",role:"Product marketing brief, KOL / influencer engine (MOAT · ASMR · Cinematic · Authority · Reach · Seed · UGC), evaluation loop."},
 {name:"Ads",      role:"Ad post-production, partnerships approval, paid campaigns."},
 {name:"Email",    role:"Launch & campaign email sequences."},
 {name:"CRM",      role:"Influencer DM routing → email pipeline, relationship records."},
 {name:"Logistics",role:"Freight: sea bulk + air samples; warehouse readiness."},
];
TEAM.forEach(t=>{t.head=t.head||"";t.members=t.members||"";});
const DEPTS = () => TEAM.map(t=>t.name);

/* ================= STAGES & GATE MAP (from gate-map v1) ================= */
const STAGES = ["Concept","Build","Production","Content","Listing creation","Live","Marketing"];
const GATES = {
  "Concept":[{t:"Form (intake)",d:"Product"},{t:"Market research",d:"Product"},{t:"Concept definition",d:"Product"},{t:"Ben concept sign-off ◆",d:"Product",ben:1}],
  "Build":[{t:"Prototype 1-2-3 approved",d:"Product"},{t:"Ben validation ◆",d:"Product",ben:1},{t:"Costing & profit signed off",d:"Product"},{t:"Packaging / insert / manual locked",d:"Design"},{t:"Model name set",d:"Design"}],
  "Production":[{t:"Design freeze",d:"Product"},{t:"Pre-production sample approved + BOM",d:"Product"},{t:"Mass production complete",d:"Product"},{t:"Freight booked (sea + air samples)",d:"Logistics"}],
  "Content":[{t:"Hero / lifestyle shoot done",d:"Content"},{t:"Post-production done",d:"Content"},{t:"Content exported (instruction / lifestyle / social clips)",d:"Content"},{t:"A+ / infographic assets ready",d:"Design"}],
  "Listing creation":[{t:"Amazon SKU created",d:"Catalog"},{t:"Shopify SKU created",d:"Catalog"},{t:"Product data filed → marketing brief",d:"Catalog"},{t:"Brand language confirmed ◆",d:"Catalog",ben:1},{t:"Listing imagery / A+ uploaded",d:"Design"}],
  "Live":[{t:"Listings published live (Amazon + Shopify)",d:"Catalog"},{t:"Marketing brief finalized & ready",d:"Marketing"}],
  "Marketing":[{t:"KOL / influencer projects live",d:"Marketing"},{t:"Channel posts live (IG / YouTube / TikTok)",d:"Social"},{t:"Launch ads running",d:"Ads"},{t:"Launch email sequence sent",d:"Email"}]
};

/* ================= MASTER FLOW CHART (digitized from "BV Team Workflow.pdf") =================
   Each node: l=label, s=stage, t=linked tracker task (colors come from the live card), d=◆ decision */
const FLOW = {
 "Product":[
  {l:"Form (intake)",s:"Concept",t:"Form (intake)"},
  {l:"Understand WHY",s:"Concept"},
  {l:"Market research 競品分析",s:"Concept",t:"Market research"},
  {l:"Concept definition 概念定義",s:"Concept",t:"Concept definition"},
  {l:"Product info: spec · look · material · price",s:"Concept"},
  {l:"Ben confirms concept 想法定稿",s:"Concept",t:"Ben concept sign-off ◆",d:1},
  {l:"Prototyping 1-2-3 + testing",s:"Build",t:"Prototype 1-2-3 approved"},
  {l:"Ben validation 驗證",s:"Build",t:"Ben validation ◆",d:1},
  {l:"Costing & profit 定價/利潤",s:"Build",t:"Costing & profit signed off"},
  {l:"Design freeze 設計凍結",s:"Production",t:"Design freeze"},
  {l:"Pre-prod sample + BOM → Ben",s:"Production",t:"Pre-production sample approved + BOM"},
  {l:"Mass production 大貨生產",s:"Production",t:"Mass production complete"},
  {l:"Send samples to teams",s:"Production"}],
 "Design":[
  {l:"Concept: look · color · material",s:"Concept"},
  {l:"Packaging · insert · manual",s:"Build",t:"Packaging / insert / manual locked"},
  {l:"Model name",s:"Build",t:"Model name set"},
  {l:"Infographic / A+ assets",s:"Content",t:"A+ / infographic assets ready"},
  {l:"Listing imagery / A+ upload",s:"Listing creation",t:"Listing imagery / A+ uploaded"},
  {l:"Update Amazon store / posts",s:"Live"}],
 "Catalog":[
  {l:"Competitor analysis",s:"Concept",t:"Competitor analysis"},
  {l:"Amazon SKU creation",s:"Listing creation",t:"Amazon SKU created"},
  {l:"Shopify SKU creation",s:"Listing creation",t:"Shopify SKU created"},
  {l:"Ops sheet update",s:"Listing creation"},
  {l:"Product data filed → brief 建檔",s:"Listing creation",t:"Product data filed → marketing brief"},
  {l:"Brand language confirmed",s:"Listing creation",t:"Brand language confirmed ◆",d:1},
  {l:"Listings published LIVE",s:"Live",t:"Listings published live (Amazon + Shopify)"}],
 "Content":[
  {l:"Pre-production",s:"Content"},
  {l:"Hero / lifestyle shoot",s:"Content",t:"Hero / lifestyle shoot done"},
  {l:"Post-production",s:"Content",t:"Post-production done"},
  {l:"Content export: instruction · lifestyle · social",s:"Content",t:"Content exported (instruction / lifestyle / social clips)"}],
 "Social":[
  {l:"IG / YouTube / TikTok posts",s:"Marketing",t:"Channel posts live (IG / YouTube / TikTok)"}],
 "Marketing":[
  {l:"Marketing brief finalized",s:"Live",t:"Marketing brief finalized & ready"},
  {l:"KOL projects: MOAT · ASMR · Cinematic · Authority · Reach · Seed · UGC",s:"Marketing",t:"KOL / influencer projects live"},
  {l:"Ideation → Sourcing / DM received",s:"Marketing"},
  {l:"Negotiation → Shipping → Video live → Payment",s:"Marketing"},
  {l:"Evaluation (Ben + Marketing)",s:"Marketing",d:1},
  {l:"Usage rights → long-term / archive",s:"Marketing"}],
 "Ads":[
  {l:"Post-production (if needed)",s:"Marketing"},
  {l:"Partnerships approval",s:"Marketing"},
  {l:"Post ad",s:"Marketing",t:"Launch ads running"}],
 "Email":[
  {l:"Launch email sequence",s:"Marketing",t:"Launch email sequence sent"}],
 "CRM":[
  {l:"Influencer DMs → email pipeline",s:"Marketing"}],
 "Logistics":[
  {l:"Freight: sea bulk + air samples",s:"Production",t:"Freight booked (sea + air samples)"}]
};
const CROSS = [ // [fromDept, fromIdx, toDept, toIdx] — key hand-offs from the PDF
 ["Product",12,"Content",0],["Product",11,"Logistics",0],["Content",3,"Social",0],
 ["Content",3,"Design",3],["Catalog",4,"Marketing",0],["Marketing",1,"Ads",0],["CRM",0,"Email",0]];

/* ================= PLANNED STAGE DURATIONS (days) — drives the Timeline view ================= */
const PLAN={"Concept":21,"Build":35,"Production":45,"Content":21,"Listing creation":14,"Live":10,"Marketing":30};

/* ================= LAUNCH DATA (DRI = a department, not a person) ================= */
function allTasks(overrides){

/* ================= GATE ENGINE (single implementation) ================= */
const criteria = l => (GATES[l.stage]||[]).map(c=>({...c, task:l.tasks.find(t=>t.t===c.t)}));
const gateState = l => { const cs=criteria(l); return {cs, met:cs.filter(c=>c.task&&c.task.st==="x").length, total:cs.length}; };
const mandatory = l => [...new Set((GATES[l.stage]||[]).map(c=>c.d))];
const deptReady = (l,d) => gateState(l).cs.filter(c=>c.d===d).every(c=>c.task.st==="x");
const allMet = l => { const g=gateState(l); return g.met===g.total && !l.complete; };
const canPushRole = l => S.role==="ceo" || (S.role==="dept" && (S.dept===l.dri || mandatory(l).includes(S.dept)));
const health = l => {
  if(l.complete) return ["Complete","done"];
  if(l.tasks.some(t=>t.st==="b")) return ["Blocked","bad"];
  const g=gateState(l);
  if(g.total-g.met===1 && g.cs.some(c=>c.ben&&c.task.st!=="x")) return ["Awaiting Ben ◆","dec"];
  if(g.met/g.total>=.5) return ["On track","ok"];
  return ["In progress","risk"];
};
const benQueue = () => LAUNCHES.filter(l=>!l.complete).flatMap(l=>{const g=gateState(l);return g.cs.filter(c=>c.ben&&c.task.st!=="x"&&g.cs.filter(o=>!o.ben).every(o=>o.task.st==="x")).map(c=>({l,c}));});
const nextUnmet = l => { const g=gateState(l); const c=g.cs.find(c=>c.task.st!=="x"); return c?c.t:null; };

/* ================= SEQUENTIAL UNLOCK ENGINE =================
   Rule: the intake Form is the root — until it's done, everything else is locked.
   Then nodes unlock lane-by-lane (a step opens only when the previous step in its
   department lane is done) and never ahead of the card's current stage. */
function nodeLocked(l,d,i){
  const n=FLOW[d][i];
  if(n.t==="Form (intake)") return false;
  const form=l.tasks.find(t=>t.t==="Form (intake)");
  if(form&&form.st!=="x") return true;
  if(STAGES.indexOf(n.s)>STAGES.indexOf(l.stage)&&!l.complete) return true;
  for(let k=0;k<i;k++){const p=FLOW[d][k]; if(p.t){const pt=l.tasks.find(x=>x.t===p.t); if(pt&&pt.st!=="x") return true;}}
  return false;
}
function taskLocked(l,task){
  if(task.t==="Form (intake)") return false;
  const form=l.tasks.find(t=>t.t==="Form (intake)");
  if(form&&form.st!=="x") return true;
  const lane=FLOW[task.d];
  if(lane){const i=lane.findIndex(n=>n.t===task.t); if(i>=0) return nodeLocked(l,task.d,i);}
  return STAGES.indexOf(task.stage)>STAGES.indexOf(l.stage)&&!l.complete;
}

/* ================= TIMELINE / DELAY ENGINE ================= */
const D=s=>new Date(s+"T00:00");
const dayDiff=(a,b)=>Math.round((D(b)-D(a))/864e5);
function curBlame(l){ // who is holding the current stage: unmet criteria owners + blocked-task owners
  const set=new Set();
  gateState(l).cs.filter(c=>c.task.st!=="x").forEach(c=>set.add(c.d));
  l.tasks.filter(t=>t.st==="b"&&t.stage===l.stage).forEach(t=>set.add(t.d));
  return [...set];
}
function segments(l){
  return (l.history||[]).map((h,i)=>{
    const end=h.end||(l.history[i+1]?l.history[i+1].start:today);
    const days=Math.max(1,dayDiff(h.start,end));
    const plan=PLAN[h.stage]||21;
    const over=Math.max(0,days-plan);
    const cur=!h.end&&!l.history[i+1]&&!l.complete;
    const blame=over?(h.delayBy||(cur?curBlame(l):[])):[];
    return {stage:h.stage,days,plan,over,cur,blame};
  });
}
function delayByDept(){
  const m={};
  LAUNCHES.forEach(l=>segments(l).forEach(s=>{ if(s.over&&s.blame.length){const share=s.over/s.blame.length; s.blame.forEach(d=>m[d]=(m[d]||0)+share);} }));
  return Object.entries(m).map(([d,v])=>({d,v:Math.round(v)})).sort((a,b)=>b.v-a.v);
}
function projectedSlip(l){ // projected finish vs target
  if(l.complete) return 0;
  const cur=segments(l).find(s=>s.cur); if(!cur) return 0;
  const remainCur=Math.max(0,cur.plan-cur.days); // optimistic: rest of plan
  const future=STAGES.slice(STAGES.indexOf(l.stage)+1).reduce((a,s)=>a+(PLAN[s]||21),0);
  const finish=new Date(D(today).getTime()+(remainCur+future)*864e5);
  return Math.round((finish-D(l.target))/864e5);
}

/* ================= SUPER PM ENGINE ================= */
const SLA_DAYS=2, WIP_LIMIT=4;
const LOG=[{d:"2026-06-10 08:00",m:"SuperPM fork initialized from Tracker v2"}];
function log(m){LOG.unshift({d:today+" "+String(8+LOG.length%9).padStart(2,"0")+":"+String(LOG.length*7%60).padStart(2,"0"),m}); if(LOG.length>250)LOG.pop(); save();}
function floatDays(l){ if(l.complete) return 0;
  const cur=segments(l).find(s=>s.cur); const remainCur=cur?Math.max(0,cur.plan-cur.days):0;
  const future=STAGES.slice(STAGES.indexOf(l.stage)+1).reduce((a,s)=>a+(PLAN[s]||21),0);
  return dayDiff(today,l.target)-(remainCur+future);
}
function velocity(l){ const weeks=Math.max(1,dayDiff(l.history[0].start,today)/7);
  return l.tasks.filter(t=>t.st==="x").length/weeks; }
function forecastDate(l){ if(l.complete) return l.target;
  const rem=l.tasks.filter(t=>t.st!=="x").length; const vpd=Math.max(velocity(l)/7,0.05);
  return new Date(D(today).getTime()+Math.ceil(rem/vpd)*864e5).toISOString().slice(0,10); }
function criticalNext(l){ const g=gateState(l); const c=g.cs.find(c=>c.task.st!=="x"); return c?{t:c.t,d:c.d}:null; }
const wip=d=>LAUNCHES.filter(l=>!l.complete).reduce((a,l)=>a+l.tasks.filter(t=>t.d===d&&t.st==="p").length,0);
const decisionAge=(l,t)=>{const d=(l.decisionRequested||{})[t]; return d?dayDiff(d,today):0;};

function autopilot(){ // the auto-correct brain: detect → propose → one-click (or bulk) fix

    l.tasks.filter(t=>t.st==="b").forEach(t=>issues.push({sev:"red",msg:`⛔ ${l.name}: “${t.t}” blocked (${t.d})`,fixLabel:"Escalate",
      fix:t.urg!=="urgent"?()=>{t.urg="urgent";l.checkins.unshift({d:today,a:"Autopilot",txt:`Escalated blocked “${t.t}” to urgent; Director alerted.`});log("⚡ Escalated blocked task on "+l.name);}:null}));
    l.tasks.filter(t=>t.st==="x"&&EVID.has(t.t)&&!(t.links||[]).length).forEach(t=>issues.push({sev:"amber",
      msg:`📎 ${l.name}: “${t.t}” marked done without evidence`,fixLabel:"Reopen",
      fix:()=>{t.st="p";l.checkins.unshift({d:today,a:"Autopilot",txt:`Reopened “${t.t}” — evidence link missing (playbook rule).`});log("⚡ Reopened "+l.name+" / "+t.t);}}));
    const fl=floatDays(l);
    if(fl<0) issues.push({sev:"red",msg:`📉 ${l.name}: float ${fl}d — forecast ${fmt(forecastDate(l))} vs target ${fmt(l.target)}`,fixLabel:null,fix:null});
  });
  DEPTS().forEach(d=>{const w=wip(d); if(w>WIP_LIMIT) issues.push({sev:"amber",msg:`🌊 ${d}: WIP ${w} over limit ${WIP_LIMIT}`,fix:null});});
  return issues;
}

/* ----- portfolio health score (0–100) ----- */
function healthScore(){
  let s=100; const act=LAUNCHES.filter(l=>!l.complete);
  act.forEach(l=>{
    s-=l.tasks.filter(t=>t.st==="b").length*8;
    if(floatDays(l)<0)s-=15;
    const last=l.checkins[0]; if(!last||dayDiff(last.d,today)>7)s-=5;
  });
  benQueue().forEach(({l,c})=>{if(decisionAge(l,c.t)>SLA_DAYS)s-=12;});
  DEPTS().forEach(d=>{if(wip(d)>WIP_LIMIT)s-=5;});
  return Math.max(10,Math.min(100,s));
}

function buildDigest(){
  const lines=[`*BV PORTFOLIO DIGEST — week of ${fmt(today)}*`,""];
  LAUNCHES.filter(l=>!l.complete).forEach(l=>{
    const g=gateState(l),[h]=health(l),cn=criticalNext(l);
    lines.push(`*${l.name}* — ${l.stage} (${g.met}/${g.total} gate criteria) · ${h}`);
    lines.push(`  DRI ${l.dri} · target ${fmt(l.target)} · float ${floatDays(l)}d · forecast ${fmt(forecastDate(l))}`);
    if(cn) lines.push(`  → critical next: ${cn.t} (${cn.d})`);
    l.tasks.filter(t=>t.st==="b").forEach(t=>lines.push(`  ⛔ blocked: ${t.t} (${t.d})`));
    lines.push("");
  });
  const q=benQueue();
  if(q.length){lines.push(`*◆ DECISIONS WAITING ON BEN (SLA ${SLA_DAYS}d)*`);
    q.forEach(({l,c})=>lines.push(`  • ${l.name} — ${c.t} (${decisionAge(l,c.t)}d)`)); lines.push("");}
  const iss=autopilot();
  lines.push(`*AUTOPILOT* — ${iss.length} open issue(s), health score ${healthScore()}/100 (${grade(healthScore())})`);
  const z=LAUNCHES.filter(l=>l.complete);
  if(z.length)lines.push(`\n_Complete: ${z.map(l=>l.name).join(", ")}_`);
  return lines.join("\n");
}

  LAUNCHES.forEach(l=>l.tasks.forEach((t,i)=>items.push({k:"☑ "+l.name+" · "+t.t,f:()=>jumpTask(l.slug,i)})));
  return items.filter(it=>it.k.toLowerCase().includes((q||"").toLowerCase())).slice(0,9);
}

function cycle(slug,i){ // checkbox click cycles status: todo → in progress → done → blocked → todo
  const l=L(slug), t=l.tasks[i];
  if(taskLocked(l,t)){toast("🔒 Locked — "+lockReason(l,t));return;}
  const nx={o:"p",p:"x",x:"b",b:"o"}[t.st];
  if(nx==="x"&&EVID.has(t.t)&&!(t.links||[]).length){toast("📎 Evidence required — attach a link before marking done (see Task Playbook)");return;}
  t.st=nx; if(nx==="x")log("☑ "+l.name+" · "+t.t+" done"); if(nx==="b")log("⛔ "+l.name+" · "+t.t+" blocked"); render();
}
function lockReason(l,t){
  const form=l.tasks.find(x=>x.t==="Form (intake)");
  if(form&&form.st!=="x"&&t.t!=="Form (intake)") return "fill the intake Form first";
  const lane=FLOW[t.d];
  if(lane){const i=lane.findIndex(n=>n.t===t.t);
    for(let k=0;k<i;k++){const p=lane[k]; if(p.t){const pt=l.tasks.find(x=>x.t===p.t); if(pt&&pt.st!=="x") return `finish “${p.t}” first`;}}}
  if(STAGES.indexOf(t.stage)>STAGES.indexOf(l.stage)) return `unlocks at the ${t.stage} stage`;
  return "complete the previous step first";
}
function approve(slug,i){
  const l=L(slug), t=l.tasks[i];

/* ================= MASTER FLOW CHART RENDER (SVG, live-colored per launch) ================= */
function flowSVG(l){
  const depts=Object.keys(FLOW).filter(d=>DEPTS().includes(d)||FLOW[d]);
  const CW=158,GAP=14,NH=46,VG=66,TOP=56;
  const W=depts.length*(CW+GAP)+GAP, H=TOP+Math.max(...depts.map(d=>FLOW[d].length))*VG+30;
  const pos=(d,i)=>{const c=depts.indexOf(d);return {x:GAP+c*(CW+GAP),y:TOP+i*VG};};
  const fill={x:"#14331f",p:"#33260f",b:"#331414",o:"#1d2127",fut:"#15171b"};
  const strk={x:"#4ade80",p:"#fbbf24",b:"#f87171",o:"#3a414b",fut:"#262b32"};
  const stateOf=(n,d,i)=>{
    if(n.t){const t=l.tasks.find(x=>x.t===n.t); if(t){ if(t.st!=="o")return t.st; return nodeLocked(l,d,i)?"fut":"o"; }}
    const si=STAGES.indexOf(n.s),ci=STAGES.indexOf(l.stage);
    if(l.complete||si<ci) return "x";
    return nodeLocked(l,d,i)?"fut":si===ci?"o":"fut";
  };
  const here=nextUnmet(l);
  let svg=`<svg width="${W}" height="${H}" xmlns="http://www.w3.org/2000/svg" style="font-family:inherit">
  <defs><marker id="ar" viewBox="0 0 8 8" refX="7" refY="4" markerWidth="7" markerHeight="7" orient="auto"><path d="M0 0L8 4L0 8z" fill="#4a5260"/></marker></defs>`;
  // columns + headers
  depts.forEach((d,c)=>{const x=GAP+c*(CW+GAP);
    svg+=`<rect x="${x-6}" y="10" width="${CW+12}" height="${H-20}" rx="10" fill="#13161a" stroke="#22262d"/>
    <text x="${x+CW/2}" y="34" text-anchor="middle" fill="${DCOLOR(d)}" font-size="13" font-weight="700">${esc(d)}</text>`;});
  // in-column arrows
  depts.forEach(d=>FLOW[d].forEach((n,i)=>{ if(i<FLOW[d].length-1){const a=pos(d,i),b=pos(d,i+1);
    svg+=`<line x1="${a.x+CW/2}" y1="${a.y+NH}" x2="${b.x+CW/2}" y2="${b.y-3}" stroke="#4a5260" stroke-width="1.3" marker-end="url(#ar)"/>`;}}));
  // cross links
  CROSS.forEach(([fd,fi,td,ti])=>{ if(!FLOW[fd]||!FLOW[td])return; const a=pos(fd,fi),b=pos(td,ti);
    const ax=a.x+CW, ay=a.y+NH/2, bx=b.x, by=b.y+NH/2, mx=(ax+bx)/2;
    svg+=`<path d="M${ax} ${ay} C ${mx} ${ay}, ${mx} ${by}, ${bx-4} ${by}" fill="none" stroke="#3d4654" stroke-width="1.2" stroke-dasharray="4 3" marker-end="url(#ar)"/>`;});
  // nodes
  depts.forEach(d=>FLOW[d].forEach((n,i)=>{const {x,y}=pos(d,i);const st=stateOf(n,d,i);
    const isHere=n.t&&n.t===here;
    const ti=n.t?l.tasks.findIndex(x=>x.t===n.t):-1;
    const click=ti>=0?` style="cursor:pointer" onclick="jumpTask('${l.slug}',${ti})"`:` style="cursor:pointer" onclick="openL('${l.slug}')"`;
    const lines=wrap(n.l,24);
    const body=n.d
      ?`<polygon points="${x+CW/2},${y-2} ${x+CW+4},${y+NH/2} ${x+CW/2},${y+NH+2} ${x-4},${y+NH/2}" fill="${fill[st]}" stroke="${isHere?"#e8b765":strk[st]}" stroke-width="${isHere?2.5:1.4}"/>`
      :`<rect x="${x}" y="${y}" width="${CW}" height="${NH}" rx="9" fill="${fill[st]}" stroke="${isHere?"#e8b765":strk[st]}" stroke-width="${isHere?2.5:1.4}"/>`;
    const tcol=st==="fut"?"#5a626d":st==="o"?"#aab3bd":{x:"#4ade80",p:"#fbbf24",b:"#f87171"}[st]||"#e8eaed";
    svg+=`<g${click}>${body}${lines.map((ln,k)=>`<text x="${x+CW/2}" y="${y+NH/2+(k-(lines.length-1)/2)*12+4}" text-anchor="middle" fill="${tcol}" font-size="9.5">${esc(ln)}</text>`).join("")}
    ${n.d?`<text x="${x+CW/2}" y="${y-6}" text-anchor="middle" fill="#c084fc" font-size="9">◆ decision</text>`:""}
    ${isHere?`<text x="${x+CW/2}" y="${y+NH+14}" text-anchor="middle" fill="#e8b765" font-size="10" font-weight="700">📍 ${l.name} is here</text>`:""}
    <title>${esc(n.l)} — stage: ${n.s}${ti>=0?" · click to open this task on the card":""}${st==="fut"&&ti>=0?" · 🔒 locked until previous step is done":""}</title></g>`;}));
  svg+="</svg>";
  return `<div class="flowwrap">${svg}</div>`;
}
function wrap(s,w){const words=s.split(" ");const out=[""];for(const wd of words){if((out[out.length-1]+" "+wd).trim().length>w)out.push(wd);else out[out.length-1]=(out[out.length-1]+" "+wd).trim();}return out.slice(0,3);}

function viewProgress(){
  const l=L(S.progLaunch); const N=l.tasks.length;

    <line x1="${X(t0)}" y1="${Y(0)}" x2="${X(idealEnd)}" y2="${Y(N)}" stroke="#4a5260" stroke-dasharray="5 4" stroke-width="1.5"/>
    <text x="${Math.min(X(idealEnd),W2-PR-10)}" y="${Y(N)-5}" text-anchor="end" fill="#6b7280" font-size="10">ideal pace → target</text>
    <line x1="${X(D(today).getTime())}" y1="${PT}" x2="${X(D(today).getTime())}" y2="${Y(0)}" stroke="#e8b765" stroke-dasharray="3 3" opacity=".6"/>
    <text x="${X(D(today).getTime())}" y="${PT-4}" text-anchor="middle" fill="#e8b765" font-size="10">today</text>
    <polyline points="${line}" fill="none" stroke="#e8b765" stroke-width="2.5"/>
    ${pts.map(p=>`<circle cx="${X(p[0])}" cy="${Y(p[1])}" r="3.5" fill="#e8b765"/>`).join("")}
    <text x="${PL}" y="${H2-12}" fill="#6b7280" font-size="10">${fmt(l.history[0].start)}</text>

    <text x="${PL-32}" y="${PT+8}" fill="#6b7280" font-size="10">tasks</text></svg>`;

    const dn=ts.filter(t=>t.st==="x").length;return {d,dn,n:ts.length,pct:dn/ts.length};}).filter(Boolean).sort((a,b)=>a.pct-b.pct);

  return `<h2>Progression — <select onchange="S.progLaunch=this.value;render()">${LAUNCHES.map(x=>`<option value="${x.slug}" ${x.slug===S.progLaunch?"selected":""}>${x.name}</option>`).join("")}</select></h2>

    const segs=segments(l); const slip=projectedSlip(l);
    return `<div class="tl-row">
      <div class="tl-head"><b style="font-size:14.5px;cursor:pointer" onclick="openL('${l.slug}')">${l.name}</b>
        <span class="sub" style="margin:0">DRI ${l.dri} · target ${fmt(l.target)}</span>
        ${l.complete?'<span class="pill done">Complete</span>':slip>0?`<span class="pill bad">projected +${slip}d late</span>`:`<span class="pill ok">projected on time</span>`}</div>
      <div class="tl-bar" style="width:${Math.max(220,segs.reduce((a,s)=>a+s.days,0)*PXD+10)}px;max-width:100%">
        ${segs.map(s=>{const si=STAGES.indexOf(s.stage);
          return `<div class="tl-seg" style="width:${s.days*PXD}px;background:${segCol[si]}${s.cur?"cc":"66"};${s.cur?"outline:2px solid var(--accent);outline-offset:-2px;":""}" title="${s.stage}: ${s.days}d (plan ${s.plan}d)${s.over?" — +"+s.over+"d over · "+s.blame.join(", "):""}">
            ${s.over?`<span class="ov" style="width:${Math.min(s.over*PXD,s.days*PXD)}px"></span>`:""}
            <span style="position:relative;z-index:1">${s.stage} ${s.days}d${s.over?` <b style="color:#fecaca">+${s.over}</b>`:""}</span></div>`;}).join("")}
      </div>
      <div class="tl-leg">${segs.filter(s=>s.over).map(s=>`<span style="color:var(--red)">▲ ${s.stage} +${s.over}d</span> — held by <b>${s.blame.join(", ")||"—"}</b>`).join(" · ")||"On plan so far."}</div>
    </div>`;}).join("");
  return `<h2>Timeline — planned vs actual</h2>
  <div class="sub">Each bar = one launch; segment width = real days in that stage (outlined = current stage). Striped red = days over the plan (${STAGES.map(s=>s+" "+PLAN[s]+"d").join(" · ")}).</div>
  <div class="panel"><h3>⏱ DELAY BY DEPARTMENT — who is costing us the most days</h3>
    ${ranks.length?ranks.map((r,i)=>`<div class="dbar"><span class="nm2">${r.d}</span><div class="tr"><div class="fl" style="width:${Math.max(8,r.v/max*100)}%;background:${i===0?"linear-gradient(90deg,#fbbf24,#f87171)":"#e8b76588"};color:${i===0?"#1a0d07":"#e8eaed"}">${r.v}d${i===0?" — biggest bottleneck":""}</div></div></div>`).join(""):'<div class="sub">No overruns recorded.</div>'}
    <div class="sub" style="margin-top:8px">Overrun days are attributed to the departments holding that stage (unmet gate criteria + blocked tasks; past stages from the stage log). Fix the top bar first.</div></div>
  <div class="panel"><h3>LAUNCH TIMELINES</h3>${rows}</div>`;
}
function viewCampaign(){
  const c=CAMPAIGNS[0]; const days=Math.ceil((new Date(c.date)-new Date(today))/864e5);
  return `<h2>Campaign — ${c.name}</h2><div class="sub">🎯 ${fmt(c.date)} · <b>${days} days out</b>.</div>
  <div class="panel"><h3>FEATURED PRODUCTS</h3><div class="board">${c.products.map(s=>`<div class="col">${cardHTML(L(s))}</div>`).join("")}</div></div>
  <div class="panel"><h3>CAMPAIGN TASKS (cross-department)</h3>${c.tasks.map((t,i)=>`<div class="row"><span class="st ${t.st}">${stIcon[t.st]}</span><span>${esc(t.t)} ${(t.links||[]).map(k=>`<a class="lnk" href="${k.u}" target="_blank">🔗 ${esc(k.n)}</a>`).join("")}<button class="addlnk" onclick="addLink('__camp',${i})">+ link</button></span><span class="o">${t.d}</span></div>`).join("")}</div>`;
}
function viewTeam(){
  return `<h2>Team & departments</h2><div class="sub">This is the tracker's <b>people config</b> (the future <code>config/people.yaml</code>). Edit roles, heads and members here — DRI pickers, task owners, gate logic and lenses all read from this list. No personal names required; departments are the unit of ownership.</div>
  <div class="panel"><table><tr><th style="width:140px">Department</th><th>Role / responsibility</th><th style="width:150px">Head (optional)</th><th style="width:170px">Members (optional)</th><th style="width:40px"></th></tr>
  ${TEAM.map((t,i)=>`<tr>
    <td><input type="text" value="${esc(t.name)}" onchange="teamEdit(${i},'name',this.value)"></td>
    <td><input type="text" value="${esc(t.role)}" onchange="teamEdit(${i},'role',this.value)"></td>
    <td><input type="text" placeholder="—" value="${esc(t.head)}" onchange="teamEdit(${i},'head',this.value)"></td>
    <td><input type="text" placeholder="—" value="${esc(t.members)}" onchange="teamEdit(${i},'members',this.value)"></td>
    <td><button class="btn red" style="padding:4px 9px" title="remove" onclick="delDept(${i})">✕</button></td></tr>`).join("")}
  </table><div style="margin-top:10px"><button class="btn ghost" onclick="addDept()">+ Add department</button></div>
  <div class="sub" style="margin-top:10px">Renaming a department updates every task, gate, DRI and flow-chart lane automatically. Removal is blocked while tasks or gates still reference it. (Prototype: edits live in memory; the real app commits them to the repo.)</div></div>`;
}

function render(){
  const sel=document.getElementById("roleSel");
  const cur=S.role==="dept"?"dept:"+S.dept:S.role;
  sel.innerHTML=`<option value="ceo">Ben — CEO</option><option value="director">Director</option>`+DEPTS().map(d=>`<option value="dept:${d}">Head — ${d}</option>`).join("");
  sel.value=[...sel.options].some(o=>o.value===cur)?cur:"ceo";
  document.getElementById("nav").innerHTML=NAVS.map(([v,l])=>`<button class="${S.view===v?"on":""}" onclick="go('${v}')">${l}</button>`).join("");
  const app=document.getElementById("app");
  // datalist for assignee suggestions (from Team tab heads/members + departments)
  let dl=document.getElementById("people");
  if(!dl){dl=document.createElement("datalist");dl.id="people";document.body.appendChild(dl);}
  dl.innerHTML=[...new Set(TEAM.flatMap(t=>[t.name,t.head,...(t.members||"").split(",")]).map(s=>(s||"").trim()).filter(Boolean))].map(p=>`<option value="${esc(p)}">`).join("");
  if(S.view==="launch") app.innerHTML=viewLaunch();
  else if(S.view==="digest") app.innerHTML=viewDigest();
  else if(S.view==="portfolio") app.innerHTML=`<h2>Portfolio <button class="btn" style="margin-left:8px" onclick="newLaunch()">+ New launch</button></h2><div class="sub">Every launch by stage. Click a card. New cards start fully locked except the intake Form.</div>${portfolioBoard()}`;
  else if(S.view==="progress") app.innerHTML=viewProgress();
  else if(S.view==="timeline") app.innerHTML=viewTimeline();
  else if(S.view==="dept") app.innerHTML=viewDept();
  else if(S.view==="flow") app.innerHTML=viewFlow();
  else if(S.view==="campaign") app.innerHTML=viewCampaign();
  else if(S.view==="team") app.innerHTML=viewTeam();
  else app.innerHTML=S.role==="ceo"?homeCEO():S.role==="director"?homeDirector():homeDept();
  const nb=document.getElementById("inboxN"); if(nb){const n=autopilot().length; nb.textContent=n?n:""; }
  renderDrawer(); save();
}
loadSaved();
if(typeof document!=="undefined"&&document.addEventListener){
  document.addEventListener("keydown",e=>{
    if((e.ctrlKey||e.metaKey)&&e.key.toLowerCase()==="k"){e.preventDefault();openPal();}
    else if(e.key==="/"&&document.activeElement&&document.activeElement.tagName!=="INPUT"&&document.activeElement.tagName!=="TEXTAREA"){e.preventDefault();const q=document.getElementById("q");if(q)q.focus();}
    else if(e.key==="Escape"){closePal();}
  });
}
render();
</script>
</body>
</html>
