<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Black Voyage — SuperPM</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://accounts.google.com/gsi/client" async defer></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<style>
  /* ===== BLACK VOYAGE brand system (Brand Guidelines V4) =====
     Primary: Black #111215 · Orange #EE3124 (signal — use strategically)
     Neutrals: Silver #D0D5E1 · Aero White #F6F8FC
     Type: Aeonik (heading/paragraph) · IBM Plex Mono (labels) · rectangles + thin lines */
  :root{
    --bg:#111215; --panel:#16181C; --panel2:#1D2026; --line:#2A2D34;
    --text:#F6F8FC; --dim:#ADB6C6; --faint:#7B8494;
    --accent:#EE3124; --green:#4ade80; --amber:#fbbf24; --red:#f87171; --blue:#60a5fa; --purple:#c084fc;
    --btntext:#fff;
    --font-head:"Aeonik","Inter","Helvetica Neue",-apple-system,"Segoe UI",sans-serif;
    --font-mono:"IBM Plex Mono",ui-monospace,Menlo,Consolas,monospace;
  }
  [data-theme="light"]{
    --bg:#F6F8FC; --panel:#FFFFFF; --panel2:#ECEFF5; --line:#D0D5E1;
    --text:#111215; --dim:#4E5666; --faint:#8A93A3;
  }
  /* cool dark-blue theme — dark base with blue glow */
  [data-theme="blue"]{
    --bg:#0D1320; --panel:#121A2B; --panel2:#16213A; --line:#243353;
    --text:#E3EDFB; --dim:#92A8C7; --faint:#61748C;
    --accent:#3D8BFF;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--bg);color:var(--text);font:14px/1.5 var(--font-head);}
  h2{font-weight:700;letter-spacing:-.01em}
  .panel h3,.col h4,th{font-family:var(--font-mono);font-weight:400;text-transform:uppercase;letter-spacing:.08em}
  .stg,.o,.sla,.checkin .d,.feeditem .d{font-family:var(--font-mono)}
  /* light-theme component overrides */
  [data-theme="light"] .st.x{background:#E9F7EC;border-color:#3E9E5B;color:#1E7E3E}
  [data-theme="light"] .st.p{background:#FFF3E0;border-color:#D68910;color:#A05A00}
  [data-theme="light"] .st.b{background:#FDEAEA;border-color:#D64545;color:#B03030}
  [data-theme="light"] .ok{background:#E9F7EC;color:#1E7E3E} [data-theme="light"] .risk{background:#FFF3E0;color:#A05A00}
  [data-theme="light"] .bad{background:#FDEAEA;color:#B03030} [data-theme="light"] .done{background:#E8F0FE;color:#1A56B0}
  [data-theme="light"] .dec{background:#F3E8FD;color:#7A3FB8}
  [data-theme="light"] .urg.low{background:#E8F0FE;color:#1A56B0} [data-theme="light"] .urg.med{background:#FbF6DD;color:#8a7400}
  [data-theme="light"] .urg.high{background:#FFF0E0;color:#B25E00} [data-theme="light"] .urg.urgent{background:#FDEAEA;color:#B03030}
  [data-theme="light"] .lnk{background:#E8F0FE;color:#1A56B0} [data-theme="light"] .asg{background:#E8EDF6;color:#3C5A8A}
  [data-theme="light"] .stg.past{background:#E9F7EC;color:#1E7E3E;border-color:#bfe5c8}
  [data-theme="light"] .deptchip.rdy{background:#E9F7EC;color:#1E7E3E;border-color:#bfe5c8}
  [data-theme="light"] .flowwrap{background:#FBFCFE}
  [data-theme="light"] .taskpanel{background:#F4F6FA}
  [data-theme="light"] .bar{background:#E3E8F1}
  body[data-wide] main{max-width:none}
  body[data-wide] footer{max-width:none!important}
  @keyframes glowPulse{0%,100%{opacity:1}50%{opacity:.2}}
  .glownode{animation:glowPulse 1.15s ease-in-out infinite}
  @keyframes dashmove{to{stroke-dashoffset:-32}}
  .routeline{animation:dashmove 1.1s linear infinite}
  .routebanner{display:flex;gap:10px;align-items:center;flex-wrap:wrap;border:1px solid var(--accent);background:rgba(238,49,36,.08);color:var(--text);padding:8px 12px;margin-bottom:10px;font-size:12.5px}
  .routebanner a{color:var(--accent)}
  /* ===== SuperPM layer ===== */
  .sla{display:inline-block;padding:2px 9px;border-radius:2px;font-size:11px;font-weight:700;margin-left:6px;font-family:var(--font-mono)}
  .sla.ok{background:#14331f;color:var(--green)} .sla.over{background:#331414;color:var(--red);animation:pulse 1.4s infinite}
  [data-theme="light"] .sla.ok{background:#E9F7EC;color:#1E7E3E} [data-theme="light"] .sla.over{background:#FDEAEA;color:#B03030}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.55}}
  .iconbtn{background:var(--panel2);border:1px solid var(--line);color:var(--dim);border-radius:2px;padding:6px 11px;cursor:pointer;font-size:13px}
  .iconbtn:hover{color:var(--text);border-color:var(--accent)}
  .drawer{position:fixed;top:0;right:-420px;width:400px;max-width:92vw;height:100vh;background:var(--panel);border-left:1px solid var(--line);z-index:40;transition:right .25s;display:flex;flex-direction:column}
  .drawer.openD{right:0}
  .drawer .dh{padding:14px 16px;border-bottom:1px solid var(--line);display:flex;gap:8px;align-items:center}
  .drawer .db{flex:1;overflow-y:auto;padding:12px 16px}
  .feeditem{border-left:3px solid var(--line);padding:6px 10px;margin-bottom:8px;font-size:12.5px}
  .feeditem .d{color:var(--faint);font-size:11px}
  .pal{position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:60;display:flex;align-items:flex-start;justify-content:center;padding-top:12vh}
  .palbox{width:560px;max-width:92vw;background:var(--panel);border:1px solid var(--line);overflow:hidden;box-shadow:0 24px 64px rgba(0,0,0,.5)}
  .palbox input{width:100%;border:none;background:var(--panel2);padding:14px 16px;font-size:15px;border-radius:0}
  .palitem{padding:10px 16px;cursor:pointer;display:flex;gap:10px;align-items:center;font-size:13.5px}
  .palitem:hover,.palitem.sel{background:var(--panel2)}
  .risk{border:1px solid var(--line);border-left:3px solid var(--red);padding:8px 12px;margin-bottom:8px;font-size:13px;background:var(--panel2)}
  .autofix{border:1px solid var(--line);padding:10px 12px;margin-bottom:8px;display:flex;gap:10px;align-items:center;background:var(--panel2)}
  .autofix .sev{width:8px;height:8px;border-radius:1px;flex:none}
  .ghostnote{color:var(--faint);font-size:11.5px}
  .gauge{display:flex;align-items:center;gap:16px}
  .digestbox{width:100%;min-height:380px;background:var(--panel2);border:1px solid var(--line);color:var(--text);padding:14px;font:12.5px/1.6 var(--font-mono);white-space:pre-wrap}
  @keyframes confetti{0%{transform:translateY(-10px) rotate(0)}100%{transform:translateY(105vh) rotate(720deg)}}
  .cf{position:fixed;top:-12px;width:9px;height:14px;z-index:80;animation:confetti 1.4s ease-in forwards;pointer-events:none}
  header{display:flex;align-items:center;gap:18px;padding:12px 20px;border-bottom:1px solid var(--line);position:sticky;top:0;background:var(--bg);z-index:10;flex-wrap:wrap}
  .logo{font-weight:700;letter-spacing:.12em;font-size:15px}
  .logo span{color:var(--accent)}
  nav{display:flex;gap:4px;flex-wrap:wrap}
  nav button{background:none;border:none;color:var(--dim);padding:7px 12px;border-radius:2px;cursor:pointer;font-size:13.5px}
  nav button.on{background:var(--panel2);color:var(--text)}
  .spacer{flex:1}
  .rolewrap{display:flex;align-items:center;gap:8px;font-size:12.5px;color:var(--dim)}
  select,input[type=text]{background:var(--panel2);color:var(--text);border:1px solid var(--line);border-radius:2px;padding:6px 10px;font-size:13px}
  main{padding:20px;max-width:1320px;margin:0 auto}
  h2{font-size:17px;margin-bottom:4px}
  .sub{color:var(--dim);font-size:13px;margin-bottom:18px}
  .kpis{display:grid;grid-template-columns:repeat(auto-fit,minmax(170px,1fr));gap:12px;margin-bottom:22px}
  .kpi{background:var(--panel);border:1px solid var(--line);border-radius:2px;padding:14px 16px}
  .kpi .n{font-size:26px;font-weight:700}
  .kpi .l{color:var(--dim);font-size:12.5px}
  .panel{background:var(--panel);border:1px solid var(--line);border-radius:2px;padding:16px;margin-bottom:18px}
  .panel h3{font-size:14px;margin-bottom:10px;color:var(--accent);letter-spacing:.03em}
  .board{display:flex;gap:12px;overflow-x:auto;padding-bottom:8px}
  .col{min-width:200px;flex:1}
  .col h4{font-size:12px;color:var(--dim);text-transform:uppercase;letter-spacing:.06em;margin-bottom:8px;display:flex;justify-content:space-between}
  .card{background:var(--panel);border:1px solid var(--line);border-radius:2px;padding:12px;margin-bottom:10px;cursor:pointer;transition:border-color .15s}
  .card:hover{border-color:var(--accent)}
  .card .nm{font-weight:600;font-size:14.5px;margin-bottom:3px}
  .card .meta{color:var(--dim);font-size:12px}
  .bar{height:5px;background:var(--panel2);border-radius:1px;margin:8px 0 6px;overflow:hidden}
  .bar i{display:block;height:100%;background:var(--accent)}
  .pill{display:inline-block;padding:2px 9px;border-radius:2px;font-size:11px;font-weight:600;margin-top:6px}
  .ok{background:#14331f;color:var(--green)} .risk{background:#33260f;color:var(--amber)}
  .bad{background:#331414;color:var(--red)} .done{background:#1a2333;color:var(--blue)} .dec{background:#2a1a33;color:var(--purple)}
  .row{display:flex;align-items:center;gap:10px;padding:8px 10px;border-radius:2px;flex-wrap:wrap}
  .row:hover{background:var(--panel2)}
  .st{width:18px;height:18px;border-radius:2px;border:1.5px solid var(--faint);display:inline-flex;align-items:center;justify-content:center;font-size:11px;flex:none;cursor:pointer}
  .st.x{background:#14331f;border-color:var(--green);color:var(--green)}
  .st.p{background:#33260f;border-color:var(--amber);color:var(--amber)}
  .st.b{background:#331414;border-color:var(--red);color:var(--red)}
  .row .o:not(.st){margin-left:auto;color:var(--faint);font-size:12px;white-space:nowrap}
  .lnk{display:inline-flex;align-items:center;gap:4px;background:#1a2333;color:var(--blue);border-radius:2px;padding:1px 9px;font-size:11.5px;text-decoration:none;margin-left:4px}
  .addlnk{background:none;border:1px dashed var(--faint);color:var(--faint);border-radius:2px;padding:0 8px;font-size:11px;cursor:pointer;margin-left:4px}
  .lnkg{display:inline-flex;align-items:center;margin-left:4px}
  .lnkg .lnk{margin-left:0}
  .lnkb{background:none;border:none;color:var(--faint);cursor:pointer;font-size:11px;padding:0 3px;opacity:.65}
  .lnkb:hover{opacity:1;color:var(--accent)}
  .addlnk:hover{color:var(--blue);border-color:var(--blue)}
  .codechip{display:inline-flex;align-items:center;gap:4px;background:#1d2033;color:#c4b5fd;border:1px solid #3a3560;border-radius:2px;padding:1px 8px;font-size:11.5px;cursor:pointer;margin-left:0;font-family:ui-monospace,Menlo,monospace}
  .codechip:hover{background:#262147;color:#ddd6fe}
  .cmodal{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:70;display:flex;align-items:center;justify-content:center;padding:5vh 4vw}
  .cmbox{background:var(--panel);border:1px solid var(--line);border-radius:4px;width:min(880px,96vw);max-height:90vh;display:flex;flex-direction:column;overflow:hidden}
  .cmhead{display:flex;align-items:center;gap:10px;padding:12px 16px;border-bottom:1px solid var(--line)}
  .cmhead b{flex:1;font-size:14px}
  .cmbody{padding:14px 16px;overflow:auto}
  .cmbody textarea{width:100%;min-height:300px;background:#0d0f13;color:#e5e7eb;border:1px solid var(--line);border-radius:3px;padding:10px;font-family:ui-monospace,Menlo,monospace;font-size:12.5px;line-height:1.5;resize:vertical}
  .cmbody iframe{width:100%;height:55vh;border:1px solid var(--line);border-radius:3px;background:#fff}
  .cmbody pre{background:#0d0f13;color:#e5e7eb;border:1px solid var(--line);border-radius:3px;padding:12px;overflow:auto;font-size:12.5px;line-height:1.5;white-space:pre-wrap;word-break:break-word;margin:0}
  .cmfoot{display:flex;gap:8px;justify-content:flex-end;padding:12px 16px;border-top:1px solid var(--line)}
  .cmtab{background:none;border:1px solid var(--faint);color:var(--faint);border-radius:2px;padding:3px 12px;font-size:12px;cursor:pointer}
  .cmtab.on{border-color:var(--blue);color:var(--blue)}
  .gatecard{border:1px solid var(--line);border-radius:2px;padding:12px;margin-bottom:10px;background:var(--panel2)}
  .btn{background:var(--accent);color:#fff;border:none;border-radius:2px;padding:8px 14px;font-weight:600;cursor:pointer;font-size:13px}
  .btn.ghost{background:var(--panel2);color:var(--text);border:1px solid var(--line)}
  .btn.red{background:#3a1d1d;color:var(--red);border:1px solid #5a2a2a}
  .btn:disabled{background:var(--panel2);color:var(--faint);cursor:not-allowed;border:1px solid var(--line)}
  .stages{display:flex;gap:6px;flex-wrap:wrap;margin:10px 0 16px}
  .stg{padding:5px 11px;border-radius:2px;font-size:12px;border:1px solid var(--line);color:var(--faint)}
  .stg.past{background:#14331f;color:var(--green);border-color:#1f4a2e}
  .stg.cur{background:var(--accent);color:#fff;font-weight:700;border-color:var(--accent)}
  .twocol{display:grid;grid-template-columns:1.5fr 1fr;gap:18px}
  @media(max-width:900px){.twocol{grid-template-columns:1fr}}
  .slack{background:#1a1d21;border:1px solid var(--line);border-radius:2px;overflow:hidden}
  .slack .hd{padding:10px 14px;border-bottom:1px solid var(--line);font-weight:700;font-size:13px}
  .slack .msgs{padding:10px 14px;max-height:440px;overflow-y:auto}
  .msg{display:flex;gap:10px;margin-bottom:14px}
  .av{width:34px;height:34px;border-radius:2px;flex:none;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px;color:#fff}
  .msg .who{font-weight:700;font-size:13px}.msg .when{color:var(--faint);font-size:11px;margin-left:6px}
  .msg .txt{font-size:13px;color:#d1d5db;margin-top:2px}
  .appr{border:1px solid var(--line);border-left:3px solid var(--accent);border-radius:2px;padding:10px;margin-top:8px;background:#202329}
  .thr{color:var(--blue);font-size:12px;margin-top:5px;cursor:pointer}
  table{width:100%;border-collapse:collapse;font-size:13px}
  th{color:var(--dim);text-align:left;font-size:11.5px;text-transform:uppercase;letter-spacing:.05em;padding:8px;border-bottom:1px solid var(--line)}
  td{padding:8px;border-bottom:1px solid var(--line);vertical-align:top}
  td input[type=text]{width:100%}
  .cell{display:inline-block;min-width:40px;text-align:center;padding:3px 8px;border-radius:2px;font-size:12px;font-weight:600}
  textarea{width:100%;background:var(--panel2);border:1px solid var(--line);border-radius:2px;color:var(--text);padding:10px;font:13px/1.5 inherit;resize:vertical;min-height:70px}
  #toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--accent);color:#fff;font-weight:600;padding:10px 18px;border-radius:2px;display:none;z-index:50;font-size:13px;max-width:90vw}
  .back{color:var(--blue);cursor:pointer;font-size:13px;margin-bottom:12px;display:inline-block}
  .checkin{border-left:3px solid var(--line);padding:6px 12px;margin-bottom:8px;font-size:13px}
  .checkin .d{color:var(--faint);font-size:11.5px}
  .flowwrap{overflow:auto;border:1px solid var(--line);border-radius:2px;background:#101216}
  .legend{display:flex;gap:14px;flex-wrap:wrap;font-size:12px;color:var(--dim);margin:10px 0}
  .legend i{display:inline-block;width:11px;height:11px;border-radius:1px;margin-right:5px;vertical-align:-1px}
  .deptchip{display:inline-block;background:var(--panel2);border:1px solid var(--line);border-radius:2px;padding:2px 10px;font-size:11.5px;margin:2px 3px 2px 0}
  .deptchip.rdy{background:#14331f;color:var(--green);border-color:#1f4a2e}
  .urg{display:inline-block;padding:1px 8px;border-radius:2px;font-size:10.5px;font-weight:700;text-transform:uppercase;letter-spacing:.04em;margin-left:4px}
  .urg.low{background:#1a2333;color:var(--blue)} .urg.med{background:#2a2a1a;color:#d4c44a}
  .urg.high{background:#33260f;color:#fb923c} .urg.urgent{background:#331414;color:var(--red)}
  .asg{display:inline-block;background:#222a36;color:#aac4e8;border-radius:2px;padding:1px 9px;font-size:11px;margin-left:4px}
  .exp{background:none;border:none;color:var(--faint);cursor:pointer;font-size:11px;margin-left:6px;padding:2px 6px;border-radius:2px}
  .exp:hover{color:var(--text);background:var(--panel2)}
  .taskpanel{background:#13161a;border:1px solid var(--line);border-radius:2px;padding:12px;margin:2px 0 8px 28px;font-size:13px}
  .taskpanel .frow{display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin-bottom:10px}
  .taskpanel label{color:var(--dim);font-size:12px}
  .note{border-left:3px solid #2e3640;padding:4px 10px;margin-bottom:6px}
  .note .d{color:var(--faint);font-size:11px}
  .tl-row{margin-bottom:22px}
  .tl-head{display:flex;align-items:baseline;gap:10px;margin-bottom:6px}
  .tl-bar{display:flex;align-items:stretch;height:34px;border-radius:2px;overflow:hidden;background:var(--panel2);width:100%}
  .tl-seg{position:relative;display:flex;align-items:center;justify-content:center;font-size:10.5px;white-space:nowrap;overflow:hidden;border-right:2px solid var(--bg);min-width:34px}
  .tl-seg .ov{position:absolute;right:0;top:0;bottom:0;background:repeating-linear-gradient(45deg,rgba(248,113,113,.45) 0 6px,rgba(248,113,113,.2) 6px 12px)}
  .tl-leg{font-size:11.5px;color:var(--dim);margin-top:4px}
  .dbar{display:flex;align-items:center;gap:10px;margin-bottom:8px}
  .dbar .nm2{width:110px;font-size:12.5px;text-align:right;color:var(--dim)}
  .dbar .tr{flex:1;background:var(--panel2);border-radius:2px;height:20px;overflow:hidden}
  .dbar .fl{height:100%;border-radius:2px;display:flex;align-items:center;padding-left:8px;font-size:11px;font-weight:700;color:#fff}
  /* ---- Claude chat panel ---- */
  .chatpanel{display:flex;flex-direction:column;height:560px}
  .chatpanel.full{position:fixed;inset:0;z-index:65;height:100vh;border-radius:0;margin:0;max-width:none}
  .chatmsgs{flex:1;overflow-y:auto;padding:6px 2px;display:flex;flex-direction:column;gap:10px}
  .cmsg{display:flex;gap:8px;align-items:flex-start}
  .cmsg .av{width:24px;height:24px;border-radius:3px;flex:none;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#fff}
  .cmsg.user .av{background:#3a4a5a} .cmsg.assistant .av{background:var(--accent)}
  .cmsg .bub{background:var(--panel2);border:1px solid var(--line);border-radius:4px;padding:7px 10px;font-size:13px;line-height:1.5;white-space:pre-wrap;max-width:88%}
  .cmsg .who{font-size:11px;color:var(--faint);margin-bottom:2px}
  .cmsg .acts{margin-top:5px;font-size:11px;color:var(--green)}
  .chatres{border-top:1px solid var(--line);padding:6px 2px;display:flex;flex-wrap:wrap;gap:5px}
  .chatinput{display:flex;gap:6px;padding-top:8px;border-top:1px solid var(--line)}
  .chatinput textarea{flex:1;height:46px;resize:vertical;background:var(--panel2);color:var(--text);border:1px solid var(--line);border-radius:4px;padding:7px 9px;font-family:inherit;font-size:13px}
  .catts{margin-top:7px;display:flex;flex-wrap:wrap;gap:6px}
  .catt{display:inline-flex;align-items:center;gap:5px;background:var(--panel);border:1px solid var(--line);border-radius:5px;padding:6px 11px;font-size:12.5px;color:var(--blue);text-decoration:none;cursor:pointer}
  .catt:hover{border-color:var(--accent)}
</style>
</head>

<header>

}

/* ================= GATE ENGINE (single implementation) ================= */
const criteria = l => (GATES[l.stage]||[]).map(c=>({...c, task:l.tasks.find(t=>t.t===c.t)}));
const gateState = l => { const cs=criteria(l); return {cs, met:cs.filter(c=>c.task&&c.task.st==="x").length, total:cs.length}; };
const mandatory = l => [...new Set((GATES[l.stage]||[]).map(c=>c.d))];
const deptReady = (l,d) => gateState(l).cs.filter(c=>c.d===d).every(c=>c.task.st==="x");
const allMet = l => { const g=gateState(l); return g.met===g.total && !l.complete; };
const canPushRole = l => S.role==="ceo" || (S.role==="dept" && (S.dept===l.dri || mandatory(l).includes(S.dept)));
const health = l => {
  if(l.complete) return ["Complete","done"];
  if(l.tasks.some(t=>t.st==="b")) return ["Blocked","bad"];
  const g=gateState(l);
  if(g.total-g.met===1 && g.cs.some(c=>c.ben&&c.task.st!=="x")) return ["Awaiting Ben ◆","dec"];
  if(g.met/g.total>=.5) return ["On track","ok"];
  return ["In progress","risk"];
};
const benQueue = () => LAUNCHES.filter(l=>!l.complete).flatMap(l=>{const g=gateState(l);return g.cs.filter(c=>c.ben&&c.task.st!=="x"&&g.cs.filter(o=>!o.ben).every(o=>o.task.st==="x")).map(c=>({l,c}));});
const nextUnmet = l => { const g=gateState(l); const c=g.cs.find(c=>c.task.st!=="x"); return c?c.t:null; };

/* ================= SEQUENTIAL UNLOCK ENGINE =================
   Rule: the intake Form is the root — until it's done, everything else is locked.
   Then nodes unlock lane-by-lane (a step opens only when the previous step in its
   department lane is done) and never ahead of the card's current stage. */
function nodeLocked(l,d,i){
  const n=FLOW[d][i];
  if(n.t==="Form (intake)") return false;
  const form=l.tasks.find(t=>t.t==="Form (intake)");
  if(form&&form.st!=="x") return true;
  if(STAGES.indexOf(n.s)>STAGES.indexOf(l.stage)&&!l.complete) return true;
  for(let k=0;k<i;k++){const p=FLOW[d][k]; if(p.t){const pt=l.tasks.find(x=>x.t===p.t); if(pt&&pt.st!=="x") return true;}}
  return false;
}
function taskLocked(l,task){
  if(task.t==="Form (intake)") return false;
  const form=l.tasks.find(t=>t.t==="Form (intake)");
  if(form&&form.st!=="x") return true;
  const lane=FLOW[task.d];
  if(lane){const i=lane.findIndex(n=>n.t===task.t); if(i>=0) return nodeLocked(l,task.d,i);}
  return STAGES.indexOf(task.stage)>STAGES.indexOf(l.stage)&&!l.complete;
}

/* ================= TIMELINE / DELAY ENGINE ================= */
const D=s=>new Date(s+"T00:00");
const dayDiff=(a,b)=>Math.round((D(b)-D(a))/864e5);
function curBlame(l){ // who is holding the current stage: unmet criteria owners + blocked-task owners
  const set=new Set();
  gateState(l).cs.filter(c=>c.task.st!=="x").forEach(c=>set.add(c.d));
  l.tasks.filter(t=>t.st==="b"&&t.stage===l.stage).forEach(t=>set.add(t.d));
  return [...set];
}
function segments(l){
  return (l.history||[]).map((h,i)=>{
    const end=h.end||(l.history[i+1]?l.history[i+1].start:today);
    const days=Math.max(1,dayDiff(h.start,end));
    const plan=PLAN[h.stage]||21;
    const over=Math.max(0,days-plan);
    const cur=!h.end&&!l.history[i+1]&&!l.complete;
    const blame=over?(h.delayBy||(cur?curBlame(l):[])):[];
    return {stage:h.stage,days,plan,over,cur,blame};
  });
}
function delayByDept(){
  const m={};
  LAUNCHES.forEach(l=>segments(l).forEach(s=>{ if(s.over&&s.blame.length){const share=s.over/s.blame.length; s.blame.forEach(d=>m[d]=(m[d]||0)+share);} }));
  return Object.entries(m).map(([d,v])=>({d,v:Math.round(v)})).sort((a,b)=>b.v-a.v);
}
function projectedSlip(l){ // projected finish vs target
  if(l.complete) return 0;
  const cur=segments(l).find(s=>s.cur); if(!cur) return 0;
  const remainCur=Math.max(0,cur.plan-cur.days); // optimistic: rest of plan
  const future=STAGES.slice(STAGES.indexOf(l.stage)+1).reduce((a,s)=>a+(PLAN[s]||21),0);
  const finish=new Date(D(today).getTime()+(remainCur+future)*864e5);
  return Math.round((finish-D(l.target))/864e5);
}

/* ================= SUPER PM ENGINE ================= */
const SLA_DAYS=2, WIP_LIMIT=4;

function log(m){LOG.unshift({d:today+" "+String(8+LOG.length%9).padStart(2,"0")+":"+String(LOG.length*7%60).padStart(2,"0"),m}); if(LOG.length>250)LOG.pop(); save();}
function floatDays(l){ if(l.complete) return 0;
  const cur=segments(l).find(s=>s.cur); const remainCur=cur?Math.max(0,cur.plan-cur.days):0;
  const future=STAGES.slice(STAGES.indexOf(l.stage)+1).reduce((a,s)=>a+(PLAN[s]||21),0);
  return dayDiff(today,l.target)-(remainCur+future);
}
function velocity(l){ const weeks=Math.max(1,dayDiff(l.history[0].start,today)/7);
  return l.tasks.filter(t=>t.st==="x").length/weeks; }
function forecastDate(l){ if(l.complete) return l.target;
  const rem=l.tasks.filter(t=>t.st!=="x").length; const vpd=Math.max(velocity(l)/7,0.05);
  return new Date(D(today).getTime()+Math.ceil(rem/vpd)*864e5).toISOString().slice(0,10); }
function criticalNext(l){ const g=gateState(l); const c=g.cs.find(c=>c.task.st!=="x"); return c?{t:c.t,d:c.d}:null; }
const wip=d=>LAUNCHES.filter(l=>!l.complete).reduce((a,l)=>a+l.tasks.filter(t=>t.d===d&&t.st==="p").length,0);

function healthScore(){
  let s=100; const act=LAUNCHES.filter(l=>!l.complete);
  act.forEach(l=>{

    if(floatDays(l)<0)s-=15;
    const last=l.checkins[0]; if(!last||dayDiff(last.d,today)>7)s-=5;

  DEPTS().forEach(d=>{if(wip(d)>WIP_LIMIT)s-=5;});
  return Math.max(10,Math.min(100,s));
}

function buildDigest(){
  const lines=[`*BV PORTFOLIO DIGEST — week of ${fmt(today)}*`,""];
  LAUNCHES.filter(l=>!l.complete).forEach(l=>{
    const g=gateState(l),[h]=health(l),cn=criticalNext(l);
    lines.push(`*${l.name}* — ${l.stage} (${g.met}/${g.total} gate criteria) · ${h}`);
    lines.push(`  DRI ${l.dri} · target ${fmt(l.target)} · float ${floatDays(l)}d · forecast ${fmt(forecastDate(l))}`);
    if(cn) lines.push(`  → critical next: ${cn.t} (${cn.d})`);
    l.tasks.filter(t=>t.st==="b").forEach(t=>lines.push(`  ⛔ blocked: ${t.t} (${t.d})`));
    lines.push("");
  });
  const q=benQueue();
  if(q.length){lines.push(`*◆ DECISIONS WAITING ON BEN (SLA ${SLA_DAYS}d)*`);
    q.forEach(({l,c})=>lines.push(`  • ${l.name} — ${c.t} (${decisionAge(l,c.t)}d)`)); lines.push("");}
  const iss=autopilot();
  lines.push(`*AUTOPILOT* — ${iss.length} open issue(s), health score ${healthScore()}/100 (${grade(healthScore())})`);
  const z=LAUNCHES.filter(l=>l.complete);
  if(z.length)lines.push(`\n_Complete: ${z.map(l=>l.name).join(", ")}_`);
  return lines.join("\n");
}

/* ----- create a Drive folder for a launch, inside the shared "BV SuperPM" folder -----
   Called from newLaunch(). Best-effort: if Google isn't configured/signed-in, the card is
   still created locally and we just skip (or surface a hint). The folder id is stored on the
   launch so every Sheet/Doc generated for it lands inside its own folder. */
function createLaunchFolder(slug){
  const l=L(slug); if(!l)return;
  if(!GOOGLE_CLIENT_ID||!gReady())return; // Google not set up / still loading → skip silently, card already created
  if(GAUTH.token&&!gHasDrive())GAUTH.token=null; // drop a stale token lacking Drive access so we re-consent
  const fname="BV-SuperPM-"+l.name; // folder named after the product, matching the Doc/Sheet naming
  toast("Creating Drive folder “"+fname+"”…");
  gGetToken(true).then(tok=>{
    if(!gHasDrive())throw {kind:"noscope"};
    const body={name:fname,mimeType:"application/vnd.google-apps.folder"};
    if(GOOGLE_FOLDER_ID)body.parents=[GOOGLE_FOLDER_ID]; // nest inside the shared "BV SuperPM" folder
    return fetch("https://www.googleapis.com/drive/v3/files?fields=id,webViewLink,name",{method:"POST",
      headers:{"Authorization":"Bearer "+tok,"Content-Type":"application/json"},
      body:JSON.stringify(body)})
    .then(r=>r.json()).then(d=>{ if(!d.id)throw ((d.error&&d.error.message)||"create failed");
      // auto-share: anyone with the link can edit, like the generated Sheets/Docs
      return fetch("https://www.googleapis.com/drive/v3/files/"+d.id+"/permissions",{method:"POST",
        headers:{"Authorization":"Bearer "+tok,"Content-Type":"application/json"},
        body:JSON.stringify({role:"writer",type:"anyone"})}).then(()=>d).catch(()=>d); });
  }).then(d=>{
    const cur=L(slug); if(!cur)return;
    cur.driveFolderId=d.id; cur.driveFolderUrl=d.webViewLink||("https://drive.google.com/open?id="+d.id);
    cur.checkins.unshift({d:today,a:actor(),txt:`Drive folder “${d.name||fname}” created in BV SuperPM (anyone-with-link can edit) — new files for this launch are saved there.`});
    log("📁 Drive folder created: "+(d.name||fname)+(GAUTH.email?(" · by "+GAUTH.email):"")); save(); render();
    toast("📁 Drive folder “"+(d.name||fname)+"” created in BV SuperPM");
  }).catch(err=>{
    if(err&&err.kind==="noscope"){toast("Folder not created — re-connect Google and CHECK the “Google Drive” box.");}
    else if(err&&(err.kind==="denied"||err.kind==="unconfigured")){/* sign-in cancelled — card still created locally */}
    else{toast("Couldn't create Drive folder: "+(typeof err==="string"?err:"sign-in needed or blocked by your org"));}
  });
}

/* ================= VERSION HISTORY =================
   Every change is auto-captured: timestamp, who (current role), and a summary of what changed
   in which section. Any previous version can be restored; the restore itself is recorded. */
let VERSIONS=[]; let _lastVerKey=null; let _verNote=null;
function nowStamp(){try{const d=new Date(),p=n=>String(n).padStart(2,"0");return d.getFullYear()+"-"+p(d.getMonth()+1)+"-"+p(d.getDate())+" "+p(d.getHours())+":"+p(d.getMinutes());}catch(e){return (typeof today!=="undefined"?today:"")+" 00:00";}}
let USERNAME=(typeof localStorage!=="undefined"&&localStorage.getItem("bv-username"))||"";
function roleLabel(){return S.role==="ceo"?"Ben (CEO)":S.role==="director"?"Director":(S.dept+" (head)");}
function actor(){return USERNAME?USERNAME:roleLabel();}  // version-history "who" = the real person (falls back to role)
function setUsername(){const n=prompt("Your name — used to label YOUR changes in the shared History so the team can see who did what:",USERNAME||"");if(n===null)return;USERNAME=(n||"").trim();try{localStorage.setItem("bv-username",USERNAME);}catch(e){} renderWhoami(); toast(USERNAME?("👤 You are "+USERNAME):"Name cleared");}
function renderWhoami(){const el=document.getElementById("whoami");if(!el)return;
  el.innerHTML=USERNAME?`<span style="cursor:pointer;color:var(--accent);font-size:12px" title="this is how your edits are labelled in History — click to change" onclick="setUsername()">👤 ${esc(USERNAME)}</span>`:`<button class="btn ghost" style="padding:6px 10px" title="Set your name so your edits show as YOU in the shared History" onclick="setUsername()">👤 Set your name</button>`;}
function verSnap(){return JSON.stringify({v:2,TEAM,LAUNCHES,CAMPAIGNS,GATES,FLOW,XROUTES});} // no LOG → smaller, change-relevant
function stWord(s){return ({o:"to-do",p:"in progress",b:"blocked",x:"done"})[s]||s;}
function saveVersions(){try{if(typeof localStorage==="undefined")return;localStorage.setItem("bv-superpm-versions",JSON.stringify(VERSIONS));}catch(e){try{VERSIONS.length=Math.floor(VERSIONS.length/2);localStorage.setItem("bv-superpm-versions",JSON.stringify(VERSIONS));}catch(_){}}}
function loadVersions(){try{if(typeof localStorage==="undefined")return;const s=localStorage.getItem("bv-superpm-versions");if(s){const a=JSON.parse(s);if(Array.isArray(a))VERSIONS=a;}}catch(e){}}
function diffState(prev,cur){
  const ch=[]; const secs=new Set();
  const pl={}, cl={}; (prev.LAUNCHES||[]).forEach(l=>pl[l.slug]=l); (cur.LAUNCHES||[]).forEach(l=>cl[l.slug]=l);
  Object.keys(cl).forEach(s=>{ if(!pl[s]){ch.push("＋ launch “"+cl[s].name+"” created");secs.add(cl[s].name);} });
  Object.keys(pl).forEach(s=>{ if(!cl[s]){ch.push("✕ launch “"+pl[s].name+"” removed");secs.add(pl[s].name);} });
  Object.keys(cl).forEach(s=>{ const a=pl[s], b=cl[s]; if(!a)return; const nm=b.name;
    if(a.stage!==b.stage){ch.push(nm+": stage "+a.stage+" → "+b.stage);secs.add(nm);}
    if(a.dri!==b.dri){ch.push(nm+": DRI "+a.dri+" → "+b.dri);secs.add(nm);}
    if(a.target!==b.target){ch.push(nm+": target "+a.target+" → "+b.target);secs.add(nm);}
    if((a.complete?1:0)!==(b.complete?1:0)){ch.push(nm+": "+(b.complete?"marked complete 🎉":"reopened"));secs.add(nm);}
    const at={}, bt={}; (a.tasks||[]).forEach(t=>at[t.t]=t); (b.tasks||[]).forEach(t=>bt[t.t]=t);
    Object.keys(bt).forEach(tt=>{ const x=at[tt], y=bt[tt]; if(!x){ch.push(nm+": ＋ task “"+tt+"”");secs.add(nm);return;}
      if(x.st!==y.st){ch.push(nm+" / "+tt+": "+stWord(x.st)+" → "+stWord(y.st));secs.add(nm);}
      const xl=(x.links||[]).length,yl=(y.links||[]).length; if(yl>xl){ch.push(nm+" / "+tt+": +"+(yl-xl)+" link");secs.add(nm);}
      const xn=(x.notes||[]).length,yn=(y.notes||[]).length; if(yn>xn){ch.push(nm+" / "+tt+": +"+(yn-xn)+" note");secs.add(nm);}
      const xc=(x.codes||[]).length,yc=(y.codes||[]).length; if(yc!==xc){ch.push(nm+" / "+tt+": "+(yc>xc?"+"+(yc-xc):(yc-xc))+" code/link");secs.add(nm);}
      if(x.assignee!==y.assignee&&y.assignee){ch.push(nm+" / "+tt+": assigned "+y.assignee);secs.add(nm);}
    });
    const ar=(a.risks||[]).length,br=(b.risks||[]).length; if(br!==ar){ch.push(nm+": "+(br>ar?"+"+(br-ar)+" risk":(br-ar)+" risk"));secs.add(nm);}
    const ac=(a.checkins||[]).length,bc=(b.checkins||[]).length; if(bc>ac){ch.push(nm+": +"+(bc-ac)+" check-in");secs.add(nm);}
  });
  if(JSON.stringify(prev.TEAM)!==JSON.stringify(cur.TEAM)){ch.push("Team updated");secs.add("Team");}
  if(JSON.stringify(prev.CAMPAIGNS)!==JSON.stringify(cur.CAMPAIGNS)){ch.push("Campaigns updated");secs.add("Campaigns");}
  if(JSON.stringify(prev.GATES)!==JSON.stringify(cur.GATES)||JSON.stringify(prev.FLOW)!==JSON.stringify(cur.FLOW)||JSON.stringify(prev.XROUTES)!==JSON.stringify(cur.XROUTES)){ch.push("Process map updated");secs.add("Process map");}
  const summary = ch.length? ch.slice(0,4).join("; ")+(ch.length>4?"; +"+(ch.length-4)+" more":"") : "Minor edit";
  return {sections:[...secs], summary, detail:ch};
}
function pushVersion(entry){ // shared → Firestore (everyone sees it); local → localStorage
  if(fbConfigured()){ if(FB.ready)fbAddVersion(entry); /* if not ready yet, this early change is skipped */ }
  else { entry.id=(VERSIONS[0]?VERSIONS[0].id:0)+1; VERSIONS.unshift(entry); if(VERSIONS.length>80)VERSIONS.length=80; saveVersions(); }
}
function recordVersion(){
  try{
    const snap=verSnap();
    if(_lastVerKey===null){ _lastVerKey=snap;
      if(!VERSIONS.length && !fbConfigured()){VERSIONS.unshift({id:1,ts:nowStamp(),who:actor(),summary:"Baseline — version history started here",sections:[],changes:[],snap}); saveVersions();}
      return; }
    if(snap===_lastVerKey)return;
    const d=diffState(JSON.parse(_lastVerKey),JSON.parse(snap));
    pushVersion({ts:nowStamp(),who:actor(),summary:_verNote||d.summary,sections:d.sections,changes:_verNote?[_verNote].concat(d.detail):d.detail,snap});
    _verNote=null; _lastVerKey=snap;
  }catch(e){}
}
function recordRemoteVersion(who,newSnapStr){
  try{
    if(_lastVerKey===null||_lastVerKey===newSnapStr) return; // no baseline yet, or no change
    const d=diffState(JSON.parse(_lastVerKey),JSON.parse(newSnapStr));
    const id=(VERSIONS[0]?VERSIONS[0].id:0)+1;
    VERSIONS.unshift({id,ts:nowStamp(),who:(who||"someone")+" · remote",summary:d.summary,sections:d.sections,changes:d.detail,snap:newSnapStr});
    if(VERSIONS.length>80)VERSIONS.length=80; saveVersions();
  }catch(e){}
}
function saveCheckpoint(){const lbl=prompt("Checkpoint label — what is this version?","");if(lbl===null)return;
  const snap=verSnap(); pushVersion({ts:nowStamp(),who:actor(),summary:"📌 "+(lbl||"Checkpoint"),sections:[],changes:[],snap});
  _lastVerKey=snap; if(!fbConfigured())render(); toast("📌 Checkpoint saved");}
function restoreVersion(id){
  const v=VERSIONS.find(x=>String(x.id)===String(id)); if(!v){toast("Version not found");return;}
  if(typeof confirm!=="undefined"&&!confirm("Restore version from "+v.ts+" (by "+v.who+")?\n\n“"+(v.summary||"")+"”\n\nThis replaces the current state. The restore is recorded as a new version, so you can undo it."))return;
  try{applySnapshot(JSON.parse(v.snap));}catch(e){toast("Restore failed");return;}
  _verNote="↩ Restored to "+v.ts+" (originally by "+v.who+")";
  log("↩ Restored version from "+v.ts);
  S.view="versions"; render(); // render → save → recordVersion captures the restore
  toast("↩ Restored to "+v.ts);
}

function fbStatus(txt,color){const el=document.getElementById("fbsync"); if(el){el.textContent=txt; el.style.color=color||"var(--faint)";}}
function fbInit(){
  if(!fbConfigured()){fbStatus("",""); return;}

      if(snap.metadata.hasPendingWrites) return;            // our own optimistic write — ignore
      if(!snap.exists){ fbWriteNow(true); return; }          // first ever run → seed the cloud from this state
      const data=snap.data(); if(!data||typeof data.state!=="string") return;

      FB.applying=true;

      try{ if(typeof localStorage!=="undefined")localStorage.setItem("bv-superpm",snapshot()); }catch(e){}
      render(); FB.applying=false;
      if(data.updatedBy&&data.updatedBy!==actor()) toast("🔄 "+data.updatedBy+" updated the board");
    }, err=>{ fbStatus("● offline","var(--red)"); });
    // shared version history — everyone sees every user's changes in the History tab
    FB.versRef.orderBy("createdAt","desc").limit(120).onSnapshot(qs=>{
      const arr=[]; qs.forEach(doc=>{ const x=doc.data(); x.id=doc.id; arr.push(x); });
      VERSIONS=arr; if(S.view==="versions") render();
    }, e=>{});
    // shared KNOWLEDGE base + cross-app MEMORY — read from the BV DATA CORE (bv-second-brain),
    // a SEPARATE Firebase project from this app's board. So SuperPM's AI reads the same brand/catalog/
    // competitor data (and writes memory) that every other BV app shares.
    let coreApp; try{ coreApp=firebase.app("core"); }catch(_){ coreApp=firebase.initializeApp(CORE_CONFIG,"core"); }
    const cdb=coreApp.firestore(); FB.coreDb=cdb;
    cdb.collection("catalog").onSnapshot(qs=>{KNOWLEDGE.catalog=qs.docs.map(d=>d.data());}, e=>{});
    cdb.collection("memory").limit(500).onSnapshot(qs=>{KNOWLEDGE.memory=qs.docs.map(d=>Object.assign({id:d.id},d.data()));}, e=>{});  // shared cross-app memory
    cdb.collection("competitors").onSnapshot(qs=>{KNOWLEDGE.competitors=qs.docs.map(d=>Object.assign({id:d.id},d.data()));}, e=>{});
    cdb.collection("brand_docs").onSnapshot(qs=>{KNOWLEDGE.brand_docs=qs.docs.map(d=>d.data());}, e=>{});  // brand bible / guidelines (chunked)
    // product_docs (full per-product spec sheets): the Core is the target, but until it is seeded
    // we fall back to the copy already in bv-superpm (open) so the AI is usable immediately. Core wins when present.
    let _pdCore=[],_pdFb=[];
    cdb.collection("product_docs").onSnapshot(qs=>{_pdCore=qs.docs.map(d=>d.data()); KNOWLEDGE.product_docs=_pdCore.length?_pdCore:_pdFb;}, e=>{});
    try{ firebase.firestore().collection("product_docs").onSnapshot(qs=>{_pdFb=qs.docs.map(d=>d.data()); if(!_pdCore.length)KNOWLEDGE.product_docs=_pdFb;}, e=>{}); }catch(_){}
    ["tech","series","materials","hardware","glossary"].forEach(c=>cdb.collection(c).onSnapshot(qs=>{KNOWLEDGE[c]=qs.docs.map(d=>d.data());}, e=>{}));
  }catch(e){ fbStatus("● error","var(--red)"); }
}
function fbAddVersion(entry){ try{ FB.versRef.add(Object.assign({},entry,{createdAt:firebase.firestore.FieldValue.serverTimestamp()})); }catch(e){} }
function fbSchedule(){ if(!FB.ready||FB.applying) return; clearTimeout(FB.timer); FB.timer=setTimeout(()=>fbWriteNow(false),700); }
function fbWriteNow(force){
  if(!FB.ready||!FB.synced) return;
  const s=verSnap(); if(!force && s===FB.lastWritten) return;
  FB.lastWritten=s;
  try{ FB.docRef.set({state:s,updatedBy:actor(),updatedAt:firebase.firestore.FieldValue.serverTimestamp()}); }catch(e){}
}

function palItems(q){ const items=[];

  NAVS.forEach(([v,lab])=>items.push({k:"📍 Go to "+lab,f:()=>go(v)}));

  items.push({k:"🆕 New launch…",f:newLaunch});
  items.push({k:"📋 Weekly digest (copy for Slack)",f:()=>go("digest")});
  items.push({k:"⬇ Export JSON backup",f:exportJSON});
  LAUNCHES.forEach(l=>l.tasks.forEach((t,i)=>items.push({k:"☑ "+l.name+" · "+t.t,f:()=>jumpTask(l.slug,i)})));
  return items.filter(it=>it.k.toLowerCase().includes((q||"").toLowerCase())).slice(0,9);

function openPal(){S.palSel=0;const p=document.getElementById("pal");if(p)p.style.display="flex";const q=document.getElementById("palQ");if(q){q.value="";q.focus();}renderPal();}
function closePal(){const p=document.getElementById("pal");if(p)p.style.display="none";}
function renderPal(){const q=document.getElementById("palQ"),list=document.getElementById("palList");if(!list)return;
  const items=palItems(q?q.value:"");
  list.innerHTML=items.map((it,i)=>`<div class="palitem ${i===S.palSel?"sel":""}" onclick="palItems(document.getElementById('palQ').value)[${i}].f();closePal();">${esc(it.k)}</div>`).join("");}
function palKey(e){const q=document.getElementById("palQ");const items=palItems(q?q.value:"");
  if(e.key==="ArrowDown"){S.palSel=Math.min(S.palSel+1,items.length-1);renderPal();e.preventDefault();}
  else if(e.key==="ArrowUp"){S.palSel=Math.max(S.palSel-1,0);renderPal();e.preventDefault();}
  else if(e.key==="Enter"){const it=items[S.palSel];if(it){it.f();closePal();}}
  else if(e.key==="Escape"){closePal();}else{S.palSel=0;}}

function cycle(slug,i){ // checkbox click cycles status: todo → in progress → done → blocked → todo
  const l=L(slug), t=l.tasks[i];
  if(taskLocked(l,t)){toast("🔒 Locked — "+lockReason(l,t));return;}
  const nx={o:"p",p:"x",x:"b",b:"o"}[t.st];
  if(nx==="x"&&EVID.has(t.t)&&!(t.links||[]).length){toast("📎 Evidence required — attach a link before marking done (see Task Playbook)");return;}
  t.st=nx; if(nx==="x")log("☑ "+l.name+" · "+t.t+" done"); if(nx==="b")log("⛔ "+l.name+" · "+t.t+" blocked");
  if(nx==="x"){const lane=FLOW[t.d]; const ii=lane?lane.findIndex(n=>n.t===t.t):-1;
    if(ii>=0){const key=t.d+"|"+lane[ii].l; const others=[...new Set(routeSteps(key,t.d,ii).map(p=>p[0]))].filter(x=>x!==t.d);
      if(others.length){S.route={key,d:t.d,i:ii};
        toast("✨ Done → this hand-off involves: "+others.join(", ")+" — route highlighted on the flow chart");}}}
  render();
}
function lockReason(l,t){
  const form=l.tasks.find(x=>x.t==="Form (intake)");
  if(form&&form.st!=="x"&&t.t!=="Form (intake)") return "fill the intake Form first";
  const lane=FLOW[t.d];
  if(lane){const i=lane.findIndex(n=>n.t===t.t);
    for(let k=0;k<i;k++){const p=lane[k]; if(p.t){const pt=l.tasks.find(x=>x.t===p.t); if(pt&&pt.st!=="x") return `finish “${p.t}” first`;}}}
  if(STAGES.indexOf(t.stage)>STAGES.indexOf(l.stage)) return `unlocks at the ${t.stage} stage`;
  return "complete the previous step first";
}
function approve(slug,i){
  const l=L(slug), t=l.tasks[i];
  if(S.role!=="ceo"){toast("◆ gates can only be approved by Ben (CEO)");return;}
  t.st="x"; l.checkins.unshift({d:today,a:"Ben",txt:`Approved “${t.t}” via Slack. (Mock: committed as [x] + audit line.)`});

}

function renameDept(o,n){ n=n.trim(); if(!n||o===n)return;
  TEAM.find(t=>t.name===o).name=n;
  LAUNCHES.forEach(l=>{l.tasks.forEach(t=>{if(t.d===o)t.d=n;}); if(l.dri===o)l.dri=n;});
  CAMPAIGNS.forEach(c=>c.tasks.forEach(t=>{if(t.d===o)t.d=n;}));
  Object.values(GATES).forEach(cs=>cs.forEach(c=>{if(c.d===o)c.d=n;}));
  if(FLOW[o]){FLOW[n]=FLOW[o]; if(o!==n)delete FLOW[o];}
  Object.keys(XROUTES).forEach(k=>{XROUTES[k]=XROUTES[k].map(([dd,ll])=>[dd===o?n:dd,ll]);
    if(k.startsWith(o+"|")){XROUTES[n+k.slice(o.length)]=XROUTES[k]; delete XROUTES[k];}});
  if(S.dept===o)S.dept=n; toast(`Department renamed ${o} → ${n} everywhere`);
}

function flowSVG(l){
  const depts=Object.keys(FLOW).filter(d=>DEPTS().includes(d)||FLOW[d]);
  const CW=158,GAP=14,NH=46,VG=66,TOP=56;
  const W=depts.length*(CW+GAP)+GAP, H=TOP+Math.max(...depts.map(d=>FLOW[d].length))*VG+30;
  const pos=(d,i)=>{const c=depts.indexOf(d);return {x:GAP+c*(CW+GAP),y:TOP+i*VG};};
  const FT=THEME==="light"
    ?{colBg:"#FFFFFF",colLine:"#DDE3EE",arrow:"#9AA6BA",
      fill:{x:"#E9F7EC",p:"#FFF3E0",b:"#FDEAEA",o:"#EEF1F7",fut:"#F7F9FC"},
      strk:{x:"#3E9E5B",p:"#D68910",b:"#D64545",o:"#B9C2D4",fut:"#E3E8F1"},
      txt:{x:"#1E7E3E",p:"#A05A00",b:"#B03030",o:"#3C4452",fut:"#A9B2C2"}}
    :{colBg:"#13161A",colLine:"#22262D",arrow:"#4A5260",
      fill:{x:"#14331f",p:"#33260f",b:"#331414",o:"#1d2127",fut:"#15171b"},
      strk:{x:"#4ade80",p:"#fbbf24",b:"#f87171",o:"#3a414b",fut:"#262b32"},
      txt:{x:"#4ade80",p:"#fbbf24",b:"#f87171",o:"#aab3bd",fut:"#5a626d"}};
  const fill=FT.fill, strk=FT.strk;
  const stateOf=(n,d,i)=>{
    if(n.t){const t=l.tasks.find(x=>x.t===n.t); if(t){ if(t.st!=="o")return t.st; return nodeLocked(l,d,i)?"fut":"o"; }}
    const si=STAGES.indexOf(n.s),ci=STAGES.indexOf(l.stage);
    if(l.complete||si<ci) return "x";
    return nodeLocked(l,d,i)?"fut":si===ci?"o":"fut";
  };
  const here=nextUnmet(l);
  const rsteps=S.route?routeSteps(S.route.key,S.route.d,S.route.i):null;
  const rset=new Set(rsteps?rsteps.map(p=>p[0]+"|"+p[1]):[]);
  let svg=`<svg width="${W}" height="${H}" viewBox="0 0 ${W} ${H}" preserveAspectRatio="xMidYMin meet" xmlns="http://www.w3.org/2000/svg" style="font-family:inherit;width:100%;height:auto;max-width:100%;display:block">
  <defs><marker id="ar" viewBox="0 0 8 8" refX="7" refY="4" markerWidth="7" markerHeight="7" orient="auto"><path d="M0 0L8 4L0 8z" fill="${FT.arrow}"/></marker></defs>`;
  // columns + headers
  depts.forEach((d,c)=>{const x=GAP+c*(CW+GAP);
    svg+=`<rect x="${x-6}" y="10" width="${CW+12}" height="${H-20}" rx="2" fill="${FT.colBg}" stroke="${FT.colLine}"/>
    <text x="${x+CW/2}" y="34" text-anchor="middle" fill="${DCOLOR(d)}" font-size="13" font-weight="700">${esc(d)}</text>`;});
  // in-column arrows
  depts.forEach(d=>FLOW[d].forEach((n,i)=>{ if(i<FLOW[d].length-1){const a=pos(d,i),b=pos(d,i+1);
    svg+=`<line x1="${a.x+CW/2}" y1="${a.y+NH}" x2="${b.x+CW/2}" y2="${b.y-3}" stroke="${FT.arrow}" stroke-width="1.3" marker-end="url(#ar)"/>`;}}));
  // cross links
  CROSS.forEach(([fd,fi,td,ti])=>{ if(!FLOW[fd]||!FLOW[td])return; const a=pos(fd,fi),b=pos(td,ti);
    const ax=a.x+CW, ay=a.y+NH/2, bx=b.x, by=b.y+NH/2, mx=(ax+bx)/2;
    svg+=`<path d="M${ax} ${ay} C ${mx} ${ay}, ${mx} ${by}, ${bx-4} ${by}" fill="none" stroke="${FT.arrow}" stroke-width="1.2" stroke-dasharray="4 3" marker-end="url(#ar)"/>`;});
  // nodes
  depts.forEach(d=>FLOW[d].forEach((n,i)=>{const {x,y}=pos(d,i);const st=stateOf(n,d,i);
    const isHere=n.t&&n.t===here;
    const ti=n.t?l.tasks.findIndex(x=>x.t===n.t):-1;
    const key=d+"|"+n.l, inR=rset.has(key);
    const click=n.url?` style="cursor:pointer" onclick="window.open('${n.url}','_blank')"`
                     :` style="cursor:pointer" onclick="toggleRouteFor('${d}',${i})"`;
    const lines=wrap(n.l,24);
    const body=n.d
      ?`<polygon points="${x+CW/2},${y-2} ${x+CW+4},${y+NH/2} ${x+CW/2},${y+NH+2} ${x-4},${y+NH/2}" fill="${fill[st]}" stroke="${isHere?"#EE3124":strk[st]}" stroke-width="${isHere?2.5:1.4}"/>`
      :`<rect x="${x}" y="${y}" width="${CW}" height="${NH}" rx="2" fill="${fill[st]}" stroke="${isHere?"#EE3124":strk[st]}" stroke-width="${isHere?2.5:1.4}"/>`;
    const tcol=FT.txt[st]||FT.txt.o;
    svg+=`<g${click}${rsteps&&!inR?' opacity="0.22"':""}>${body}${inR?`<rect class="glownode" x="${x-4}" y="${y-4}" width="${CW+8}" height="${NH+8}" rx="3" fill="none" stroke="#EE3124" stroke-width="3"/>`:""}${lines.map((ln,k)=>`<text x="${x+CW/2}" y="${y+NH/2+(k-(lines.length-1)/2)*12+4}" text-anchor="middle" fill="${tcol}" font-size="9.5">${esc(ln)}</text>`).join("")}
    ${n.d?`<text x="${x+CW/2}" y="${y-6}" text-anchor="middle" fill="#c084fc" font-size="9">◆ decision</text>`:""}${n.url?`<text x="${x+CW/2}" y="${y-6}" text-anchor="middle" fill="#60a5fa" font-size="9">🔗 Figma</text>`:""}
    ${isHere?`<text x="${x+CW/2}" y="${y+NH+14}" text-anchor="middle" fill="#EE3124" font-size="10" font-weight="700">📍 ${l.name} is here</text>`:""}
    <title>${esc(n.l)} — stage: ${n.s}${ti>=0?" · click to open this task on the card":""}${st==="fut"&&ti>=0?" · 🔒 locked until previous step is done":""}</title></g>`;}));
  if(rsteps){const rpts=rsteps.map(([dd,ll])=>{const ii=FLOW[dd]?FLOW[dd].findIndex(nn=>nn.l===ll):-1; if(ii<0)return null; const p=pos(dd,ii); return [p.x+CW/2,p.y+NH/2];}).filter(Boolean);
    if(rpts.length>1) svg+=`<path d="M${rpts.map(p=>p.join(" ")).join(" L ")}" fill="none" stroke="#EE3124" stroke-width="2.5" stroke-dasharray="9 7" class="routeline" opacity="0.85"/>`;}
  svg+="</svg>";
  let banner="";
  if(rsteps){
    const depts=[...new Set(rsteps.map(p=>p[0]))];
    const src=FLOW[S.route.d][S.route.i];
    const ti2=src.t?l.tasks.findIndex(x=>x.t===src.t):-1;
    const hasUrl=rsteps.some(([dd,ll])=>{const nn=(FLOW[dd]||[]).find(n2=>n2.l===ll);return nn&&nn.url;});
    banner=`<div class="routebanner">⚡ <b>ROUTE</b>&nbsp; ${rsteps.map(([dd,ll])=>esc(ll)).join(" → ")}<br>
      ${depts.length>1?`🤝 Cross-department — DRI should reach out to: <b>${depts.join(" + ")}</b>`:`▼ Single department (${depts[0]}) — path runs straight down the lane`}
      ${hasUrl?` · <a href="${FIGMA}" target="_blank">open Figma board ↗</a>`:""}
      ${ti2>=0?`<button class="addlnk" onclick="jumpTask('${l.slug}',${ti2})">open task on card</button>`:""}
      <button class="addlnk" onclick="S.route=null;render()">✕ clear</button></div>`;
  }
  return `${banner}<div class="flowwrap">${svg}</div>`;
}
function wrap(s,w){const words=s.split(" ");const out=[""];for(const wd of words){if((out[out.length-1]+" "+wd).trim().length>w)out.push(wd);else out[out.length-1]=(out[out.length-1]+" "+wd).trim();}return out.slice(0,3);}

function viewProgress(){

    <line x1="${X(t0)}" y1="${Y(0)}" x2="${X(idealEnd)}" y2="${Y(N)}" stroke="${PC.ideal}" stroke-dasharray="5 4" stroke-width="1.5"/>
    <text x="${Math.min(X(idealEnd),W2-PR-10)}" y="${Y(N)-5}" text-anchor="end" fill="${PC.txt}" font-size="10">ideal pace → target</text>
    <line x1="${X(D(today).getTime())}" y1="${PT}" x2="${X(D(today).getTime())}" y2="${Y(0)}" stroke="#EE3124" stroke-dasharray="3 3" opacity=".6"/>
    <text x="${X(D(today).getTime())}" y="${PT-4}" text-anchor="middle" fill="#EE3124" font-size="10">today</text>

  const dp=DEPTS().map(d=>{const ts=l.tasks.filter(t=>t.d===d);if(!ts.length)return null;
    const dn=ts.filter(t=>t.st==="x").length;return {d,dn,n:ts.length,pct:dn/ts.length};}).filter(Boolean).sort((a,b)=>a.pct-b.pct);
  // cross-launch strips

    const bars=[];for(let t=t0+wkMs;t-wkMs<tNow;t+=wkMs)bars.push(Math.max(0,interp(Math.min(t,tNow))-interp(t-wkMs)));

  (CHAT.msgs||[]).forEach(m=>(m.attachments||[]).forEach(a=>inv.push("- ["+(a.type==="code"?"html":"link")+"] "+(a.n||"")+(a.u?(" — "+a.u):"")+"   (generated earlier in this chat)")));
  const res=inv.join("\n")||"(nothing attached to this card yet)";
  const lines=[...new Set((KNOWLEDGE.catalog||[]).map(p=>p.Parent_Model).filter(Boolean))];
  const gloss=(KNOWLEDGE.glossary||[]).filter(g=>g.en_approved).map(g=>"  ✓ \""+g.en_approved+"\""+(g.en_avoid?(" — NOT \""+g.en_avoid+"\""):"")+(g.context?("  ("+g.context+")"):"")).join("\n");
  const kb="BLACK VOYAGE KNOWLEDGE BASE (live from the shared BV DATA CORE) — ground EVERY product/brand/tech/competitor claim in this REAL data before answering (don't invent facts):\n"
   +"- CATALOG: "+(KNOWLEDGE.catalog||[]).length+" SKUs"+(lines.length?" ("+lines.slice(0,8).join(", ")+(lines.length>8?"…":"")+")":"")+" — model/variant/size/material/feature/dimensions. Use search_catalog → get_product.\n"
   +"- PRODUCT SPECS: "+(KNOWLEDGE.product_docs||[]).length+" full spec sheets (技術規格/五金/功能/品牌呈現/MO 史) — the deep source-of-truth per product. Use search_product_spec for detailed specs beyond the catalog row.\n"
   +"- BRAND KNOWLEDGE: core TECH ("+(KNOWLEDGE.tech||[]).length+": Vortex Vacuum Seal™, IPX8, compression), SERIES ("+(KNOWLEDGE.series||[]).length+": Essential/Pro/Pro Lite), MATERIALS ("+(KNOWLEDGE.materials||[]).length+"), HARDWARE ("+(KNOWLEDGE.hardware||[]).length+"), COMPETITORS ("+(KNOWLEDGE.competitors||[]).length+": positioning/strengths/weaknesses/our gap), BRAND GUIDELINES ("+(KNOWLEDGE.brand_docs||[]).length+" sections). Use search_knowledge.\n"
   +"- MEMORY: shared cross-app long-term memory ("+(KNOWLEDGE.memory||[]).length+" facts, shared with every BV app). Call recall before answering; call remember to save durable new insights so they persist across every chat and app.\n"
   +(gloss?("VOICE RULES (approved vs avoided wording — ALWAYS follow when writing any copy):\n"+gloss+"\n"):"");
  return "You are Claude, embedded in the Black Voyage \"SuperPM\" product dashboard. You help the team manage the product card \""+l.name+"\" (stage: "+l.stage+", DRI: "+l.dri+"). This chat is SHARED — everyone on the team sees it and your actions, for this product only.\n"
   +kb
   +"You CAN see everything already attached to this card: the full inventory of links and files the team has uploaded (including ones pasted on individual tasks) is listed below under ATTACHMENTS. When asked what's attached, or to pull/list/collect the links, read them straight from that inventory and give the actual URLs — never say you can't see them.\n"
   +"When asked to upload/attach a link, doc, or HTML, add a note, or change a task status, USE the tools to actually do it on the board (don't just describe it). Think carefully and be thorough and accurate — don't be terse when depth is useful.\n"
   +"Keep ONE final version of each document: attach only the finished version, not drafts. To revise, call add_html with the EXACT SAME label so it replaces the old file. Never create 'v1', 'v2', 'clean', 'draft', or 'final' label variants.\n"
   +"TASKS on this card:\n"+tasks+"\nATTACHMENTS already on this card:\n"+res;
}

    ?`<a class="catt" href="${esc(a.u)}" target="_blank">🔗 ${esc(a.n)}</a>`
    :`<span class="catt" title="open the HTML — preview / source / full page" onclick="openMsgAtt(${mi},${ai})">📄 &lt;/&gt; ${esc(a.n)}</span>`).join("");
  return `<div class="cmsg ${cls}"><div class="av">${av}</div><div><div class="who">${esc(m.who||(m.role==="assistant"?"Claude":"User"))}${m.ts?" · "+esc(m.ts):""}</div>${m.text?`<div class="bub">${esc(m.text)}</div>`:""}${atts?`<div class="catts">${atts}</div>`:""}${(m.actions&&m.actions.length)?`<div class="acts">⚡ ${m.actions.map(esc).join(" · ")}</div>`:""}</div></div>`;
}

function runChatTool(slug,name,input){
  const l=L(slug); if(!l)return {summary:"",text:"card not found"};
  try{
    if(name==="search_catalog"){ const q=(input.query||"").toLowerCase().split(/\s+/).filter(Boolean);
      const hits=(KNOWLEDGE.catalog||[]).map(p=>{const b=[p.SKU,p.Parent_Model,p.Variant,p.Material,p.Size,p.Feature,p.spec].join(" ").toLowerCase(); return {p,s:q.reduce((a,t)=>a+(b.includes(t)?1:0),0)};}).filter(x=>q.length?x.s>0:true).sort((a,b)=>b.s-a.s).slice(0,8).map(x=>x.p);
      if(!hits.length)return {summary:"🔎 catalog",text:"No catalog SKUs matched “"+(input.query||"")+"”. ("+(KNOWLEDGE.catalog||[]).length+" SKUs in catalog.)"};
      const clean=s=>(s||"").replace(/\s+/g," ").trim();
      return {summary:"🔎 catalog ("+hits.length+")",text:"Catalog matches (specs by SKU):\n"+hits.map(p=>"• "+(p.SKU||p.Parent_Model||"?")+(p.Parent_Model&&p.Parent_Model!==p.SKU?" ["+p.Parent_Model+"]":"")+" — material "+(clean(p.Material)||"—")+" · size "+(clean(p.Size)||"—")+(clean(p.Feature)?(" · "+clean(p.Feature)):"")+(clean(p.spec)?(" · dims "+clean(p.spec)):"")).join("\n")+"\n(call get_product for the full spec row; competitor/brand context → search_knowledge)"}; }
    if(name==="search_knowledge"){ const q=(input.query||"").toLowerCase().split(/\s+/).filter(Boolean); let hits=[];
      [["tech",KNOWLEDGE.tech],["series",KNOWLEDGE.series],["materials",KNOWLEDGE.materials],["hardware",KNOWLEDGE.hardware],["competitor",KNOWLEDGE.competitors],["brand",KNOWLEDGE.brand_docs]].forEach(([d,arr])=>(arr||[]).forEach(x=>{const b=Object.values(x).join(" ").toLowerCase(); const s=q.reduce((a,t)=>a+(b.includes(t)?1:0),0); if(q.length?s>0:true)hits.push({d,x,s});}));
      hits=hits.sort((a,b)=>b.s-a.s).slice(0,8);
      if(!hits.length)return {summary:"📚 brand",text:"No brand-knowledge entries matched “"+(input.query||"")+"”."};
      const fmt=h=>{const x=h.x;
        if(h.d==="competitor")return "[COMPETITOR] "+(x.Competitor||"")+" ("+(x.Type||"")+"): "+(x.Positioning||"")+" | strengths: "+(x.Strengths||"")+" | weaknesses: "+(x.Weaknesses||"")+" | OUR gap/opportunity: "+(x["Positioning Gap/Opportunity"]||"");
        if(h.d==="brand")return "[BRAND GUIDELINES"+(x.sourceName?(": "+x.sourceName):"")+"] "+((x.text||"").replace(/\s+/g," ").slice(0,650));
        const nm=x.title_en||x.name_en||x.id||x.material_code||""; const body=(x.content_en||x.description_en||x.positioning_en||x.summary_en||"").replace(/\s+/g," "); const extra=h.d==="series"?(" | vacuum: "+(x.vacuum_en||"")+" | zipper: "+(x.zipper_en||"")+" | hipbelt: "+(x.hipbelt_en||"")):h.d==="materials"?(" | properties: "+(x.properties_en||"").replace(/\s+/g," ")+" | "+(x.composition_en||"")+(x.weight_gsm?(" | "+x.weight_gsm+"gsm"):"")):""; return "["+h.d.toUpperCase()+"] "+nm+": "+body.slice(0,550)+extra;};
      return {summary:"📚 brand ("+hits.length+")",text:"Brand knowledge:\n\n"+hits.map(fmt).join("\n\n")}; }
    if(name==="get_product"){ const q=(input.name||"").toLowerCase(); const clean=s=>(s||"").replace(/\s+/g," ").trim();
      const p=(KNOWLEDGE.catalog||[]).find(p=>(((p.SKU||"")+" "+(p.Parent_Model||"")+" "+(p.Material||"")).toLowerCase().includes(q)));
      if(!p)return {summary:"",text:"No catalog SKU found for “"+(input.name||"")+"”. Try search_catalog first."};
      const shown=new Set(["SKU","Parent_Model","Variant","Size","Material","Feature","spec","_gid","_synced"]);
      const extra=Object.keys(p).filter(k=>!shown.has(k)&&clean(p[k])).map(k=>k.replace(/_/g," ").trim()+": "+clean(p[k]));  // auto-surface weight/liters/expansion etc. once synced
      const rows=["SKU: "+(p.SKU||"—"),"model: "+(clean(p.Parent_Model)||"—")+" · variant "+(clean(p.Variant)||"—")+" · size "+(clean(p.Size)||"—")+" · material "+(clean(p.Material)||"—"),"FEATURE: "+(clean(p.Feature)||"—"),"DIMENSIONS/SPEC: "+(clean(p.spec)||"—")];
      if(extra.length)rows.push("OTHER SPECS: "+extra.join(" · "));
      return {summary:"📦 "+(p.SKU||p.Parent_Model),text:rows.join("\n")}; }
    if(name==="search_product_spec"){ const q=(input.query||"").toLowerCase().split(/\s+/).filter(Boolean);
      const hits=(KNOWLEDGE.product_docs||[]).map(p=>{const b=((p.name||"")+" "+(p.category||"")+" "+(p.currentMO||"")+" "+((p.skus||[]).join(" "))+" "+(p.text||"")).toLowerCase(); return {p,s:q.reduce((a,t)=>a+(b.includes(t)?1:0),0)};}).filter(x=>q.length?x.s>0:true).sort((a,b)=>b.s-a.s).slice(0,3).map(x=>x.p);
      if(!hits.length)return {summary:"📄 spec",text:"No product spec sheet matched “"+(input.query||"")+"”. ("+(KNOWLEDGE.product_docs||[]).length+" spec sheets loaded.)"};
      return {summary:"📄 spec ("+hits.length+")",text:hits.map(p=>"### "+(p.name||"?")+(p.currentMO?(" ["+p.currentMO+"]"):"")+(p.category?(" · "+p.category):"")+"\n"+(p.text||"").slice(0,2800)).join("\n\n———\n\n")}; }
    if(name==="recall"){ const q=(input.query||"").toLowerCase().split(/\s+/).filter(Boolean);
      const hits=(KNOWLEDGE.memory||[]).map(m=>{const b=(((m.text||m.fact||"")+" "+(m.tags||"")+" "+(m.app||"")).toLowerCase()); return {m,s:q.reduce((a,t)=>a+(b.includes(t)?1:0),0)};}).filter(x=>q.length?x.s>0:true).sort((a,b)=>b.s-a.s).slice(0,12).map(x=>x.m);
      if(!hits.length)return {summary:"🧠 recall",text:"No memories matched. ("+(KNOWLEDGE.memory||[]).length+" in shared memory.)"};
      return {summary:"🧠 recall ("+hits.length+")",text:"Recalled from shared memory:\n"+hits.map(m=>"• "+(m.text||m.fact||"")+(m.tags?"  ["+m.tags+"]":"")+(m.app?"  ("+m.app+")":"")).join("\n")}; }
    if(name==="remember"){ const fact=(input.fact||"").trim(); if(!fact)return {text:"Nothing to remember."}; try{(FB.coreDb||firebase.firestore()).collection("memory").add({text:fact,tags:input.tags||"",app:"superpm",entities:[slug],who:actor(),ts:Date.now()});}catch(e){} return {summary:"🧠 remembered",text:"Saved to shared long-term memory (BV Data Core)."}; }
    if(name==="add_link"){ if(!(input.url||"").trim())return {text:"No url provided — include the full url."}; const nm=input.label||"Link"; return {summary:"🔗 "+nm,text:"Shared link “"+nm+"” in the chat.",att:{type:"link",n:nm,u:input.url}}; }
    if(name==="add_html"){ if(!(input.html||"").trim())return {text:"No HTML content was provided — put the FULL html document in the html argument and try once."}; const nm=input.label||"HTML"; return {summary:"</> "+nm,text:"Created HTML “"+nm+"” ("+input.html.length+" chars) — shown inline in the chat.",att:{type:"code",n:nm,h:input.html}}; }
    if(name==="add_note"){ (l.checkins=l.checkins||[]).unshift({d:today,a:actor(),txt:input.text||""}); save(); return {summary:"📝 note",text:"Note added to the log."}; }
    if(name==="set_task_status"){ const map={todo:"o",in_progress:"p",done:"x",blocked:"b"}; const st=map[input.status]; if(!st)return {summary:"",text:"Unknown status."};
      const q=(input.task||"").toLowerCase(); const t=(l.tasks||[]).find(t=>t.t.toLowerCase().includes(q)); if(!t)return {summary:"",text:"No task matching “"+(input.task||"")+"”."};
      t.st=st; save(); return {summary:"✓ "+t.t+"→"+input.status,text:"Set “"+t.t+"” to "+input.status+"."}; }
    return {summary:"",text:"Unknown tool "+name};
  }catch(e){ return {summary:"",text:"Tool error: "+e}; }
}
async function chatSend(slug){
  const input=document.getElementById("chatInput"); if(!input)return;
  const text=(input.value||"").trim(); if(!text)return;
  if(!CHAT_API_URL){toast("⚠️ Chat backend not set yet — deploy the proxy & set CHAT_API_URL (see CHAT-SETUP.md)");return;}
  if(CHAT.busy){toast("Claude is still working…");return;}
  input.value=""; const who=actor(), l=L(slug);
  const prior=(CHAT.msgs||[]).slice();
  chatPush(slug,{role:"user",who,text,ts:nowStamp()});
  CHAT.busy=true; renderChatBody();
  let messages=[];
  for(const mm of prior.concat([{role:"user",who,text}])){ const role=mm.role==="assistant"?"assistant":"user"; const content=mm.role==="user"?((mm.who||"User")+": "+mm.text):mm.text;
    if(messages.length&&messages[messages.length-1].role===role&&typeof messages[messages.length-1].content==="string"){messages[messages.length-1].content+="\n"+content;} else {messages.push({role,content});} }
  const actions=[], atts=[];
  try{
    for(let hop=0;hop<6;hop++){
      const resp=await fetch(CHAT_API_URL,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({model:chatModel(),system:chatSystemPrompt(l),messages,tools:CHAT_TOOLS})}).then(r=>r.json());
      if(resp.error){ chatPush(slug,{role:"assistant",who:"Claude",text:"⚠️ "+((resp.error&&resp.error.message)||"backend error"),ts:nowStamp()}); break; }
      messages.push({role:"assistant",content:resp.content||[]});
      const tus=(resp.content||[]).filter(b=>b.type==="tool_use");
      const txt=(resp.content||[]).filter(b=>b.type==="text").map(b=>b.text).join("\n").trim();
      if(tus.length){ const results=[];
        for(const tu of tus){ const out=runChatTool(slug,tu.name,tu.input||{}); if(out.summary)actions.push(out.summary); if(out.att)atts.push(out.att); results.push({type:"tool_result",tool_use_id:tu.id,content:out.text}); }
        messages.push({role:"user",content:results}); renderChatBody(); continue;
      } else { chatPush(slug,{role:"assistant",who:"Claude",text:txt||(atts.length?"":"(done)"),actions:actions.slice(),attachments:atts.slice(),ts:nowStamp()}); break; }
    }
  }catch(e){ chatPush(slug,{role:"assistant",who:"Claude",text:"⚠️ Couldn't reach the chat backend.",ts:nowStamp()}); }
  CHAT.busy=false; renderChatBody();
}

  else if(S.view==="progress") html=viewProgress();

  renderWhoami(); renderGAuth(); renderDrawer(); save();
}
